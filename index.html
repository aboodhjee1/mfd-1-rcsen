    {"id":"profpractice_11","type":"sba","stem":"A patient suddenly develops one-sided facial drooping, arm weakness, and slurred speech during a dental appointment. Using the FAST assessment, what is the most likely diagnosis and management?","options":["Facial palsy from dental LA — reassure and observe","Stroke (cerebrovascular accident) — call 999 immediately (FAST positive); do not give aspirin until CT scan has excluded haemorrhagic stroke; keep patient calm, do not give fluids by mouth, note time of onset","Bell's palsy — refer to GP","Hypoglycaemia presenting as neurological deficit — check blood glucose before calling 999","Hypertensive crisis — give GTN spray sublingually"],"correct":1,"explanation":"FAST (Face drooping, Arm weakness, Speech difficulty, Time to call 999) is the NHS stroke recognition tool. A FAST-positive patient requires immediate 999 call. Do NOT give aspirin until CT has ruled out haemorrhagic stroke (aspirin worsens bleeds). Note the time of symptom onset (critical for thrombolysis window: <4.5 hours). Maintain airway, keep calm, protect from injury. Do NOT give food/fluids (dysphagia risk). Although hypoglycaemia can mimic stroke — checking BG is appropriate if quick, but do not delay calling 999."},
    {"id":"profpractice_12","type":"sba","stem":"A known diabetic patient (type 1) attends early morning and appears pale, sweaty, and shaking. He is confused and unable to cooperate. Blood glucose is 2.8 mmol/L. He can just swallow. What is the first-line treatment?","options":["Give glucagon 1 mg IM immediately","Apply GlucoGel (glucose 40% dextrose gel) to the inside of the cheek carefully, monitor, and call 999 if no improvement in 10 minutes; give glucagon IM if he becomes fully unconscious","Give 500 mL 5% dextrose IV immediately","Lay flat and start CPR","Give GTN spray sublingually"],"correct":1,"explanation":"If the patient is confused but can swallow (with care): give fast-acting glucose orally — e.g. GlucoGel (Glucogel 40% dextrose gel) squeezed into the buccal sulcus; this provides approximately 10 g of glucose. Alternatively: glucose tablets or sugary drink if safe to swallow. If no improvement or the patient becomes unconscious: give glucagon 1 mg IM. Call 999 if there is any uncertainty about safety. Recheck blood glucose after 10–15 minutes."},
    {"id":"profpractice_13","type":"sba","stem":"A patient in the dental surgery experiences acute hyperventilation — they are breathing very rapidly, feel dizzy, have perioral tingling, and carpopedal spasm. Oxygen saturation is 99%. What is the most appropriate management?","options":["Give oxygen via mask at 10 L/min immediately","Give IV midazolam to sedate the patient","Calm reassurance, ask the patient to try to breathe slowly — do NOT use a paper bag (risk of hypoxia); consider rebreathing device only if no medical cause is identified","Give adrenaline IM 500 µg","Call 999 immediately"],"correct":2,"explanation":"Hyperventilation syndrome (panic attack with psychogenic hyperventilation): patients blow off CO2 causing respiratory alkalosis → perioral/fingertip tingling, dizziness, carpopedal spasm. Management: calm reassurance, slow breathing coaching. The paper bag technique has fallen out of favour due to risk of hypoxia (if the cause is cardiac or respiratory, not psychogenic). O2 saturation 99% supports a psychogenic cause but organic causes (pulmonary embolism) must be excluded. Do NOT give oxygen (further lowers CO2 drive) unless saturation drops."},
    {"id":"profpractice_14","type":"sba","stem":"A patient receiving IV midazolam sedation develops an acute episode of stridor and facial flushing shortly after the amide LA is injected. What is the most likely diagnosis?","options":["Oversedation from midazolam — give flumazenil","Anaphylaxis to the local anaesthetic — give IM adrenaline 500 µg immediately","Vasovagal syncope — lay flat","Hyperventilation — encourage slow breathing","Drug-drug interaction between midazolam and LA"],"correct":1,"explanation":"Stridor (high-pitched upper airway noise from laryngeal/tracheal narrowing) combined with facial flushing after LA injection represents anaphylaxis (angioedema of the upper airway) — a life-threatening emergency. Give IM adrenaline 500 µg immediately (anterolateral thigh), call 999, give 100% O2. Do NOT delay for flumazenil — anaphylaxis requires adrenaline as the primary treatment. True LA allergy is rare (<1% of adverse reactions to LA) but anaphylaxis from any cause is life-threatening."},
    {"id":"profpractice_15","type":"sba","stem":"During a routine procedure, a patient becomes progressively pale and clammy, their BP drops to 80/50 mmHg and pulse is 120 bpm but weak. There is no identifiable allergic trigger or cardiac symptom. What is this clinical picture most consistent with?","options":["Vasovagal syncope","Anaphylaxis","Hypovolaemic or neurogenic shock — call 999 immediately; place supine with legs elevated; maintain airway; give oxygen; monitor vital signs; determine and treat cause","Hyperventilation syndrome","Acute hypertension"],"correct":2,"explanation":"Hypotension (80/50 mmHg) with compensatory tachycardia (120 bpm), pallor, and clammy skin is the picture of circulatory shock. Without allergic features or chest pain, and in the dental setting, this could be hypovolaemic shock (bleeding) or neurogenic shock (following extensive LA/surgical stress). Management: call 999, lay flat with legs elevated (Trendelenburg), oxygen, IV access if available, stop any haemorrhage. Identify the cause urgently. Simple vasovagal is brief and responds to lying flat — persistent signs indicate a different aetiology."},
    {"id":"profpractice_16","type":"sba","stem":"A patient with a history of addison's disease (primary adrenal insufficiency) has an adrenal crisis during a prolonged dental procedure. They are conscious but profoundly hypotensive and bradycardic. What is the most important treatment from the emergency kit?","options":["Adrenaline IM 500 µg","Hydrocortisone 100 mg IM — the primary treatment for adrenal crisis, replacing the absent cortisol stress response","Glucagon 1 mg IM for hypoglycaemia","Aspirin 300 mg for possible MI","GTN spray for angina"],"correct":1,"explanation":"Addisonian/adrenal crisis is caused by acute cortisol deficiency. Signs: profound hypotension, weakness, confusion, abdominal pain, and sometimes bradycardia. Treatment: hydrocortisone 100 mg IM (or IV if available) immediately — this is the critical intervention. Also call 999, lay flat, give oxygen, IV fluid resuscitation (in hospital). Hydrocortisone should be in the dental emergency kit. Adrenaline does not address the underlying deficiency and is not the primary treatment."},
    {"id":"profpractice_17","type":"sba","stem":"During treatment under local anaesthesia, a patient suddenly becomes pale, dizzy, and loses consciousness but is breathing and has a pulse. Recovery occurs within 1–2 minutes on lying flat. What is the most likely diagnosis?","options":["Anaphylaxis","Myocardial infarction","Vasovagal syncope (simple faint) — the most common medical emergency in dental practice","Hypoglycaemia","Epileptic seizure"],"correct":2,"explanation":"Vasovagal syncope is the most common medical emergency in dentistry. It results from a transient decrease in cerebral perfusion triggered by pain, anxiety, or sight of blood, causing bradycardia and hypotension through a vagal reflex. The patient rapidly recovers on lying flat. Key features: prodrome (pallor, sweating, nausea), loss of consciousness, spontaneous rapid recovery in the supine position. Management: lay flat, elevate legs, monitor, give O2, allow recovery."},
    {"id":"profpractice_18","type":"sba","stem":"A 60-year-old man with a prosthetic mitral valve replacement (5 years ago) attends for a routine scale and polish followed by a simple extraction of the upper right first premolar. He has no penicillin allergy. According to NICE CG64 (last reviewed 2016), what is the appropriate antibiotic prophylaxis policy?","options":["Amoxicillin 3 g orally 1 hour pre-procedure for both visits","Antibiotic prophylaxis is NOT routinely recommended in the UK for dental procedures, even in patients at increased risk of infective endocarditis; discuss the risks and benefits, and document the patient's preferences. Prophylaxis should only be considered after specialist cardiology liaison in selected high-risk patients","Clindamycin 600 mg 1 hour pre-procedure","Amoxicillin 2 g IV at the time of extraction","Cephalexin 2 g 1 hour before extraction"],"correct":1,"explanation":"NICE CG64 (Prophylaxis against infective endocarditis) advises that antibiotic prophylaxis against IE is NOT routinely recommended for people at increased risk undergoing dental procedures. The 2016 update added that prophylaxis is 'not routinely recommended' rather than the absolute prohibition implied originally. In selected high-risk patients (e.g. previous IE, prosthetic valve, congenital cyanotic heart disease undergoing invasive dentistry), prophylaxis can be considered after discussion and ideally cardiology input. Importantly, regular prevention of dental disease and good oral hygiene remain the cornerstone of IE risk reduction."},
    {"id":"profpractice_19","type":"sba","stem":"A patient becomes very pale, diaphoretic, and has a rigid arm with clonic twitching lasting 90 seconds. She is not responding to her name. After the episode, she is confused and drowsy. What is the most likely diagnosis and management?","options":["Vasovagal syncope — observe and discharge","Generalised tonic-clonic seizure — protect from injury, do not restrain, do not put anything in the mouth, time the seizure, call 999 if >5 minutes, place in recovery position post-ictally, give buccal midazolam if >5 minutes","Anaphylaxis — give IM adrenaline","Hypoglycaemia — give oral glucose immediately","Transient ischaemic attack (TIA)"],"correct":1,"explanation":"The sequence — tonic (rigid) phase then clonic (rhythmic jerking) followed by post-ictal confusion and drowsiness — is a generalised tonic-clonic seizure. Management: protect from injury by removing hazards; do NOT restrain; do NOT insert anything into the mouth (risk of injury to patient and rescuer); call 999 if the seizure lasts >5 minutes or there is no rapid recovery; give buccal midazolam 10 mg if >5 minutes duration; place in recovery position post-ictally and monitor airway."},
    {"id":"profpractice_20","type":"sba","stem":"According to Resus Council UK, what is the recommended ratio of chest compressions to ventilations in adult CPR when two rescuers are present and both are trained?","options":["15:2","30:2 (same as single rescuer)","10:2","Continuous compressions with asynchronous ventilation only in advanced airway CPR","5:1 for two trained rescuers"],"correct":1,"explanation":"Resus Council UK (2021): the 30:2 compression:ventilation ratio is used for ADULT CPR by ALL rescuers (single or two trained professionals with basic airway) until an advanced airway is in place. Once an ET tube or supraglottic airway is inserted and secured, continuous compressions are given at 100–120/min with ventilations at 10/min asynchronously (no longer need to pause for breaths). In paediatric 2-rescuer professional CPR: 15:2."},
    {"id":"profpractice_21","type":"sba","stem":"A dental practice receives a sharps injury report: a dental nurse sustains a needlestick from a needle previously used on a patient who is hepatitis B surface antigen (HBsAg) positive. The dental nurse is fully vaccinated against hepatitis B with a documented protective response (anti-HBs >10 mIU/mL). What is the immediate management?","options":["No action needed — the nurse is fully vaccinated","Immediate washing of the wound with soap and water (do not suck), report to the occupational health/line manager, document the incident; since the nurse has protective immunity, post-exposure prophylaxis (HBIG + booster) is not required; follow up blood tests at baseline and 3 months","Immediately administer HBIG (hepatitis B immunoglobulin) within 24 hours","Give the nurse prophylactic antivirals immediately","Refer to A&E for IV antibiotics"],"correct":1,"explanation":"For a needlestick injury from a Hep B positive source: (1) immediate wound care (wash with soap and water, encourage gentle bleeding, do NOT suck); (2) report to occupational health / line manager; (3) assess the nurse's immunity. Since the nurse has a documented protective response (anti-HBs >10 mIU/mL), they have adequate immunity — no HBIG or additional booster needed at this time. Follow-up blood testing is still recommended. If the nurse were non-immune or uncertain, HBIG + booster within 24 hours would be required."},
    {"id":"profpractice_22","type":"sba","stem":"A dental nurse sustains a needlestick from a needle used on a patient whose HIV status is unknown. What is the risk of HIV transmission and the key management steps?","options":["Risk is >10% — give post-exposure prophylaxis (PEP) automatically to all needlestick injuries","Risk of HIV transmission from a needlestick with hollow needle is approximately 0.3%; immediate actions: wash wound, report to occupational health/line manager, assess source patient's HIV status (with consent), and refer the injured nurse to a sexual health or infectious disease clinic within 1 hour for HIV PEP assessment (PEP should start within 72 hours if indicated)","No action is needed unless the source patient is known HIV positive","HIV PEP cannot be given more than 4 hours after exposure","The dental nurse must be tested for HIV before any action is taken"],"correct":1,"explanation":"The risk of HIV seroconversion from a single hollow-bore needlestick is approximately 0.3% (1 in 300). Immediate steps: (1) wash wound with soap and water; (2) report to occupational health; (3) assess the risk and source patient (with consent); (4) refer urgently (within 1 hour, certainly within 72 hours) to a specialist clinic for HIV post-exposure prophylaxis (PEP) assessment. PEP (28-day antiretroviral course) is most effective when started within 1 hour but can still be given up to 72 hours post-exposure."},
    {"id":"profpractice_23","type":"sba","stem":"The dental practice is required to maintain which level of decontamination for dental instruments under HTM 01-05?","options":["High-level disinfection using 2% glutaraldehyde for all instruments","Sterilisation using a validated and maintained bench-top steam autoclave (Class B or N, depending on instrument type) as a minimum; instruments must be pre-cleaned and either sterilised in pouches for wrapped storage or used immediately","Disinfection with 70% isopropyl alcohol wipe for all instruments","Chemical cold sterilisation for all instruments","UV light decontamination for non-critical instruments"],"correct":1,"explanation":"HTM 01-05 (Health Technical Memorandum, Decontamination in Primary Dental Care) requires that all reusable dental instruments undergo cleaning (manual or automated), followed by sterilisation in a bench-top steam autoclave (Class B for wrapped items, Class N for unwrapped). Chemical disinfection alone is NOT acceptable for sterilisation. Single-use instruments must not be reused. The process must be validated, documented, and regularly maintained and tested with biological/chemical indicators. Water quality for steam generation must also meet standards."},
    {"id":"profpractice_24","type":"sba","stem":"What is the minimum temperature and holding time required for the steam sterilisation cycle in a Class B bench-top autoclave used in dentistry (for wrapped instruments)?","options":["121°C for 3 minutes","121°C for 15 minutes","134°C for 3 minutes (holding time)","100°C for 30 minutes","134°C for 30 minutes"],"correct":2,"explanation":"HTM 01-05 and EN 13060 standard: the standard porous load (Class B) cycle for wrapped instrument sterilisation is 134°C for a minimum holding time of 3 minutes (134°C/3.5 minutes in some cycle specifications). This achieves a sterility assurance level (SAL) of 10⁻⁶. Unwrapped instruments (Class N cycle): 134°C for 3 minutes also, but must be used immediately. The lower temperature cycle (121°C for 15 minutes) is less commonly used in dentistry. Regular cycle validation, Bowie-Dick test, and biological indicator testing are required."},
    {"id":"profpractice_25","type":"sba","stem":"A patient in the dental chair develops sudden onset right-sided weakness, facial asymmetry, and unintelligible speech. The clock shows these symptoms started 90 minutes ago. What is the relevance of the 4.5-hour 'thrombolysis window' in this context?","options":["The 4.5-hour window is irrelevant to dental practice — only call 999","The 4.5-hour window for intravenous thrombolysis (alteplase) begins at symptom onset; this patient is 90 minutes into the window. Calling 999 immediately maximises the chance the patient arrives at a stroke unit within the thrombolysis window, improving the outcome of ischaemic stroke","At 90 minutes, thrombolysis is no longer possible — no need to hurry","Thrombolysis is given by the dentist in the practice","The time window is only relevant for haemorrhagic stroke"],"correct":1,"explanation":"IV thrombolysis (alteplase) for ischaemic stroke is approved within 4.5 hours of symptom onset. This patient is 90 minutes into the window — calling 999 immediately allows time to reach a stroke unit, obtain CT (to exclude haemorrhage), and potentially receive thrombolysis or mechanical thrombectomy. Every minute of delay = approximately 1.9 million neurons lost ('time is brain'). Documenting the exact time of symptom onset is critically important for the receiving stroke team."},
    {"id":"profpractice_26","type":"sba","stem":"The Supreme Court case Montgomery v Lanarkshire Health Board (2015) fundamentally changed the standard of consent in UK healthcare. What is the key principle established by Montgomery?","options":["The Bolam test (what a reasonable doctor would disclose) is sufficient for consent to be valid","Clinicians must disclose any risk that a REASONABLE PATIENT (not just a 'reasonable doctor') would consider material, or that THIS patient would consider important — the patient-centred standard replaces the Bolam test for consent","Patients must only be told of risks above 1% incidence","Verbal consent without documentation is always sufficient for dental procedures","A signed consent form is itself proof of valid consent"],"correct":1,"explanation":"Montgomery (2015) established that a clinician must tell a patient about any material risk involved in treatment: a risk is material if a reasonable person in the patient's position would consider it significant, or if the clinician knows or should know that THIS particular patient would want to know about it. This patient-centred standard replaces the Bolam test for consent disclosure. It requires a two-way, individualised discussion — a signed form is merely evidence of a process, not proof of valid consent."},
    {"id":"profpractice_27","type":"sba","stem":"A 17-year-old patient attends alone requesting a dental extraction for a painful wisdom tooth. Under UK law, can they consent to this treatment?","options":["No — all patients under 18 require parental consent","Yes — patients aged 16 and over can provide legally valid consent for their own medical and dental treatment under the Family Law Reform Act 1969 (England/Wales) and the Age of Legal Capacity (Scotland) Act 1991","Only if the parent is contactable and implicitly consents","Only if the dentist assesses Gillick competence","Yes, but a parent/guardian must countersign the consent form"],"correct":1,"explanation":"In England, Wales, and Northern Ireland (Family Law Reform Act 1969, s.8): persons aged 16 and over can give valid consent to their own surgical/medical/dental treatment without parental consent. Below 16: a minor can consent if 'Gillick competent' (Fraser guidelines) — sufficient maturity and intelligence to understand the proposed treatment. Parental consent is sought for Gillick-incompetent children or as a safety measure, but a competent young person's decision should be respected."},
    {"id":"profpractice_28","type":"sba","stem":"A 14-year-old girl attends the practice alone requesting an upper anterior composite restoration after chipping a tooth at school. She declines having her parents informed. Which statement BEST distinguishes Gillick competence from the Fraser guidelines as applied in UK dental practice?","options":["Gillick and Fraser are interchangeable terms with identical meaning","Gillick competence is the broader concept (a child under 16 with sufficient understanding and intelligence may consent to medical/dental treatment without parental knowledge); the Fraser guidelines are a specific application originally developed for confidential contraceptive advice and are narrower in scope","Fraser applies to all medical decisions; Gillick applies only to dental decisions","Both apply only after the child reaches age 16","Both require parental consent in addition to the child's"],"correct":1,"explanation":"In Gillick v West Norfolk and Wisbech AHA (1986) the House of Lords ruled that a child under 16 with sufficient maturity and intelligence to understand the proposed treatment can give valid consent without parental involvement — the broad principle of 'Gillick competence'. The Fraser guidelines (named after Lord Fraser) were specifically articulated in that case for confidential contraceptive advice/treatment to under-16s and require additional safeguards. In dentistry, the question is whether the child is Gillick competent for the specific treatment proposed; document the assessment carefully. Note that even a competent child's REFUSAL of treatment can be overridden by the courts in life-threatening circumstances."},
    {"id":"profpractice_29","type":"sba","stem":"A patient discloses in confidence that she is being physically abused by her partner. She does not want you to report this. Under GDC guidance and UK law, what is the most appropriate response?","options":["Immediately report to the police without informing the patient","Maintain strict confidentiality — do not disclose under any circumstances","Explore the patient's wishes, offer signposting to support services (MARAC, domestic violence agencies), clearly document; consider disclosure without consent only if there is a serious risk to life (the patient's or others'), a legal obligation, or a safeguarding concern under local protocols","Refuse to treat the patient until they report the abuse themselves","Contact the patient's GP immediately"],"correct":2,"explanation":"GDC Standards (Standard 4: Confidentiality) and the GDC guidance on confidentiality: patients have the right to confidentiality but this is not absolute. Disclosure without consent may be justified when there is: a serious imminent risk to life; a legal obligation (e.g. court order, notifiable disease); or specific safeguarding circumstances. For adults at risk (domestic violence): offer support, signpost, document accurately, and engage with safeguarding leads if needed. Immediate police disclosure without consent is rarely appropriate unless there is imminent danger."},
    {"id":"profpractice_30","type":"sba","stem":"A patient's dental records are requested by their solicitor as part of a personal injury claim. The patient has given signed consent for this release. Under GDPR and the UK Data Protection Act 2018, what is the correct approach?","options":["Refuse all requests from solicitors — only NHS bodies can access records","The records can be released to the solicitor with the patient's valid signed consent — ensure the records are complete, accurate, and contemporaneous; charge an appropriate fee","Send records without reading them first","Alter records before releasing to remove any embarrassing clinical errors","Only release records over 5 years old"],"correct":1,"explanation":"A patient's dental records are a medico-legal document. With a signed authority from the patient, you may release records to their solicitor. Under GDPR: ensure the release is in response to a valid request, the records are accurate and unaltered (altering records = professional misconduct/fraud), release only what is requested, and charge a reasonable fee. Records should never be altered after the fact. The GDC expects dental records to be complete, legible, contemporaneous, and accurate."},
    {"id":"profpractice_31","type":"sba","stem":"According to GDC Standards for the Dental Team (Standards 4.2.1), what is the general rule on patient confidentiality?","options":["You must share all patient information freely with other healthcare providers","Patient information should only be shared with third parties with the patient's express consent or when there is a clear legal obligation or overriding public interest","Confidentiality applies only to written records — verbal information can be shared freely","Confidentiality is absolute and cannot be breached for any reason","Patient information can be shared with family members without consent in all cases"],"correct":1,"explanation":"GDC Standard 4: 'Respect and protect patients' information.' Key principle: patient information must be kept confidential and only disclosed with the patient's consent, unless required by law, there is an overriding public interest (e.g. safeguarding, disease notification), or it is in the patient's best interests when they lack capacity. Share the minimum information necessary. Always document the reason for any disclosure without consent."},
    {"id":"profpractice_32","type":"sba","stem":"A patient informs you that they are going to harm a named third party. What should you do under GDC guidance?","options":["Keep this information strictly confidential","Document it but take no action","Consider disclosure in the public interest — this is an exception to patient confidentiality when there is a serious and credible risk of harm to an identifiable third party; seek advice from your MDO/defence organisation and consider warning the police","Tell the threatened person without informing the patient","Dismiss it as an idle threat and do not document it"],"correct":2,"explanation":"An explicit credible threat to harm a named third party ('Tarasoff' duty of care principle) is a recognised exception to patient confidentiality under UK law and GDC guidance. The clinician may be obliged to warn authorities/the threatened person. Immediate advice should be sought from your Medical Defence Organisation (MDO). Document all decisions and reasoning carefully. The GDC allows disclosure 'in the public interest' when harm prevention outweighs confidentiality."},
    {"id":"profpractice_33","type":"sba","stem":"A colleague in your practice is consistently arriving to work smelling of alcohol and has made several clinical errors. What is your professional obligation according to GDC Standards?","options":["Report them anonymously to the police","Do nothing — it is not your place to interfere with a colleague's personal life","Raise your concern via the appropriate channel (practice manager, responsible clinician, GDC, or NHS England/NHSE) — GDC Standard 8: 'Raise concerns' requires you to act if a colleague's health or behaviour puts patients at risk","Confront the colleague directly and give them an ultimatum","Discuss the matter with patients to gather evidence"],"correct":2,"explanation":"GDC Standard 8.7: 'Raise concerns if patients are at risk.' If you believe a colleague's health, behaviour, or conduct is compromising patient safety, you have a professional obligation to raise concerns through appropriate channels. This includes: the practice principal, clinical governance lead, NHS England, CQC, or the GDC itself (fitness to practise). Failure to act when you knew of patient risk is itself a GDC concern. Seek advice from your MDO about the most appropriate step."},
    {"id":"profpractice_34","type":"sba","stem":"A patient asks for a copy of their dental records. They are entitled to request these under which legislation?","options":["Freedom of Information Act 2000","UK General Data Protection Regulation (UK GDPR) / Data Protection Act 2018 — patients have a right of subject access to their personal data held by a healthcare provider; this should be provided within one calendar month without charge (unless excessive)","Access to Medical Records Act 1990 (no longer in force)","The Health and Social Care Act 2012","GDC Standards alone (no statutory right)"],"correct":1,"explanation":"Patients have the right to access their personal data (including dental records) under UK GDPR / Data Protection Act 2018 (subject access request — SAR). The practice must respond within one month. In most cases, no fee can be charged. The practice must provide: a copy of the records, an explanation if needed, and must not delete or alter records in anticipation of the request (this would constitute obstruction and misconduct). The Access to Health Records Act 1990 was largely superseded by the DPA for living patients."},
    {"id":"profpractice_35","type":"sba","stem":"What is the purpose of the GDC's 'fitness to practise' procedure?","options":["To discipline dentists for customer service complaints only","To investigate and act upon concerns about a registrant's fitness to practise that may include impairment through health issues, misconduct, criminal convictions, poor performance, or fraud — protecting patients, not punishing dentists","To renew dental licences annually","To resolve contractual disputes between dentists and the NHS","To assess clinical competence at regular intervals for all registrants"],"correct":1,"explanation":"The GDC's fitness to practise procedure investigates concerns that a registrant's ability to practise safely and effectively may be impaired, covering: misconduct, poor performance, adverse physical or mental health, criminal convictions, adverse decisions by other regulatory bodies, and dishonesty. The purpose is PUBLIC PROTECTION (not punishment). Outcomes range from advice to conditions of practice, suspension, or erasure from the register. Voluntary undertakings can be offered in less severe cases."},
    {"id":"profpractice_36","type":"sba","stem":"A patient complains that their dentist failed to diagnose an oral cancer that was later diagnosed at hospital. Under which standard of professional negligence will the dentist be judged in a UK court?","options":["The criminal standard — beyond reasonable doubt","The Bolam test — whether the dentist's conduct fell below the standard of a reasonable body of dental professionals in that specialty — now tempered by Bolitho (the responsible body must logically withstand scrutiny)","The Montgomery standard (patient-centred risk disclosure)","The highest possible standard — the dentist is always negligent if cancer is missed","Whatever standard the patient's expert witness states"],"correct":1,"explanation":"Clinical negligence in the UK is assessed using the Bolam test (1957): a clinician is not negligent if their practice was in accordance with a responsible body of medical/dental opinion skilled in that particular area, even if other practitioners would have acted differently. Bolitho (1997) added that the professional opinion must also withstand logical analysis — a practice cannot be exonerated simply because a body of professionals supports it if it is logically indefensible. Montgomery modified Bolam specifically for consent/risk disclosure."},
    {"id":"profpractice_37","type":"sba","stem":"A patient does not attend for a recall examination and subsequently develops advanced periodontal disease. The dentist sent a recall letter but the patient did not respond. In a potential negligence claim, what is the most important documentation the dentist should have?","options":["A log of all appointments offered to the patient","A contemporaneous record that: the recall letter was sent (copy of letter/evidence of mailing), the patient failed to attend, attempted contact was made, and the dentist documented the patient's periodontal status at the last examination and the advice given","The patient's signed disclaimer","Records of all payments made by the patient","A note that the patient was 'low risk' at last visit only"],"correct":1,"explanation":"Good clinical records are the dentist's primary defence in any negligence claim. The records should show: (1) the periodontal status was assessed and documented at each visit; (2) appropriate advice and recall was recommended; (3) the patient was informed of the consequences of not attending; (4) recall attempts were made and documented; (5) all referrals considered. GDC Standards require accurate and complete records. Records should be kept for 10 years (or until the patient is 25, whichever is longer)."},
    {"id":"profpractice_38","type":"sba","stem":"According to GDC Standards, for how long should dental patient records (including radiographs) be retained in the UK?","options":["5 years from the last appointment","A minimum of 10 years from the date of the last entry, or until the patient is 25 years old (whichever is longer) for children","Indefinitely — records must never be destroyed","3 years from the last appointment only","Until the patient transfers to another practice"],"correct":1,"explanation":"GDC Standards (Standard 4) and NHS/NHSE guidance specify: adult patient records should be retained for a minimum of 10 years (or 11 years if the record involves a continuing course of treatment). For children/young people: records should be retained until the patient is 25 years old, or for 10 years after the last treatment (whichever is longer). Some conditions extend this further (e.g. radiation dose records). After the minimum retention period, records should be destroyed securely (e.g. shredding)."},
    {"id":"profpractice_39","type":"sba","stem":"A patient presents demanding to be seen immediately despite not having an appointment, is verbally abusive to the receptionist, and threatens violence. What is the most appropriate response under GDC guidance?","options":["Treat the patient immediately to de-escalate the situation","The practice has a right to refuse to treat a patient or remove them from the list for violence or threatening behaviour; call the police if there is immediate threat; document the incident; offer emergency referral if there is a genuine dental emergency","Accept the abuse to avoid conflict","Terminate the patient's contract without offering any alternative dental care","See the patient secretly so other patients are not aware"],"correct":1,"explanation":"GDC Standards allow practices to refuse treatment or remove patients who behave threatenably, violently, or abusively. Patient safety and staff wellbeing are paramount. Document all incidents. If there is an immediate threat of violence, call 999. Even after removing a patient from the list, ensure there is an appropriate handover and emergency dental access is available if the patient has a genuine acute dental need. The GDC requires practitioners to act with integrity and treat both patients and colleagues with respect."},
    {"id":"profpractice_40","type":"sba","stem":"A dentist undertakes a clinical audit of their practice's caries management outcomes. What is the correct cycle of a clinical audit?","options":["Set standards → collect data → analyse → change practice → re-audit","Collect data → publish results → change practice","Observe complications → write a report → publish","Set standards → collect data → analyse → achieve 100% compliance in first cycle","Identify a poor outcome → blame a staff member → change staff"],"correct":0,"explanation":"The clinical audit cycle: (1) Choose a topic; (2) Set standards (based on best evidence, guidelines, or best practice); (3) Collect data (measure current practice against standards); (4) Analyse and compare to standards; (5) Identify gaps and implement changes; (6) Re-audit to see if the changes have improved practice (closing the loop). Clinical audit is distinct from research (which generates new knowledge) — audit measures practice against established standards."},
    {"id":"profpractice_41","type":"sba","stem":"A patient wants a second opinion before proceeding with a large restorative treatment plan costing £3,500. Under GDC Standards, what is the appropriate response?","options":["Tell the patient they must accept the plan or leave the practice","Support the patient's right to seek a second opinion and facilitate transfer of records if requested — GDC Standard 2 requires respect for patient autonomy and the right to choose their own care","Charge the patient for the consultation time spent on the treatment plan as a condition of releasing records","Tell the patient a second opinion is unnecessary","Only support a second opinion if the treatment is NHS"],"correct":1,"explanation":"GDC Standard 2 ('Listen to your patients and respect their wishes'): patients have the right to make decisions about their care, including seeking a second opinion. The dentist must support this right, explain the treatment plan clearly, and on request, transfer records to facilitate the second opinion. It would be unprofessional and potentially a GDC concern to obstruct, charge punitively, or discourage a patient from seeking a second opinion."},
    {"id":"profpractice_42","type":"sba","stem":"A junior dental nurse accidentally drops a contaminated instrument on a patient's lap and the patient sustains a minor needle-stick injury. Under the duty of candour (NHS Contractual Duty and Regulation 20, Health and Social Care Act 2008), what must the practice do?","options":["Apologise privately to the nurse and move on","Inform the patient about the incident, say sorry, explain what happened and what will be done to prevent it happening again — offer them a written record of the conversation; document everything","Say nothing to the patient unless they ask","Tell the patient it was an unavoidable accident and not the practice's fault","Report the nurse to the GDC immediately"],"correct":1,"explanation":"The statutory duty of candour (Regulation 20, CQC) and contractual NHS duty of candour require healthcare providers to be open and honest with patients when things go wrong. For a notifiable safety incident: inform the patient (or their family), apologise sincerely (not an admission of liability), explain what happened, offer a written record, and explain what actions will be taken to prevent recurrence. Failing the duty of candour is a breach of CQC regulations. This reflects GDC Standard 7 (Be honest and act with integrity)."},
    {"id":"profpractice_43","type":"sba","stem":"Under GDC Standards, which of the following correctly describes the principle of 'valid consent' in dentistry?","options":["A signed consent form is required for every dental procedure","Valid consent must be voluntary (freely given, no coercion), informed (sufficient information about the procedure, risks, alternatives), and given by a person with capacity to make the decision — the process is more important than the signature","Implied consent (patient sitting in the chair) is sufficient for all procedures","Valid consent requires witnessed signatures","Parents must consent for all patients under 16 in all circumstances"],"correct":1,"explanation":"Valid consent has three elements: (1) VOLUNTARY — free from coercion; (2) INFORMED — adequate information about the nature of the procedure, material risks, alternatives (including no treatment), and what will happen if treatment is not accepted; (3) CAPACITY — the patient has the mental capacity to understand, retain, weigh, and communicate their decision. A signature on a form is NOT consent — it is evidence that a consent discussion took place. Process-based consent (ongoing discussion) is the gold standard."},
    {"id":"profpractice_44","type":"sba","stem":"A dentist friend asks you to falsify a patient's dental records to help with an insurance claim. What should you do?","options":["Help if the patient and dentist both agree","Refuse — falsifying clinical records is dishonest (GDC Standard 7), potentially criminal (fraud under the Fraud Act 2006), and a serious GDC fitness to practise matter that could lead to erasure from the register","Agree if the dentist provides a formal written request","Ask your MDO whether this is acceptable","Only refuse if the amount of money involved is large"],"correct":1,"explanation":"Falsifying clinical records is: (1) dishonest conduct (GDC Standard 7 — be honest and act with integrity); (2) potentially criminal — fraud by false representation (Fraud Act 2006, s.2); (3) a very serious GDC fitness to practise matter that is likely to result in erasure from the register. There is no circumstance in which falsifying records is acceptable. You must refuse and, if appropriate, report the request to your MDO. Colluding in dishonesty carries the same consequences as committing it."},
    {"id":"profpractice_45","type":"sba","stem":"A patient makes an NHS complaint about the quality of their denture. Under NHS complaints regulations, what is the first step the practice must take?","options":["Refer the complaint directly to NHS England or the CQC","Acknowledge the complaint within 3 working days (or within 10 working days for written investigations) and investigate under the NHS complaints procedure (NHS Constitution, 2023); try to resolve locally in the first instance before escalating to the Parliamentary and Health Service Ombudsman (PHSO)","Refuse to deal with NHS complaints directly — all must go to NHS England","Investigate without informing the patient of the process","Send the patient a discount voucher"],"correct":1,"explanation":"NHS England/Wales complaints procedure (NHS Constitution / Local Authority Social Services and NHS Complaints (England) Regulations 2009): complaints should be acknowledged within 3 working days. The practice should investigate and respond in writing, usually within 25 working days (or as agreed with the complainant). If local resolution fails, the patient can escalate to NHS England or ultimately to the Parliamentary and Health Service Ombudsman (PHSO). All NHS practices must have a written complaints procedure."},
    {"id":"profpractice_46","type":"sba","stem":"The GDC Standards for the Dental Team has how many Standards?","options":["5 Standards","7 Standards","9 Standards","12 Standards","15 Standards"],"correct":2,"explanation":"GDC Standards for the Dental Team (2013, updated periodically) contains 9 Standards: 1. Put patients' interests first; 2. Communicate effectively with patients; 3. Obtain valid consent; 4. Maintain and protect patients' information; 5. Have a clear complaints procedure; 6. Work with colleagues in a way that is in patients' best interests; 7. Maintain, develop, and work within your professional knowledge and skills; 8. Raise concerns if patients are at risk; 9. Make sure your personal behaviour maintains patients' confidence in you and the dental profession."},
    {"id":"profpractice_47","type":"sba","stem":"A 35-year-old woman attends for a routine examination. She has good oral hygiene, low caries rate, no perio risk factors, no medical or social risk factors, and her last filling was 12 years ago. According to NICE CG19/NG19 (Dental recall) and DBOH 4th edition risk-based recall guidance, what is the appropriate maximum recall interval?","options":["Every 3 months","Every 6 months for all adults regardless of risk","Up to 24 months — recall intervals should be set on the basis of an individual's risk assessment, with low-risk adults eligible for intervals up to 24 months","Every 12 months only — UK regulations forbid longer","Every 36 months for low-risk adults"],"correct":2,"explanation":"NICE CG19 (Dental recall, last reviewed 2018) and DBOH 4th edition (PHE/UKHSA 2021) specify that dental recall intervals should be tailored to individual risk: adults at low risk may have recalls up to 24 months apart; higher-risk adults at 3–12 months. Children at low risk: up to 12 months; higher-risk children may need 3–6 monthly intervals. The fixed 6-monthly recall is no longer recommended for everyone — risk-based recall intervals are the standard. Documentation of the risk assessment and rationale is essential."},
    {"id":"profpractice_48","type":"sba","stem":"A patient presents with a suspicious white lesion that the dentist believes may be a serious oral condition. Under GDC Standards and NICE guidance, what is the appropriate referral pathway?","options":["Refer under the routine 18-week pathway","Monitor for 6 months before referring","Refer urgently under the 2-week wait (2WW) suspected cancer pathway if the lesion is unexplained and persistent (e.g. unexplained ulceration >3 weeks, unexplained white/red patches, suspicious induration) — NICE NG12","Biopsy in primary care and refer only if positive","Refer to the oral hygienist first"],"correct":2,"explanation":"NICE NG12 (Suspected Cancer: recognition and referral, updated 2021): urgent 2-week wait referral is recommended for patients with unexplained oral symptoms/signs including: unexplained oral ulceration lasting ≥3 weeks, persistent unexplained erythroplakia or white patch (especially if red component), induration of the oral mucosa, unexplained neck lump in adults, or oral swelling. Consider 2WW also for any lesion where oral cancer cannot be excluded clinically."},
    {"id":"profpractice_49","type":"sba","stem":"A dental practice is visited by a CQC inspector. Which regulatory standard is NOT directly within the CQC's remit for dental practices?","options":["Safe care and treatment (decontamination standards, clinical safety)","Effective leadership and governance","Whether the practice's NHS contract meets financial targets (item of service fee management)","Person-centred care (treating patients with dignity)","Safeguarding vulnerable adults and children"],"correct":2,"explanation":"The CQC (Care Quality Commission) regulates dental practices in England against its 5 key questions: Is the service Safe, Effective, Caring, Responsive, and Well-led? The CQC's remit covers patient safety, infection control, safeguarding, consent processes, governance, and care quality. Financial matters (NHS contract performance, item of service claims, targets) are NHS England/BSA matters — NOT within CQC's direct regulatory remit, though financial governance of the practice is a CQC concern."},
    {"id":"profpractice_50","type":"sba","stem":"A patient who is a Jehovah's Witness with full capacity refuses a blood transfusion that would be life-saving after a major oral surgical complication. The patient is fully informed and makes this decision of their own free will. What is the correct response?","options":["Override the refusal and administer the blood transfusion to save their life","Accept and document the refusal — a competent adult has an absolute right to refuse any medical treatment, including life-saving treatment, even if you disagree with their decision","Obtain a court order to override the refusal","Sedate the patient to circumvent the refusal","Call the police to obtain a blood transfusion order"],"correct":1,"explanation":"A competent adult has the absolute right to refuse any medical treatment, even life-saving treatment, under UK law (Mental Capacity Act 2005 and common law). This includes Jehovah's Witnesses refusing blood products. The refusal must be respected as long as the patient: has capacity; is fully informed of the consequences; is making the decision voluntarily. Document clearly, note the time and witnesses, and continue to provide all other care possible. It is lawful and ethical to respect this decision; overriding it constitutes battery."},
    {"id":"profpractice_51","type":"sba","stem":"The DMFT/dmft index is used to measure caries experience in populations. What does the 'T' in DMFT stand for and what does the index measure?","options":["Teeth — it measures the total number of teeth in the mouth","Treatment — DMFT measures the number of Decayed, Missing, and Filled Teeth (or tooth surfaces) due to caries, providing a cumulative index of caries experience in permanent dentitions (DMFT) or primary dentitions (dmft)","Toothache — it measures pain associated with caries","Total — it measures the total number of carious cavities","Time — it measures the time taken for caries to develop"],"correct":1,"explanation":"DMFT (Decayed, Missing, Filled Teeth) is the WHO index for caries experience: D = untreated decayed teeth; M = missing teeth (extracted due to caries); F = filled/restored teeth (previously treated for caries). The index gives a cumulative measure of lifetime caries experience and is used in epidemiological surveys (e.g. NHS National Dental Epidemiology Programmes). dmft is the equivalent for primary dentition. Each tooth is scored once; the index can range from 0 to 28 (DMFT for permanent)."},
    {"id":"profpractice_52","type":"sba","stem":"According to the latest NHS Child Dental Health Survey (2022/2023) findings for 5-year-olds in England, what is the approximate proportion of children with evidence of decay experience (dmft >0)?","options":["5%","15%","23–25%","50%","70%"],"correct":2,"explanation":"NHS Child Dental Health Survey 2022/23 (England): approximately 23–25% of 5-year-olds in England had obvious decay experience (dmft>0). This represents a significant improvement from 2012 (~28%) but remains a substantial public health burden. The condition is disproportionately more common in deprived communities. Dental caries remains the most common reason for hospital admissions in children aged 6–10 in England."},
    {"id":"profpractice_53","type":"sba","stem":"A 4-year-old child weighing 16 kg has a fever and toothache from an irreversible pulpitis the day before a planned extraction. The parent asks for paracetamol. What is the appropriate single dose and frequency, according to the BNF for Children?","options":["120 mg every 4 hours, max 4 doses in 24 hours","250 mg every 6 hours, max 4 doses in 24 hours","Approximately 240 mg (15 mg/kg) every 4–6 hours, maximum 4 doses (60 mg/kg) in 24 hours","500 mg every 6 hours, max 4 doses in 24 hours","800 mg every 6 hours, max 4 doses in 24 hours"],"correct":2,"explanation":"BNF for Children paediatric paracetamol dosing for pain/fever: 15 mg/kg per dose (range 10–15 mg/kg), every 4–6 hours, maximum 60 mg/kg or 4 doses in 24 hours. For a 16 kg child: 16 × 15 = 240 mg per dose. Standard preparations: 120 mg/5 mL or 250 mg/5 mL paracetamol suspension — round to nearest practical 5 mL volume. Caution in hepatic impairment, low body weight, and avoid overlap with combination products. Always check the child's actual weight rather than rely on age."},
    {"id":"profpractice_54","type":"sba","stem":"The Delivering Better Oral Health toolkit (DBOH, 4th edition, PHE 2021) recommends which of the following for all children from first tooth eruption?","options":["Use 500 ppm fluoride toothpaste until age 6, then 1000 ppm","Use a smear of 1000 ppm fluoride toothpaste from first tooth eruption, increasing to a pea-sized amount of 1450 ppm from age 3; brush teeth twice daily; do not eat the toothpaste (rinse only or spit, do not swallow)","Use fluoride tablets from birth in fluoridated areas","No fluoride toothpaste until age 2","Apply fluoride varnish only — no toothbrushing until 3 years"],"correct":1,"explanation":"DBOH 4th edition (PHE/UKHSA 2021): from first tooth eruption — use a smear of 1000 ppm fluoride toothpaste; from age 3 — pea-sized amount of 1450 ppm (family toothpaste). Brush twice daily, last thing at night and at least once more during the day. Spit out, do not rinse (higher residual fluoride protection). Children must be supervised until adequate technique is established (~7 years). Fluoride varnish is applied in addition, not as a replacement."},
    {"id":"profpractice_55","type":"sba","stem":"A 6-year-old child attends with a parent. He has obvious untreated caries in multiple primary teeth, an unkempt appearance, and has missed his last three booked dental appointments — the receptionist describes him as 'frequently failing to attend'. According to NICE NG76 (Child Maltreatment) and the PHE 'Was Not Brought' guidance, what is the most appropriate response?","options":["Send a final reminder letter and remove the child from the practice list if missed again","Treat 'Was Not Brought' (rather than 'Did Not Attend') as a possible safeguarding indicator: take a careful history, document concerns, share appropriate information with the GP and health visitor, and follow the local safeguarding pathway — making a referral to children's social care if the threshold is met","Tell the parent off and refuse further appointments","Make no record because missing appointments is not a dental matter","Contact the school directly without informing the parent"],"correct":1,"explanation":"PHE / safeguarding guidance reframes children's missed appointments from 'Did Not Attend' (parent-blaming) to 'Was Not Brought' — a recognised potential indicator of neglect, especially when combined with dental neglect (untreated caries, sepsis, multiple decayed teeth in young children). NICE NG76 emphasises: thorough documentation, multi-agency information sharing where appropriate, and using local safeguarding pathways. Always discuss concerns with the practice safeguarding lead. Contemporary records and considered, proportionate action are essential."},
    {"id":"profpractice_56","type":"sba","stem":"A dental public health practitioner is designing a programme to reduce oral cancer rates. Which of the following represents a primary prevention strategy?","options":["Screening asymptomatic populations for early oral cancer lesions","Treating confirmed oral cancer with surgery and radiotherapy","Reducing tobacco and alcohol use through public health campaigns and cessation services, and HPV vaccination programmes","Monitoring patients after oral cancer treatment for recurrence","Training dentists to diagnose oral cancer at an early stage"],"correct":2,"explanation":"In the Lalonde/Leavell & Clark prevention model: Primary prevention = preventing disease before it occurs (addressing risk factors). Reducing tobacco, alcohol use, and HPV vaccination prevent the development of oral cancer. Secondary prevention = screening to detect early disease (e.g. visual examination programmes). Tertiary prevention = minimising disability from established disease (treatment and rehabilitation). A 'primary prevention' strategy targets the cause of oral cancer before any disease arises."},
    {"id":"profpractice_57","type":"sba","stem":"A 5-year-old child weighing 18 kg becomes unconscious in the dental waiting room. The parent reports the child has type 1 diabetes and has not eaten breakfast. He is unrousable. The dental emergency drug kit contains glucagon 1 mg powder for reconstitution. What is the appropriate dose to administer IM?","options":["0.1 mg IM","0.25 mg IM","0.5 mg IM (children <8 years or <25 kg)","1 mg IM (children ≥8 years or >25 kg, and adults)","2 mg IM"],"correct":2,"explanation":"Resus Council UK / BNF for Children glucagon dose for severe hypoglycaemia where IV access is not available: children under 8 years old or under 25 kg = 0.5 mg IM/SC; children 8 years or over (or >25 kg) and adults = 1 mg IM/SC. Glucagon raises blood glucose by stimulating hepatic glycogenolysis and takes 5–15 minutes to work. Call 999. Once conscious and able to swallow, give a fast-acting carbohydrate then a long-acting carbohydrate snack. Glucagon is less effective in malnourished or alcoholic patients (depleted glycogen stores)."},
    {"id":"profpractice_58","type":"sba","stem":"Which UK document provides the national evidence-based framework for oral health promotion and clinical preventive guidance for primary dental care?","options":["The NHS Long Term Plan (2019)","Delivering Better Oral Health (DBOH) — a toolkit for prevention, published by PHE/UKHSA and last updated in 2021, providing evidence-based guidance on fluoride, diet, smoking cessation, fissure sealants, and periodontal prevention for primary dental care","NICE NG12 (Suspected Cancer)","HTM 01-05 (Decontamination)","The NHS Dental Contract reform documents (2016, 2022)"],"correct":1,"explanation":"Delivering Better Oral Health (DBOH) is the PHE/UKHSA toolkit for prevention in primary dental care, providing evidence-based recommendations on: fluoride toothpaste, fluoride varnish, fissure sealants, dietary advice, smoking cessation, alcohol advice, and periodontal prevention. It covers all age groups from infants to older adults and is the primary reference for preventive dentistry guidance in England. It should be used in conjunction with NICE public health guidance."},
    {"id":"profpractice_59","type":"sba","stem":"Which of the following best describes the 'social determinants of health' model as it applies to oral health inequalities in the UK?","options":["Oral health is determined entirely by individual behaviour choices","Oral health is determined solely by genetics","Oral health inequalities are shaped by wider factors including socioeconomic status, education, housing, employment, ethnicity, and access to dental services — those in the most deprived communities have the poorest oral health despite having the same individual risk factors at a higher prevalence","Oral health is only determined by access to NHS dentistry","Social determinants only affect older adults — children's oral health is not socially determined"],"correct":2,"explanation":"The social determinants of health (Dahlgren and Whitehead model, Marmot Review 2010) explain oral health inequalities: people in the most deprived communities experience 2–3 times more dental caries, periodontal disease, and tooth loss than those in the least deprived. Structural factors (poverty, poor housing, unemployment, education, limited access to services) drive these inequalities. Individual behaviour (diet, oral hygiene) is itself shaped by these social circumstances. Upstream policies addressing social determinants are required alongside individual clinical interventions."},
    {"id":"profpractice_60","type":"sba","stem":"Under the Equality Act 2010, dental practices are required to make 'reasonable adjustments' for patients with disabilities. Which of the following is an example of a reasonable adjustment for a patient with physical disability attending for dental treatment?","options":["Referring all disabled patients to secondary care","Telling the patient to attend only during quiet periods","Providing accessible car parking, step-free access, adjusting the dental chair to allow transfer from a wheelchair, offering longer appointments, communicating in the patient's preferred format, and treating the patient in their wheelchair if transfer is not possible","Charging an additional fee for the extra time required","Providing written information only (no other adjustments are required)"],"correct":2,"explanation":"Under the Equality Act 2010, dental practices have a legal duty to make 'reasonable adjustments' to remove barriers that disadvantage patients with disabilities compared to non-disabled patients. Examples include: physical access (ramps, automatic doors), accessible WC facilities, adjustable dental chairs, treating in wheelchairs, providing information in Easy Read/Braille/large print, offering extended appointments, and ensuring staff have appropriate disability awareness training. 'Reasonable' is assessed in proportion to the size and resources of the practice."}
  ],
};

// ============ STATE MANAGEMENT ============
const STORAGE_KEY = 'mfd_eng_app_state_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.removedQuestions) parsed.removedQuestions = []; // backward compat
      return parsed;
    }
  } catch (e) { console.error(e); }
  return {
    examDate: '2026-10-20',
    questionStats: {}, // { questionId: { attempts: n, correct: n, lastSeen: timestamp } }
    topicStats: {},    // { topicId: { attempted: n, correct: n } }
    bookmarks: [],
    removedQuestions: [],
    theme: 'light',
    totalSessions: 0,
    totalTime: 0,
    streak: 0,
    lastSession: null
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ============ ROUTING ============
let currentView = 'dashboard';

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  });
});

document.getElementById('themeToggle').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  saveState();
});

document.getElementById('resetData').addEventListener('click', (e) => {
  e.preventDefault();
  if (confirm('This will erase all your progress, scores, and bookmarks. Continue?')) {
    localStorage.removeItem(STORAGE_KEY);
    state = loadState();
    render();
  }
});

// Initialize theme
document.documentElement.setAttribute('data-theme', state.theme);

// ============ RENDER FUNCTIONS ============
function render() {
  const main = document.getElementById('main');
  if (currentView === 'dashboard') main.innerHTML = renderDashboard();
  else if (currentView === 'practice') main.innerHTML = renderPractice();
  else if (currentView === 'stats') main.innerHTML = renderStats();
  else if (currentView === 'removed') main.innerHTML = renderRemoved();
  attachHandlers();
}

function daysUntilExam() {
  const exam = new Date(state.examDate);
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.ceil((exam - today) / (1000 * 60 * 60 * 24));
  return diff;
}

function totalQuestionsAnswered() {
  return Object.values(state.questionStats).reduce((sum, s) => sum + s.attempts, 0);
}

function totalCorrect() {
  return Object.values(state.questionStats).reduce((sum, s) => sum + s.correct, 0);
}

function overallAccuracy() {
  const total = totalQuestionsAnswered();
  if (total === 0) return 0;
  return Math.round((totalCorrect() / total) * 100);
}

function topicProgress(topicId) {
  const removed = state.removedQuestions || [];
  const topicQs = (QUESTIONS[topicId] || []).filter(q => !removed.includes(q.id));
  if (topicQs.length === 0) return { attempted: 0, total: 0, accuracy: 0 };
  let attempted = 0, correct = 0;
  topicQs.forEach(q => {
    const s = state.questionStats[q.id];
    if (s && s.attempts > 0) {
      attempted++;
      if (s.correct > 0) correct++;
    }
  });
  return {
    attempted,
    total: topicQs.length,
    accuracy: attempted ? Math.round((correct/attempted)*100) : 0
  };
}

function renderDashboard() {
  const days = daysUntilExam();
  const examFormatted = new Date(state.examDate).toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
  const totalQ = totalQuestionsAnswered();
  const acc = overallAccuracy();

  const readyTopics = TOPICS.filter(t => t.status === 'ready');

  return `
    <div class="greet">Welcome back.</div>
    <div class="greet-sub">Let's keep building toward exam day.</div>

    <div class="countdown">
      <div class="countdown-main">
        <div class="countdown-num">${days}</div>
        <div>
          <div class="countdown-label">Days until exam</div>
          <div class="countdown-date">${examFormatted}</div>
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:var(--ink-muted);display:block;margin-bottom:4px;">Change date</label>
        <input type="date" id="examDateInput" value="${state.examDate}">
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Questions Answered</div>
        <div class="stat-value">${totalQ}</div>
        <div class="stat-meta">${totalCorrect()} correct</div>
      </div>
      <div class="stat">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value">${acc}%</div>
        <div class="stat-meta">overall average</div>
      </div>
      <div class="stat">
        <div class="stat-label">Bookmarks</div>
        <div class="stat-value">${state.bookmarks.length}</div>
        <div class="stat-meta">saved questions</div>
      </div>
    </div>

    <div class="section-title">Available Topics</div>
    <div class="topics">
      ${TOPICS.map(t => {
        const p = topicProgress(t.id);
        const isReady = t.status === 'ready';
        const fillPct = p.total ? (p.attempted / p.total) * 100 : 0;
        return `
          <div class="topic-card ${isReady ? '' : 'locked'}" ${isReady ? `data-topic="${t.id}"` : ''}>
            <div class="topic-num">${t.num}${isReady ? '' : ' · coming soon'}</div>
            <div class="topic-name">${t.name}</div>
            ${isReady ? `
              <div class="topic-meta">
                <span>${p.attempted}/${p.total} questions</span>
                ${p.attempted ? `<span>${p.accuracy}% accuracy</span>` : ''}
              </div>
              <div class="topic-progress-bar"><div class="topic-progress-fill" style="width:${fillPct}%"></div></div>
            ` : `<div class="topic-meta"><span class="pill">Pending</span></div>`}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderPractice() {
  return `
    <div class="greet">Practice</div>
    <div class="greet-sub">Choose a mode. Your wrong answers are saved for spaced review.</div>

    <div class="section-title">Quick Modes</div>
    <div class="mode-grid">
      <div class="mode-card" data-mode="topic">
        <h3>By Topic</h3>
        <p>Practice questions from a specific subject area.</p>
      </div>
      <div class="mode-card" data-mode="mixed">
        <h3>Mixed Practice</h3>
        <p>Random questions across all available topics.</p>
      </div>
      <div class="mode-card" data-mode="weak">
        <h3>Weak Spots</h3>
        <p>Re-attempt questions you previously got wrong.</p>
      </div>
      <div class="mode-card" data-mode="bookmarks">
        <h3>Bookmarked</h3>
        <p>Review questions you've saved for later.</p>
      </div>
    </div>

    <div class="section-title">Pick a Topic</div>
    <div class="topics">
      ${TOPICS.filter(t => t.status === 'ready').map(t => {
        const p = topicProgress(t.id);
        return `
          <div class="topic-card" data-quiz-topic="${t.id}">
            <div class="topic-num">${t.num}</div>
            <div class="topic-name">${t.name}</div>
            <div class="topic-meta">
              <span>${(QUESTIONS[t.id] || []).length} questions</span>
              ${p.attempted ? `<span>${p.accuracy}% last accuracy</span>` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderRemoved() {
  const removed = state.removedQuestions || [];

  if (removed.length === 0) {
    return `
      <div class="greet">Removed Questions</div>
      <div class="greet-sub">Questions you remove during practice won't appear in quizzes.</div>
      <div class="empty">
        <h3>Nothing removed yet</h3>
        <p>During a quiz, tap <strong>✕ Remove</strong> on any question to hide it from future practice. You can restore it here anytime.</p>
      </div>
    `;
  }

  // Build a lookup: qId → { question, topicId, topicName }
  const lookup = {};
  for (const [tid, qs] of Object.entries(QUESTIONS)) {
    const topic = TOPICS.find(t => t.id === tid);
    qs.forEach(q => { lookup[q.id] = { q, tid, topicName: topic ? topic.name : tid }; });
  }

  // Group by topic in TOPICS order
  const byTopic = {};
  removed.forEach(qId => {
    const entry = lookup[qId];
    if (!entry) return;
    if (!byTopic[entry.tid]) byTopic[entry.tid] = { name: entry.topicName, qs: [] };
    byTopic[entry.tid].qs.push(entry.q);
  });

  let cards = '';
  TOPICS.forEach(t => {
    const group = byTopic[t.id];
    if (!group) return;
    cards += `<div class="section-title" style="margin-top:20px;margin-bottom:8px;">${group.name} <span style="color:var(--ink-muted);font-size:13px;font-weight:400;">${group.qs.length} removed</span></div>`;
    cards += `<div class="removed-list">`;
    group.qs.forEach(q => {
      cards += `
        <div class="removed-card">
          <div class="removed-card-body">
            <div class="removed-card-topic">${t.num} · ${group.name}</div>
            <div class="removed-card-stem">${q.stem}</div>
          </div>
          <button class="btn btn-secondary" data-restore="${q.id}" style="white-space:nowrap;flex-shrink:0;">↩ Restore</button>
        </div>
      `;
    });
    cards += `</div>`;
  });

  return `
    <div class="greet">Removed Questions</div>
    <div class="greet-sub">${removed.length} question${removed.length !== 1 ? 's' : ''} hidden from practice. Restore any below.</div>
    <div style="margin-bottom:20px;">
      <button class="btn btn-secondary" data-restore-all>↩ Restore All</button>
    </div>
    ${cards}
  `;
}

function renderStats() {
  const totalQ = totalQuestionsAnswered();
  if (totalQ === 0) {
    return `
      <div class="greet">Statistics</div>
      <div class="greet-sub">Stats will appear once you've answered some questions.</div>
      <div class="empty">
        <h3>No data yet</h3>
        <p>Start a practice session to see your performance breakdown.</p>
      </div>
    `;
  }

  const topicRows = TOPICS.filter(t => t.status === 'ready').map(t => {
    const p = topicProgress(t.id);
    if (p.attempted === 0) return null;
    const color = p.accuracy >= 75 ? 'var(--correct)' : p.accuracy >= 50 ? 'var(--warn)' : 'var(--wrong)';
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line-soft);">
        <div>
          <div style="font-family:var(--serif);font-size:16px;">${t.name}</div>
          <div style="font-size:12px;color:var(--ink-muted);">${p.attempted} of ${p.total} attempted</div>
        </div>
        <div style="font-family:var(--serif);font-size:24px;color:${color};">${p.accuracy}%</div>
      </div>
    `;
  }).filter(Boolean).join('');

  return `
    <div class="greet">Statistics</div>
    <div class="greet-sub">Your performance breakdown across all topics.</div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Total Questions</div>
        <div class="stat-value">${totalQ}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Overall Accuracy</div>
        <div class="stat-value">${overallAccuracy()}%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Topics Touched</div>
        <div class="stat-value">${TOPICS.filter(t => topicProgress(t.id).attempted > 0).length}</div>
      </div>
    </div>

    <div class="section-title">By Topic</div>
    <div style="background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius-lg);padding:8px 24px;">
      ${topicRows || '<div class="empty"><p>Practice some questions to see this break down by topic.</p></div>'}
    </div>
  `;
}

// ============ QUIZ ENGINE ============
function formatExplanation(q) {
  const raw = (q.explanation || '').trim();
  const parts = raw.split(/\. (?=[A-Z])/).map(s => s.trim()).filter(Boolean);

  if (q.type === 'tf') {
    return parts.map((s, i) => {
      const branch = q.branches[i];
      const label = String.fromCharCode(97 + i);
      const dot = s.endsWith('.') ? '' : '.';
      const badge = branch
        ? `<span class="expl-tf-badge ${branch.answer ? 'expl-tf-t' : 'expl-tf-f'}">${branch.answer ? 'T' : 'F'}</span>`
        : '';
      return `<div class="explanation-item"><span class="explanation-label">${label}) ${badge}</span><span>${s}${dot}</span></div>`;
    }).join('');
  }

  return parts.map(s => {
    const dot = s.endsWith('.') ? '' : '.';
    return `<div class="explanation-item">${s}${dot}</div>`;
  }).join('');
}
let quizState = null;

function startQuiz(questions, mode='topic', label='') {
  if (!questions || questions.length === 0) {
    alert('No questions available for this selection.');
    return;
  }
  quizState = {
    questions: shuffle([...questions]),
    currentIdx: 0,
    answers: [],          // { qId, correct: bool/null, userAnswer: ... }
    skipped: [],
    mode, label,
    startTime: Date.now(),
    submitted: false
  };
  currentView = 'quiz-active';
  renderQuiz();
}

function renderQuiz() {
  const main = document.getElementById('main');
  const q = quizState.questions[quizState.currentIdx];
  const total = quizState.questions.length;
  const answered = quizState.answers.find(a => a.qId === q.id);
  const elapsed = Math.floor((Date.now() - quizState.startTime) / 1000);
  const mins = Math.floor(elapsed/60), secs = elapsed%60;

  let questionHTML = '';
  if (q.type === 'sba') {
    questionHTML = `
      <div class="question-type">Single Best Answer</div>
      <div class="question-stem">${q.stem}</div>
      <div class="options" id="options">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (answered) {
            if (i === q.correct) cls += ' correct';
            else if (i === answered.userAnswer) cls += ' wrong';
          }
          return `<div class="${cls}" data-opt="${i}">
            <span class="option-letter">${String.fromCharCode(65+i)}</span>
            <span>${opt}</span>
          </div>`;
        }).join('')}
      </div>
    `;
  } else if (q.type === 'tf') {
    const userBranches = answered ? answered.userAnswer : [];
    questionHTML = `
      <div class="question-type">True / False — score each branch independently</div>
      <div class="question-stem">${q.stem}</div>
      <div class="tf-branches" id="tfBranches">
        ${q.branches.map((br, i) => {
          const userAns = userBranches[i];
          const showResult = answered;
          const isCorrect = showResult && userAns === br.answer;
          return `
            <div class="tf-branch">
              <span class="tf-branch-text">${String.fromCharCode(97+i)}) ${br.text}</span>
              <div class="tf-buttons">
                <button class="tf-btn ${userAns === true ? 'selected-t' : ''}" data-branch="${i}" data-val="true" ${answered ? 'disabled':''}>T</button>
                <button class="tf-btn ${userAns === false ? 'selected-f' : ''}" data-branch="${i}" data-val="false" ${answered ? 'disabled':''}>F</button>
              </div>
              ${showResult ? `<span class="tf-result ${isCorrect ? 'correct' : 'wrong'}">${br.answer ? 'T' : 'F'}</span>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  main.innerHTML = `
    <div class="quiz">
      <div class="quiz-header">
        <button class="back-btn" data-quit-quiz>← Exit</button>
        <div class="quiz-progress">Question ${quizState.currentIdx+1} of ${total}</div>
        <div class="quiz-timer">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>
      </div>
      <div class="quiz-nav-strip">
        ${quizState.questions.map((qq, i) => {
          const ans = quizState.answers.find(a => a.qId === qq.id);
          const isSkipped = quizState.skipped.includes(qq.id);
          let cls = 'quiz-nav-dot';
          if (i === quizState.currentIdx) cls += ' current';
          else if (ans) cls += ans.correct ? ' answered-correct' : ' answered-wrong';
          else if (isSkipped) cls += ' skipped';
          return `<button class="${cls}" data-nav="${i}">${i+1}</button>`;
        }).join('')}
      </div>
      <div class="question">
        ${questionHTML}
        ${answered ? `
          <div class="explanation">
            <div class="explanation-title">Explanation</div>
            ${formatExplanation(q)}
          </div>
        ` : ''}
      </div>
      <div class="quiz-actions">
        <div>
          ${quizState.currentIdx > 0 ? '<button class="btn btn-secondary" data-prev>← Previous</button>' : ''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-secondary" data-bookmark="${q.id}">${state.bookmarks.includes(q.id) ? '★ Bookmarked' : '☆ Bookmark'}</button>
          <button class="btn-remove" data-remove="${q.id}">✕ Remove</button>
          ${!answered
            ? `<button class="btn btn-secondary" data-skip>Skip →</button><button class="btn" data-submit>Submit answer</button>`
            : (quizState.currentIdx < total - 1 ? '<button class="btn" data-next>Next →</button>' : '')}
          <button class="btn btn-accent" data-finish>Submit Quiz</button>
        </div>
      </div>
    </div>
  `;

  attachQuizHandlers();
}

function attachQuizHandlers() {
  const q = quizState.questions[quizState.currentIdx];

  // SBA option click
  document.querySelectorAll('[data-opt]').forEach(el => {
    el.addEventListener('click', () => {
      const answered = quizState.answers.find(a => a.qId === q.id);
      if (answered) return;
      document.querySelectorAll('[data-opt]').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      el.dataset.tempSelected = '1';
    });
  });

  // TF buttons
  document.querySelectorAll('[data-branch]').forEach(el => {
    el.addEventListener('click', () => {
      const answered = quizState.answers.find(a => a.qId === q.id);
      if (answered) return;
      const branchIdx = parseInt(el.dataset.branch);
      const val = el.dataset.val === 'true';
      const siblings = document.querySelectorAll(`[data-branch="${branchIdx}"]`);
      siblings.forEach(s => { s.classList.remove('selected-t', 'selected-f'); });
      el.classList.add(val ? 'selected-t' : 'selected-f');
      el.dataset.tempSelected = val;
    });
  });

  // Submit
  const submitBtn = document.querySelector('[data-submit]');
  if (submitBtn) submitBtn.addEventListener('click', () => submitAnswer());

  // Next / Prev
  const nextBtn = document.querySelector('[data-next]');
  if (nextBtn) nextBtn.addEventListener('click', () => { quizState.currentIdx++; renderQuiz(); });
  const prevBtn = document.querySelector('[data-prev]');
  if (prevBtn) prevBtn.addEventListener('click', () => { quizState.currentIdx--; renderQuiz(); });

  // Finish
  const finishBtn = document.querySelector('[data-finish]');
  if (finishBtn) finishBtn.addEventListener('click', () => {
    const unanswered = quizState.questions.length - quizState.answers.length;
    if (unanswered > 0 && !confirm(`${unanswered} question${unanswered > 1 ? 's' : ''} unanswered. Submit anyway?`)) return;
    finishQuiz();
  });

  // Skip
  const skipBtn = document.querySelector('[data-skip]');
  if (skipBtn) skipBtn.addEventListener('click', () => {
