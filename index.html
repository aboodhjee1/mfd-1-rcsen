<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MFDS Part 1 RCS England — Study</title>
<style>
  /* ============ DESIGN TOKENS ============ */
  :root {
    --bg: #fafaf7;
    --bg-elev: #ffffff;
    --bg-soft: #f3f2ed;
    --ink: #1a1a1a;
    --ink-soft: #4a4a47;
    --ink-muted: #8a8a85;
    --line: #e5e3dc;
    --line-soft: #efede6;
    --accent: #1a4d3e;
    --accent-soft: #e8f0ed;
    --correct: #2d6a4f;
    --correct-bg: #e8f3ec;
    --wrong: #9b2c2c;
    --wrong-bg: #fbeaea;
    --warn: #8b6914;
    --warn-bg: #faf3e0;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --radius: 6px;
    --radius-lg: 10px;
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', Menlo, Consolas, monospace;
  }

  [data-theme="dark"] {
    --bg: #14140f;
    --bg-elev: #1c1c17;
    --bg-soft: #232320;
    --ink: #f0eee5;
    --ink-soft: #c4c2b8;
    --ink-muted: #8a887d;
    --line: #2e2e28;
    --line-soft: #252521;
    --accent: #7fb89e;
    --accent-soft: #1f2e28;
    --correct: #7fb89e;
    --correct-bg: #1c2823;
    --wrong: #d4827d;
    --wrong-bg: #2a1e1e;
    --warn: #d4b572;
    --warn-bg: #2a2418;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  /* ============ LAYOUT ============ */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--line);
    padding: 28px 0 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .brand {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .brand .accent { color: var(--accent); font-style: italic; }
  .brand-sub {
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  nav {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  nav button {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-family: var(--sans);
    font-size: 14px;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
    font-weight: 500;
  }
  nav button:hover { background: var(--bg-soft); color: var(--ink); }
  nav button.active {
    background: var(--ink);
    color: var(--bg);
  }

  .theme-toggle {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
    transition: all 0.15s;
  }
  .theme-toggle:hover { border-color: var(--ink-soft); }

  main {
    flex: 1;
    padding: 40px 0 60px;
  }

  /* ============ DASHBOARD ============ */
  .greet {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 400;
    margin-bottom: 6px;
    letter-spacing: -0.015em;
  }
  .greet-sub {
    color: var(--ink-muted);
    font-size: 15px;
    margin-bottom: 36px;
  }

  .countdown {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .countdown-main {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .countdown-num {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .countdown-label {
    font-size: 14px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .countdown-date {
    color: var(--ink-soft);
    font-size: 14px;
  }
  .countdown input[type="date"] {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 6px 10px;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .stat-meta {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 4px;
  }

  .section-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 18px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  /* ============ TOPIC LIST ============ */
  .topics {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .topic-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .topic-card:hover {
    border-color: var(--ink-soft);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .topic-card.locked {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .topic-card.locked:hover {
    transform: none;
    border-color: var(--line);
    box-shadow: none;
  }
  .topic-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
  }
  .topic-name {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink);
    font-weight: 500;
  }
  .topic-meta {
    font-size: 12px;
    color: var(--ink-muted);
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }
  .topic-progress-bar {
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .topic-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .pill {
    display: inline-block;
    font-size: 10px;
    background: var(--warn-bg);
    color: var(--warn);
    padding: 2px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .pill-ready {
    background: var(--correct-bg);
    color: var(--correct);
  }

  /* ============ BUTTONS ============ */
  .btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 10px 22px;
    font-size: 14px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { border-color: var(--ink-soft); background: var(--bg-soft); }
  .btn-accent {
    background: var(--accent);
    color: white;
  }

  /* ============ QUIZ VIEW ============ */
  .quiz {
    max-width: 720px;
    margin: 0 auto;
  }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .quiz-progress {
    color: var(--ink-muted);
    font-size: 13px;
  }
  .quiz-timer {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink-soft);
  }

  .question {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  .question-type {
    font-size: 11px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .question-stem {
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.5;
    margin-bottom: 24px;
    color: var(--ink);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 14px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.12s;
    font-size: 15px;
    color: var(--ink-soft);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .option:hover { border-color: var(--ink-soft); background: var(--bg-soft); }
  .option.selected {
    border-color: var(--accent);
    border-width: 2px;
    background: var(--accent-soft);
    color: var(--ink);
  }
  .option.selected .option-letter {
    color: var(--accent);
    font-weight: 700;
  }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
  }
  .option-letter {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-muted);
    min-width: 18px;
  }

  /* True/False question type */
  .tf-branches {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tf-branch {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 12px 16px;
    border-radius: var(--radius);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .tf-branch-text {
    flex: 1;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .tf-buttons {
    display: flex;
    gap: 4px;
  }
  .tf-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius);
    color: var(--ink-muted);
    font-family: var(--sans);
    transition: all 0.12s;
  }
  .tf-btn:hover { border-color: var(--ink-soft); color: var(--ink); }
  .tf-btn.selected-t { background: var(--correct); color: white; border-color: var(--correct); }
  .tf-btn.selected-f { background: var(--wrong); color: white; border-color: var(--wrong); }
  .tf-result {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 3px;
    margin-left: 8px;
  }
  .tf-result.correct { background: var(--correct-bg); color: var(--correct); }
  .tf-result.wrong { background: var(--wrong-bg); color: var(--wrong); }

  .explanation {
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--bg-soft);
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    border-left: 3px solid var(--accent);
  }
  .explanation-title {
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .explanation-item {
    padding: 7px 0;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    gap: 10px;
    align-items: baseline;
    line-height: 1.55;
  }
  .explanation-item:first-child { padding-top: 0; }
  .explanation-item:last-child { border-bottom: none; padding-bottom: 0; }
  .explanation-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 1px;
  }
  .expl-tf-badge {
    font-size: 10px;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 700;
  }
  .expl-tf-t { background: var(--correct-bg); color: var(--correct); }
  .expl-tf-f { background: var(--wrong-bg); color: var(--wrong); }

  .quiz-actions {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 24px;
  }

  .quiz-result {
    text-align: center;
    padding: 60px 20px;
  }
  .quiz-result-score {
    font-family: var(--serif);
    font-size: 80px;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .quiz-result-label {
    color: var(--ink-muted);
    margin-top: 12px;
    margin-bottom: 32px;
  }

  .quiz-nav-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin: 16px 0 20px;
  }
  .quiz-nav-dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg-soft);
    color: var(--ink-muted);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    transition: all 0.15s;
    padding: 0;
  }
  .quiz-nav-dot:hover { border-color: var(--ink-soft); color: var(--ink); }
  .quiz-nav-dot.current { border-color: var(--accent); color: var(--accent); font-weight: 700; background: var(--accent-soft); }
  .quiz-nav-dot.answered-correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
  .quiz-nav-dot.answered-wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
  .quiz-nav-dot.skipped { border-style: dashed; color: var(--warn); border-color: var(--warn); }

  /* ============ MODE SELECTOR ============ */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 40px;
  }
  .mode-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-card:hover {
    border-color: var(--ink-soft);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .mode-card h3 {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .mode-card p {
    font-size: 13px;
    color: var(--ink-muted);
    line-height: 1.5;
  }

  /* ============ FOOTER ============ */
  footer {
    border-top: 1px solid var(--line);
    padding: 20px 0;
    color: var(--ink-muted);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* ============ EMPTY STATE ============ */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-muted);
  }
  .empty h3 {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 500;
  }

  /* ============ RESPONSIVE ============ */

  /* Tablets & large phones */
  @media (max-width: 640px) {
    .app { padding: 0 18px; }
    .greet { font-size: 28px; }
    .countdown-num { font-size: 42px; }
    nav button { font-size: 13px; padding: 6px 10px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Small phones — iPhone 17 Pro Max and similar (≤480px logical width) */
  @media (max-width: 480px) {
    /* Safe-area-aware layout for Dynamic Island + home indicator */
    body {
      padding-top: env(safe-area-inset-top);
    }
    .app {
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    footer {
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    /* Header — stack brand above scrollable nav */
    header {
      padding: 14px 0 10px;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .brand { font-size: 20px; }
    .brand-sub { font-size: 10px; }

    /* Horizontal-scroll nav strip */
    nav {
      width: calc(100% + 32px);
      margin-left: -16px;
      padding: 0 16px 2px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
      gap: 2px;
    }
    nav::-webkit-scrollbar { display: none; }
    nav button {
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 36px;
      padding: 7px 12px;
      font-size: 13px;
    }
    .theme-toggle { flex-shrink: 0; }

    main { padding: 24px 0 40px; }

    footer {
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      font-size: 11px;
    }

    /* Dashboard */
    .greet { font-size: 24px; margin-bottom: 4px; }
    .greet-sub { font-size: 13px; margin-bottom: 20px; }

    .countdown {
      padding: 16px 18px;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 22px;
    }
    .countdown-num { font-size: 42px; }

    .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    .stat { padding: 12px 14px; }
    .stat-value { font-size: 24px; }
    .stat-label { font-size: 10px; }

    .section-title { font-size: 18px; margin-bottom: 12px; }

    .topics { grid-template-columns: 1fr; gap: 8px; }
    .topic-card { padding: 14px 16px; }
    .topic-name { font-size: 16px; }

    /* Quiz — question card */
    .question { padding: 18px 14px; margin-bottom: 14px; }
    .question-stem { font-size: 16px; margin-bottom: 16px; line-height: 1.45; }
    .question-type { font-size: 10px; margin-bottom: 10px; }

    /* SBA options — large touch targets */
    .option {
      padding: 13px 14px;
      font-size: 14px;
      min-height: 52px;
      align-items: center;
      gap: 10px;
    }
    .option-letter { font-size: 12px; min-width: 16px; }

    /* T/F branches — text full-width, buttons on own row */
    .tf-branch {
      flex-wrap: wrap;
      row-gap: 8px;
      column-gap: 10px;
      padding: 12px 14px;
    }
    .tf-branch-text { flex-basis: 100%; font-size: 13px; }
    .tf-buttons { gap: 8px; }
    .tf-btn {
      padding: 10px 20px;
      font-size: 14px;
      min-height: 44px;
      min-width: 60px;
    }
    .tf-result { font-size: 11px; padding: 2px 6px; }

    /* Quiz header & nav strip */
    .quiz-header { margin-bottom: 14px; padding-bottom: 10px; }
    .quiz-progress { font-size: 12px; }
    .quiz-timer { font-size: 13px; }

    .quiz-nav-strip { gap: 5px; margin: 10px 0 14px; }
    .quiz-nav-dot { width: 34px; height: 34px; font-size: 12px; }

    /* Quiz action buttons */
    .quiz-actions { flex-wrap: wrap; gap: 8px; align-items: flex-start; }
    .quiz-actions .btn {
      min-height: 46px;
      padding: 10px 16px;
      font-size: 14px;
    }

    /* Explanation */
    .explanation { padding: 14px 16px; font-size: 13px; }
    .explanation-item { padding: 8px 0; }

    /* Quiz result */
    .quiz-result { padding: 36px 12px; }
    .quiz-result-score { font-size: 60px; }
    .quiz-result-label { font-size: 13px; }

    /* Practice mode grid */
    .mode-grid { grid-template-columns: 1fr; gap: 8px; margin-bottom: 24px; }
    .mode-card { padding: 16px 18px; }
    .mode-card h3 { font-size: 16px; }
    .mode-card p { font-size: 13px; }
  }

  /* Suppress sticky hover states on touch devices */
  @media (hover: none) {
    .btn:hover { transform: none; box-shadow: none; }
    .topic-card:hover { transform: none; border-color: var(--line); box-shadow: none; }
    .mode-card:hover { transform: none; border-color: var(--line); box-shadow: none; }
    .option:not(.selected):not(.correct):not(.wrong):hover { border-color: var(--line); background: var(--bg); color: var(--ink-soft); }
    .tf-btn:hover { border-color: var(--line); color: var(--ink-muted); }
  }

  /* ── iPad Air 11-inch (M2) — portrait 820px · landscape 1180px ──────── */

  /* Both orientations: safe area + 44 px touch targets */
  @media (min-width: 481px) and (max-width: 1200px) {
    footer { padding-bottom: max(20px, env(safe-area-inset-bottom)); }

    /* 44 px minimum touch targets */
    .btn        { min-height: 44px; }
    nav button  { min-height: 40px; }
    .option     { min-height: 52px; align-items: center; }
    .tf-btn     { min-height: 44px; min-width: 56px; padding: 10px 18px; font-size: 14px; }
    .quiz-nav-dot { width: 34px; height: 34px; }
    .mode-card  { padding: 24px 26px; }
  }

  /* Portrait (820 px): narrower viewport needs layout help */
  @media (min-width: 481px) and (max-width: 820px) {
    .app    { padding: 0 24px; }
    header  { padding: 22px 0 16px; }
    .greet  { font-size: 30px; }
    nav button  { padding: 7px 12px; font-size: 13px; }

    /* Two-column practice grid in portrait */
    .mode-grid  { grid-template-columns: repeat(2, 1fr); }
    /* Topic cards: comfortable two-column */
    .topics     { grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }

    /* Quiz actions: let right-side buttons wrap naturally */
    .quiz-actions           { flex-wrap: wrap; gap: 10px; }
    .quiz-actions .btn      { min-height: 46px; }
  }

  /* Landscape (821–1200 px): desktop layout applies; just add touch polish */
  @media (min-width: 821px) and (max-width: 1200px) {
    .option     { min-height: 52px; align-items: center; }
    .tf-btn     { min-height: 44px; min-width: 56px; padding: 10px 18px; }
    /* Give the quiz a little more breathing room */
    .quiz { max-width: 800px; }
  }

  /* ── Removed Questions view ── */
  .removed-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .removed-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }
  .removed-card-body { flex: 1; min-width: 0; }
  .removed-card-topic {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .removed-card-stem {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .btn-remove {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--wrong);
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--sans);
    transition: all 0.12s;
  }
  .btn-remove:hover { background: var(--wrong-bg); border-color: var(--wrong); }
  @media (hover: none) { .btn-remove:hover { background: transparent; border-color: var(--line); } }
  @media (max-width: 480px) {
    .removed-card { flex-direction: column; gap: 10px; }
    .removed-card > .btn-secondary { align-self: flex-start; }
  }
</style>

<script>
/* ============================================================

   Single-file, offline, persistent via localStorage
   ============================================================ */

// ============ DATA: TOPICS & CONTENT ============
const TOPICS = [
  { id: 'oralsurg',     num: '01', name: 'Oral Surgery',                              status: 'ready' },
  { id: 'oralmed',      num: '02', name: 'Oral Medicine',                             status: 'ready' },
  { id: 'pathology',    num: '03', name: 'Oral Pathology',                            status: 'ready' },
  { id: 'perio',        num: '04', name: 'Periodontology',                            status: 'ready' },
  { id: 'restorative',  num: '05', name: 'Restorative Dentistry & Cariology',         status: 'ready' },
  { id: 'endo',         num: '06', name: 'Endodontics',                               status: 'ready' },
  { id: 'prostho',      num: '07', name: 'Prosthodontics',                            status: 'ready' },
  { id: 'paeds',        num: '08', name: 'Paediatric Dentistry',                      status: 'ready' },
  { id: 'ortho',        num: '09', name: 'Orthodontics',                              status: 'ready' },
  { id: 'radiology',    num: '10', name: 'Dental Radiology & IRMER',                  status: 'ready' },
  { id: 'pharm',        num: '11', name: 'Pharmacology & Therapeutics',               status: 'ready' },
  { id: 'profpractice', num: '12', name: 'Medical Emergencies, Law, Ethics & Public Health', status: 'ready' },
];

// ============ QUESTIONS ============
// All questions are SBA (single best answer, 5 options). Schema:
// { id, type:'sba', stem, options:[A..E], correct:0..4, explanation }
const QUESTIONS = {
  oralsurg: [
    {"id":"oralsurg_1","type":"sba","stem":"A 35-year-old woman attends 3 days after lower right third molar extraction with severe throbbing pain radiating to her ear. The socket contains grey necrotic debris and exposed bone with no sign of pus. Which is the single best management?","options":["Prescribe amoxicillin 500 mg three times daily for 5 days","Irrigate the socket with warm saline and place a sedative dressing","Perform curettage of the socket under local anaesthesia","Re-suture the socket margins","Prescribe chlorhexidine 0.2% mouthwash and review in one week"],"correct":1,"explanation":"Dry socket (localised alveolar osteitis) is managed by gentle irrigation to remove debris followed by placement of a sedative dressing such as Alvogyl or BIPP ribbon gauze. Antibiotics are not routinely indicated unless systemic signs of infection are present. Curettage is avoided as it disrupts healing, and re-suturing an infected socket is inappropriate."},
    {"id":"oralsurg_2","type":"sba","stem":"Which of the following is the most significant independent risk factor for development of dry socket following mandibular third molar extraction?","options":["Female sex","Smoking","Local anaesthetic with vasoconstrictor","Pre-operative chlorhexidine rinse","Upper respiratory tract infection at time of extraction"],"correct":1,"explanation":"Smoking is the strongest modifiable risk factor for dry socket; nicotine causes vasoconstriction reducing clot stability and the toxic chemicals in smoke impair healing. The combined oral contraceptive pill (through oestrogen-mediated fibrinolysis) is another recognised risk. Pre-operative chlorhexidine rinse is actually protective."},
    {"id":"oralsurg_3","type":"sba","stem":"During extraction of an upper left second premolar, a 4 mm oroantral communication is identified. There is no evidence of chronic sinusitis and it is a clean socket. What is the most appropriate immediate management?","options":["Observe and advise antral precautions only","Primary closure with a buccal advancement flap","Pack the socket with oxidised cellulose and suture","Refer immediately to maxillofacial surgery","Prescribe amoxicillin and review at 48 hours"],"correct":1,"explanation":"Communications ≥2 mm require active closure; for a fresh clean socket of 4 mm, primary closure with a buccal mucoperiosteal advancement flap is indicated at the same appointment. Antral precautions alone are insufficient. Oxidised cellulose packing is not recommended as a primary closure method for this size."},
    {"id":"oralsurg_4","type":"sba","stem":"A patient is referred with an established oroantral fistula of 8 weeks duration following upper molar extraction. The antrum is healthy on imaging. Which surgical technique is most commonly used for definitive repair?","options":["Palatal rotational flap","Buccal fat pad flap","Rehrmann buccal advancement flap","Tongue flap","Temporalis muscle flap"],"correct":2,"explanation":"The Rehrmann buccal advancement flap is the standard first-line technique for closure of established oroantral fistulae when the antrum is healthy. The palatal rotational flap is an alternative. The buccal fat pad flap is reserved for larger defects. Tongue and temporalis flaps are used for very large defects or following radiotherapy."},
    {"id":"oralsurg_5","type":"sba","stem":"A 62-year-old patient on warfarin for atrial fibrillation requires extraction of a lower left first molar. His INR taken this morning is 2.8. According to SDCEP guidance, what is the most appropriate management?","options":["Postpone extraction until INR is below 2.0","Proceed with extraction using local haemostatic measures","Admit to hospital for the extraction","Ask the GP to withhold warfarin for 3 days before extraction","Prescribe tranexamic acid systemically for 5 days post-extraction"],"correct":1,"explanation":"SDCEP guidance states that patients with a stable INR ≤4.0 can safely undergo simple dental extractions in primary care without altering their anticoagulation regimen. Local haemostatic measures (oxidised cellulose, tranexamic acid 5% mouthwash, sutures) should be used. Stopping warfarin increases thromboembolic risk and is not recommended."},
    {"id":"oralsurg_6","type":"sba","stem":"A patient taking apixaban 5 mg twice daily for a deep vein thrombosis requires extraction of two adjacent upper premolars. According to SDCEP guidance, what is the recommended approach?","options":["Stop apixaban 48 hours before the procedure","Continue apixaban and proceed with local haemostatic measures","Switch to low-molecular-weight heparin bridge therapy","Admit to hospital for extraction under general anaesthesia","Prescribe tranexamic acid 5% mouthwash for 2 days pre-operatively"],"correct":1,"explanation":"SDCEP guidance on antithrombotic medications advises continuing direct oral anticoagulants (DOACs) such as apixaban for straightforward dental extractions and using local haemostatic measures. Where possible, appointments should be scheduled in the morning, typically >6 hours after the last DOAC dose. Stopping DOACs increases thromboembolic risk without clinically significant benefit for minor oral surgery."},
    {"id":"oralsurg_7","type":"sba","stem":"A patient returns to the practice 8 hours after a lower right molar extraction with ongoing oozing from the socket. On examination there is a large unstable clot but no signs of systemic illness. What is the first step in management?","options":["Prescribe tranexamic acid tablets","Apply firm pressure with a gauze pack for 15–20 minutes","Irrigate with hydrogen peroxide and pack with BIPP","Refer immediately to the hospital maxillofacial department","Administer intramuscular tranexamic acid"],"correct":1,"explanation":"The first-line management of post-extraction haemorrhage is to apply firm local pressure with a folded gauze pack bitten down for 15–20 minutes, after removing the unstable clot and irrigating gently. If this fails, local anaesthetic with vasoconstrictor, socket packing with haemostatic agents, and suturing are the next steps. Systemic tranexamic acid is not first-line."},
    {"id":"oralsurg_8","type":"sba","stem":"Bleeding that occurs 7–10 days after a dental extraction associated with malodour and mild fever is best described as which type of haemorrhage?","options":["Primary haemorrhage","Reactionary haemorrhage","Secondary haemorrhage","Tertiary haemorrhage","Coagulopathic haemorrhage"],"correct":2,"explanation":"Secondary haemorrhage occurs 7–10 days post-operatively and is caused by infection eroding the clot or vessel wall; it is characterised by malodour and may be associated with mild pyrexia. Primary haemorrhage occurs at the time of surgery. Reactionary haemorrhage occurs within the first 24 hours as blood pressure rises after the vasoconstrictive effect of local anaesthetic wears off."},
    {"id":"oralsurg_9","type":"sba","stem":"According to NICE guidance TA1, which of the following is a recognised indication for surgical removal of an impacted lower third molar?","options":["Difficulty cleaning around the tooth causing mild gingival swelling on one occasion","Prophylactic removal in a 25-year-old with no symptoms","The patient's preference for removal","Second episode of pericoronitis requiring hospital admission","Mild food packing distal to the second molar"],"correct":3,"explanation":"NICE TA1 advises against prophylactic removal of disease-free impacted third molars. Accepted indications include recurrent pericoronitis (typically second or subsequent episodes), unrestorable caries, cyst formation, external or internal resorption, fracture, for prosthetic reasons, or when the tooth is involved in a tumour. A single episode of pericoronitis alone is not an indication."},
    {"id":"oralsurg_10","type":"sba","stem":"An 18-year-old has a partially erupted lower left third molar that has caused documented pericoronitis requiring antibiotics on three occasions in the past year. Radiograph shows a mesioangular impaction with roots two-thirds formed. Which NICE TA1 criterion is met?","options":["Prophylactic removal","Cyst formation","Recurrent pericoronitis","Unrestorable caries","External root resorption of adjacent tooth"],"correct":2,"explanation":"Recurrent pericoronitis is an accepted indication for third molar removal under NICE TA1. The guideline requires documented recurrence; a single episode or mild swelling is insufficient. This patient has had three episodes requiring antibiotic treatment, meeting the criterion."},
    {"id":"oralsurg_11","type":"sba","stem":"Immediately after an inferior alveolar nerve block, a patient develops diplopia with ipsilateral loss of abduction of the eye. There is no pain and vital signs are normal. What is the most likely cause?","options":["Anaphylaxis to the local anaesthetic","Intravascular injection into the pterygoid venous plexus","Vasovagal syncope","Direct trauma to the facial nerve","Haematoma in the pterygomandibular space"],"correct":1,"explanation":"Ophthalmoplegia following IAN block is caused by inadvertent intravascular injection into the pterygoid venous plexus, allowing local anaesthetic to travel retrogradely to the orbit via emissary veins. The sixth cranial nerve (abducens) is most commonly affected, causing failure of lateral gaze. It is transient and resolves as the LA wears off; no specific treatment is needed beyond monitoring."},
    {"id":"oralsurg_12","type":"sba","stem":"What is the maximum recommended dose of lidocaine 2% with 1:80,000 adrenaline for a healthy 70 kg adult patient undergoing dental extractions?","options":["3.0 mg/kg (approximately 150 mg, ~7.5 mL)","4.4 mg/kg (approximately 308 mg, ~15.4 mL)","7.0 mg/kg (approximately 490 mg, ~24.5 mL)","2.0 mg/kg (approximately 140 mg, ~7.0 mL)","5.0 mg/kg (approximately 350 mg, ~17.5 mL)"],"correct":1,"explanation":"Lidocaine 2% with vasoconstrictor has a maximum recommended dose of 4.4 mg/kg (absolute ceiling 500 mg). For a 70 kg adult: 4.4 × 70 = 308 mg = 15.4 mL = approximately 8.5 standard 1.8 mL cartridges. Plain lidocaine (without vasoconstrictor) has a lower maximum of 3.0 mg/kg. Exceeding these doses risks systemic toxicity including CNS and cardiovascular effects."},
    {"id":"oralsurg_13","type":"sba","stem":"Following a posterior superior alveolar nerve block, a patient develops a rapidly expanding soft tissue swelling of the cheek. She is not in pain and there is no trismus. What is the most likely complication?","options":["Parotid gland perforation","Maxillary sinusitis","Haematoma of the pterygoid venous plexus","Infection of the buccal space","Subcutaneous emphysema"],"correct":2,"explanation":"The posterior superior alveolar nerve block is associated with the highest risk of haematoma formation among intraoral nerve blocks, as the needle passes in proximity to the pterygoid venous plexus. The rapidly expanding cheek swelling is characteristic. Management is firm extraoral pressure to limit the haematoma. Trismus may develop later if the haematoma is extensive."},
    {"id":"oralsurg_14","type":"sba","stem":"A dentist wishes to anaesthetise the lower left molar region in a patient with a known sulphonamide allergy. Articaine 4% with 1:100,000 adrenaline is available. Which statement regarding articaine is most accurate?","options":["Articaine is contraindicated in patients with sulphonamide allergy","Articaine 4% carries a higher risk of paraesthesia when used for inferior alveolar nerve blocks compared to lidocaine","Articaine has a shorter duration of action than lidocaine","Articaine cannot be used for infiltration anaesthesia in the mandible","Articaine has a maximum dose of 7 mg/kg with vasoconstrictor"],"correct":1,"explanation":"Several studies and MHRA reports have associated articaine 4% with a higher rate of persistent paraesthesia when administered as an inferior alveolar nerve block (IAN block) compared to lidocaine 2%. For this reason, articaine is generally recommended for infiltration anaesthesia in the mandible rather than IAN blocks. Sulphonamide allergy is not a contraindication to articaine."},
    {"id":"oralsurg_15","type":"sba","stem":"A 4-year-old child is given topical benzocaine gel before an injection. Shortly afterwards, the child becomes cyanosed despite adequate oxygen saturation on pulse oximetry. What is the most likely diagnosis?","options":["Anaphylaxis to benzocaine","Vasovagal syncope","Methaemoglobinaemia","Laryngospasm","Lidocaine systemic toxicity"],"correct":2,"explanation":"Methaemoglobinaemia causes central cyanosis (blue/grey discolouration) but paradoxically normal oxygen saturation on standard pulse oximetry, because pulse oximetry cannot distinguish oxyhaemoglobin from methaemoglobin. Benzocaine and prilocaine (via its metabolite o-toluidine) are the local anaesthetics most associated with this condition. Treatment is IV methylene blue 1–2 mg/kg."},
    {"id":"oralsurg_16","type":"sba","stem":"A 28-year-old presents to the dental emergency department with bilateral submandibular swelling, induration of the floor of the mouth, trismus, dysphagia, and muffled voice. Temperature is 38.9°C. What is the most appropriate immediate action?","options":["Incise and drain the submandibular space under local anaesthesia","Prescribe oral amoxicillin 500 mg three times daily and review in 24 hours","Arrange emergency hospital admission with urgent airway assessment","Extract the causative tooth under local anaesthesia","Prescribe intravenous fluids and observe in the dental chair"],"correct":2,"explanation":"This presentation is consistent with Ludwig's angina (bilateral submandibular/sublingual/submental space infection). It is a surgical emergency because rapid airway compromise can occur. The priority is emergency hospital admission for airway assessment by anaesthetics and ENT, IV antibiotics, and surgical decompression. Local anaesthesia and outpatient management are unsafe in this setting."},
    {"id":"oralsurg_17","type":"sba","stem":"According to SDCEP guidance on drug prescribing in dentistry, what is the first-line antibiotic for an adult with a spreading odontogenic infection and systemic signs (fever 38.2°C, malaise) in primary care?","options":["Metronidazole 400 mg three times daily for 5 days","Amoxicillin 500 mg three times daily for 5 days","Co-amoxiclav 625 mg three times daily for 5 days","Phenoxymethylpenicillin 500 mg four times daily for 5 days","Clarithromycin 250 mg twice daily for 5 days"],"correct":1,"explanation":"SDCEP's Drug Prescribing for Dentistry recommends amoxicillin 500 mg three times daily for 5 days as first-line for spreading odontogenic infections in adults without penicillin allergy. Metronidazole is the preferred alternative for penicillin-allergic patients. Co-amoxiclav is reserved for severe or refractory infections. Antibiotics should always be combined with source control (drainage)."},
    {"id":"oralsurg_18","type":"sba","stem":"A patient with a penicillin allergy (urticaria) presents with an acute dentoalveolar abscess with moderate facial swelling but no systemic signs. Drainage is not feasible at this visit. What is the most appropriate antibiotic choice?","options":["Co-amoxiclav 625 mg three times daily","Cefalexin 500 mg four times daily","Metronidazole 400 mg three times daily","Clindamycin 300 mg four times daily","Doxycycline 100 mg once daily"],"correct":2,"explanation":"SDCEP recommends metronidazole 400 mg three times daily for 5 days as the first-line alternative for penicillin-allergic patients with odontogenic infections. Cefalexin (a cephalosporin) carries a small risk of cross-reactivity in penicillin allergy. Clindamycin is an alternative for severe infections. Doxycycline has limited efficacy against the anaerobes that predominate in dental abscesses."},
    {"id":"oralsurg_19","type":"sba","stem":"Infection from a mandibular first molar perforates the lingual plate below the mylohyoid muscle attachment. Which fascial space is primarily involved?","options":["Buccal space","Masticator space","Sublingual space","Submandibular space","Parapharyngeal space"],"correct":3,"explanation":"The roots of the lower first and second molars typically lie below the attachment of mylohyoid to the mandible. When infection perforates the lingual plate at this level, pus enters the submandibular space (below mylohyoid). Infection from the lower third molar can also spread here. In contrast, infection above the mylohyoid attachment enters the sublingual space."},
    {"id":"oralsurg_20","type":"sba","stem":"A 52-year-old woman with a documented anaphylactic reaction to penicillin presents with a spreading lateral pharyngeal space infection following lower molar extraction. She requires hospital admission. Which antibiotic combination is most appropriate?","options":["IV co-amoxiclav and metronidazole","IV benzylpenicillin and metronidazole","IV clindamycin and metronidazole","IV vancomycin alone","IV clarithromycin and flucloxacillin"],"correct":2,"explanation":"For severe odontogenic infections in penicillin-allergic patients, clindamycin provides broad-spectrum cover including aerobic and anaerobic organisms. Adding metronidazole gives additional anaerobic cover. Benzylpenicillin and co-amoxiclav are contraindicated in true penicillin anaphylaxis. Vancomycin lacks adequate anaerobic coverage for mixed odontogenic infections."},
    {"id":"oralsurg_21","type":"sba","stem":"A 40-year-old presents with severe headache, spiking fever to 40°C, right proptosis, chemosis, and inability to move the right eye in any direction. He had a dental abscess of the upper right canine treated with antibiotics 5 days ago. What is the most likely diagnosis?","options":["Orbital cellulitis","Cavernous sinus thrombosis","Maxillary sinusitis","Intracranial abscess","Subdural empyema"],"correct":1,"explanation":"Cavernous sinus thrombosis is a rare but life-threatening complication of facial and dental infections, particularly those in the 'danger triangle' of the face. The combination of high fever, proptosis, chemosis, complete ophthalmoplegia (all directions of gaze), and severe headache is the hallmark presentation. The cavernous sinus drains both orbits, so bilateral eye signs may develop. Urgent CT with contrast and IV antibiotics are required."},
    {"id":"oralsurg_22","type":"sba","stem":"Which of the following is the most important clinical sign mandating emergency hospital referral for a patient presenting with a dental abscess?","options":["Tenderness on percussion of the offending tooth","Mild trismus (mouth opening 35 mm)","Raised white cell count on point-of-care testing","Dyspnoea or difficulty breathing","Fluctuant swelling pointing intraorally"],"correct":3,"explanation":"Dyspnoea, difficulty breathing, stridor, or any sign of airway compromise mandates immediate emergency hospital referral or calling 999, as there is a risk of rapid airway obstruction. Other referral criteria include severe trismus, dysphagia, swelling extending to the floor of the mouth or neck, systemic sepsis, or immunocompromise. An intraoral fluctuant swelling can usually be drained in primary care."},
    {"id":"oralsurg_23","type":"sba","stem":"Radiographic examination of an impacted lower left third molar shows a well-defined unilocular radiolucency with a corticated margin attached to the cemento-enamel junction of the tooth. The tooth is displaced superiorly. What is the most likely diagnosis?","options":["Odontogenic keratocyst","Radicular cyst","Dentigerous cyst","Ameloblastoma","Calcifying odontogenic cyst"],"correct":2,"explanation":"A dentigerous (follicular) cyst arises from the reduced enamel epithelium attached at the CEJ of an unerupted tooth, forming a pericoronal radiolucency. It is the most common developmental odontogenic cyst. The corticated margin and attachment to the CEJ with crown of the tooth within the lumen are characteristic. Odontogenic keratocyst can have a similar appearance but is not attached at the CEJ."},
    {"id":"oralsurg_24","type":"sba","stem":"A 30-year-old has an odontogenic keratocyst (OKC) of the mandible removed. He is counselled that the recurrence rate is higher than for other cysts. Which histological feature is most responsible for this?","options":["Thick fibrous capsule","Presence of cholesterol crystals","Thin friable wall and daughter cysts within the lining","Dense inflammatory infiltrate","Hyaline bodies in the wall"],"correct":2,"explanation":"The OKC (now classified as keratocystic odontogenic tumour in some classifications) has a thin, friable, parakeratinised lining that is prone to tearing during enucleation, leaving behind epithelial remnants that can form daughter cysts or satellite cysts within the capsule. This incomplete removal accounts for its recurrence rate of approximately 15–35%. Decompression prior to surgery can reduce recurrence."},
    {"id":"oralsurg_25","type":"sba","stem":"A 45-year-old woman has a periapical radiolucency of 12 mm diameter associated with a non-vital lower left second premolar. Histology confirms a radicular cyst. What is the most appropriate treatment?","options":["Root canal treatment of the tooth alone","Root canal treatment followed by periapical surgery","Extraction of the tooth with enucleation of the cyst","Marsupialization as definitive treatment","Observation only with 6-monthly radiographs"],"correct":1,"explanation":"Radicular cysts are treated by eliminating the source of epithelial proliferation (infected pulp tissue via root canal treatment). For cysts where RCT alone is unlikely to resolve the lesion (generally >10 mm) or where periapical healing is not occurring, periapical surgery with enucleation of the cyst lining is indicated. Simple observation is inadequate for a cyst of this size."},
    {"id":"oralsurg_26","type":"sba","stem":"A 55-year-old man presents with a slowly expanding swelling of the right mandibular body. OPG shows a multilocular radiolucency with a 'soap bubble' pattern. Biopsy shows a neoplasm comprising islands of odontogenic epithelium with stellate reticulum and peripheral palisading. What is the most appropriate management?","options":["Enucleation and curettage","Decompression alone","Marginal resection with 1 cm clear margins","Radiotherapy","Chemotherapy with cisplatin"],"correct":2,"explanation":"This is ameloblastoma, a benign but locally aggressive odontogenic tumour. Despite being benign, its behaviour requires resection with clear surgical margins (typically 1.0–1.5 cm) rather than simple enucleation, which carries an unacceptably high recurrence rate of up to 90%. Marginal or segmental resection depending on extent is the standard of care. Radiotherapy has no role."},
    {"id":"oralsurg_27","type":"sba","stem":"A 60-year-old woman on long-term steroid therapy for rheumatoid arthritis sustains a trivial mandibular injury and suffers a fracture. Which underlying jaw pathology most commonly predisposes to pathological fracture?","options":["Simple bone cyst","Torus mandibularis","Ameloblastoma","Periapical granuloma","Ossifying fibroma"],"correct":2,"explanation":"Pathological fracture of the jaw occurs when bone is weakened by an underlying lesion. Ameloblastoma is the most common odontogenic tumour to cause pathological fracture due to extensive cortical expansion and replacement of cancellous bone. Other causes include large cysts (especially OKC), osteoradionecrosis, MRONJ, Paget's disease, and metastatic deposits. Simple bone cysts rarely cause fracture."},
    {"id":"oralsurg_28","type":"sba","stem":"A 70-year-old edentulous patient requires a full upper denture. The maxillary midline shows a broad bony prominence 3 cm × 2 cm that prevents adequate denture seating. The patient is otherwise well. What is the most appropriate management?","options":["Prescribe custom-made high-relief denture and observe","Refer for torus palatinus removal surgery","Reassure the patient that it is benign and requires no treatment","Biopsy to exclude malignancy","Prescribe a soft liner and adjust at 3-monthly intervals"],"correct":0,"explanation":"Torus palatinus is a benign developmental exostosis and requires no treatment unless it prevents adequate prosthetic rehabilitation. In most cases, a denture with a high-relief design or relief in the fitting surface can accommodate the torus. Surgical removal is indicated only when conservative prosthodontic approaches fail or the torus interferes with function significantly. Biopsy is not required for a typical, longstanding torus."},
    {"id":"oralsurg_29","type":"sba","stem":"A periapical radiograph of the upper anterior region shows a well-defined oval radiolucency between and apical to the roots of both upper central incisors, with a thin corticated margin. The teeth are vital. What is the most likely diagnosis?","options":["Periapical abscess","Radicular cyst","Nasopalatine duct cyst","Central giant cell granuloma","Globulomaxillary cyst"],"correct":2,"explanation":"The nasopalatine duct cyst (incisive canal cyst) arises from remnants of the nasopalatine duct and presents as a midline anterior maxillary radiolucency between the roots of vital upper central incisors. A heart-shaped or oval radiolucency ≥6 mm diameter with a corticated margin in this location in a patient with vital teeth is characteristic. It is the most common non-odontogenic cyst of the jaws."},
    {"id":"oralsurg_30","type":"sba","stem":"A 22-year-old student presents with a painless bluish fluctuant swelling of 1 cm on the inner surface of the lower lip, which recurred after rupturing spontaneously last month. What is the most likely diagnosis and treatment?","options":["Lipoma — excision","Mucocele — excision of the lesion including the associated minor salivary gland","Ranula — marsupialization","Dermoid cyst — surgical excision","Abscess — incision and drainage"],"correct":1,"explanation":"A mucocele (mucus extravasation cyst) is most commonly found on the lower lip and results from rupture of a minor salivary gland duct following trauma, with pooling of mucus in the connective tissue. It presents as a bluish, fluctuant swelling that often recurs after spontaneous rupture. Treatment is excision of the lesion together with the associated minor salivary gland to prevent recurrence."},
    {"id":"oralsurg_31","type":"sba","stem":"A 68-year-old woman has been taking oral alendronate 70 mg weekly for 8 years for osteoporosis. She requires extraction of a symptomatic upper molar. Which statement best reflects her risk of medication-related osteonecrosis of the jaw (MRONJ)?","options":["Risk is equivalent to the general population as oral bisphosphonates have no MRONJ risk","Risk is very high; she should not have any dental extractions","Risk is low but present; SDCEP/AAOMS guidance suggests proceeding with standard care and haemostatic precautions","Drug holiday of at least 3 months is mandatory before any extraction","She must be hospitalised for the extraction"],"correct":2,"explanation":"Long-term oral bisphosphonate use (>3–5 years) for osteoporosis carries a low but real MRONJ risk, estimated at approximately 0.01–0.04%. Current SDCEP and AAOMS guidance advises against routine drug holidays as the benefit is unproven and the risk of osteoporotic fracture increases. Standard dental extraction with haemostatic measures, primary closure if possible, and close follow-up is the recommended approach. Patient should be informed of the risk."},
    {"id":"oralsurg_32","type":"sba","stem":"A 58-year-old man receiving denosumab 120 mg subcutaneously every 4 weeks for metastatic prostate cancer with bone involvement presents with exposed necrotic bone in the posterior mandible of 10 weeks duration. Which statement is most accurate?","options":["MRONJ cannot occur with denosumab; a bisphosphonate must be causative","Denosumab at oncology doses carries a similar MRONJ risk to oral bisphosphonates","Denosumab at oncology doses carries a high MRONJ risk, comparable to IV zoledronic acid","The lesion should be managed with chemotherapy","Spontaneous resolution is expected within 6 months"],"correct":2,"explanation":"Denosumab, a RANKL inhibitor, when used at oncology doses (120 mg monthly) carries a similar or slightly higher MRONJ risk compared to IV bisphosphonates such as zoledronic acid. Lower doses used for osteoporosis (60 mg every 6 months) carry a much lower risk. MRONJ risk with oral bisphosphonates for osteoporosis is significantly lower than IV bisphosphonate oncology regimens."},
    {"id":"oralsurg_33","type":"sba","stem":"According to the AAOMS 2014 position paper, which criterion is required for a diagnosis of MRONJ?","options":["Current or previous treatment with antiresorptive agents, exposed necrotic bone for at least 4 weeks, and no prior radiotherapy","Current or previous treatment with antiresorptive or antiangiogenic agents, exposed necrotic bone for more than 8 weeks, and no prior radiotherapy to the jaws","Any exposed jaw bone in a patient taking any calcium supplement","Radiographic evidence of bone loss in a patient on vitamin D supplementation","Fever and elevated CRP in a patient on oral bisphosphonates"],"correct":1,"explanation":"The AAOMS 2014 criteria for MRONJ require: (1) current or previous treatment with antiresorptive or antiangiogenic agents, (2) exposed necrotic bone in the maxillofacial region persisting for >8 weeks, and (3) no prior radiotherapy to the jaws and no metastatic disease to the jaws. All three criteria must be met. Lesions of less than 8 weeks are classified as Stage 0 (suspected MRONJ)."},
    {"id":"oralsurg_34","type":"sba","stem":"A patient who received radiotherapy to the floor of mouth (60 Gy) 4 years ago presents with exposed necrotic mandibular bone that has not healed over 3 months. He has never taken antiresorptive medication. What is the most likely diagnosis?","options":["MRONJ Stage 2","Osteomyelitis of unknown cause","Osteoradionecrosis (ORN)","Sequestrum from a dental abscess","Actinomycosis"],"correct":2,"explanation":"Osteoradionecrosis (ORN) results from radiation-induced hypoxia, hypovascularity, and hypocellularity of bone. It differs from MRONJ in that it is caused by prior radiotherapy (not antiresorptive drugs) and there is typically a history of radiation to the area. The mandible is more commonly affected than the maxilla due to its poorer vascular supply. Management may include hyperbaric oxygen, surgery, and pentoxifylline/tocopherol protocol."},
    {"id":"oralsurg_35","type":"sba","stem":"A 72-year-old man on IV zoledronic acid for multiple myeloma requires extraction of a lower molar. Which pre-operative step is most important to reduce the risk of MRONJ?","options":["Take a drug holiday of at least 6 months before extraction","Prescribe prophylactic antibiotics for 2 weeks pre-operatively","Optimise oral hygiene and ensure extraction is atraumatic with primary closure","Perform the extraction under general anaesthesia only","Prescribe antifungal prophylaxis"],"correct":2,"explanation":"For high-risk patients on IV bisphosphonates, optimising oral hygiene (to reduce bacterial load), using atraumatic extraction technique, achieving primary closure of the socket, and prescribing antibiotics pre- and post-operatively are the key risk-reduction strategies. Drug holidays before extraction are not recommended for IV bisphosphonate patients as the drug remains in bone for years regardless. Informing the patient of the risk is also essential."},
    {"id":"oralsurg_36","type":"sba","stem":"A patient on zoledronic acid reports pain in the posterior mandible but clinical and radiographic examination shows no exposed bone. There is thickening of the inferior alveolar nerve canal on OPG. What MRONJ stage is this?","options":["At-risk category","Stage 0","Stage 1","Stage 2","Stage 3"],"correct":1,"explanation":"Stage 0 MRONJ (AAOMS 2014) refers to patients with no clinical evidence of necrotic bone but with non-specific symptoms and radiographic changes (such as alveolar bone loss not explained by periodontal disease, IAN canal sclerosis, or cortical erosion). These patients require close monitoring and preventive dental care. Stage 1 involves exposed necrotic bone without infection."},
    {"id":"oralsurg_37","type":"sba","stem":"A 25-year-old woman avulses an upper right central incisor in a sports injury. The tooth has been stored in milk for 35 minutes. The apex is closed. What is the immediate priority in management?","options":["Endodontic treatment before replantation","Remove the root apex before replanting","Replant the tooth immediately after brief irrigation with saline and place in a flexible splint","Place the tooth in 2% sodium fluoride solution for 20 minutes then replant","Refer to secondary care for replantation under general anaesthesia"],"correct":2,"explanation":"For a closed apex permanent tooth with an extra-oral dry time of less than 60 minutes, immediate replantation after gentle saline irrigation is the priority (IADT guidelines). Milk is an acceptable storage medium that maintains periodontal ligament cell viability. A flexible splint (e.g. 0.1 mm wire and composite) should be placed for 2 weeks. Endodontic treatment is started 7–10 days after replantation for closed apex teeth."},
    {"id":"oralsurg_38","type":"sba","stem":"A 5-year-old child avulses a maxillary primary central incisor. The parent has brought the tooth to the surgery. What is the recommended management?","options":["Replant immediately and splint for 2 weeks","Replant and prescribe antibiotics for 5 days","Do not replant; reassure parent and provide space management advice if appropriate","Replant the tooth only if extra-oral time was less than 30 minutes","Store in milk and refer to paediatric dentistry"],"correct":2,"explanation":"Primary teeth should NOT be replanted following avulsion. The main reasons are: risk of damaging the developing permanent tooth bud, risk of ankylosis, and uncooperative patient management. The child and parent should be reassured and monitored for space management implications. The IADT guidelines are clear that replantation of avulsed primary teeth is contraindicated."},
    {"id":"oralsurg_39","type":"sba","stem":"A 22-year-old man sustains an injury resulting in intrusion of the upper right central incisor by 3 mm. The root apex is fully formed. Which management is most appropriate according to IADT guidelines?","options":["Allow spontaneous re-eruption for up to 8 weeks","Surgical repositioning immediately","Orthodontic repositioning to begin within 3–4 weeks if no spontaneous re-eruption","Extract the tooth and place an implant","Root canal treatment immediately before deciding on repositioning"],"correct":2,"explanation":"For mature permanent teeth (closed apex) with intrusion, IADT guidelines recommend either surgical or orthodontic repositioning rather than waiting for spontaneous re-eruption, as ankylosis is a significant risk. Orthodontic repositioning beginning within 3–4 weeks is the preferred approach for moderate intrusion. Spontaneous re-eruption is more appropriate for immature (open apex) teeth with mild intrusion."},
    {"id":"oralsurg_40","type":"sba","stem":"A 28-year-old man is involved in a road traffic collision and sustains a mandibular fracture. Which site of mandibular fracture is most commonly reported in the literature?","options":["Symphysis","Parasymphysis","Body","Condyle","Angle"],"correct":3,"explanation":"The condylar region (condylar head and subcondylar area) is the most common site of mandibular fracture, accounting for approximately 30–36% of all mandibular fractures. This is because the condylar neck is the weakest point of the mandible, and indirect forces transmitted along the jaw preferentially cause fracture here. The angle and parasymphysis are also common sites."},
    {"id":"oralsurg_41","type":"sba","stem":"An 8-year-old sustains trauma to a maxillary central incisor with an incompletely formed apex. The pulp is exposed over a 2 mm area and the patient presents 1 hour after injury. Which treatment best preserves continued root development?","options":["Direct pulp cap with calcium hydroxide","Cvek pulpotomy (partial pulpotomy) using mineral trioxide aggregate","Full pulpectomy and root canal obturation","Extraction and space maintainer","Calcium hydroxide root filling to apex"],"correct":1,"explanation":"A Cvek pulpotomy (partial pulpotomy) removes the superficial inflamed pulp tissue to a depth of 2 mm and applies a biocompatible pulp capping material (MTA or biodentine) over healthy pulp tissue. This allows continued dentinogenesis and root maturation in immature teeth, which is critical for long-term prognosis. It has success rates of >90% for young pulps with recent uncomplicated exposures."},
    {"id":"oralsurg_42","type":"sba","stem":"Following reimplantation of an avulsed permanent upper central incisor, how long should a flexible splint be retained according to IADT guidelines?","options":["24–48 hours","1 week","2 weeks","4 weeks","8 weeks"],"correct":2,"explanation":"IADT guidelines recommend a flexible splint for 2 weeks following replantation of an avulsed permanent tooth. Rigid splinting or prolonged splinting increases the risk of ankylosis and replacement root resorption. A flexible splint (wire + composite) allows physiological movement that encourages periodontal ligament healing. Splinting duration differs for other luxation injuries: lateral luxation requires 4 weeks and root fractures in the cervical third up to 4 months."},
    {"id":"oralsurg_43","type":"sba","stem":"A 55-year-old man presents with recurrent pain and swelling below the left jaw, particularly at mealtimes. A hard calculus is palpable in the floor of the mouth anteriorly. Which gland is most commonly affected by sialolithiasis?","options":["Parotid gland","Sublingual gland","Minor salivary glands","Submandibular gland","Accessory parotid gland"],"correct":3,"explanation":"Sialolithiasis most commonly affects the submandibular gland (approximately 80–90% of cases). This is attributed to the tortuous uphill course of Wharton's duct, the alkaline and mucoid saliva with high calcium and phosphate content, and the duct orifice being narrower relative to the gland size. Parotid stones account for about 10–20% of cases."},
    {"id":"oralsurg_44","type":"sba","stem":"A 50-year-old woman presents with a slowly growing, painless mass in the parotid region present for 5 years. MRI shows a well-encapsulated heterogeneous mass. Histology confirms a benign mixed tumour. What is the treatment of choice?","options":["Observation with 6-monthly ultrasound","Fine needle aspiration cytology and chemotherapy","Superficial parotidectomy with facial nerve preservation","Enucleation of the tumour","Radiotherapy"],"correct":2,"explanation":"Pleomorphic adenoma (benign mixed tumour) is the most common salivary gland tumour and requires superficial parotidectomy with preservation of the facial nerve. Simple enucleation carries a high recurrence rate (30–45%) due to pseudopod extensions beyond the capsule, and risk of malignant transformation (carcinoma ex-pleomorphic adenoma) increases with duration. Preserving the facial nerve is essential."},
    {"id":"oralsurg_45","type":"sba","stem":"A 65-year-old woman presents with episodic severe sharp electric-shock-like pain in the right cheek triggered by light touch, eating, and cold air. The pain lasts seconds. Neurological examination is normal. What is the first-line pharmacological treatment?","options":["Amitriptyline 25 mg nocte","Gabapentin 300 mg three times daily","Carbamazepine titrated from 100 mg twice daily","Prednisolone 30 mg once daily","Sumatriptan 50 mg as required"],"correct":2,"explanation":"The presentation is typical of trigeminal neuralgia (V2 distribution). First-line pharmacological treatment is carbamazepine, a sodium channel blocker, titrated from 100 mg twice daily to effect (usually 400–1200 mg/day). It achieves pain relief in approximately 70–80% of patients. Regular monitoring of blood count and sodium is required. Amitriptyline and gabapentin are second-line options."},
    {"id":"oralsurg_46","type":"sba","stem":"Carbamazepine is initiated for trigeminal neuralgia. Through which mechanism does it exert its analgesic effect?","options":["Potentiation of GABA-A receptor activity","Blockade of voltage-gated sodium channels","Inhibition of NMDA receptors","Activation of mu-opioid receptors","Inhibition of serotonin reuptake"],"correct":1,"explanation":"Carbamazepine acts primarily by blocking voltage-gated sodium channels in a use-dependent manner, stabilising the neuronal membrane and reducing repetitive high-frequency firing of action potentials. This mechanism is responsible for its efficacy in trigeminal neuralgia, epilepsy, and bipolar disorder. Gabapentin and pregabalin act on voltage-gated calcium channels; benzodiazepines potentiate GABA-A receptors."},
    {"id":"oralsurg_47","type":"sba","stem":"A 40-year-old man describes severe, strictly unilateral periorbital pain lasting 45–90 minutes, occurring up to 3 times per day for 6 weeks, with ipsilateral lacrimation, nasal discharge, and partial ptosis during attacks, followed by a pain-free period. Which is the most likely diagnosis?","options":["Migraine with aura","Trigeminal neuralgia","Cluster headache","Temporal arteritis","Atypical facial pain"],"correct":2,"explanation":"Cluster headache presents with severe unilateral periorbital/temporal pain lasting 15–180 minutes, occurring in clusters (bouts) with one or more attacks daily for weeks. Ipsilateral autonomic features (lacrimation, rhinorrhoea, Horner's syndrome) are characteristic. It predominantly affects males (3:1) and the pain is described as the most severe known. Acute treatment: high-flow O2 and sumatriptan nasal spray or injection."},
    {"id":"oralsurg_48","type":"sba","stem":"A patient with well-controlled type 2 diabetes (HbA1c 58 mmol/mol, eGFR 62) enquires about dental implants to replace an upper central incisor. Which statement is most accurate regarding implant placement?","options":["Diabetes is an absolute contraindication to dental implants","Well-controlled diabetes is a relative contraindication; implants can be placed with close monitoring","Implants are contraindicated if eGFR is below 90","Implants have identical success rates in diabetic and non-diabetic patients","Metformin must be stopped 48 hours before surgery"],"correct":1,"explanation":"Well-controlled type 2 diabetes is a relative, not absolute, contraindication to dental implants. Studies show comparable implant survival rates in well-controlled diabetics versus non-diabetics, though there is a slightly higher risk of peri-implantitis. Poor glycaemic control (HbA1c >69 mmol/mol) significantly increases complication risk. Implants should be avoided in poorly controlled diabetes. Metformin does not need to be stopped."},
    {"id":"oralsurg_49","type":"sba","stem":"A 2 cm white patch is found on the left lateral border of the tongue during a routine examination of a 55-year-old smoker. It cannot be rubbed off. Which approach to biopsy is most appropriate?","options":["Excisional biopsy of the entire lesion","Incisional biopsy from the most suspicious area","Exfoliative cytology alone is sufficient for diagnosis","No biopsy needed; prescribe antifungal treatment first","Fine needle aspiration cytology"],"correct":1,"explanation":"For lesions >1 cm or those with features suspicious for dysplasia or malignancy (e.g. lateral tongue in a smoker), an incisional biopsy from the most clinically suspicious area (erythematous, irregular, or indurated portion) is appropriate. Excisional biopsy of a 2 cm lesion would be complex and risks inadequate margins if malignant. Exfoliative cytology has low sensitivity and cannot replace histopathology for definitive diagnosis."},
    {"id":"oralsurg_50","type":"sba","stem":"A patient presents with clicking, pain, and limited mouth opening on the right side for 3 months. Clinical examination is consistent with temporomandibular dysfunction (TMD). There are no red flags. What is the most appropriate initial management?","options":["Immediate referral for MRI of the TMJ","Prescribe long-term diazepam for muscle spasm","Reassurance, explanation, soft diet, jaw exercises, and an occlusal splint","Occlusal equilibration to correct the bite","Arthrocentesis of the joint"],"correct":2,"explanation":"The vast majority of TMD has a favourable natural history. First-line management is conservative and reversible: patient education, reassurance, soft diet, avoidance of parafunctional habits, jaw exercises/physiotherapy, and provision of a hard acrylic stabilisation splint. Irreversible treatments (occlusal adjustment, surgery) should not be first-line. NICE and FGDP guidance both emphasise conservative management initially."},
    {"id":"oralsurg_51","type":"sba","stem":"A 35-year-old patient has an impacted lower right wisdom tooth. CBCT shows the inferior alveolar nerve passing through the root furcation of the wisdom tooth. He is asymptomatic. Which treatment best balances MRONJ and nerve injury risk?","options":["Surgical extraction under general anaesthesia with microsurgical nerve repair on standby","Coronectomy (intentional root retention)","Immediate extraction under local anaesthesia without CBCT guidance","Observation only with annual radiographs","Orthodontic uprighting of the tooth"],"correct":1,"explanation":"Coronectomy (deliberate retention of the roots) is recommended when CBCT confirms the IAN to be in intimate contact with or passing through the roots of lower wisdom teeth. The crown is removed to the level of bone while the roots are retained, dramatically reducing the risk of IAN injury. Long-term studies show low complication rates; the roots tend to migrate away from the nerve over time. It is contraindicated if the tooth is infected or mobile."},
    {"id":"oralsurg_52","type":"sba","stem":"Lingual nerve injury during third molar surgery is most likely caused by which surgical manoeuvre?","options":["Elevation of the mucoperiosteal flap buccally","Use of a lingual retractor during bone removal","High-speed turbine bur for bone removal without irrigation","Sectioning the crown with a surgical bur","Placement of sutures in the retromolar area"],"correct":1,"explanation":"The lingual nerve lies in close proximity to the lingual plate in the third molar region and is vulnerable during lingual retraction. Studies have shown that use of a lingual retractor is associated with a higher incidence of temporary lingual nerve injury. However, some evidence suggests not using a lingual retractor also places the nerve at risk from the bur. Current evidence is mixed; careful surgical technique is essential regardless of retractor use."},
    {"id":"oralsurg_53","type":"sba","stem":"A patient develops urticaria, hypotension (BP 78/45), stridor, and bronchospasm 5 minutes after administration of local anaesthetic. What is the dose and route of adrenaline for anaphylaxis?","options":["0.1 mg (1:10,000) intravenous","0.5 mg (1:1,000) intramuscular","0.5 mg (1:10,000) subcutaneous","1.0 mg (1:1,000) intramuscular","0.5 mg (1:10,000) intramuscular"],"correct":1,"explanation":"Per the Resuscitation Council UK 2021 guidelines, anaphylaxis is treated with adrenaline 0.5 mg IM (0.5 mL of 1:1,000) injected into the anterolateral thigh. This can be repeated every 5 minutes if needed. IM is preferred over IV (which risks arrhythmia if not given by experts), and subcutaneous absorption is too slow. In children the dose is 0.01 mg/kg IM (maximum 0.5 mg)."},
    {"id":"oralsurg_54","type":"sba","stem":"A 16-year-old patient loses consciousness in the dental chair during a local anaesthetic injection. The syncope is vasovagal. He regains consciousness after being laid supine with legs elevated. What should be given next?","options":["Adrenaline 0.5 mg IM","IV glucose 10%","Supplemental oxygen and monitor; no further treatment usually required","Hydrocortisone 200 mg IV","Glucagon 1 mg IM"],"correct":2,"explanation":"Vasovagal syncope (simple faint) is self-limiting once the patient is supine, which restores cerebral perfusion. Recovery is expected within minutes. Supplemental oxygen at 15 L/min via face mask is given as a precaution, but no further pharmacological intervention is required. The patient should be kept recumbent until fully recovered. Return to dental treatment should be delayed and the patient should not leave unaccompanied."},
    {"id":"oralsurg_55","type":"sba","stem":"A patient with a prosthetic aortic heart valve requires a lower molar extraction. According to current NICE guidance (CG64), what prophylaxis is required?","options":["Amoxicillin 3 g orally 1 hour before treatment","Amoxicillin 2 g IV at induction","No antibiotic prophylaxis; maintain good oral hygiene","Clindamycin 600 mg orally 1 hour before treatment only if penicillin allergic","Amoxicillin 500 mg TDS for 5 days post-extraction"],"correct":2,"explanation":"NICE CG64 (2008) recommends against routine antibiotic prophylaxis for infective endocarditis in patients undergoing dental procedures, including those with prosthetic heart valves or previous IE. This guidance was controversial but has been upheld; the evidence showed no benefit and potential harm from prophylaxis. Instead, patients should be advised of the importance of maintaining good oral hygiene and reporting fever or malaise post-procedure."},
    {"id":"oralsurg_56","type":"sba","stem":"A patient with no contraindications requires post-operative analgesia following a surgical lower wisdom tooth removal. According to SDCEP guidance, which analgesic is first-line?","options":["Co-codamol 30/500 mg four times daily","Tramadol 50 mg as required","Ibuprofen 400 mg three times daily with food","Diclofenac suppositories 100 mg twice daily","Morphine 5 mg as required"],"correct":2,"explanation":"SDCEP prescribing guidance recommends ibuprofen 400 mg (or other NSAIDs) as first-line analgesic for post-operative dental pain, as NSAIDs provide superior analgesia for inflammatory dental pain compared to paracetamol alone. Paracetamol can be used as an alternative or combined with NSAIDs for additive effect. Codeine-containing preparations are not first-line and are associated with constipation and dependence."},
    {"id":"oralsurg_57","type":"sba","stem":"A 25-year-old woman taking the combined oral contraceptive pill (COCP) requires extraction of a lower right third molar. Which advice is most accurate regarding her risk of dry socket?","options":["The COCP has no effect on dry socket risk","She should stop the COCP 4 weeks before extraction to reduce risk","Oestrogen in the COCP increases fibrinolytic activity and dry socket risk; scheduling extraction in days 23–28 of the pill cycle may reduce risk","The COCP is a contraindication to local anaesthetic with vasoconstrictor","Progesterone-only pills carry the same risk as the COCP"],"correct":2,"explanation":"Oestrogen in the combined oral contraceptive pill elevates plasminogen activator levels, increasing fibrinolytic activity and predisposing to clot lysis and dry socket. Several studies have shown a higher dry socket incidence in COCP users. Scheduling the extraction during days 23–28 of the active pill cycle (when oestrogen effect is lowest) is a practical risk-reduction strategy recommended in the literature."},
    {"id":"oralsurg_58","type":"sba","stem":"A patient presents with a tender right-sided facial swelling, erythema, and limited mouth opening of 18 mm following lower molar extraction 4 days ago. Infection has spread to which space to most likely cause this degree of trismus?","options":["Buccal space","Parapharyngeal space","Masticator space","Sublingual space","Submandibular space"],"correct":2,"explanation":"Trismus (restricted mouth opening) results from spasm or invasion of the muscles of mastication. The masticator space contains the masseter, medial pterygoid, and the lower part of the temporalis muscle and the ramus of the mandible. Infection spreading into this space causes severe inflammation of these muscles, resulting in severe trismus. Buccal space infection typically causes facial swelling without significant trismus."},
    {"id":"oralsurg_59","type":"sba","stem":"When designing a mucoperiosteal flap for lower third molar surgery, which principle is most important to prevent wound dehiscence?","options":["The free margin should be wider than the base to ensure tension-free closure","The base of the flap should be at least as wide as the free margin to ensure adequate blood supply","Vertical releasing incisions should never be used","The flap must not cross the midline","The flap should always be envelope-type only"],"correct":1,"explanation":"Adequate blood supply to a mucoperiosteal flap is dependent on the base being at least as wide as the free margin (a trapezoidal or envelope design). A flap with a narrow base relative to its free margin risks ischaemia, necrosis, and dehiscence. Vertical releasing incisions are acceptable but should not be placed over bony defects. Incisions should be on sound bone to allow primary closure."},
