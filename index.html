    {"id":"ortho_45","type":"sba","stem":"An 8-year-old child has a posterior crossbite involving the upper left deciduous molars and permanent first molar. On closing, the mandible deviates to the left. Centric relation (teeth not touching) and maximum intercuspation differ. What does this suggest?","options":["The child has a true skeletal asymmetry","There is a displacement associated with the crossbite — the teeth are guiding the mandible into an asymmetric position; the underlying skeletal pattern may be normal","Immediate surgical correction is required","The crossbite is dental only with no displacement","This is within normal development — no treatment needed"],"correct":1,"explanation":"When maximum intercuspation differs from centric relation (ICP ≠ CR) and the mandible deviates on closure, this indicates a tooth-guided displacement. The premature crossbite contact deflects the mandible laterally to achieve full intercuspation. The underlying skeletal pattern may be normal or only mildly asymmetric. Early correction (URA expansion) eliminates the displacement and prevents adaptive asymmetric mandibular growth."},
    {"id":"ortho_46","type":"sba","stem":"In the assessment of a malocclusion, what does 'increased MMPA' (mandibular-to-maxillary plane angle) indicate regarding facial growth pattern?","options":["Horizontal (low-angle) growth pattern with reduced lower face height","Average growth pattern","Vertical (high-angle) growth pattern with increased lower face height and anterior open bite tendency","Bimaxillary proclination","Skeletal Class II only"],"correct":2,"explanation":"MMPA (Maxillary-Mandibular Planes Angle or Frankfurt-Mandibular Planes Angle in some analyses) measures the divergence between the maxillary and mandibular planes. Increased MMPA (>32–35°) indicates a high-angle/hyperdivergent vertical growth pattern: a long lower face, increased anterior face height, tendency to anterior open bite, and a backward-rotating mandible. Low-angle (<22–25°) means horizontal growth, a short lower face, and deep bite tendency."},
    {"id":"ortho_47","type":"sba","stem":"Fixed orthodontic appliances are being placed. Which of the following steps in bracket bonding is essential for adequate bond strength?","options":["Dry the tooth, apply fluoride varnish, then bond","Etch the enamel with 37% phosphoric acid for 30 seconds, rinse, dry, apply primer/adhesive, then bond the bracket","Apply the composite to the bracket and cure without etching","Scale and polish immediately before bonding","Use zinc phosphate cement for bracket bonding"],"correct":1,"explanation":"The orthodontic bonding protocol requires: (1) clean, dry enamel; (2) acid etch with 37% phosphoric acid (orthophosphoric acid) for 15–30 seconds on permanent enamel (creates microporosity); (3) rinse and dry until frosty white enamel; (4) apply primer/bonding resin; (5) apply composite to bracket mesh; (6) position bracket; (7) cure. Etching is mandatory for adequate bond strength. Fluoride varnish before bonding would impair etching."},
    {"id":"ortho_48","type":"sba","stem":"A patient has a Class II Division 1 malocclusion with an overjet of 7 mm and a well-aligned lower arch. The upper arch is crowded with 6 mm of crowding. Upper first premolars are extracted. After extraction, which of the following describes 'maximum anchorage'?","options":["Allowing all of the extraction space to be used by mesial drift of the posterior teeth","Using headgear, TADs, or special mechanics to prevent mesial movement of the posterior teeth, reserving all the extraction space for anterior retraction","Allowing equal space distribution between anterior retraction and posterior drift","Extracting only one upper premolar to limit space","Extracting second premolars instead for less space"],"correct":1,"explanation":"Maximum anchorage means the posterior teeth are prevented from moving mesially into the extraction space, reserving all the space for retraction of the anterior teeth (retracting the incisors and canines by the full premolar width). This requires anchorage reinforcement: transpalatal arch (TPA), Nance palatal arch, headgear, or TADs. Maximum anchorage is needed when large overjet reduction is required along with crowding relief."},
    {"id":"ortho_49","type":"sba","stem":"A patient has upper central incisors with 2 mm of crowding and a very mild Class I malocclusion (no other features). What is the IOTN DHC grade and what does it imply for NHS treatment?","options":["Grade 5 — immediate NHS treatment is required","Grade 4 — NHS treatment is clearly indicated","Grade 3 — borderline need; NHS funding depends on AC score","Grade 2 — little need; NHS treatment is not provided","Grade 1 — no treatment need"],"correct":3,"explanation":"IOTN DHC Grade 2 comprises mild malocclusion features including slight crowding (<2 mm), minor crossbites, minor spacing, and similar. Grade 2 indicates 'little need'; NHS treatment is not funded for Grade 2 in England. Grade 3 (moderate/borderline) may qualify if the AC score is also ≥6. Only Grades 4 and 5 automatically qualify for NHS orthodontic treatment without needing a high AC score."},
    {"id":"ortho_50","type":"sba","stem":"A 12-year-old girl has an anterior open bite of -3 mm (lower incisors do not contact the upper incisors by 3 mm). She has a history of prolonged digit (thumb) sucking until age 10. Her skeletal pattern is mildly hyperdivergent (MMPA 35°). What is the most likely aetiology?","options":["Skeletal aetiology — high MMPA alone explains all the open bite","Digit sucking habit causing dentoalveolar anterior open bite in a dentally susceptible child, with possible minor vertical skeletal component","Lower jaw excessive growth causing the open bite","Tongue thrusting alone","Tongue size abnormality (macroglossia)"],"correct":1,"explanation":"In this case, the most likely aetiology is the prolonged digit-sucking habit (which physically prevents the incisors from fully erupting — dentoalveolar anterior open bite) on a background of a mild vertical skeletal pattern. After cessation of the habit, partial spontaneous correction often occurs. Skeletal open bites (high MMPA alone) tend to be more pronounced and symmetrical. A combination of dental and skeletal factors is common, and a careful history is essential."},
    {"id":"ortho_51","type":"sba","stem":"A patient has an anterior open bite of -4 mm with a high-angle skeletal pattern (MMPA 40°). Both conventional orthodontics and orthognathic surgery have been discussed. What surgical procedure is most appropriate for correction of a skeletal anterior open bite?","options":["Le Fort I osteotomy to move the maxilla anteriorly","Bilateral sagittal split osteotomy (BSSO) to advance the mandible","Posterior maxillary impaction via Le Fort I osteotomy to close the anterior open bite by autorotating the mandible","Genial (chin) advancement genioplasty","Bimaxillary osteotomy with mandibular setback"],"correct":2,"explanation":"Skeletal anterior open bite correction typically involves posterior maxillary impaction: a Le Fort I osteotomy is used to move the posterior maxilla superiorly (upward impaction). This causes the mandible to autorotate closed (counter-clockwise), closing the anterior open bite without touching the mandible. A BSSO to close the bite by advancing the mandible may also be used in combination. Genioplasty corrects chin projection, not open bite."},
    {"id":"ortho_52","type":"sba","stem":"A 13-year-old has fixed appliances placed. Six months later, the clinician notices multiple white spot lesions on the buccal surfaces around the brackets. The patient's oral hygiene has been poor throughout treatment. What is the most appropriate next step?","options":["Continue treatment and address oral hygiene at the end","Remove the fixed appliances, treat the demineralised enamel with fluoride (varnish, Tooth Mousse/CPP-ACP), reinforce oral hygiene, and reconsider whether to resume treatment","Apply fluoride varnish but continue with treatment unchanged","Simply increase the appointment frequency","Prescribe a course of antibiotics"],"correct":1,"explanation":"Persistent poor oral hygiene causing active demineralisation (white spot lesions) is an indication to pause or abandon fixed appliance treatment. Continuing risks significant enamel caries. The appliances should be removed, intensive remineralisation therapy started (fluoride varnish, Tooth Mousse/CPP-ACP), and a period of effective home care established. Reinstatement of treatment depends on whether the patient demonstrates improved compliance. This protects the patient from irreversible enamel damage."},
    {"id":"ortho_53","type":"sba","stem":"A patient has a reverse overjet (lower incisors anterior to upper incisors by 3 mm) and a Class I skeletal pattern — an anterior crossbite of two upper incisors that are retroclined due to occlusal interference in development. What is the appropriate orthodontic management?","options":["Orthognathic surgery to advance the maxilla","Extract lower incisors to eliminate the crossbite","Upper removable appliance with Z-spring/procline spring or fixed appliance to procline the upper incisors over the lower, with a posterior bite plane to unlock the occlusion during treatment","Accept and monitor — dental crossbites cannot be corrected","Grind the lower incisors to reduce their height"],"correct":2,"explanation":"An anterior crossbite with a Class I skeletal pattern ('dental crossbite') is due to retroclination of the upper incisors — manageable orthodontically without surgery. Treatment: URA with a procline spring (Z-spring) on the retroclined incisors plus a posterior bite plane to disengage the occlusion (allow the upper incisors to procline freely over the lower incisors). Fixed appliances are used in older/more complex cases. Surgery is not indicated when the skeletal pattern is Class I."},
    {"id":"ortho_54","type":"sba","stem":"A patient's lower second molars need to be aligned with fixed appliances but they are very lingually tilted. Which component of the bracket prescription controls root torque in a fully programmed bracket system?","options":["The bracket angulation in the slot (tip)","The third-order torque prescription built into the bracket slot orientation","The bracket height on the tooth","The archwire diameter only","The adhesive composite thickness"],"correct":1,"explanation":"Modern pre-adjusted edgewise appliance (PAEA / 'straight wire' systems, e.g. MBT, Roth) have torque (labiolingual root angulation), tip (mesiodistal angulation), and in/out (thickness) built into each bracket. The third-order (torque) prescription is encoded in the angulation of the base of the bracket slot relative to the bracket base, so that when a rectangular archwire engages the bracket, it automatically delivers the prescribed root torque. No bracket bending is needed."},
    {"id":"ortho_55","type":"sba","stem":"In the lower incisor region, the average arch length discrepancy below which all crowding can generally be resolved without extractions is:","options":["<2 mm","<4 mm","<6 mm","<8 mm","<10 mm"],"correct":1,"explanation":"A lower arch crowding of up to approximately 4 mm can generally be resolved without extraction by modest arch expansion, interproximal reduction (IPR), and alignment. Greater than 4 mm in the lower arch usually requires space creation (extractions, distalization, or IPR in selected cases). The critical figure of ~4 mm (some authors say 3–5 mm) is a useful threshold for extraction vs non-extraction decision-making, though individual assessment is always required."},
    {"id":"ortho_56","type":"sba","stem":"A patient requires orthognathic surgery. Cephalometric analysis shows: SNA 78°, SNB 84°, ANB -6°, MMPA 24°. What combination of jaw movements would be most appropriate?","options":["Maxillary advancement (Le Fort I) only","Mandibular setback (BSSO) only","Bimaxillary surgery: maxillary advancement (Le Fort I) AND mandibular setback (BSSO) — a 'bimaxillary osteotomy'","Genial advancement genioplasty only","Distraction osteogenesis of the mandible to increase its length"],"correct":2,"explanation":"SNA 78° (normal ~82°) indicates maxillary retrusion; SNB 84° (normal ~80°) indicates mandibular protrusion; ANB -6° indicates severe Class III skeletal pattern. MMPA 24° is below average (low-angle). The most appropriate treatment is bimaxillary osteotomy: Le Fort I maxillary advancement AND BSSO mandibular setback. Combining both movements achieves a greater skeletal correction than either alone, produces a more balanced aesthetic outcome, and reduces the amount of movement needed at each jaw."},
    {"id":"ortho_57","type":"sba","stem":"Which archwire material is most appropriate for detailed finishing (root parallelism, torque correction) in the final stages of fixed appliance treatment?","options":["Superelastic NiTi round 0.014\"","Beta-titanium (TMA) rectangular 0.019\" × 0.025\"","Stainless steel rectangular 0.019\" × 0.025\"","Braided stainless steel 0.0175\"","NiTi rectangular 0.019\" × 0.025\""],"correct":2,"explanation":"In the finishing stage, a stainless steel rectangular archwire (0.019\" × 0.025\" in a 0.022\" slot, or 0.017\" × 0.025\" in a 0.018\" slot) is used because of its high stiffness (allows precise force delivery and third-order torque corrections), ability to be bent chairside to correct individual tooth positions, and accurate root parallelism via tip bends. NiTi and TMA are too flexible for precise finishing; NiTi cannot be permanently bent."},
    {"id":"ortho_58","type":"sba","stem":"A 12-year-old patient has hypodontia of the upper left lateral incisor. The canine has drifted mesially into the lateral incisor space. What is the initial speciality referral?","options":["Restorative dentistry specialist to plan the implant immediately","Oral and maxillofacial surgery for surgical exposure","Orthodontist to assess space opening vs space closure and plan overall arch management","Paediatric dental specialist for overall care","No referral — the GDP manages this alone"],"correct":2,"explanation":"In hypodontia cases, the orthodontist leads the multidisciplinary team assessment and plans whether to close the space (canine substitution) or open/maintain space for prosthetic replacement. This decision depends on many factors: the occlusion, skeletal pattern, tooth shape, canine colour, and the patient's wishes. The orthodontist makes this assessment first before prosthodontic or surgical planning can proceed."},
    {"id":"ortho_59","type":"sba","stem":"A 9-year-old presents with a supernumerary tooth (mesiodens) in the upper midline that is palpable in the palate. An OPG shows it is inverted and positioned between the roots of the upper central incisors. It has not caused eruption delay of the central incisors. What is the management?","options":["Immediate surgical removal under local anaesthesia","Monitor radiographically at 6-month intervals; consider removal when the roots of the adjacent permanent teeth are 2/3 formed to reduce risk of iatrogenic root damage","Extract the adjacent central incisors","Ignore — inverted mesiodens never cause problems","Apply orthodontic traction to erupt the mesiodens"],"correct":1,"explanation":"An inverted mesiodens not causing eruption delay should be monitored. Surgical removal is planned when the roots of the adjacent permanent central incisors are approximately two-thirds developed — this minimises the risk of surgical damage to the partly-formed roots while ensuring the incisors have sufficient root length to be stable. Earlier removal risks iatrogenic root damage; later removal may cause prolonged impaction or dentigerous cyst formation."},
    {"id":"ortho_60","type":"sba","stem":"A 28-year-old patient requests orthodontic treatment. She has mild crowding (4 mm) in the lower arch and a Class I molar relationship. She asks about the differences between conventional fixed appliances and clear aligner therapy (CAT, e.g. Invisalign). Which of the following is a recognised limitation of clear aligner therapy compared to fixed appliances?","options":["Clear aligners cannot move teeth at all","Clear aligners have limited ability to perform certain complex tooth movements (e.g. precise torque control, extrusion, multiple rotation corrections) and require high patient compliance as they must be worn 20–22 hours per day","Clear aligners are more expensive in every clinical scenario","Fixed appliances are invisible to others","Clear aligners cause more root resorption than fixed appliances"],"correct":1,"explanation":"Clear aligner therapy (CAT) has several recognised limitations compared to fixed appliances: (1) limited torque control (especially for upper incisors); (2) difficulty intruding/extruding teeth predictably; (3) complex rotations can be challenging; (4) absolute compliance required (20–22 hrs/day) — poor compliance severely compromises outcome; (5) attachments (bonded composite) are required for many movements. However, CAT is effective for mild-moderate tooth movement and has excellent aesthetics and patient acceptance."}
  ],
  radiology: [
    {"id":"radiology_1","type":"sba","stem":"In the UK, the legislation governing the use of ionising radiation in medical/dental practice is:","options":["The Ionising Radiations Regulations 1999 (IRR99)","The Ionising Radiation (Medical Exposure) Regulations 2017 (IR(ME)R 2017) and the Ionising Radiations Regulations 2017 (IRR17)","The Health and Safety at Work Act 1974 only","The Radioactive Substances Act 1993","The Medical Devices Regulations 2002"],"correct":1,"explanation":"Dental radiography in the UK is governed by two sets of regulations: (1) IRR17 (Ionising Radiations Regulations 2017) — focuses on protection of workers and the environment, enforced by the Health and Safety Executive (HSE); (2) IR(ME)R 2017 (Ionising Radiation (Medical Exposure) Regulations 2017) — focuses on protection of patients receiving medical exposures, enforced by the Care Quality Commission (CQC) in England. Both replaced their 1999/2000 predecessors."},
    {"id":"radiology_2","type":"sba","stem":"Under IR(ME)R 2017, which duty holder is responsible for justifying an individual dental X-ray examination?","options":["The radiation protection supervisor (RPS)","The employer (practice owner or NHS body)","The referrer (person requesting the X-ray)","The practitioner (clinician who directs the exposure, often the dentist)","The operator (person who carries out the exposure)"],"correct":3,"explanation":"Under IR(ME)R 2017, the practitioner (the registered healthcare professional who directs the medical exposure — usually the dentist or dental radiologist) has the duty to clinically evaluate/justify each individual exposure before it is performed, weighing the benefit against the risk. The referrer sends the request; the practitioner decides whether the examination is justified. The operator physically carries out the exposure under written employer's procedures."},
    {"id":"radiology_3","type":"sba","stem":"Under IR(ME)R 2017, which role involves the practical aspects of carrying out a dental radiograph — positioning the patient, setting the machine, and pressing the exposure button?","options":["Referrer","Practitioner","Operator","Radiation protection adviser (RPA)","Radiation protection supervisor (RPS)"],"correct":2,"explanation":"The operator under IR(ME)R 2017 is any person entitled to carry out practical aspects of medical exposures (positioning the patient, setting exposure parameters, pressing the exposure button). Operators must be trained and identified in the employer's procedures. In dentistry, this can be a dentist, dental nurse, or radiographer working within an employer's written procedures. The practitioner justifies; the operator carries out."},
    {"id":"radiology_4","type":"sba","stem":"Which of the following best describes the ALARA principle as applied to dental radiography?","options":["As Late as Radiographically Achievable — defer X-rays for as long as possible","As Low as Reasonably Achievable — exposures must be reduced to as low a dose as is reasonably practicable while still achieving diagnostic quality","All Lesions Are Radiographically Apparent — rely on clinical examination, take X-rays only if the clinical diagnosis is uncertain","Avoid Lateral-Angle Radiograph Administration","Absolute Limit Applied to Radiation Administration"],"correct":1,"explanation":"ALARA (As Low as Reasonably Achievable) is the fundamental radiation protection principle under both IRR17 and IR(ME)R 2017. Doses must be kept as low as reasonably practicable through: appropriate selection criteria; fast film/digital receptors; accurate positioning; appropriate collimation; correct exposure factors; quality assurance. This does not mean avoiding necessary radiographs — unjustified omission of indicated X-rays is also a patient safety issue."},
    {"id":"radiology_5","type":"sba","stem":"A new patient aged 25 attends for a routine check-up. She has 28 teeth, good oral hygiene, no symptoms, and no radiographic history available. Which bitewing interval is recommended according to FGDP selection criteria for a low-risk adult?","options":["No bitewings needed — clinical examination is sufficient","Bitewings every 6 months","Bitewings every 12–18 months","Bitewings every 2 years","Bitewings every 5 years"],"correct":3,"explanation":"According to FGDP UK Selection Criteria for Dental Radiography (2013): for a low-risk dentate adult (established patient, good OH, no recent caries), posterior bitewing radiographs are recommended every 2 years. For a high-risk adult, the interval shortens to 6 monthly to annual. A new adult patient with no radiographic history would initially have a set of BWs to establish baseline, then intervals based on risk assessment. FGDP guidelines are referenced in IR(ME)R 2017 guidance."},
    {"id":"radiology_6","type":"sba","stem":"What is the approximate effective dose of a full mouth periapical series (typically 18 views) using a digital receptor, in microsieverts (µSv)?","options":["0.5 µSv","5 µSv","35–80 µSv","500 µSv","1000 µSv (1 mSv)"],"correct":2,"explanation":"A full mouth periapical series (18 periapicals with digital receptors) delivers approximately 35–80 µSv effective dose, depending on technique, collimation, and equipment. A single periapical is ~1–8 µSv; a panoramic radiograph ~6–15 µSv; a CBCT (limited FOV) ~50–200 µSv. The annual background radiation in the UK is ~2400 µSv. These figures underline the importance of justifying exposures and using the minimum number of views."},
    {"id":"radiology_7","type":"sba","stem":"A dental nurse asks whether a patient's extraoral radiograph requires the patient to wear a lead apron. According to current UK guidance (FGDP/PHE), what is the recommendation?","options":["Lead aprons are always required for all dental radiographs","Lead aprons should be routinely used for all intraoral radiographs but not for extraoral","Lead aprons are not recommended as routine for dental radiography (intraoral or extraoral) because modern equipment and techniques make the contribution of scattered radiation to the dose negligible","Lead aprons are only required for pregnant patients","Lead aprons should always be used for panoramic radiography but not for periapicals"],"correct":2,"explanation":"Current PHE (Public Health England) and FGDP guidance states that routine use of lead aprons for dental radiography in the UK is NOT recommended, as modern equipment produces such low scatter radiation that the apron provides negligible additional protection. Proper collimation, fast receptors, and correct technique provide adequate protection. However, lead aprons may still be offered if a patient requests one, and thyroid collars should be considered for repeated exposures. This represents a change from older practice."},
    {"id":"radiology_8","type":"sba","stem":"Which of the following is a feature of the paralleling technique for intraoral periapical radiography that makes it preferable to the bisecting angle technique?","options":["The paralleling technique requires no X-ray positioning device","The paralleling technique requires a shorter focus-receptor distance","The paralleling technique produces less geometric distortion because the receptor is placed parallel to the long axis of the tooth with the central X-ray beam perpendicular to both","The bisecting angle technique is more accurate for posterior teeth","The paralleling technique involves angulating the tube at 45 degrees"],"correct":2,"explanation":"The paralleling technique places the film/sensor parallel to the tooth's long axis with the X-ray beam directed at right angles to both the tooth and the receptor. This produces accurate, undistorted images. It requires a longer focus-receptor distance (to reduce parallax error from the receptor being away from the tooth) and uses a beam-aiming device (e.g. Rinn XCP). The bisecting angle technique is less accurate as it relies on bisecting an angle, producing foreshortening or elongation."},
    {"id":"radiology_9","type":"sba","stem":"What is the SLOB rule (Same Lingual Opposite Buccal) used for in dental radiography?","options":["To determine the correct exposure time for periapical radiographs","To localise a tooth or object in the buccal-lingual plane using two radiographs taken at different horizontal tube angulations","To assess the length of a root canal on an endodontic radiograph","To determine whether a cyst is maxillary or mandibular in origin","To assess proximity of a lower wisdom tooth root to the inferior alveolar canal"],"correct":1,"explanation":"The SLOB rule (or tube-shift/parallax technique) is used to localise an object in the third dimension (buccal-lingual). Two radiographs are taken with the tube shifted horizontally. The object that moves in the SAME direction as the tube shift is LINGUAL; the object that moves in the OPPOSITE direction is BUCCAL. This is used to localise impacted canines, supernumeraries, and root positions. Clark's rule is the same principle."},
    {"id":"radiology_10","type":"sba","stem":"A 35-year-old patient has a cone-beam CT (CBCT) requested for implant planning. Under IR(ME)R 2017, what additional justification is required compared to a 2D radiograph?","options":["CBCT does not require additional justification compared to 2D radiographs","The justification must demonstrate that the additional diagnostic information from the 3D exposure cannot be obtained from a 2D radiograph and that the benefit outweighs the higher radiation dose","CBCT is justified for all implant cases automatically without individual assessment","CBCT is restricted to hospital settings only and requires a specialist referral for any dental use","No written justification is needed if the patient consents"],"correct":1,"explanation":"Under IR(ME)R 2017 and the supporting FGDP/SEDENTEXCT CBCT guidelines, CBCT carries a higher dose than conventional 2D radiography. Justification must explicitly state that (1) the clinical question cannot be answered by 2D radiographs, and (2) the diagnostic benefit outweighs the increased dose. CBCT should not be used as a routine substitute for 2D in implant planning when 2D data is sufficient. Documented individual justification is required."},
    {"id":"radiology_11","type":"sba","stem":"On a panoramic radiograph (OPG), a well-defined radiolucency with a sclerotic border is seen around the crown of an unerupted lower right third molar. The follicular space is enlarged to 5 mm. What is the most likely diagnosis?","options":["Normal dental follicle (up to 5 mm may be normal)","Dentigerous cyst","Keratocystic odontogenic tumour (OKC)","Central giant cell granuloma","Ameloblastoma"],"correct":1,"explanation":"A radiolucency surrounding the crown of an unerupted tooth (attached at the cemento-enamel junction) represents a dentigerous (follicular) cyst when the follicular space exceeds 3–5 mm (there is no agreed absolute threshold; >5 mm strongly suggests a cyst). The sclerotic border confirms its benign, non-infiltrative nature. OKCs may occur pericoronal but tend to extend apically; ameloblastomas are multilocular or soap-bubble; dentigerous cyst is the most common diagnosis for this appearance."},
    {"id":"radiology_12","type":"sba","stem":"A periapical radiograph shows a well-defined radiolucency at the apex of the upper right lateral incisor with a lamina dura intact and the tooth is vital on pulp testing. What is the most likely diagnosis?","options":["Periapical abscess","Periapical (radicular) cyst","Nasopalatine duct cyst","Lateral periodontal cyst","Normal incisive foramen variant"],"correct":4,"explanation":"A radiolucency at the apex of the upper lateral incisor with an intact lamina dura and a vital tooth suggests a normal anatomical structure projected over the apex: the incisive (nasopalatine) foramen. The incisive foramen is located at the midline between the upper central incisors and may project over the lateral incisor apex on some projections. Other options require a non-vital tooth (radicular cyst, abscess). A lateral periodontal cyst appears on the lateral root surface, not apex."},
    {"id":"radiology_13","type":"sba","stem":"A 40-year-old woman presents with a 'cotton wool' appearance on a panoramic radiograph affecting the lower posterior mandible, with areas of mixed radiolucency and radiopacity. She also has enlargement of the mandible and the alkaline phosphatase is very elevated. What is the most likely diagnosis?","options":["Fibrous dysplasia","Ossifying fibroma","Paget's disease of bone (osteitis deformans)","Chronic sclerosing osteomyelitis","Florid cemento-osseous dysplasia"],"correct":2,"explanation":"The classic radiographic triad of Paget's disease includes: (1) mixed radiolucent-radiopaque pattern ('cotton wool' appearance); (2) generalised bone enlargement; (3) blurring of the normal bone trabecular pattern. Biochemically, markedly elevated serum alkaline phosphatase is characteristic (reflecting increased osteoblastic activity). Paget's affects the maxilla more than the mandible. Complications include hypercementosis, denture fit problems, and rare sarcomatous change."},
    {"id":"radiology_14","type":"sba","stem":"An OPG shows a large multilocular 'soap bubble' radiolucency in the posterior mandible and ramus of a 30-year-old. The cortex is expanded. The lesion spans from the third molar region to the condyle. What is the most likely diagnosis?","options":["Dentigerous cyst","Radicular cyst","Ameloblastoma","Keratocystic odontogenic tumour (OKC)","Simple bone cyst"],"correct":2,"explanation":"A large multilocular, 'soap bubble' or honeycomb radiolucency in the posterior mandible/ramus in a young adult is the classic radiographic appearance of an ameloblastoma. Cortical expansion is typical. The size and location (posterior mandible/ramus) and multilocularity are key distinguishing features. OKCs can be multilocular but tend to grow in a different pattern (along the medullary cavity with little expansion). Dentigerous and radicular cysts are unilocular."},
    {"id":"radiology_15","type":"sba","stem":"A panoramic radiograph shows bilateral multilocular cystic lesions in the jaws of a 22-year-old male. What syndrome should be suspected, and what other radiographic finding may be present?","options":["Paget's disease — look for skull involvement","Gorlin-Goltz syndrome (basal cell nevus syndrome) — look for calcified falx cerebri and rib anomalies on chest radiograph","Gardner syndrome — look for intestinal polyps and osteomas","Cherubism — bilateral jaw enlargement in childhood","Cleidocranial dysplasia — look for supernumerary teeth and absent clavicles"],"correct":1,"explanation":"Multiple jaw cysts (keratocystic odontogenic tumours / OKCs) in a young person should prompt assessment for Gorlin-Goltz syndrome (Naevoid Basal Cell Carcinoma Syndrome). Key features: multiple OKCs, basal cell carcinomas (often by age 20), skeletal anomalies (bifid rib, scoliosis), calcification of the falx cerebri on skull radiograph or CT, and frontal bossing. It is autosomal dominant (PTCH1 mutation). Gardner syndrome has intestinal polyps + osteomas."},
    {"id":"radiology_16","type":"sba","stem":"On a bitewing radiograph, an irregular radiolucency is seen within the crown of a lower molar, appearing to communicate with the pulp chamber. The tooth is non-vital. What does this most likely represent?","options":["Secondary caries around an existing restoration","Internal root resorption","External cervical resorption","Deep caries with pulpal involvement","Normal pulp cap calcification"],"correct":1,"explanation":"Internal resorption appearing on radiograph shows a well-defined, rounded, radiolucent expansion within the root canal or pulp chamber. It is caused by inflammatory resorption of the dentine from within the pulp space. The lesion appears centred within the root (unlike external resorption which has an external scalloped border). Root canal treatment (to remove the granulation tissue responsible for resorption) is indicated urgently before perforation occurs."},
    {"id":"radiology_17","type":"sba","stem":"A lower third molar on OPG appears to have its roots intimately related to the inferior alveolar canal. Which of the following features on the OPG would most strongly indicate that the root is actually in contact with (not simply overlapping) the canal?","options":["A white line visible across the root","Darkening of the root tips (loss of root density) where the canal passes through, diversion of the canal, and loss of the canal's corticated white lines (Howe and Poyton signs)","Mesioangular angulation of the tooth","Dense sclerotic bone around the apex","Proximity within 1 mm of the canal as measured on the OPG"],"correct":1,"explanation":"Howe and Poyton (1960) described signs on OPG indicating true contact/compression of the inferior alveolar canal by a wisdom tooth root: (1) darkening/graying of the root tip (loss of root density at the canal); (2) narrowing or diversion of the canal; (3) interruption of the white corticated lines of the canal. These signs indicate high risk of IAN injury and are an indication for CBCT for more precise assessment (FGDP guidance)."},
    {"id":"radiology_18","type":"sba","stem":"Which of the following is the main advantage of digital radiography over conventional film-based radiography in dental practice?","options":["Digital radiography produces images with higher resolution than the finest dental film","Digital radiography eliminates the need for justification under IR(ME)R 2017","Digital radiography allows lower radiation dose (especially with direct digital sensors), instant image availability, image manipulation, easier storage and transfer, and eliminates chemical processing waste","Digital radiography is always superior for detecting proximal caries compared to film","Digital radiography requires no quality assurance programme"],"correct":2,"explanation":"Advantages of digital radiography include: reduced radiation dose (direct digital sensors can reduce dose by 50–80% vs E-speed film; PSP plates similar to F-speed film); instant image display; ability to manipulate contrast/brightness; electronic storage and transfer (no physical film storage); no chemical processing (environmental benefit); and integration with patient management software. A quality assurance programme is still required. Spatial resolution of digital sensors may be slightly lower than fine-grain film in theory, but clinically equivalent."},
    {"id":"radiology_19","type":"sba","stem":"A 55-year-old patient has an OPG as part of assessment. A unilocular, well-defined radiolucency 2.5 cm in diameter is seen in the right maxillary antrum. There are no teeth in the area, the antrum walls are intact, and the patient is asymptomatic. The most likely diagnosis is:","options":["Maxillary sinusitis","Antral polyp or mucous retention cyst of the maxillary sinus","Squamous cell carcinoma of the antrum","Aspergillosis of the sinus","Oroantral fistula"],"correct":1,"explanation":"A well-defined, smooth-domed, unilocular radiolucency in the floor or walls of the maxillary antrum, in an asymptomatic patient, is most likely a maxillary sinus mucous retention cyst (or antral polyp). These are very common incidental findings on OPGs and rarely require treatment unless symptomatic. The intact antral walls and well-defined margins are reassuring features. SCC of the antrum shows aggressive bone destruction. Sinusitis would show opacification."},
    {"id":"radiology_20","type":"sba","stem":"What does the term 'diagnostic reference level' (DRL) mean in dental radiography?","options":["The maximum permissible dose for a patient","An investigation level representing the dose typically received for a procedure when using good radiographic practice; exceeding it triggers a review of technique","The reference dose for radiation workers","The threshold dose above which radiation causes deterministic effects","The minimum dose required to produce a diagnostically adequate image"],"correct":1,"explanation":"A Diagnostic Reference Level (DRL) is not a dose limit. It is an investigation level: the dose level that, if regularly exceeded, should prompt a review of the technique and equipment to identify why the doses are higher than typical for that procedure performed using good practice. DRLs for dental radiography are set by Public Health England/UKHSA. They represent the 75th percentile of dose distributions from surveys. Exceeding a DRL is an alert, not necessarily an error."},
    {"id":"radiology_21","type":"sba","stem":"Which projection is most appropriate to demonstrate the floor of the mouth (submandibular region) for suspected sialolithiasis of the submandibular duct?","options":["OPG","Lateral oblique jaw radiograph","Lower true occlusal radiograph (vertex occlusal)","Lower 90° cross-sectional occlusal radiograph","Lateral cephalogram"],"correct":3,"explanation":"The lower 90° cross-sectional (true) occlusal radiograph is the standard projection for demonstrating the floor of the mouth and the submandibular duct region. The sensor/film is placed transversely in the floor of the mouth and the beam is directed perpendicular to it (from below the chin). This clearly shows any calcified sialolith in the submandibular duct or Wharton's duct. The standard lower occlusal (oblique occlusal) is used for the anterior mandible."},
    {"id":"radiology_22","type":"sba","stem":"On a periapical radiograph, the image of the upper molar root tips is seen overlapping with the floor of the maxillary sinus. What modification to the technique would separate the sinus floor from the root apices?","options":["Decrease the vertical angulation (flatten the beam angle)","Increase the vertical angulation (steepen the beam angle)","Decrease the horizontal angulation","Use a shorter cone","Change to a panoramic radiograph"],"correct":0,"explanation":"When the maxillary sinus floor overlaps the root apices on a periapical, decreasing the vertical angulation (directing the beam more horizontally, flatter) will project the sinus floor more superiorly relative to the roots, separating them. Increasing the vertical angle projects the sinus further over the roots. This is the 'sinus shift' technique, useful for distinguishing periapical pathology from the sinus floor."},
    {"id":"radiology_23","type":"sba","stem":"Under IRR17 (Ionising Radiations Regulations 2017), what is the occupational dose limit for a classified radiation worker (whole body effective dose)?","options":["1 mSv per year","6 mSv per year","20 mSv per year","50 mSv per year","100 mSv per year"],"correct":2,"explanation":"Under IRR17, the annual occupational dose limit for a classified radiation worker (whole body effective dose) is 20 mSv per year (as a 5-year average, with no year exceeding 50 mSv). For the lens of the eye: 20 mSv/year; for skin/extremities: 500 mSv/year. The public dose limit is 1 mSv per year effective dose. In practice, dental radiographers receive very low doses well below these limits with proper technique, so few dental staff need to be classified workers."},
    {"id":"radiology_24","type":"sba","stem":"A 32-year-old woman presents for a periapical radiograph. She mentions she may be pregnant (8 weeks). What is the appropriate course of action?","options":["Defer all radiographs until after delivery","Proceed without any modification — dental X-rays are always safe in pregnancy","Confirm necessity and justification of the radiograph; if clinically indicated, proceed with careful collimation and modern technique — the fetal dose from a dental periapical is negligible (<0.01 µSv)","Refer to a hospital with lead-lined facilities","Perform the radiograph only after the first trimester"],"correct":2,"explanation":"The effective dose from a dental periapical radiograph (<5 µSv) is negligible compared to the fetal risk threshold. The background fetal radiation dose in the UK over 9 months is ~0.9 mSv. Dental radiographs are not contraindicated in pregnancy when clinically indicated. The key is: (1) confirm clinical indication and justification; (2) use good technique (rectangular collimation); (3) reassure the patient. Deferral may harm the patient if treatment is needed urgently."},
    {"id":"radiology_25","type":"sba","stem":"Which of the following is the term for the radiopaque line seen at the outer aspect of the cortical bone on a radiograph?","options":["Lamina dura","Cortical plate (cortex)","Trabecular bone pattern","Zone of provisional calcification","Periodontal ligament space"],"correct":1,"explanation":"The cortical plate (cortex) is the dense outer layer of bone that appears as a radiopaque white line on radiographs. The lamina dura is the layer of dense bone lining the tooth socket (alveolar bone proper), appearing as a radiopaque line around the root. The periodontal ligament space appears as a thin radiolucent line between the lamina dura and the root surface. Trabecular (cancellous) bone fills the medullary spaces between."},
    {"id":"radiology_26","type":"sba","stem":"What does the CBCT field of view (FOV) represent and why is it important for dose justification?","options":["The image contrast range — larger FOV produces higher contrast","The volume of tissue scanned (region from which data is collected); larger FOV means greater radiation dose and more tissue irradiated — FOV should be as small as possible for the clinical question","The distance from the X-ray source to the patient — larger distance means lower dose","The digital resolution of the detector","The speed of image acquisition"],"correct":1,"explanation":"CBCT FOV is the volume of tissue from which data is collected during the scan. It is described by height × diameter (e.g. a limited FOV might be 4 × 4 cm for a single implant site; a full-arch FOV 14 × 8 cm). Larger FOV means: (1) more tissue irradiated; (2) higher effective dose. SEDENTEXCT and FGDP guidelines state the FOV should be restricted to the smallest volume sufficient to answer the clinical question, to minimise dose."},
    {"id":"radiology_27","type":"sba","stem":"A well-defined, periapical radiolucency is present at the apex of a non-vital lower premolar. The lesion is 8 mm in diameter. What radiographic feature would suggest this is more likely to be a periapical cyst rather than a periapical granuloma?","options":["Size of the lesion (cysts are generally larger, >10 mm diameter) combined with a well-defined corticated border","The presence of a PDL space shadow around the apex","Non-vital response to electric pulp test","Sclerotic bone around the apex (condensing osteitis)","Irregular, poorly defined border"],"correct":0,"explanation":"Periapical granuloma and periapical cyst cannot be reliably distinguished on radiographs alone (histology is needed). However, features that suggest a cyst over granuloma: larger size (>10 mm), well-corticated (defined sclerotic border), more regular round or oval shape. Smaller lesions (≤5 mm) are more likely to be granulomas. In practice, both are managed with root canal treatment (or surgery if large), and diagnosis is confirmed on histology of the surgically removed specimen."},
    {"id":"radiology_28","type":"sba","stem":"A quality assurance programme for dental radiography requires regular monitoring of image quality. Under UK guidance, what is the recommended frequency of image quality audits?","options":["Once every 5 years","Annually (at least), with continuous monitoring of each radiograph taken","Only when CQC inspects the practice","Every 10 years","When a new piece of equipment is installed only"],"correct":1,"explanation":"The IRMER Regulations and accompanying FGDP/PHE guidance require regular quality assurance programmes, including image quality auditing. PHE guidance (NRPB/IPEM RP Series) recommends at least annual audit of image quality using grading criteria (Grade 1: excellent, no errors; Grade 2: diagnostically acceptable, minor errors; Grade 3: unacceptable). The reject analysis rate (% Grade 3 images) should be <10%. Regular monitoring of every image taken is also part of ongoing QA."},
    {"id":"radiology_29","type":"sba","stem":"A periapical radiograph shows a well-defined radiolucency overlying the root of the upper central incisor, positioned more superiorly (towards the nasal floor). The tooth is vital. What is the most likely diagnosis?","options":["Periapical abscess","Globulomaxillary cyst","Nasopalatine duct cyst (incisive canal cyst)","Lateral periodontal cyst","Radicular (periapical) cyst"],"correct":2,"explanation":"A well-defined, midline radiolucency between or above the upper central incisors (in the incisive canal area), with a vital tooth response, is consistent with a nasopalatine duct cyst (incisive canal cyst). It can appear heart-shaped or round and is typically located at or superior to the root apices of the central incisors. The classic location (midline, superior) and vital teeth distinguish it from a radicular cyst (which requires a non-vital tooth). It is the most common non-odontogenic cyst of the jaws."},
    {"id":"radiology_30","type":"sba","stem":"The 'maxillary tuberosity' and the 'pterygoid plates' are recognisable structures on which dental radiographic projection?","options":["Periapical radiograph of the upper molar","Panoramic radiograph (OPG)","Upper standard occlusal radiograph","Lateral cephalogram","PA skull radiograph"],"correct":1,"explanation":"The panoramic radiograph (OPG) demonstrates a wide range of anatomy including: mandibular condyles, coronoid processes, rami, body of mandible, inferior alveolar canals, mental foramina, maxillary sinuses, nasal floor, nasal septum, zygoma, maxillary tuberosity, pterygoid plates (seen posteriorly), hyoid bone, and the styloid processes. This breadth of anatomical demonstration makes it valuable for dental and jaw assessment."},
    {"id":"radiology_31","type":"sba","stem":"An OPG shows a large, poorly-defined radiolucency with ill-defined borders and evidence of 'sun-ray' or 'sunburst' periosteal reaction in the mandible of a 17-year-old. What is the most likely diagnosis?","options":["Fibrous dysplasia","Simple (traumatic) bone cyst","Osteosarcoma of the mandible","Ameloblastoma","Osteomyelitis"],"correct":2,"explanation":"A large, destructive, poorly-defined radiolucency with a 'sunburst' or 'sun-ray' periosteal reaction in the jaw of a young person is the classic radiographic appearance of an osteosarcoma. The sunburst pattern represents aggressive new bone formation perpendicular to the cortex as the tumour elevates the periosteum. Osteosarcoma of the jaw occurs mainly in the second and third decades. This is a medical emergency requiring urgent referral to OMFS/oncology."},
    {"id":"radiology_32","type":"sba","stem":"Which of the following radiographic signs suggests replacement root resorption (ankylosis) after dental trauma?","options":["Widened PDL space with sclerotic lamina dura","Loss of the normal PDL space with the root becoming indistinguishable from adjacent alveolar bone (bony union — the root shadow merges with the surrounding bone)","A periapical granuloma","External inflammatory resorption with widened radiolucency at the apex","Internal pink spot"],"correct":1,"explanation":"Replacement resorption (ankylosis) occurs when the PDL is damaged (e.g. dry storage following avulsion) and the root fuses directly to the alveolar bone, which then gradually replaces the root dentine/cementum. Radiographically: the PDL space disappears and the root shadow is indistinguishable from the surrounding trabecular bone pattern — the root 'merges' with the bone. Clinically, the tooth gives a high metallic sound on percussion. Progressive infraocclusion follows."},
    {"id":"radiology_33","type":"sba","stem":"A radiograph shows multiple well-defined, radiopaque masses within the jaw, associated with an unerupted lower molar. The masses are described as having a 'snowflake' calcification pattern. What is the most likely diagnosis?","options":["Cementoma (cemento-osseous dysplasia)","Odontome (compound or complex)","Calcifying epithelial odontogenic tumour (CEOT / Pindborg tumour)","Osteosclerosis","Cementoblastoma"],"correct":2,"explanation":"A CEOT (Pindborg tumour) characteristically shows 'driven snow' or 'snowflake' calcifications within a radiolucency, associated with an unerupted tooth (most commonly lower molar or premolar). It contains islands of calcified amyloid material. It is a benign but locally aggressive odontogenic tumour. An odontome has a recognisable tooth-like structure; cementoblastoma is fused to the root of a vital tooth; cementoma arises at the apex."},
    {"id":"radiology_34","type":"sba","stem":"What is the principal radiation protection mechanism provided by rectangular collimation compared to circular collimation for intraoral periapical radiographs?","options":["Rectangular collimation increases the contrast of the image","Rectangular collimation reduces the area of tissue irradiated by approximately 60%, significantly reducing the dose to the patient","Rectangular collimation prevents secondary radiation scattering","Rectangular collimation speeds up the exposure time","Rectangular collimation enables higher kVp settings"],"correct":1,"explanation":"Rectangular collimation limits the X-ray beam to match the size and shape of the receptor (typically 3 × 4 cm for a periapical), compared to a 6 cm diameter circular beam. This reduces the irradiated area by approximately 60%, with a corresponding reduction in patient dose. It is a simple, inexpensive modification that significantly improves radiation protection. FGDP guidance strongly recommends rectangular collimation for periapical and bitewing radiographs."},
    {"id":"radiology_35","type":"sba","stem":"A patient has an upper standard occlusal radiograph taken. The receptor is placed on the upper palate and the beam is directed at approximately 65–70° to the occlusal plane. What structures does this projection demonstrate?","options":["The floor of the mouth and submandibular salivary glands","The anterior maxilla, nasal floor, nasopalatine duct, and any pathology in the upper anterior region","The mandibular condyles and TMJ","The maxillary sinuses in full","The lower premolar and molar region"],"correct":1,"explanation":"The upper standard occlusal radiograph (vertex occlusal or oblique occlusal) demonstrates the anterior maxilla, including: the nasal floor, nasal septum, nasopalatine foramen and canal, anterior teeth, any supernumeraries (e.g. mesiodens), cysts (nasopalatine duct cyst), impacted teeth, and fractures of the anterior alveolus. It provides a wide field of view of the upper anterior region. The true (vertex) occlusal at 90° is used for cross-sectional views of the palate."},
    {"id":"radiology_36","type":"sba","stem":"On a periapical radiograph of the lower third molar region, a band-shaped or tubular radiolucent structure is seen running across the roots. What structure does this most likely represent?","options":["The inferior alveolar canal","The mental foramen","An artefact from film bending","A periodontal abscess","The external oblique ridge"],"correct":0,"explanation":"The inferior alveolar canal (IAC) is seen on periapical radiographs of the lower molar region as a band-shaped or tubular radiolucency bounded by two radiopaque corticated lines (the superior and inferior walls of the canal). Its relationship to the lower wisdom tooth roots is critically assessed before surgical extraction. The mental foramen appears as a round radiolucency near the lower premolar apices."},
    {"id":"radiology_37","type":"sba","stem":"A 45-year-old patient has ground glass opacity affecting the right maxilla on an OPG, with displacement of the teeth but without expansion. The borders are ill-defined and blend gradually into normal bone. What is the most likely diagnosis?","options":["Ossifying fibroma","Fibrous dysplasia of the maxilla","Paget's disease","Osteosarcoma","Sclerosing osteomyelitis"],"correct":1,"explanation":"Fibrous dysplasia classically shows a 'ground glass' radiographic appearance (fine granular opacification that blends gradually into normal bone without a well-defined cortical border), ill-defined margins that merge with surrounding normal bone, and a tendency to displace rather than resorb teeth. It typically presents in young people and ceases activity when skeletal growth stops. Ossifying fibroma has a well-defined corticated border — a key distinguishing feature."},
    {"id":"radiology_38","type":"sba","stem":"Under IR(ME)R 2017, which one of the following is NOT required as part of a written employer's procedure for dental radiography?","options":["Identification of trained operators","Details of the equipment used","Written protocols for each type of examination","Individual dose record for every patient receiving a dental radiograph","Quality assurance arrangements"],"correct":3,"explanation":"IR(ME)R 2017 does not require individual dose records for each patient receiving a dental radiograph (unlike the situation for radiation workers or higher-dose procedures). The employer's procedures must include: identification of trained operators and practitioners; list of equipment; examination protocols; QA procedures; patient identification protocols; and referral criteria. Maintaining individual patient records of every radiograph taken is good practice (as part of clinical records) but the dose is not individually recorded for routine dental radiography."},
    {"id":"radiology_39","type":"sba","stem":"An OPG shows a radiolucent lesion at the apex of a lower premolar in a 17-year-old. The tooth is vital. The lesion has a well-defined corticated border and is small (1 cm). There is no associated cortical expansion. The patient is entirely asymptomatic. What is the most appropriate next step?","options":["Refer immediately for surgical removal — any periapical radiolucency in a vital tooth requires biopsy","Perform a CBCT of the region","Monitor with a periapical radiograph after 12 months; if the lesion is unchanged and the tooth remains vital, it is most likely a periapical cemental dysplasia (or other benign entity) and can continue to be observed","Prescribe antibiotics empirically","Extract the premolar and submit for histology"],"correct":2,"explanation":"A small (<1 cm), well-corticated apical radiolucency in a vital tooth in a young person, that is asymptomatic, is most likely an early periapical cemental dysplasia (periapical osseous dysplasia) or a normal anatomical variant (mental foramen, incisive canal). No treatment is required. Monitoring with a periapical radiograph after 12 months to confirm stability is appropriate. If it enlarges, becomes symptomatic, or loses vitality, further investigation is warranted."},
    {"id":"radiology_40","type":"sba","stem":"What structure causes the J-shaped or hook-shaped radiopaque shadow that appears overlying the upper molar roots on an OPG?","options":["Zygomatic arch","Pterygoid plates","The posterior wall of the maxillary sinus","Coronoid process of the mandible","Mastoid process"],"correct":3,"explanation":"On a panoramic radiograph, the coronoid process of the mandible sweeps forward during the rotation and is often projected overlying the upper tuberosity/molar region as a J-shaped or hook-shaped radiopaque shadow. This is a normal anatomical landmark on OPGs. Recognising it prevents misinterpretation as pathology. It is more prominent on one side than the other and becomes visible when the condyle moves forward during the panoramic sweep."},
    {"id":"radiology_41","type":"sba","stem":"Under the 2017 IRMER framework, which party has the primary duty to ensure that equipment used for medical exposures complies with requirements, is subject to maintenance, and that a QA programme exists?","options":["The practitioner","The operator","The employer","The referrer","The radiation protection adviser (RPA)"],"correct":2,"explanation":"Under IR(ME)R 2017, the employer (the organisation or practice responsible for the radiological service) has the primary duty to: ensure equipment is maintained and tested; put in place written procedures; ensure staff are trained; operate a QA programme; and keep records. The employer bears overall responsibility. Practitioners and operators work within the employer's procedures. The RPA advises the employer but does not bear primary responsibility."},
    {"id":"radiology_42","type":"sba","stem":"A dental nurse asks how to clean and disinfect the intraoral digital sensor between patients. What is the recommended approach?","options":["Immerse the sensor in 70% isopropyl alcohol between patients","Autoclave the sensor between patients","Place a single-use disposable protective barrier (plastic sleeve) over the sensor before each patient — do not immerse in liquid or autoclave as this damages the sensor electronics","Wipe the sensor with a dry cloth only","Use glutaraldehyde solution for disinfection after each patient"],"correct":2,"explanation":"Direct digital sensors (CCD/CMOS) cannot be autoclaved or immersed in liquid as this damages the electronics. The standard infection control approach is to use a single-use disposable plastic barrier sleeve over the sensor for each patient. After use, the barrier is removed carefully (treating it as contaminated), and the sensor surface is wiped with a hospital-grade disinfectant wipe. This is consistent with HTM 01-05 decontamination guidance."},
    {"id":"radiology_43","type":"sba","stem":"Which of the following views is the most appropriate initial radiograph to assess the symphysis and parasymphysis regions of the mandible for a suspected fracture after facial trauma?","options":["OPG alone","Lower true occlusal radiograph plus OPG","Lateral cephalogram","Bitewing radiographs","CBCT is always required for mandibular fracture assessment"],"correct":1,"explanation":"Mandibular fractures require two views at 90° to each other. For the symphysis/parasymphysis, the combination of an OPG (providing a wide view of the mandible) and a lower true occlusal radiograph (providing a cross-sectional view of the symphysis) is the standard plain film combination. The OPG alone can miss fractures in the midline (which lies at the centre of the tomographic plane and may be blurred). CBCT provides superior detail but is higher dose and not always the first-line."},
    {"id":"radiology_44","type":"sba","stem":"A cone beam CT is taken for a patient prior to implant placement in the lower right premolar region. The CBCT report notes a hypodense (radiolucent) area in the floor of the mandible adjacent to the proposed implant site. The area is well-defined and the bone around it is normal. No teeth are associated. What is the most likely explanation?","options":["Abscess from a non-vital premolar","Static bone cavity (Stafne's bone cavity/cyst)","Ameloblastoma","Traumatic bone cyst","Metastatic lesion"],"correct":1,"explanation":"A Stafne's bone cavity (static bone cavity) is a developmental pseudocyst in the lingual cortex of the posterior mandible, below the IAC. It represents a concavity in the lingual surface of the mandible caused by the submandibular salivary gland pressing into the bone. On radiographs: well-defined, ovoid, radiolucency below the IAC in the posterior mandible. It is an incidental finding, requires no treatment (biopsy or surgery is unnecessary). On CBCT it characteristically shows corticated margins and an opening on the lingual cortex."},
    {"id":"radiology_45","type":"sba","stem":"What is the primary purpose of the posterior palatal seal (post-dam) in a complete upper denture, and is it visible on a dental radiograph?","options":["It improves retention by providing additional suction; it IS visible on intraoral radiographs as a radiopaque line","It provides peripheral seal at the vibrating line to improve retention; it is NOT visible on dental radiographs (it is a clinical adaptation of the denture base, not a radiographic feature)","It prevents food ingestion under the denture","It is a metal reinforcement visible on OPG","It is always visible as a radiolucent line on OPG"],"correct":1,"explanation":"The posterior palatal seal (post-dam) is a slight compression zone at the vibrating line (posterior palate) built into the denture base to create an air-seal that improves retention of the upper complete denture. It is a clinical/laboratory feature — an area of slight positive thickness in the PMMA base. It is NOT visible as a distinct feature on dental radiographs. This question tests clinical knowledge more than radiography, but distinguishes radiographic anatomy from clinical prosthetic features."},
    {"id":"radiology_46","type":"sba","stem":"A 20-year-old has an OPG taken. Multiple teeth show well-defined periapical radiolucencies with sclerotic borders. The teeth are all vital. The patient has no dental symptoms. What is the most likely diagnosis?","options":["Multiple periapical cysts","Multiple periapical abscesses","Cemento-osseous dysplasia (multiple periapical cemental dysplasia)","Hypercementosis","Multiple granulomas in a periodontitis patient"],"correct":2,"explanation":"Multiple periapical radiolucencies in vital, asymptomatic teeth (most commonly involving the lower anteriors, and commonly in women of African ethnicity in the third to fifth decade) is the classic presentation of cemento-osseous dysplasia (COD, formerly called periapical cemental dysplasia or cementoma). Early lesions appear purely radiolucent; mature lesions become radiopaque. No treatment is needed. Biopsy is contraindicated (risks osteomyelitis). Follow-up only."},
    {"id":"radiology_47","type":"sba","stem":"Which of the following statements about the incisive (nasopalatine) foramen on a periapical radiograph is correct?","options":["It always appears as a radiopaque structure","It appears as a round or heart-shaped radiolucency in the midline between the upper central incisors and may be mistaken for a periapical pathology of non-vital teeth — distinguishing it requires vitality testing","It is always larger than 1 cm in diameter","It cannot be seen on periapical radiographs","It appears only in edentulous patients"],"correct":1,"explanation":"The nasopalatine foramen is a normal anatomical structure that appears as a round or heart-shaped radiolucency in the midline between (or superior to) the upper central incisors. It can be mistaken for a periapical lesion. The key distinguishing feature: the nasopalatine foramen is associated with VITAL teeth. Electric pulp testing of the adjacent teeth is essential. If >10 mm in diameter, nasopalatine duct cyst should be considered."},
    {"id":"radiology_48","type":"sba","stem":"A patient has a bitewing radiograph showing interproximal caries in the lower right second premolar. The carious lesion appears to be in the outer dentine (radiolucency extending into dentine but not reaching the pulp). How should this be classified using the radiographic depth classification?","options":["Enamel caries (D1/D2)","Outer dentine caries (D3)","Inner dentine caries (D4, approaching pulp)","Pulp involvement (D5)","Surface caries only — no radiographic classification needed"],"correct":1,"explanation":"The Mount-Hume (or ICDAS-based) radiographic depth classification: D1/D2 — radiolucency within enamel only; D3 — radiolucency in outer third of dentine; D4 — radiolucency in inner third of dentine (approaching pulp); D5 — pulpal involvement. This case (outer dentine, not reaching pulp) is D3. Dentine caries on a bitewing is always clinically significant as it represents active disease requiring intervention. The lesion is deeper clinically than it appears on radiograph."},
    {"id":"radiology_49","type":"sba","stem":"A 10-year-old child requires posterior bitewing radiographs. Which size sensor/film should be used?","options":["Size 4 (panoramic occlusal size) for maximum coverage","Size 2 (standard adult periapical) placed in the vertical position","Size 1 (narrow periapical) or size 2 depending on arch width and cooperation, with a child-specific holder","Size 0 (paediatric periapical) always used for all children","Adult standard size 2 placed in the same orientation as adults"],"correct":2,"explanation":"For posterior bitewing radiographs in children, size 1 (narrow, suitable for smaller mouths) or size 2 (standard, for larger children) is used, with an appropriate child-sized bitewing holder. The selection depends on the individual child's arch width, intra-oral space, and cooperation. Using too large a sensor in a small mouth causes pain and movement artefact. Size 0 is used for very young children or anterior views. The correct size is essential to get a diagnostically adequate image."},
    {"id":"radiology_50","type":"sba","stem":"An OPG is taken showing the mandible, maxilla, and TMJ regions. A 'ghost image' is seen as a diffuse, reversed shadow above the real image of a metallic object. What causes this artefact?","options":["Patient movement during the exposure","Suboptimal processing of the PSP plate","A dense metallic object (earring, implant, orthodontic appliance) on one side of the patient being projected through the opposite side of the tomographic layer, forming a magnified, reversed shadow","Incorrect patient positioning (chin too high)","An error in the detector rotation algorithm"],"correct":2,"explanation":"Ghost images on OPGs are caused by metal objects (earrings, eyeglasses, orthodontic brackets, implants, hearing aids) that are positioned outside the tomographic layer and irradiated twice as the beam sweeps around the patient. The real image is sharp; the ghost is a magnified, diffuse, reversed shadow located higher and on the opposite side. Patients must remove all removable metallic objects before an OPG. Earrings are a common culprit."},
    {"id":"radiology_51","type":"sba","stem":"Which type of radiograph is indicated as the primary investigation for assessing the extent and level of alveolar bone loss in a patient with suspected periodontitis?","options":["Periapical radiograph series (horizontal or vertical bitewings for posterior teeth, periapicals for the rest)","OPG alone","CBCT of full arch","Lateral cephalogram","Upper and lower occlusal radiographs"],"correct":0,"explanation":"Vertical and horizontal bitewing radiographs are the primary modality for assessing alveolar bone levels in periodontitis. They show the crestal bone height accurately without geometric distortion. Full mouth periapical radiographs show the full root length and periapical status. An OPG provides a general view but has less accuracy for alveolar bone levels. CBCT is not routinely indicated for periodontitis assessment (FGDP selection criteria). The choice between BW series and full mouth periapicals depends on severity."},
    {"id":"radiology_52","type":"sba","stem":"Under the IR(ME)R 2017 definition, what is meant by an 'unintended or accidental medical exposure' in dental radiography and what must happen when one occurs?","options":["A patient receiving a second radiograph that was not needed","An exposure significantly greater than intended, where the patient receives a dose substantially in excess of the intended dose due to equipment malfunction, operator error, or miscommunication — must be investigated, reported to the appropriate authority if dose thresholds are met, and lessons learned documented","A radiograph taken of the wrong tooth — this requires a new radiograph only","Any exposure taken without a prior clinical examination","An exposure is never classed as 'accidental' in dentistry as doses are too low"],"correct":1,"explanation":"IR(ME)R 2017 requires that unintended, accidental, or near-miss medical exposures be documented and investigated. If the patient receives a dose significantly above the intended amount (e.g. repeat series due to equipment failure, incorrect settings causing very high dose), this must be reported to the relevant authority (CQC in England) if the dose meets specified reporting thresholds. Lessons learned must be shared. Even in dental practice, equipment malfunctions can cause significant excess dose, and this reporting duty applies."},
    {"id":"radiology_53","type":"sba","stem":"What is the approximate kilovoltage (kV) range used for dental intraoral periapical radiography in modern UK dental practice?","options":["20–30 kV","50–70 kV","90–120 kV","140–150 kV","200+ kV"],"correct":1,"explanation":"Modern dental intraoral radiography uses a peak kilovoltage (kVp) in the range of approximately 60–70 kVp. PHE/FGDP guidance recommends ≥60 kVp to minimise patient dose (higher kV produces more penetrating radiation, allowing lower mAs to be used). Older equipment may use 50 kVp. The optimal range is 60–70 kVp with a corresponding reduction in mAs. Very high kV (>90) is used for skull/body radiography, not intraoral dental work."},
    {"id":"radiology_54","type":"sba","stem":"A patient presents with a radiopaque lesion fused to the root of a vital lower first molar. The lesion is surrounded by a thin radiolucent rim. The area has expanded slightly. What is the most likely diagnosis?","options":["Condensing osteitis (focal sclerosing osteomyelitis)","Hypercementosis","Cementoblastoma","Cemento-osseous dysplasia (mature phase)","Odontoma (compound)"],"correct":2,"explanation":"A cementoblastoma is a benign odontogenic tumour characterised by: well-defined radiopaque mass fused to the root of a vital tooth (most commonly lower first molar in young adults), surrounding radiolucent halo, and possible tooth expansion. It may be associated with pain. The root is often obliterated by the mass. Treatment is enucleation WITH tooth extraction (the mass is attached to the root). The vital tooth and fused attachment distinguish it from condensing osteitis."},
    {"id":"radiology_55","type":"sba","stem":"Which of the following is the correct advice for minimising patient exposure when using a dental X-ray unit?","options":["Use the shortest focus-skin distance (shortest cone) to reduce the exposure time","Use fast film speeds or digital sensors; apply rectangular collimation; use appropriate kVp; and minimise repeat exposures by using correct positioning technique","Position the X-ray tube as close to the patient as possible for maximum intensity","Use high mA settings to reduce the exposure time to the minimum possible","Use a circular beam with the largest possible aperture to cover multiple teeth in one exposure"],"correct":1,"explanation":"The measures to minimise patient dose include: (1) using the fastest receptor (digital sensor or E/F-speed film); (2) applying rectangular collimation; (3) using appropriate kVp (60+ kVp); (4) using a long focus-skin distance (long cone reduces the dose at skin by reducing the inverse-square-law effect); (5) avoiding repeats through careful positioning technique. A short cone (short focus-skin distance) INCREASES the dose; circular beams INCREASE the irradiated area."},
    {"id":"radiology_56","type":"sba","stem":"On a periapical radiograph of the upper molar, two radiopaque lines descend from the nose toward the zygomatic arch. What normal anatomical landmark is this?","options":["The maxillary tuberosity","The anterior border of the coronoid process","The 'Y' (inverted Y) shape formed by the outer anterior wall of the maxillary sinus and the floor of the nasal cavity — the 'Y-line' or malar eminence of the zygoma","The nasopalatine duct","The pterygoid plates"],"correct":2,"explanation":"The periapical radiograph of the upper molar region commonly shows an inverted 'Y' shape formed by the intersection of the floor of the nasal cavity and the anterior wall (or outer wall) of the maxillary antrum. This 'Y-line' runs from the floor of the nose downward and is a normal radiographic landmark. The zygomatic process of the maxilla (malar eminence) also forms a prominent radiopaque line in this area. Recognising normal anatomy prevents misidentification of pathology."},
    {"id":"radiology_57","type":"sba","stem":"In CBCT imaging, what is meant by 'voxel size' and why does it matter?","options":["Voxel size is the physical size of the X-ray tube — smaller tubes produce better images","Voxel size is the three-dimensional pixel; smaller voxels provide higher spatial resolution but require higher radiation dose — the smallest voxel should be selected only when necessary for the clinical question","Voxel size is the field of view size","Voxel size determines the kVp used in the scan","Voxel size is irrelevant to image quality — only FOV matters"],"correct":1,"explanation":"A voxel (volumetric pixel) is the 3D element making up a CBCT image. Voxel size ranges from ~0.076 mm (high resolution) to ~0.4 mm (standard). Smaller voxels provide higher spatial resolution (better for fine detail like root canals, periodontal defects, root resorption) but require higher dose and longer scan time. Larger voxels reduce dose but limit resolution. SEDENTEXCT guidelines recommend selecting the smallest FOV and largest voxel size adequate for the clinical question to minimise dose."},
    {"id":"radiology_58","type":"sba","stem":"A full-mouth periapical series is being reported. One upper periapical shows apparent 'loss of lamina dura' around all the molar roots. What is the most important initial consideration when interpreting this finding?","options":["This always indicates active periapical pathology — root canal treatment is required","First ensure the radiograph is of adequate quality (correct exposure, processing, and geometry) before interpreting the lamina dura; the lamina dura is a subtle, easily obscured feature and absence may be an artefact of radiographic technique or anatomy rather than true pathology","Loss of lamina dura is always a sign of osteosarcoma","The finding is always normal and requires no assessment","Immediately refer for a CBCT of the region"],"correct":1,"explanation":"The lamina dura is a thin layer of dense bone that appears as a fine radiopaque line around tooth roots. It is easily obscured by poor radiographic technique (underexposure, elongation, incorrect angulation). Before interpreting apparent loss of lamina dura as pathological, the radiographic quality must be assessed. True loss of lamina dura occurs in periapical pathology, hyperparathyroidism (generalised loss), Paget's disease, and fibrous dysplasia. Technique artefact must be excluded first."},
    {"id":"radiology_59","type":"sba","stem":"A patient's OPG shows a poorly-defined, aggressive-looking lesion in the posterior mandible. There is destruction of the inferior cortex and 'Codman's triangle' periosteal reaction. What is the Codman's triangle and what does it indicate?","options":["A rounded radiolucency at the apex — it is always benign","A triangular radiopaque area formed by the elevated periosteum at the leading edge of an aggressive bone tumour (periosteal reaction) — it indicates rapid, aggressive bone destruction requiring urgent referral","A normal variant at the mandibular angle","The normal bone trabecular pattern in a young patient","An artefact caused by the OPG rotation mechanism"],"correct":1,"explanation":"Codman's triangle is a triangular area of new bone formed by the periosteum being elevated at the margin of an aggressive, rapidly growing lesion (most commonly osteosarcoma or other malignant tumours). The rapidly growing tumour elevates the periosteum faster than new bone can form, leaving a 'triangle' of reactive bone at the edge. It is a hallmark of aggressive (malignant) bone lesions. Combined with cortical destruction, it should prompt urgent referral to OMFS/oncology."},
    {"id":"radiology_60","type":"sba","stem":"A patient has a 3-unit fixed bridge planned from the upper right first premolar to the upper right second molar (replacing the first molar). A periapical radiograph of the second molar shows a diffuse, sclerotic opacification surrounding the apex without a PDL space or lamina dura visible. The tooth is vital. What does this finding most likely represent?","options":["Hypercementosis of the second molar","Condensing osteitis (focal sclerosing osteomyelitis) associated with chronic periapical inflammation of the second molar","A cementoblastoma","Fibrous dysplasia localised to the second molar region","Periapical abscess in the early phase"],"correct":1,"explanation":"Condensing osteitis (focal sclerosing osteomyelitis) appears as a diffuse, ill-defined area of increased opacity at the apex of a tooth, often with no clearly defined periapical radiolucency, associated with low-grade chronic pulpal inflammation. The tooth may be vital or non-vital. The bone reaction is a dense sclerotic response to chronic low-grade infection. If the tooth has deep caries or a large restoration, it requires investigation for vitality and treated accordingly (RCT if non-vital, or monitor if vital with no symptoms)."}
  ],
  pharm: [
    {"id":"pharm_1","type":"sba","stem":"A 40-year-old patient requires inferior alveolar nerve block. You use lidocaine 2% with 1:80,000 adrenaline. What is the maximum dose of lidocaine (with vasoconstrictor) for a 70 kg adult?","options":["100 mg (5 mg/kg)","200 mg (approximately 3 mg/kg)","300 mg (approximately 4.4 mg/kg)","500 mg (7 mg/kg)","600 mg (8.6 mg/kg)"],"correct":2,"explanation":"The maximum dose of lidocaine WITH adrenaline (vasoconstrictor) is 500 mg (some sources: 7 mg/kg, maximum 500 mg). For a 70 kg patient: 7 × 70 = 490 mg, ≈500 mg. In dental practice, 2% lidocaine = 20 mg/mL; a standard 2.2 mL cartridge contains 44 mg. The maximum is approximately 11 cartridges (rarely approached). WITHOUT vasoconstrictor (plain lidocaine), the maximum is 3 mg/kg (max 200 mg). Many UK sources and BNF specify 4.4 mg/kg (up to ~300 mg) as the widely cited dental figure."},
