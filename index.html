    {"id":"pathology_23","type":"sba","stem":"A 60-year-old woman has a parotid mass that shows pain, facial nerve involvement, and fixation. Biopsy shows a tumour with a cribriform pattern, tubular pattern, and solid pattern. Perineural invasion is prominent. What is the diagnosis?","options":["Mucoepidermoid carcinoma","Polymorphous adenocarcinoma","Adenoid cystic carcinoma","Warthin's tumour","Myoepithelioma"],"correct":2,"explanation":"Adenoid cystic carcinoma (ACC) has three histological patterns: cribriform (Swiss-cheese, best prognosis), tubular, and solid (worst prognosis). Perineural invasion is a hallmark, explaining its tendency for facial nerve involvement, pain, and local recurrence after seemingly adequate resection. ACC has a deceptively slow clinical course but frequently metastasises to lungs late (sometimes decades after primary treatment). Five-year survival appears reasonable but 20-year survival is poor."},
    {"id":"pathology_24","type":"sba","stem":"A Warthin's tumour is biopsied from the lower pole of the parotid gland in a 65-year-old male smoker. Histologically, what are the two characteristic components?","options":["Mucous cells and epidermoid cells in cystic spaces","Columnar oncocytic epithelium lining cystic spaces supported by dense lymphoid stroma with germinal centres","Islands of clear cells with psammoma bodies","Fibrous stroma with entrapped nests of squamous cells","Streaming fascicles of spindle cells"],"correct":1,"explanation":"Warthin's tumour (papillary cystadenoma lymphomatosum) is the second most common benign salivary gland tumour after pleomorphic adenoma, and almost exclusively occurs in the parotid. Histologically it has two components: oncocytic (oxyphilic) bilayered columnar epithelium forming papillary projections lining cystic spaces, and dense lymphoid stroma with germinal centres. It is bilateral in 10% and associated with smoking. Treatment is surgical excision with minimal recurrence."},
    {"id":"pathology_25","type":"sba","stem":"A 35-year-old woman presents with a 2 cm firm swelling in the upper lip. Histology shows small ductal and acinar structures in a chondromyxoid stroma; no encapsulation is complete. The lesion has pseudopod extensions beyond the apparent margin. What is the diagnosis?","options":["Mucoepidermoid carcinoma","Pleomorphic adenoma","Basal cell adenoma","Canalicular adenoma","Polymorphous adenocarcinoma"],"correct":1,"explanation":"Pleomorphic adenoma (benign mixed tumour) is the most common salivary gland tumour, consisting of epithelial elements (ductal and myoepithelial cells) in a varied stroma (myxoid, chondroid, fibrous). The pseudopod extensions beyond the apparent capsule explain why simple enucleation leads to recurrence (up to 45%). Superficial parotidectomy with intact capsule, or wide local excision for minor salivary gland lesions, is the treatment of choice."},
    {"id":"pathology_26","type":"sba","stem":"A 4-month-old breastfed infant has white curd-like plaques on the buccal mucosa and tongue that wipe off to leave an erythematous base. The mother has nipple soreness. What is the most likely diagnosis and first-line treatment?","options":["Hairy leukoplakia — aciclovir","Pseudomembranous candidiasis (oral thrush) — miconazole oral gel for the infant and topical therapy for the mother to prevent reinfection","Lichen planus — topical corticosteroid","Geographic tongue — reassurance only","Diphtheria — penicillin"],"correct":1,"explanation":"Pseudomembranous candidiasis (oral thrush) presents as removable white plaques leaving an erythematous (sometimes bleeding) base — this is the diagnostic feature distinguishing it from leukoplakia (which does not rub off). Miconazole oral gel is first-line in infants over 4 months; nystatin suspension is an alternative. Mother and infant must be treated simultaneously to prevent re-infection through breastfeeding. Oral candidiasis in adults warrants exclusion of underlying causes (steroid inhaler use, denture wear, immunosuppression, diabetes, HIV)."},
    {"id":"pathology_27","type":"sba","stem":"A 72-year-old man wears a complete upper denture full-time, including overnight. The fitting surface area of palatal mucosa appears uniformly erythematous and oedematous but is asymptomatic. There are no granular or papillary changes. Using Newton's classification of denture stomatitis, this is which type, and what is the most appropriate first-line management?","options":["Type I (localised inflammation) — replace the denture immediately","Type II (generalised erythema) — improve denture hygiene, remove the denture at night, and prescribe miconazole oral gel if Candida is identified","Type III (papillary hyperplasia) — surgical excision","Type IV — referral for biopsy to exclude SCC","Type 0 — no treatment required"],"correct":1,"explanation":"Newton's classification of denture-related stomatitis: Type I = localised pinpoint hyperaemia; Type II = generalised diffuse erythema confined to the denture-bearing area; Type III = inflammatory papillary hyperplasia (granular/cobblestone). This patient has Type II. First-line management addresses the cause: leave the denture out at night, soak overnight in chlorhexidine 0.2% or dilute hypochlorite (acrylic only), brush the fitting surface, manage any underlying systemic factor (diabetes, iron/B12 deficiency), and prescribe topical antifungals (miconazole gel — caution with warfarin and statins) if Candida is implicated."},
    {"id":"pathology_28","type":"sba","stem":"A painless bluish nodule on the ventral tongue is biopsied. Histology shows a cyst-like space filled with eosinophilic proteinaceous material, with no epithelial lining, surrounded by granulation tissue and foamy macrophages. What is the diagnosis?","options":["Mucocele (mucous extravasation cyst)","Mucous retention cyst","Ranula","Dermoid cyst","Lymphangioma"],"correct":0,"explanation":"A mucous extravasation cyst (mucocele) lacks an epithelial lining because it is formed by rupture of a minor salivary gland duct with extravasation of mucus into the connective tissue. The mucin pool is surrounded by granulation tissue and macrophages (muciphages). In contrast, a mucous retention cyst has a true epithelial lining formed by duct dilation. Mucoceles are most common on the lower lip; ranulae are floor-of-mouth variants from the sublingual gland."},
    {"id":"pathology_29","type":"sba","stem":"A 6-year-old child presents with bilateral symmetric painless jaw swelling affecting all four jaw quadrants with a radiograph showing bilateral multilocular radiolucencies with expansion and a 'cherub' appearance. What is the diagnosis and inheritance pattern?","options":["Multiple odontogenic keratocysts — autosomal dominant (Gorlin-Goltz)","Cherubism — autosomal dominant (SH3BP2 mutation)","Multiple giant cell granulomas — no clear inheritance","Fibrous dysplasia — somatic GNAS1 mutation","Osteopetrosis — autosomal recessive"],"correct":1,"explanation":"Cherubism is a rare autosomal dominant condition caused by mutations in SH3BP2 (which encodes a scaffolding protein involved in osteoclast regulation). It presents in early childhood with progressive, symmetric bilateral jaw enlargement (especially mandible) with upward gaze due to displacement of the orbital floor giving the 'cherub' appearance. Radiographs show bilateral multilocular radiolucencies. Lesions spontaneously regress after puberty in most cases."},
    {"id":"pathology_30","type":"sba","stem":"A 60-year-old man has cortical irregularity at the angle of the mandible on OPG. He is asymptomatic. Histology shows fibrous and adipose tissue with no epithelial lining. What is this incidental finding?","options":["Osteoradionecrosis","Stafne bone cavity (static bone cavity)","Aneurysmal bone cyst","Traumatic bone cyst","Mandibular extension of antral cavity"],"correct":1,"explanation":"A Stafne bone cavity (static bone cyst/defect) is a developmental lingual cortical depression caused by pressure from the submandibular gland. It appears as a well-defined, corticated radiolucency below the inferior dental canal, below the angle or body of the mandible. It is asymptomatic, static, and requires no treatment. The 'pseudocyst' contains only normal soft tissue (salivary gland, adipose, lymph nodes). CT or MRI confirms the diagnosis."},
    {"id":"pathology_31","type":"sba","stem":"A submandibular lymph node biopsy in a 55-year-old male smoker shows metastatic squamous cell carcinoma. No primary tumour is found in the oral cavity, pharynx, or skin. The tumour cells are strongly positive for p16 immunohistochemistry. Where is the most likely primary site?","options":["Floor of mouth","Buccal mucosa","Oropharynx (tonsillar crypt or base of tongue)","Salivary glands","Nasopharynx"],"correct":2,"explanation":"p16 overexpression on immunohistochemistry is a surrogate marker for high-risk HPV (HPV-16/18) infection and is strongly associated with oropharyngeal SCC (particularly tonsillar and base of tongue). HPV-positive oropharyngeal cancers can present with cervical nodal metastasis before the primary is clinically apparent. When a cervical node SCC is p16-positive, an oropharyngeal primary should be assumed and directed biopsies of the tonsils and base of tongue performed."},
    {"id":"pathology_32","type":"sba","stem":"A 68-year-old woman on long-term bisphosphonate therapy undergoes jaw biopsy for suspected MRONJ. Histology shows necrotic bone with empty lacunae, bacterial surface colonies, absence of osteocytes, and absence of normal marrow spaces. Which feature confirms the diagnosis of necrotic bone?","options":["Presence of osteoclasts lining bone surfaces","Empty osteocyte lacunae and loss of haematopoietic marrow","Dense sclerosis of bone without soft tissue invasion","Replacement of bone by fibrous tissue","Periosteal new bone formation"],"correct":1,"explanation":"The histological hallmark of necrotic (non-vital) bone is the absence of osteocytes within their lacunae (empty lacunae). In MRONJ, there is also typically absence of haematopoietic marrow (replaced by fibrous or inflammatory tissue), bacterial colonies on bone surfaces (actinomycetes are particularly common), and inflammatory infiltrate in surrounding soft tissue. Osteoclasts are absent in MRONJ because antiresorptive drugs inhibit osteoclastic activity."},
    {"id":"pathology_33","type":"sba","stem":"A 48-year-old man originally from Bangladesh attends with progressive trismus, generalised pallor of the oral mucosa, palpable submucosal fibrous bands on the buccal mucosa, and burning sensation on eating spicy food. He chews paan/areca nut daily. What is the diagnosis and the principal long-term concern?","options":["Lichen planus — risk of malignant transformation <1%","Oral submucous fibrosis (OSF) — a potentially malignant disorder with malignant transformation rate of approximately 7–13%","Recurrent aphthous stomatitis — no malignant potential","Burning mouth syndrome — no malignant potential","Pemphigoid — risk of conjunctival scarring"],"correct":1,"explanation":"Oral submucous fibrosis is a chronic potentially malignant disorder strongly linked to areca (betel) nut chewing, particularly common in South Asian populations. It progresses from a burning sensation to dense submucosal fibrosis, blanching, and trismus. Reported malignant transformation rates are approximately 7–13%. Management: cease areca nut, intralesional steroids ± hyaluronidase, mouth-opening exercises, and lifelong surveillance with biopsy of any suspicious change. NICE NG12 supports urgent referral for any suspected oral cancer."},
    {"id":"pathology_34","type":"sba","stem":"A biopsy shows fragments of granulation tissue containing non-caseating granulomas composed of epithelioid histiocytes and Langhans-type giant cells. Ziehl-Neelsen stain is negative. Chest X-ray shows bilateral hilar lymphadenopathy. What is the most likely diagnosis?","options":["Tuberculosis","Crohn's disease","Sarcoidosis","Foreign body reaction","Wegener's granulomatosis"],"correct":2,"explanation":"Sarcoidosis is a systemic granulomatous disease of unknown aetiology characterised by non-caseating granulomas (no central necrosis — unlike TB). The Ziehl-Neelsen stain for mycobacteria is negative. Bilateral hilar lymphadenopathy on CXR is the most common radiological finding. Oral sarcoidosis can present as gingival or mucosal granulomas. Elevated serum ACE supports the diagnosis. Treatment is with systemic corticosteroids for symptomatic disease."},
    {"id":"pathology_35","type":"sba","stem":"A 65-year-old man has a discrete, velvety, well-demarcated bright red patch on the soft palate that does not wipe off. He has smoked 30 pack-years and drinks 25 units of alcohol per week. The lesion is asymptomatic. Which statement best describes the lesion and its malignant potential?","options":["Erythema migrans (geographic tongue) — no malignant potential","Erythroplakia — a potentially malignant disorder; up to 50% show severe dysplasia, carcinoma in situ, or frank SCC at biopsy and the highest malignant transformation rate of any oral mucosal lesion","Lichen planus erosive type — malignant transformation <1%","Acute pseudomembranous candidiasis — no malignant potential","Median rhomboid glossitis — no malignant potential"],"correct":1,"explanation":"Erythroplakia is defined (WHO) as a fiery red plaque or patch that cannot be characterised as any other definable lesion. It is the oral mucosal lesion with the highest risk of malignant transformation: at biopsy, around 50% are already severely dysplastic, carcinoma in situ, or invasive SCC. Any persistent red patch (>3 weeks) requires urgent suspected cancer referral (NICE NG12, 2WW). It contrasts with leukoplakia (white patch, transformation 1–5%) and is more dangerous despite being less common."},
    {"id":"pathology_36","type":"sba","stem":"A 70-year-old man has a periapical biopsy of a lower molar showing a granuloma. Histology reveals sulfur-granules surrounded by filamentous gram-positive organisms and an acute inflammatory infiltrate. What is the diagnosis?","options":["Sarcoidosis","Tuberculosis","Actinomycosis","Foreign body reaction","Nocardiosis"],"correct":2,"explanation":"Actinomycosis is caused by Actinomyces israelii (normal oral commensal), an anaerobic, gram-positive filamentous bacterium. Characteristic features are yellow 'sulfur granules' (colonies of organisms embedded in calcium phosphate) visible to the naked eye, surrounded by acute inflammation and fibrosis. It follows trauma, extraction, or infection. The mandible is the most common site of orocervicofacial actinomycosis. Treatment: high-dose amoxicillin for 6–12 months."},
    {"id":"pathology_37","type":"sba","stem":"A 25-year-old woman has a painless, firm, fibrous nodule on the attached gingiva adjacent to a lower molar. Histology shows a well-circumscribed lesion of dense collagenous fibrous tissue with few fibroblasts, covered by stratified squamous epithelium. What is the diagnosis?","options":["Peripheral ossifying fibroma","Pyogenic granuloma","Fibrous epulis (peripheral fibroma)","Peripheral giant cell granuloma","Lipoma"],"correct":2,"explanation":"A fibrous epulis (peripheral fibroma or fibroepithelial polyp) is the most common gingival/oral mucosal swelling, composed of dense fibrous connective tissue with few cells, covered by normal epithelium. It arises as a reactive lesion to chronic local irritation (plaque, calculus, sharp tooth). Treatment is excision; unlike some epulides, recurrence rate is low. It should be distinguished from peripheral ossifying fibroma (which contains bone/calcification) and pyogenic granuloma (which is vascular and bleeds easily)."},
    {"id":"pathology_38","type":"sba","stem":"A 28-year-old pregnant woman develops a soft, red, pedunculated, highly vascular gingival swelling that bleeds easily. Histology shows lobular proliferation of blood vessels in a myxoid stroma with an inflammatory infiltrate. What is the diagnosis?","options":["Peripheral giant cell granuloma","Peripheral ossifying fibroma","Pyogenic granuloma (lobular capillary haemangioma)","Pregnancy epulis","Kaposi's sarcoma"],"correct":2,"explanation":"A pyogenic granuloma (lobular capillary haemangioma) is a reactive vascular lesion presenting as a red, friable, easily bleeding gingival growth, often associated with local irritation or hormonal changes (pregnancy epulis). Histologically it shows a lobular arrangement of capillaries in an oedematous myxoid stroma with inflammatory cells. Despite the name, it is neither pyogenic nor a true granuloma. Treatment is excision; lesions in pregnancy may regress post-partum."},
    {"id":"pathology_39","type":"sba","stem":"A 50-year-old man has a blue-purple sessile gingival swelling. Histology shows multinucleate giant cells in a cellular fibrous stroma with haemosiderin deposits and new bone formation at the periphery. What is the diagnosis?","options":["Fibrous epulis","Pyogenic granuloma","Peripheral giant cell granuloma","Peripheral ossifying fibroma","Metastatic renal cell carcinoma"],"correct":2,"explanation":"Peripheral giant cell granuloma (PGCG) is a reactive lesion exclusive to the gingiva or alveolar mucosa, presenting as a blue-purple sessile or pedunculated swelling, often anterior to the molars, commonly associated with local irritation. Histologically it shows multinucleate osteoclast-like giant cells in a vascular fibrous stroma with haemosiderin and reactive bone formation at the periphery. It can cup-shape resorb underlying alveolar bone. Treatment is excision and elimination of local irritants."},
    {"id":"pathology_40","type":"sba","stem":"A 3 cm calcified nodule in the soft tissue of the cheek shows concentric laminated calcification ('corpora amylacea') on histology, without any epithelial component. What is the most likely diagnosis?","options":["Calcifying odontogenic cyst","Sialolith","Phlebolith (calcified thrombus in a vascular malformation)","Ossifying fibroma","Foreign body reaction"],"correct":2,"explanation":"Phleboliths are calcified thrombi forming in venous malformations (haemangiomas/vascular malformations). They are typically round, with concentric laminar ('onion-skin') calcification visible on plain radiograph. They are an incidental finding and are pathognomonic of a vascular lesion. In the cheek, they are associated with slow-flow venous malformations. No treatment is required for the phlebolith itself; management is directed at the underlying vascular malformation if symptomatic."},
    {"id":"pathology_41","type":"sba","stem":"A 12-year-old presents with delayed eruption of the upper left canine. OPG reveals a radiopaque structure overlying the crown of the unerupted tooth, composed of small tooth-like structures in an orderly arrangement. What is this lesion?","options":["Compound odontome","Complex odontome","Calcifying epithelial odontogenic tumour","Odontogenic fibroma","Cementoblastoma"],"correct":0,"explanation":"A compound odontome is composed of multiple small tooth-like structures (denticles) arranged in an organised fashion resembling rudimentary teeth. It is most common in the maxillary anterior region, often associated with an unerupted tooth, and can cause delayed eruption or displacement. It is a developmental hamartoma, not a true neoplasm. Treatment is enucleation allowing normal tooth eruption, with minimal risk of recurrence."},
    {"id":"pathology_42","type":"sba","stem":"A 30-year-old woman has a well-defined radiopaque mass fused to the root of a lower first molar. The tooth is painful to percussion. Histology shows a tumour of cementoblasts with abundant cementum-like material fused to the root. What is the diagnosis?","options":["Hypercementosis","Cementoblastoma","Periapical cemento-osseous dysplasia","Ossifying fibroma","Cemento-ossifying fibroma"],"correct":1,"explanation":"Cementoblastoma is the only true neoplasm of cementum. It presents as a radiopaque mass attached to and fused with the root of a tooth (most commonly mandibular first molar). The tooth is often painful and vital. Histologically it shows sheets of cementum-like tissue with reversal lines and rimming by cementoblasts. Treatment requires extraction of the tooth with the attached mass; the lesion does not recur after complete removal."},
    {"id":"pathology_43","type":"sba","stem":"A 40-year-old woman has multiple small periapical mixed density lesions around the apices of vital mandibular incisors. Radiographs show small radiolucent areas becoming progressively more radiopaque over time. She is asymptomatic and has no clinical abnormality. What is the most likely diagnosis?","options":["Multiple radicular cysts","Cemento-osseous dysplasia (periapical type)","Multiple odontogenic keratocysts","Osteopetrosis","Paget's disease"],"correct":1,"explanation":"Periapical cemento-osseous dysplasia (PCOD) is a benign reactive process most commonly seen in middle-aged Black or Asian women around the apices of vital mandibular anterior teeth. It evolves from a radiolucent phase (early) to a mixed phase to a predominantly radiopaque phase as fibrous tissue is replaced by cementum-like material. It requires no treatment and should not be biopsied; biopsy sites heal poorly in avascular, dense cementum."},
    {"id":"pathology_44","type":"sba","stem":"A newborn has multiple missing primary teeth and anodontia. Examination shows absent sweat glands, sparse fine hair, and flat nose. What is the underlying condition causing the dental anomaly?","options":["Down syndrome","Ectodermal dysplasia","Cleidocranial dysplasia","Dentinogenesis imperfecta","Amelogenesis imperfecta"],"correct":1,"explanation":"Ectodermal dysplasia (hypohidrotic type, caused by EDA gene mutation) affects all ectodermal structures: teeth (oligodontia/anodontia with peg-shaped teeth), hair (hypotrichosis), sweat glands (hypohidrosis, risk of hyperthermia), and nails. Affected males have the most severe phenotype (X-linked form). Dental management requires early prosthetic rehabilitation to enable speech and feeding. Implants are placed after jaw growth is complete."},
    {"id":"pathology_45","type":"sba","stem":"A patient has opalescent, blue-brown discoloured teeth that wear rapidly. Radiograph shows bulbous crowns, cervical constrictions, and obliteration of pulp chambers and root canals. What is the diagnosis?","options":["Amelogenesis imperfecta","Dentinogenesis imperfecta","Dentin dysplasia type I","Tetracycline staining","Fluorosis"],"correct":1,"explanation":"Dentinogenesis imperfecta (DI) is an autosomal dominant condition caused by mutations in DSPP (dentin sialophosphoprotein). Clinically teeth appear opalescent blue-brown with rapid wear due to enamel-dentin separation. Radiographically: bulbous crowns, cervical constriction, and progressive obliteration of pulp chambers and root canals ('thistle tube' canals). DI type II is isolated (no osteogenesis imperfecta); DI type I is associated with OI."},
    {"id":"pathology_46","type":"sba","stem":"Histology of a tooth shows thin, hypomineralised enamel with a normal amount of enamel matrix but deficient mineralisation. The teeth have a chalky white appearance and chip easily. What type of amelogenesis imperfecta is this?","options":["Hypoplastic AI","Hypomature AI","Hypocalcified AI","Snow-capped AI","Hypomature-hypoplastic AI"],"correct":2,"explanation":"Hypocalcified amelogenesis imperfecta (AI) has a normal amount of enamel matrix that is insufficiently mineralised (softest, most severely affected enamel). Teeth appear chalky or yellow-brown and the enamel is very soft, staining readily and chipping away from underlying dentin. Hypoplastic AI has reduced enamel quantity (thin); hypomature AI has enamel of normal thickness but with deficient crystal maturation (harder than hypocalcified). AI has multiple inheritance patterns depending on the mutation."},
    {"id":"pathology_47","type":"sba","stem":"A 60-year-old man has multiple hard, irregular bony outgrowths on the buccal aspects of the maxilla and mandible bilaterally. Histology shows mature lamellar bone with a compact outer cortex and sparse marrow. What is the diagnosis?","options":["Osteoma","Exostosis (buccal exostoses)","Torus palatinus","Fibrous dysplasia","Paget's disease"],"correct":1,"explanation":"Buccal exostoses are benign developmental bony outgrowths on the buccal alveolar bone of both jaws, usually bilateral and symmetrical. Histologically they are composed of normal mature lamellar bone. They are distinct from torus palatinus (midline palate) and torus mandibularis (lingual mandible). No treatment is required unless they cause difficulty with denture construction or food trapping. Peripheral osteoma is a similar lesion in the periosteum."},
    {"id":"pathology_48","type":"sba","stem":"A 6-year-old child presents with failure of eruption of permanent teeth, persistence of primary teeth, and on radiograph shows multiple impacted permanent teeth and Wormian bones in the skull. She has absent clavicles. What is the diagnosis?","options":["Down syndrome","Ectodermal dysplasia","Cleidocranial dysplasia","Gardner syndrome","Gorlin-Goltz syndrome"],"correct":2,"explanation":"Cleidocranial dysplasia (dysostosis) is an autosomal dominant condition caused by RUNX2 mutations. Features: hypoplastic/absent clavicles (allowing shoulders to be approximated anteriorly), multiple supernumerary teeth, delayed/failed eruption of permanent teeth due to failure of root resorption, Wormian bones, and open anterior fontanelle. Treatment involves surgical exposure and orthodontic traction of impacted teeth, but is complex and prolonged."},
    {"id":"pathology_49","type":"sba","stem":"A 45-year-old woman with Gardner syndrome presents for dental assessment. Which oral/jaw manifestation is most characteristic?","options":["Multiple odontogenic keratocysts","Cherubism","Multiple osteomas of the jaw and skull, supernumerary teeth, and impacted teeth","Multiple periapical cemento-osseous dysplasias","Bilateral parotid swelling"],"correct":2,"explanation":"Gardner syndrome (APC gene mutation, variant of familial adenomatous polyposis) is characterised by: colorectal polyps (with malignant transformation potential), multiple osteomas (hard bony masses of the jaws and skull), supernumerary teeth, impacted permanent teeth, epidermoid cysts, and desmoid tumours. The dental/jaw findings may precede colorectal manifestations by years, making dentists an important diagnostic point of entry. All patients require gastroenterology surveillance."},
    {"id":"pathology_50","type":"sba","stem":"A 50-year-old man has a high-grade jaw sarcoma. Histology shows malignant cells producing osteoid directly (without a cartilaginous intermediate). What is the diagnosis?","options":["Chondrosarcoma","Ewing sarcoma","Osteosarcoma","Malignant fibrous histiocytoma","Liposarcoma"],"correct":2,"explanation":"Osteosarcoma is defined by the direct production of osteoid (unmineralised bone matrix) by malignant cells. This distinguishes it from chondrosarcoma (malignant cartilage production) and Ewing sarcoma (small round blue cells, no matrix production). In the jaws, osteosarcoma occurs in a younger age group (3rd–4th decade) than in long bones. Radiographic findings: 'sunburst' periosteal reaction, widened periodontal ligament space, and bone destruction."},
    {"id":"pathology_51","type":"sba","stem":"A 14-year-old boy presents with a 2-week history of severe throbbing pain, swelling, and pus discharging from a sinus tract over the body of the mandible. He is febrile (38.4°C) and the lower right first molar is grossly carious and tender to percussion. OPG shows a 'moth-eaten' radiolucency around the apex with patchy areas of dense bone. What is the most likely diagnosis and initial management?","options":["Acute apical abscess — incision and drainage only","Suppurative osteomyelitis of the mandible — extraction or RCT to remove the source, urgent hospital referral, IV antibiotics (penicillin-based) and consideration of debridement","MRONJ Stage 2 — start oral clindamycin","Garré's sclerosing osteitis — observation","Cherubism — long-term steroids"],"correct":1,"explanation":"Acute suppurative osteomyelitis of the mandible most commonly arises from a periapical or periodontal source in younger patients (the maxilla is rarely affected due to its rich blood supply). Classic features: deep pain, swelling, pyrexia, sinus tract, paraesthesia of the inferior alveolar nerve, and 'moth-eaten' radiographic appearance with sequestrum formation. Management requires source control (extraction or RCT), urgent hospital referral, prolonged antibiotics (often IV initially — benzylpenicillin or amoxicillin ± metronidazole; clindamycin if penicillin-allergic), and surgical debridement of sequestra if present."},
    {"id":"pathology_52","type":"sba","stem":"A 65-year-old man with known metastatic prostate cancer presents with jaw pain. OPG shows generalised sclerosis and a 'moth-eaten' area in the posterior mandible. What is the most likely cause of the jaw lesion?","options":["Osteosarcoma arising de novo","Paget's disease","Metastatic prostate cancer to the jaw","MRONJ (he is on zoledronic acid)","Osteopetrosis"],"correct":2,"explanation":"Metastatic tumours to the jaws are rare but the most common primary sites are breast (most common), lung, kidney, prostate, thyroid, and colon. Prostate metastases to bone are typically osteoblastic (sclerotic). Jaw metastases most commonly affect the molar region of the mandible (rich blood supply). They may present with pain, swelling, paraesthesia of the inferior alveolar nerve ('numb chin syndrome'), and loosening of teeth — these symptoms in a known cancer patient warrant urgent investigation."},
    {"id":"pathology_53","type":"sba","stem":"A 68-year-old woman presents to her GDP with persistent back pain, fatigue, and loosening of her teeth. OPG demonstrates multiple well-circumscribed 'punched-out' radiolucencies of the mandible without sclerotic margins. Blood tests show anaemia, hypercalcaemia, raised total protein with a monoclonal band on serum protein electrophoresis, and Bence Jones protein in the urine. What is the most likely diagnosis?","options":["Multiple metastatic carcinoma","Multiple odontogenic keratocysts","Multiple myeloma","Hyperparathyroidism (multiple brown tumours)","Paget's disease"],"correct":2,"explanation":"Multiple myeloma is a plasma cell malignancy producing monoclonal immunoglobulin (M-band on electrophoresis) and free light chains (Bence Jones protein). Skull and jaw radiographs typically show multiple sharply defined 'punched-out' lytic lesions without surrounding sclerosis. The CRAB features summarise its consequences: hyper-Calcaemia, Renal impairment, Anaemia, and Bone lesions. Dental implications include MRONJ-equivalent risk if treated with bisphosphonates or denosumab. Any patient with multifocal jaw radiolucencies and systemic features warrants urgent haematology referral."},
    {"id":"pathology_54","type":"sba","stem":"A 7-year-old child from sub-Saharan Africa presents with a rapidly enlarging painless swelling of the mandible over 4 weeks, associated with displacement and loosening of teeth. Biopsy shows sheets of medium-sized lymphoid cells with a 'starry sky' pattern (tingible body macrophages dispersed among monotonous tumour cells). EBV is identified in tumour cells. What is the most likely diagnosis?","options":["Acute lymphoblastic leukaemia","Burkitt lymphoma","Hodgkin lymphoma","Langerhans cell histiocytosis","Ewing sarcoma"],"correct":1,"explanation":"Endemic (African) Burkitt lymphoma is a highly aggressive B-cell non-Hodgkin lymphoma caused by t(8;14) MYC translocation, strongly associated with EBV and chronic malaria co-infection. The jaws (especially mandible) are the most common presenting site in endemic disease, with rapidly progressive painless swelling, displacement and exfoliation of teeth, and large soft-tissue masses. Histology shows a classic 'starry sky' appearance from interspersed tingible body macrophages clearing apoptotic debris. It is highly chemosensitive; prognosis with prompt treatment is excellent."},
    {"id":"pathology_55","type":"sba","stem":"A 35-year-old man with newly diagnosed HIV (CD4 count 180 cells/µL) presents with non-removable, vertically corrugated white plaques on the lateral borders of the tongue. The plaques cannot be wiped off and are asymptomatic. What is the most likely diagnosis and causative organism?","options":["Pseudomembranous candidiasis — Candida albicans","Hairy leukoplakia — Epstein-Barr virus (EBV)","Lichen planus — autoimmune T-cell mediated","Frictional keratosis — chronic trauma","Verrucous carcinoma — HPV"],"correct":1,"explanation":"Oral hairy leukoplakia (OHL) is caused by Epstein-Barr virus (EBV) replication in epithelial cells and is strongly associated with HIV infection or other immunosuppression (transplant patients). Classic appearance: bilateral, white, vertically corrugated (hair-like) plaques on the lateral tongue that do not rub off. Histology shows acanthosis with 'balloon' cells in the upper spinous layer. Diagnosis is usually clinical; in undiagnosed cases, OHL is a strong indicator for HIV testing. Treatment is rarely required; antiretroviral therapy resolves it."},
    {"id":"pathology_56","type":"sba","stem":"A 45-year-old woman is referred to oral medicine with a hyperplastic, granular, bright-red gingivitis described by the referring GDP as 'strawberry-like'. She also reports several months of nasal crusting, sinusitis, and recent haemoptysis. Urinalysis at the appointment shows microscopic haematuria. Which of the following is the most appropriate next step?","options":["Reassurance and improved oral hygiene instruction only","Topical chlorhexidine and review in 6 weeks","Urgent referral for medical investigation including ANCA testing, chest imaging and renal review for suspected granulomatosis with polyangiitis (GPA)","Empirical course of doxycycline for 3 months","Direct referral for gingivectomy"],"correct":2,"explanation":"'Strawberry gingivitis' (hyperplastic, papillary, friable gingiva resembling a strawberry surface) is a classic oral manifestation of granulomatosis with polyangiitis (GPA, formerly Wegener's). GPA is an ANCA-associated systemic small-vessel vasculitis affecting the upper airway, lungs (haemoptysis, cavities) and kidneys (rapidly progressive glomerulonephritis). Recognition by the dental team is important — untreated, the renal disease can be life-threatening. Management is co-ordinated medical: confirmatory ANCA testing, biopsy where appropriate, and induction with rituximab or cyclophosphamide plus high-dose corticosteroid."},
    {"id":"pathology_57","type":"sba","stem":"A 6-year-old child presents to a GDP with painful swollen gingivae, several mobile teeth, and an OPG showing well-defined 'punched-out' radiolucencies giving a 'floating teeth' appearance. The child has had recurrent ear infections and a persistent skin rash. Routine periodontal therapy seems unable to stabilise the situation. What is the most appropriate next step?","options":["Intensive supragingival cleaning and review in 3 months","Extract all mobile primary teeth and provide a denture","Urgent referral to a paediatric dentistry/oral medicine specialist for biopsy and systemic work-up to exclude Langerhans cell histiocytosis or acute leukaemia","Empirical course of metronidazole and amoxicillin","Reassurance — this is normal exfoliation"],"correct":2,"explanation":"'Floating teeth' on radiograph in a child mandates urgent referral to exclude serious systemic disease, in particular Langerhans cell histiocytosis (LCH) and acute leukaemia (especially AML with gingival infiltration). Other differentials include hypophosphatasia, cyclic neutropenia, and Papillon-Lefèvre syndrome. Routine periodontal therapy is inadequate and inappropriate without a definitive diagnosis. Biopsy of affected gingiva and full blood investigations are mandatory. Treatment depends on diagnosis — LCH lesions may regress with curettage or systemic therapy; leukaemia requires urgent oncology care."},
    {"id":"pathology_58","type":"sba","stem":"A 30-year-old patient has a 2 cm soft, compressible, bluish swelling under the tongue that has been present since birth and increases with crying. Aspiration yields clear serous fluid. Histology shows dilated, thin-walled channels lined by a single layer of endothelium without red blood cells. What is the diagnosis?","options":["Haemangioma","Lymphangioma (cystic hygroma)","Mucocele","Ranula","Dermoid cyst"],"correct":1,"explanation":"Lymphangioma (cystic hygroma when large and cystic, microcystic when smaller) is a hamartomatous proliferation of lymphatic channels. It presents as a soft, compressible, bluish, translucent swelling, often present since birth. Aspiration yields clear, watery lymph. Histology shows dilated thin-walled lymphatic channels (no red blood cells, unlike haemangioma) lined by endothelium positive for D2-40 (podoplanin). Floor of mouth and tongue are common sites."},
    {"id":"pathology_59","type":"sba","stem":"A periapical biopsy shows chronic granulation tissue with an epithelial lining. Serial sections do not demonstrate a complete lumen. What is the correct pathological term for this finding?","options":["Radicular cyst","Residual cyst","Periapical granuloma with epithelial rests","Bay cyst variant","Lateral periodontal cyst"],"correct":2,"explanation":"The distinction between a periapical granuloma with proliferating epithelial rests (from Malassez) and a true radicular cyst depends on whether the epithelial lining forms a complete cavity. If serial sections demonstrate a partial epithelial lining without a complete lumen, this is classified as a periapical granuloma with epithelial proliferation, not a cyst. True radicular cysts have a complete epithelial-lined lumen. This distinction has implications for understanding how cysts develop from granulomas."},
    {"id":"pathology_60","type":"sba","stem":"A 55-year-old woman complains of dry mouth, gritty eyes, and bilateral parotid enlargement of 6 months. Examination shows reduced unstimulated whole salivary flow (<0.1 mL/min) and a positive Schirmer test. Blood tests demonstrate positive anti-Ro (SSA) and anti-La (SSB) antibodies and a raised ESR. What is the most likely diagnosis and the most important long-term oral complication?","options":["Sjögren syndrome — increased risk of MALT-type B-cell lymphoma in major salivary glands and dramatically increased caries risk","Bulimia nervosa — perimylolysis","Diabetes mellitus — Candida overgrowth","Sialolithiasis — recurrent infection","Mumps — sterility"],"correct":0,"explanation":"Sjögren syndrome is an autoimmune exocrinopathy with lymphocytic infiltration of salivary and lacrimal glands producing xerostomia and keratoconjunctivitis sicca. Diagnosis (2016 ACR/EULAR criteria) integrates symptoms, ocular tests, salivary flow, anti-Ro/La antibodies, and labial gland biopsy showing focal lymphocytic sialadenitis (focus score ≥1). Oral consequences include rampant caries (especially cervical), candidiasis, dysgeusia, and a 5–10x increased risk of mucosa-associated lymphoid tissue (MALT) B-cell lymphoma in salivary glands. Management is preventive — high-fluoride toothpaste (Duraphat 5000 ppm), saliva substitutes, and monitoring of glandular swellings."}
  ],
  perio: [
    {"id":"perio_1","type":"sba","stem":"According to the 2017 World Workshop on the Classification of Periodontal and Peri-Implant Diseases, what are the two fundamental conditions required for a diagnosis of periodontitis (as opposed to gingivitis)?","options":["Bleeding on probing and radiographic bone loss","Probing depth ≥4 mm and clinical attachment loss","Clinical attachment loss (CAL) and associated radiographic bone loss","Suppuration and mobility","Pocket depths ≥6 mm and furcation involvement"],"correct":2,"explanation":"The 2017 World Workshop classification defines periodontitis by the presence of non-plaque-induced or plaque-induced attachment loss and radiographic bone loss. Clinical attachment loss (CAL) is the definitive measure of true periodontal destruction. Without CAL there is no periodontitis — only gingivitis. The staging (I–IV) and grading (A–C) system then describes severity and risk/progression rate."},
    {"id":"perio_2","type":"sba","stem":"A 45-year-old man has probing depths of 5 mm at multiple sites with corresponding CAL of 3–4 mm, radiographic horizontal bone loss of <33% root length, and maximum tooth mobility of grade 1. Furcation involvement is Class I at one molar. How would you classify his periodontitis according to the 2017 BSP/EFP system?","options":["Stage I, Grade A","Stage II, Grade A","Stage II, Grade B","Stage III, Grade B","Stage IV, Grade C"],"correct":2,"explanation":"Stage II periodontitis is defined by CAL of 3–4 mm, radiographic bone loss in the coronal third (≤33%), maximum tooth loss due to periodontitis of 0, Class I or II furcation, maximum mobility Grade 1, and PPD ≤5 mm after treatment. Grade B is based on the percentage bone loss/age ratio of 0.25–1.0 and/or risk factors (smoking <10 cigarettes/day, pre-diabetes). No evidence of rapid progression places this at Grade B."},
    {"id":"perio_3","type":"sba","stem":"A 55-year-old woman has probing depths of up to 9 mm, CAL ≥6 mm, vertical bone loss ≥33% root length, Class III furcation involvement, and tooth mobility Grade 3 at one molar. What is the periodontitis stage?","options":["Stage I","Stage II","Stage III","Stage IV","Cannot be staged without radiographs"],"correct":3,"explanation":"Stage IV periodontitis is defined by very advanced attachment loss with complexity factors that compromise the function of the whole dentition: masticatory dysfunction, severe malocclusion, severe ridge deficiency, and teeth with very poor prognosis. Key markers: CAL ≥5 mm, radiographic bone loss extending to the middle or apical third of the root, ≥5 teeth lost due to periodontitis, Class III furcation, and mobility ≥Grade 2. Grade 3 mobility at a molar indicates Stage IV."},
    {"id":"perio_4","type":"sba","stem":"A 38-year-old patient with periodontitis is a heavy smoker (20 cigarettes/day). The percentage bone loss/age ratio is 1.2. Which grade of periodontitis does this correspond to?","options":["Grade A (slow rate of progression)","Grade B (moderate rate of progression)","Grade C (rapid rate of progression)","Grade cannot be assigned without biofilm levels","Grade D (used for aggressive forms)"],"correct":2,"explanation":"Periodontitis grade reflects biological plausibility of progression rate and risk factors. Grade C (rapid progression) is assigned when the % bone loss/age ratio is >1.0, and/or there is ≥2 mm bone loss over 5 years on consecutive radiographs, and/or heavy smoking (≥10 cigarettes/day) or HbA1c ≥7% (poorly controlled diabetes) is present. This patient meets Grade C criteria on both the ratio and the smoking history."},
    {"id":"perio_5","type":"sba","stem":"A healthy 22-year-old woman presents with a chief complaint of 'loose teeth'. She has severe generalised bone loss affecting first molars and incisors disproportionate to plaque levels. Subgingival microbiology identifies Aggregatibacter actinomycetemcomitans. Under the 2017 classification, what is the most likely diagnosis?","options":["Necrotising periodontitis","Periodontitis Stage III Grade B","Periodontitis Stage III/IV Grade C","Gingival condition associated with systemic disease","Plaque-induced gingivitis with local risk factors"],"correct":2,"explanation":"This presentation corresponds to what was previously called 'aggressive periodontitis' — now reclassified under the 2017 system as periodontitis Stage III/IV Grade C. Key features: young patient, severe bone loss disproportionate to biofilm burden, familial aggregation pattern, and association with A. actinomycetemcomitans. Grade C reflects rapid progression (% bone loss/age >1.0). Adjunct systemic antibiotics (amoxicillin + metronidazole) alongside comprehensive periodontal therapy are considered."},
    {"id":"perio_6","type":"sba","stem":"A 30-year-old man presents as an emergency with acute onset severe gingival pain, interdental necrosis with 'punched out' craters, a grey pseudomembrane, bleeding, fetid odour, and fever. He is highly stressed with recent sleep deprivation. What is the most likely diagnosis?","options":["Herpetic gingivostomatitis","Acute necrotising ulcerative gingivitis (ANUG)","Desquamative gingivitis","Pericoronitis","Acute periodontal abscess"],"correct":1,"explanation":"ANUG (acute necrotising ulcerative gingivitis) presents with the classic triad of: interdental necrosis with grey pseudomembrane, fetid halitosis, and pain. Predisposing factors: stress, smoking, HIV infection, nutritional deficiency, immune suppression, and sleep deprivation. Unlike herpetic gingivostomatitis, ANUG does not produce vesicles and is not preceded by a prodrome. Management: oral hygiene instruction, debridement, metronidazole 400 mg TDS for 3–5 days, and remove precipitating factors."},
    {"id":"perio_7","type":"sba","stem":"Which bacteria form the 'red complex' group associated with severe periodontitis as described by Socransky et al.?","options":["Fusobacterium nucleatum, Prevotella intermedia, Streptococcus mutans","Treponema denticola, Tannerella forsythia, Porphyromonas gingivalis","Actinomyces viscosus, Veillonella parvula, Prevotella melaninogenica","Streptococcus gordonii, Actinomyces israelii, Capnocytophaga sputigena","Aggregatibacter actinomycetemcomitans, Fusobacterium nucleatum, Prevotella nigrescens"],"correct":1,"explanation":"The 'red complex' (Socransky 1998) comprises Treponema denticola, Tannerella forsythia, and Porphyromonas gingivalis — strongly associated with severe chronic periodontitis and deep probing depths. The 'orange complex' (including Fusobacterium nucleatum, Prevotella intermedia) precedes colonisation by the red complex. A. actinomycetemcomitans is the key pathogen in Grade C periodontitis (formerly aggressive periodontitis)."},
    {"id":"perio_8","type":"sba","stem":"A patient with Stage III periodontitis is referred for non-surgical periodontal treatment. What is the primary objective of subgingival instrumentation (root surface debridement)?","options":["Complete elimination of all subgingival bacteria","Mechanically remove supra- and subgingival deposits and disrupting/removing the subgingival biofilm to allow resolution of inflammation","Smooth the root surface to prevent bacterial reattachment","Remove 1–2 mm of cementum to expose clean dentine","Eliminate periodontal pockets by removing soft tissue"],"correct":1,"explanation":"Root surface debridement (RSD) aims to mechanically remove plaque, calculus, and endotoxin-contaminated cementum to disrupt the subgingival biofilm, allowing the host immune response to resolve inflammation. Complete elimination of all bacteria is impossible and not the goal. The traditional concept of 'root planing' to produce a smooth, hard surface has been replaced by a more biologically focused approach that minimises unnecessary cementum removal. Inflamed pocket epithelium reattaches following biofilm disruption."},
    {"id":"perio_9","type":"sba","stem":"Following initial periodontal therapy, a patient is reassessed at 8 weeks. Several sites still show probing depths of 6–7 mm with bleeding on probing. Which factor most strongly predicts the need for surgical periodontal treatment?","options":["Patient age >50 years","Probing depth ≥6 mm remaining after cause-related therapy","Presence of Porphyromonas gingivalis in subgingival samples","Furcation Class I involvement","Radiographic bone loss in the apical third"],"correct":1,"explanation":"Residual probing depth ≥6 mm after completion of cause-related (non-surgical) therapy is the strongest predictor of the need for surgical intervention. Sites with persistent probing depths ≥6 mm have a significantly higher risk of continued disease progression. The BSP 2020 treatment pathway considers surgical access if sites ≥6 mm remain after 8–12 weeks following thorough non-surgical treatment and optimal patient compliance."},
    {"id":"perio_10","type":"sba","stem":"According to the BSP Implementation of the 2017 Classification (BSP 2020), which step in the pathway involves systemic antibiotics as an adjunct?","options":["Step 1 (education, risk factor modification, supragingival debridement)","Step 2 (cause-related therapy/RSD) — routinely in all Stage III/IV Grade C","Step 2 (cause-related therapy/RSD) — selectively in Stage III/IV Grade C with A. actinomycetemcomitans, following full-mouth debridement","Step 3 (surgical therapy)","Step 4 (supportive periodontal therapy)"],"correct":2,"explanation":"The BSP 2020 pathway suggests systemic antibiotics (amoxicillin 500 mg TDS + metronidazole 400 mg TDS for 7 days) as an adjunct to RSD in Step 2 for Stage III/IV Grade C patients, particularly those with A. actinomycetemcomitans infection or those under 35 years with rapid progression. Full-mouth debridement within 24–48 hours is recommended when antibiotics are used. Antibiotics are NOT routine for all periodontal patients and should not be used in Stage I/II."},
    {"id":"perio_11","type":"sba","stem":"A 50-year-old woman on regular periodontal supportive therapy presents with a localised acute swelling adjacent to a tooth with a 7 mm pocket. There is a fluctuant swelling, tenderness to percussion, and pus on probing. The tooth is vital. What is the diagnosis?","options":["Acute periapical abscess","Acute lateral periodontal abscess","Gingival abscess","Acute pericoronal abscess","Combined periodontic-endodontic lesion"],"correct":1,"explanation":"A lateral periodontal abscess is characterised by acute onset of pain, swelling, and pus in an established periodontal pocket of a vital tooth. The tooth is vital (differentiating it from a periapical abscess, which arises from a necrotic pulp). It is most common in patients with established periodontitis, in deep pockets where drainage is blocked. Management: drainage via the pocket or incision, RSD, irrigation; systemic antibiotics if systemic signs are present."},
    {"id":"perio_12","type":"sba","stem":"A 60-year-old man has bleeding on probing at 90% of sites, probing depths of 2–3 mm, and no clinical attachment loss on all radiographs. He is a non-smoker with well-controlled type 2 diabetes (HbA1c 52 mmol/mol). What is the most likely diagnosis according to 2017 classification?","options":["Periodontitis Stage I Grade B","Localised plaque-induced gingivitis on an intact periodontium","Generalised plaque-induced gingivitis on an intact periodontium","Non-plaque-induced gingival condition","Gingivitis modified by systemic condition (diabetes)"],"correct":2,"explanation":"Gingivitis is defined by gingival inflammation (bleeding on probing, erythema) in the absence of clinical attachment loss and radiographic bone loss. Since >10% of teeth are affected, it is classified as generalised. On an intact periodontium (no prior attachment loss), well-controlled diabetes (HbA1c <53 mmol/mol) is unlikely to be a major modifying factor. If >10% BOP but no CAL, the diagnosis is generalised gingivitis on an intact periodontium."},
    {"id":"perio_13","type":"sba","stem":"What is the most appropriate recall interval during supportive periodontal therapy (SPT) for a patient with Stage II Grade B periodontitis who is compliant and has a stable, healthy periodontal status?","options":["Every 3 months indefinitely","Every 6 months","Every 12 months","Every 18 months","No recall needed once the patient is stable"],"correct":1,"explanation":"For patients in SPT with stable periodontitis, 6-monthly recall intervals are appropriate for low-to-moderate risk patients with good compliance and oral hygiene. High-risk patients (heavy smokers, poorly controlled diabetes, Grade C, many remaining risk factors) may require 3-monthly recalls. The BSP SPT guidelines recommend risk-based recall using validated tools (e.g. DPSI or Lang & Tonetti risk assessment). Lifelong SPT is essential as periodontitis cannot be 'cured'."},
    {"id":"perio_14","type":"sba","stem":"A patient is on methotrexate for rheumatoid arthritis. Which aspect of the patient's periodontal management requires special consideration?","options":["Methotrexate has no effect on periodontal tissues","Methotrexate causes gingival enlargement requiring surgical gingivectomy","Methotrexate causes immunosuppression, increasing susceptibility to infection; systemic antibiotics should be considered more readily","Methotrexate prevents bone loss making periodontal surgery unnecessary","Methotrexate must be stopped before any periodontal instrumentation"],"correct":2,"explanation":"Methotrexate (and other immunosuppressive drugs) impair the host immune response, increasing susceptibility to infection and potentially altering the presentation of periodontal disease. In immunosuppressed patients, systemic antibiotics are considered more readily as an adjunct to periodontal treatment if infection signs are present. Regular dental monitoring and aggressive preventive care are essential. Gingival enlargement is associated with ciclosporin, not methotrexate."},
    {"id":"perio_15","type":"sba","stem":"A 35-year-old woman who is 20 weeks pregnant presents with a soft, red, pedunculated swelling of 1.5 cm on the upper labial gingiva that bleeds easily. What is this condition called and what is the first-line management?","options":["Peripheral giant cell granuloma — surgical excision immediately","Pregnancy epulis (pyogenic granuloma) — oral hygiene instruction and review post-partum","Hereditary gingival fibromatosis — gingivectomy","Kaposi's sarcoma — urgent oncology referral","Drug-induced gingival overgrowth — change medication"],"correct":1,"explanation":"Pregnancy epulis (pregnancy granuloma/pyogenic granuloma) occurs in up to 5% of pregnancies due to hormonal changes (oestrogen and progesterone) amplifying the gingival response to plaque. It typically presents in the second trimester. First-line management is oral hygiene instruction and plaque control. Many lesions regress spontaneously post-partum. Surgical excision during pregnancy should only be performed if the lesion is causing significant functional problems, with high recurrence if removed before delivery."},
    {"id":"perio_16","type":"sba","stem":"Which systemic condition is most significantly associated with necrotising periodontal disease in the 2017 classification, particularly in severe/recurrent cases?","options":["Type 1 diabetes","HIV infection/AIDS","Hypothyroidism","Rheumatoid arthritis","Coeliac disease"],"correct":1,"explanation":"HIV infection is the systemic condition most strongly associated with necrotising periodontal diseases (necrotising gingivitis, periodontitis, stomatitis). Necrotising periodontitis in HIV-positive patients can be rapidly destructive and may expose alveolar bone (necrotising stomatitis). The 2017 classification separates necrotising periodontal diseases as distinct from plaque-induced periodontitis. Management includes aggressive debridement, metronidazole, and antiretroviral therapy."},
    {"id":"perio_17","type":"sba","stem":"A 65-year-old patient has probing depths of 4–5 mm with horizontal bone loss and Grade 2 furcation involvement of the lower right first molar. According to the 2017 staging, what stage does the furcation involvement contribute to?","options":["Stage I (Class I furcation)","Stage II (Class I or II furcation)","Stage III (Class II furcation)","Stage IV (Class III furcation)","Furcation involvement does not influence staging"],"correct":2,"explanation":"In the 2017 World Workshop classification, furcation involvement contributes to staging complexity: Class I furcation = Stage II complexity; Class II furcation = Stage III complexity; Class III (through-and-through) furcation = Stage III/IV complexity. Grade 2 (Class II) furcation involvement is a Stage III complexity factor. This reflects the clinical challenge of treating and maintaining furcation-involved teeth."},
    {"id":"perio_18","type":"sba","stem":"According to HTM 01-05 (Health Technical Memorandum), a periodontal probe used on a patient with periodontitis is classified as which category of instrument requiring which level of decontamination?","options":["Non-critical — clean and disinfect only","Semi-critical — disinfect and high-level disinfection","Critical — must be decontaminated by sterilisation in a validated autoclave","Non-critical — single-use only","Semi-critical — sterilise only if visibly soiled"],"correct":2,"explanation":"HTM 01-05 classifies dental instruments using the Spaulding classification adapted for dentistry. A periodontal probe penetrates the gingival sulcus (contacts mucous membranes and blood), classifying it as a 'critical' instrument (highest risk). Critical instruments must be decontaminated by sterilisation (Class B or Class S validated autoclave) between patients. Single-use instruments may be used as an alternative."},
    {"id":"perio_19","type":"sba","stem":"Smoking has multiple effects on the periodontium. Which of the following is the most clinically important effect that may lead to UNDERESTIMATION of disease severity?","options":["Smoking causes xerostomia, concentrating oral bacteria","Smoking increases plaque accumulation","Smoking causes vasoconstriction, reducing bleeding on probing and masking clinical signs of inflammation","Smoking directly destroys collagen in the periodontal ligament","Smoking causes nicotine staining of teeth, obscuring calculus"],"correct":2,"explanation":"Nicotine causes vasoconstriction and impairs the vascular response to inflammation, significantly reducing or abolishing bleeding on probing (BOP). This means smokers have lower BOP despite equal or worse underlying periodontal disease. Clinicians may underestimate disease severity if they rely on BOP alone. Smokers with periodontitis may have deeper pockets, more bone loss, and worse prognosis than non-smokers with equivalent clinical signs."},
    {"id":"perio_20","type":"sba","stem":"A 52-year-old man has severe periodontitis (Stage III Grade C) with HbA1c 86 mmol/mol (poorly controlled type 2 diabetes). Which statement about the periodontitis-diabetes relationship is most accurate?","options":["Diabetes does not affect the severity of periodontitis","Severe periodontitis may worsen glycaemic control through systemic inflammatory mechanisms; treating periodontitis may improve HbA1c","Poorly controlled diabetes prevents any improvement following periodontal treatment","Patients with diabetes should not receive periodontal treatment","There is no bidirectional relationship between periodontitis and diabetes"],"correct":1,"explanation":"There is a well-established bidirectional relationship between periodontitis and diabetes. Poorly controlled diabetes exacerbates periodontitis through impaired neutrophil function, advanced glycation end products (AGEs), and enhanced inflammatory cytokine production. Conversely, chronic periodontal infection increases systemic inflammation, worsening insulin resistance and glycaemic control. Meta-analyses show that successful periodontal treatment is associated with a modest reduction in HbA1c (~0.4%)."},
    {"id":"perio_21","type":"sba","stem":"A 40-year-old woman has an endodontically treated lower molar with a deep isolated probing depth of 9 mm on the distal surface with a 'J-shaped' bone defect on radiograph. All other teeth have probing depths of ≤3 mm and the BOP is 10%. What is the most likely diagnosis?","options":["Localised Stage III Grade B periodontitis","Periapical pathology","Vertical root fracture","Combined periodontic-endodontic lesion with endo origin","Primary endo-secondary perio lesion requiring RCT then review"],"correct":2,"explanation":"A vertical root fracture (VRF) characteristically presents with an isolated, narrow, deep probe depth (often described as 'J-shaped' or circumferential bone defect) on an endodontically treated tooth. Other teeth are periodontally healthy. VRF is the most common complication of endodontically treated teeth and mimics isolated periodontitis. Diagnosis is aided by CBCT (showing cortical bone loss) or direct visualisation during extraction/surgery. The tooth typically requires extraction."},
    {"id":"perio_22","type":"sba","stem":"A 28-year-old non-smoking woman has isolated gingival recession on the labial surface of the lower right canine. There is no bone loss on the adjacent teeth. The recession is 3 mm and there is adequate attached gingiva. The tooth is not hypersensitive. According to the Miller-Cairo classification (2018), this is a recession type RT1. What is the initial management?","options":["Immediate connective tissue graft surgery","Coronally advanced flap with connective tissue graft","Oral hygiene instruction, toothbrushing technique modification, and monitoring","Refer for orthodontic correction of the position","Free gingival graft"],"correct":2,"explanation":"Cairo RT1 recession (formerly Miller Class I/II — no bone or soft tissue loss interproximally) has 100% root coverage potential with surgery. However, before surgery, the cause must be addressed: traumatic toothbrushing technique is the most common cause in young non-smokers. The first step is oral hygiene instruction and correct toothbrushing technique (low-force, Bass technique). Surgery is indicated if recession progresses despite optimal oral hygiene or if the patient requests aesthetic improvement."},
    {"id":"perio_23","type":"sba","stem":"Which of the following is the most predictable mucogingival surgical technique for achieving complete root coverage of an RT1 recession on a single tooth?","options":["Free gingival graft","Semilunar flap","Connective tissue graft with coronally advanced flap (CAF)","Envelope flap alone","Laterally positioned flap"],"correct":2,"explanation":"A connective tissue graft (CTG) combined with a coronally advanced flap (CAF) is the gold-standard technique for achieving complete root coverage, with the highest predictability and most stable long-term outcomes for single and multiple recession defects. The CTG provides additional tissue volume and vascularity. The CAF repositions the gingival margin coronally over the graft. Free gingival grafts increase the width of keratinised tissue but are less effective for complete coverage due to poor aesthetics and contraction."},
    {"id":"perio_24","type":"sba","stem":"A patient is on warfarin (INR 2.6) and requires subgingival debridement (root surface debridement) for Stage II periodontitis. How should this be managed?","options":["Withhold warfarin for 3 days before treatment","Proceed with debridement without modification; local haemostatic measures as needed","Admit to hospital for treatment under medical supervision","Prescribe vitamin K supplements pre-operatively","Limit treatment to supragingival scaling only, never subgingival"],"correct":1,"explanation":"Subgingival debridement is not a surgical procedure and is associated with only minor bleeding risk. SDCEP guidance states that patients on stable anticoagulants (INR ≤4.0 for warfarin) can undergo non-surgical periodontal treatment (scaling and RSD) in primary care without interrupting anticoagulation. Local haemostatic measures (pressure packs, oxidised cellulose) should be available. There is no need to withhold anticoagulants for non-surgical periodontal therapy."},
    {"id":"perio_25","type":"sba","stem":"A 55-year-old man presents with gingival recession of 4–5 mm and root sensitivity on multiple upper and lower front teeth. His oral hygiene is good, with BOP of 15%. He brushes vigorously with a hard-bristle toothbrush. There is no bone loss or attachment loss relative to healthy peers. What is the most likely cause?","options":["Stage III Grade B periodontitis","Aggressive periodontitis","Abrasion and recession from traumatic toothbrushing (non-plaque-induced gingival recession)","Mucous membrane pemphigoid","Chemotherapy-induced mucositis"],"correct":2,"explanation":"Toothbrushing-associated (traumatic) recession is caused by excessive lateral force, hard-bristle brushes, and abrasive technique, producing recession on labial surfaces without bone loss or significant attachment loss relative to age-matched norms. Good oral hygiene with low BOP supports a non-plaque-induced aetiology. Management: modify brushing technique to a gentle Bass/roll technique with a soft-bristle toothbrush; consider recession coverage surgery if the patient is symptomatic or concerned aesthetically."},
    {"id":"perio_26","type":"sba","stem":"A furcation probe examination of the lower left first molar reveals that the probe penetrates 4 mm horizontally into the furcation but does not pass through. According to Hamp et al. classification, what grade of furcation involvement is this?","options":["Grade I (horizontal probing depth ≤3 mm)","Grade II (horizontal probing depth >3 mm but not through-and-through)","Grade III (through-and-through)","Grade IV (through-and-through with clinical crown-to-root ratio compromise)","Not classifiable without radiographs"],"correct":1,"explanation":"Hamp et al. (1975) classification: Grade I = horizontal attachment loss ≤3 mm; Grade II = horizontal attachment loss >3 mm but not through-and-through; Grade III = through-and-through (probe passes from buccal to lingual). Grade II furcation involvement represents incomplete involvement that is still potentially manageable with surgical procedures (furcation plasty, tunnel preparation). Grade III (through-and-through) is a Stage III complexity factor and may indicate extraction or root resection."},
    {"id":"perio_27","type":"sba","stem":"A patient asks about the role of adjunctive use of locally delivered antibiotics (e.g. minocycline microspheres) in periodontal treatment. Which statement is most accurate according to current evidence?","options":["Locally delivered antibiotics routinely replace mechanical debridement in periodontitis","Locally delivered antibiotics provide a clinically significant benefit as an adjunct to RSD at sites with persistent pocketing ≥5 mm","Locally delivered antibiotics have no evidence base and should not be used","Locally delivered antibiotics are first-line monotherapy for Stage III periodontitis","Locally delivered antibiotics completely eliminate the need for systemic antibiotics"],"correct":1,"explanation":"Locally delivered antibiotics (minocycline microspheres, doxycycline gel, metronidazole gel) provide an additional modest clinical benefit as adjuncts to RSD at sites with residual pockets ≥5 mm that have not responded to mechanical treatment alone. Meta-analyses show small additional reductions in probing depth (~0.3 mm). They are not a substitute for mechanical debridement, and their use should be selective, not routine. Resistance concerns exist with routine use."},
    {"id":"perio_28","type":"sba","stem":"A 48-year-old woman presents with peri-implant inflammation. Probing around the implant reveals 5 mm pocketing with BOP and suppuration, and radiographic evidence of bone loss of 3 mm beyond the expected remodelling (>2 mm). What is the diagnosis?","options":["Peri-implant mucositis","Peri-implantitis","Normal post-surgical healing","Retrograde peri-implantitis","Implant failure from loading"],"correct":1,"explanation":"Peri-implantitis is defined as a plaque-associated pathological condition around dental implants characterised by inflammation in the peri-implant mucosa AND progressive bone loss beyond the expected initial biological remodelling (>2 mm or >25% bone loss). It differs from peri-implant mucositis (which is reversible inflammation confined to the soft tissues, without bone loss). Peri-implantitis requires active treatment: debridement, antiseptic irrigation, and potentially surgical intervention."},
    {"id":"perio_29","type":"sba","stem":"Which of the following is the most important modifiable risk factor for peri-implantitis?","options":["Age over 60","Implant surface texture","History of periodontitis and poor plaque control","Implant diameter less than 4 mm","Titanium alloy composition"],"correct":2,"explanation":"History of periodontitis and poor plaque control are the strongest modifiable risk factors for peri-implantitis. Patients with a history of Stage III/IV periodontitis have 3–4 times higher risk of peri-implantitis. Smoking, poorly controlled diabetes, and poor oral hygiene are also significant risk factors. Implants should generally not be placed in patients with untreated active periodontitis or poor plaque control, as the same pathogens colonise peri-implant sites."},
    {"id":"perio_30","type":"sba","stem":"During a routine examination, you detect a probing depth of 4 mm on the mesial of an upper second premolar. A periapical radiograph shows approximately 15% bone loss. The tooth is vital and not tender to percussion. What is the most appropriate next step?","options":["Extract the tooth immediately","Commence root canal treatment","Prescribe amoxicillin and review in 2 weeks","Record a full periodontal chart and assess for the presence of periodontitis","Apply periodontal dressing and review in 4 weeks"],"correct":3,"explanation":"A single probing measurement does not confirm a diagnosis of periodontitis. The first step is to complete a full periodontal chart (BPE or 6-point pocket chart) to determine the extent and severity of the condition, and to assess for clinical attachment loss. Radiographic bone loss must be interpreted with CAL measurements to stage periodontitis. No treatment should be initiated before a comprehensive periodontal assessment is complete."},
    {"id":"perio_31","type":"sba","stem":"The Basic Periodontal Examination (BPE) is a screening tool. A BPE score of 3 in a sextant indicates which clinical finding?","options":["No pocket, no bleeding, no calculus","Bleeding on probing only","Calculus or overhanging margins, pockets ≤3.5 mm","Pocket of 4–5 mm (black band partially visible)","Pocket of ≥6 mm (black band disappears into pocket)"],"correct":2,"explanation":"BPE scores: 0 = healthy, 1 = BOP only, 2 = supra/subgingival calculus or plaque retentive factors (pocket ≤3.5 mm), 3 = pocket 4–5 mm (black band partially visible 3.5–5.5 mm from tip), 4 = pocket ≥6 mm (black band disappears), * = furcation involvement. Score 3 should prompt a full 6-point pocket chart of the affected sextant. Score 4 or * anywhere requires a full-mouth 6-point chart and periodontal assessment."},
    {"id":"perio_32","type":"sba","stem":"A 45-year-old woman presents for review after 3 months of periodontal treatment. Her plaque score has fallen from 80% to 15% and BOP from 60% to 18%. Probing depths are 3–5 mm at remaining sites. What is the next most appropriate step in the BSP 2020 treatment pathway?","options":["Immediately proceed to surgical therapy","Re-assess at 8–12 weeks and if sites ≥6 mm remain, consider surgical referral; otherwise enrol in supportive periodontal therapy","Prescribe 3-month course of doxycycline","Re-start non-surgical debridement from the beginning","Discharge to the GDP for routine care"],"correct":1,"explanation":"The BSP 2020 pathway re-evaluates 8–12 weeks after Step 2 (cause-related therapy). At re-evaluation: if sites ≥6 mm persist despite optimal OHI and debridement, refer for Step 3 (surgical therapy). If the patient achieves a probing depth of <6 mm at all sites with BOP <10%, they should be enrolled in Step 4 (supportive periodontal therapy, SPT). BOP of 18% and maximum PD 5 mm suggest a good response — enrolment in SPT is appropriate."},
    {"id":"perio_33","type":"sba","stem":"A 58-year-old man has a periodontitis-associated infrabony defect (3-wall defect, 5 mm depth) at the mesial of the upper left first molar. Which regenerative technique has the best evidence for clinical attachment gain in this scenario?","options":["Guided tissue regeneration with resorbable membrane alone","Enamel matrix derivative (Emdogain) alone","A combination of bone graft and resorbable collagen membrane","Any approach — they are all equivalent","Coronally advanced flap without regenerative material"],"correct":2,"explanation":"For deep (≥5 mm) infrabony defects, the combination of a bone substitute graft and a resorbable collagen membrane provides superior clinical attachment gain compared to either alone or open flap debridement alone. Enamel matrix derivative is also effective for deep 2- and 3-wall defects. Meta-analyses support regenerative procedures for deep intraosseous defects, achieving mean CAL gains of 2–5 mm. Patient compliance and plaque control are prerequisites for successful regeneration."},
    {"id":"perio_34","type":"sba","stem":"A 42-year-old woman with a gummy smile and short clinical crowns is referred for periodontal surgery before restorative treatment. The teeth are of adequate length histologically but the gingival margin is coronally displaced. What surgical procedure is indicated to improve crown length before restorations?","options":["Gingivectomy alone if there is adequate attached gingiva and bone crest is in correct position","Apically repositioned flap with osseous surgery if the bone crest needs repositioning","Crown lengthening with flap and osseous recontouring is needed regardless of bone position","Orthodontic intrusion only","Free gingival graft"],"correct":0,"explanation":"Surgical crown lengthening increases the clinical crown length to achieve the biological width (approximately 2 mm of junctional epithelium and connective tissue attachment above the bone crest). If there is adequate attached gingiva and the bone crest is ≥3 mm below the CEJ, gingivectomy (external bevel) removes excess soft tissue. If the bone crest is too coronal (<3 mm from CEJ), osseous surgery combined with an apically repositioned flap is needed to re-establish the biological width."},
    {"id":"perio_35","type":"sba","stem":"A 25-year-old woman has a persistent shallow pocket (3 mm) with BOP at the distal of an upper canine. There is 1 mm of Clinical Attachment Loss confined to that single site, with corresponding radiographic change. All other teeth are periodontally healthy. According to the 2017 classification, how should this isolated finding be interpreted?","options":["Stage I periodontitis","Staging requires ≥2 non-adjacent teeth","Periodontitis Stage I (single tooth, CAL with BOP confirmed)","This is within normal variation — no diagnosis of periodontitis","Gingivitis with pseudo-pocketing"],"correct":2,"explanation":"The 2017 classification requires that the diagnosis of periodontitis be made when there is measurable CAL at ≥2 non-adjacent teeth, OR when there is a single tooth with ≥2 interproximal surfaces showing CAL. This isolated single-site single-surface finding does not meet the threshold for periodontitis — it may represent attachment loss from a non-periodontitis cause (e.g. trauma, false pocket from gingival enlargement). Further monitoring and assessment are needed."},
    {"id":"perio_36","type":"sba","stem":"Which statement most accurately describes the relationship between cardiovascular disease and periodontitis?","options":["There is a proven direct causal link: treating periodontitis reduces myocardial infarction risk","Periodontitis is associated with increased cardiovascular risk through shared risk factors (smoking, diabetes) and systemic inflammatory mechanisms, but causality is not established","Periodontitis has no relationship with cardiovascular disease","Only Porphyromonas gingivalis bacteraemia causes cardiovascular disease","Only patients with existing valvular disease are at increased cardiovascular risk from periodontitis"],"correct":1,"explanation":"Multiple large epidemiological studies show associations between periodontitis and coronary artery disease, stroke, and cardiovascular events. Proposed mechanisms include periodontal bacteria causing systemic inflammation (elevated CRP, IL-6, fibrinogen), direct bacteraemia causing atheromatous plaque formation, and shared risk factors (smoking, diabetes, obesity). However, randomised controlled trials have not conclusively demonstrated that treating periodontitis reduces cardiovascular events, so an independent causal link is not proven."},
    {"id":"perio_37","type":"sba","stem":"During new patient assessment, a 50-year-old woman has widespread gingival inflammation, PDs of 5–6 mm, and CAL of 3–4 mm. She is on phenytoin for epilepsy. Which component of her gingival/periodontal condition is most attributable to phenytoin?","options":["The bone loss is phenytoin-induced","The gingival inflammation is entirely phenytoin-induced","The gingival overgrowth is phenytoin-induced, acting synergistically with plaque-induced inflammation","Phenytoin directly causes CAL","Phenytoin causes deep pocketing without gingival overgrowth"],"correct":2,"explanation":"Phenytoin causes gingival overgrowth (fibrous hyperplasia) through increased fibroblast collagen production. This overgrowth creates pseudo-pocketing and inflammation, but the true loss of attachment (CAL and bone loss) is due to plaque-induced periodontitis. Plaque accumulation in the enlarged tissues exacerbates the gingival enlargement — hence the synergy. Management: optimise oral hygiene, request medication review, and if overgrowth persists, surgical gingivectomy."},
    {"id":"perio_38","type":"sba","stem":"A dentist provides root surface debridement (RSD) for a periodontal patient. Which instrument is most efficient for removing heavy subgingival calculus in a deep (8 mm) pocket?","options":["Gracey curettes 5/6","Gracey curettes 13/14 or 15/16 for posterior teeth","Sickle scalers","Ultrasonic scaler with slim subgingival tip","A standard periodontal probe"],"correct":3,"explanation":"Ultrasonic scalers (piezoelectric or magnetostrictive) with slim subgingival inserts/tips are the most efficient instruments for removing calculus in deep pockets, as their slender profile allows better access to the base of deep pockets while the acoustic streaming and cavitation provide irrigation and bacterial disruption. Gracey curettes 13/14 are area-specific for posterior mesial surfaces and 15/16 for posterior distal — appropriate for manual instrumentation. Both manual and ultrasonic approaches are recommended, often combined."},
