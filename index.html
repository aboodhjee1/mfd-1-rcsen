    {"id":"perio_39","type":"sba","stem":"A 55-year-old woman presents with a widened periodontal ligament space on OPG around several posterior teeth. Clinically there are wear facets, flat posterior occlusal surfaces, and the patient reports jaw pain and headaches on waking. What is the most likely cause of the widened PDL space?","options":["Advanced periodontitis with bone loss","Traumatic occlusion from nocturnal bruxism causing occlusal trauma","Periapical pathology of all affected teeth","Hypercementosis","Systemic hypermobility syndrome"],"correct":1,"explanation":"Parafunctional habits (bruxism/clenching) cause primary occlusal trauma characterised by widening of the PDL space, flattening of the alveolar crest, loss of the lamina dura, and hypercementosis on radiographs. Clinical signs include tooth wear, fracture lines, and muscle tenderness. Primary occlusal trauma (in the absence of periodontitis) causes increased tooth mobility but does NOT cause attachment loss. Management: occlusal splint, stress management, periodontal treatment if concurrent periodontitis."},
    {"id":"perio_40","type":"sba","stem":"A 60-year-old man is in supportive periodontal therapy following Stage III Grade C periodontitis treatment. At review, he has 3 sites with probing depths of 6–7 mm with BOP and no suppuration. All other sites are ≤4 mm with 8% BOP. What is the most appropriate management of the remaining sites?","options":["Prescribe systemic antibiotics immediately","No further treatment — enrol in 6-monthly recall","Repeat full-mouth root surface debridement of the affected sites","Refer to a periodontist for surgical assessment of the residual pockets","Extract all teeth with residual probing depths"],"correct":2,"explanation":"In SPT, sites with residual pockets ≥6 mm or recurrent BOP should be re-instrumented (repeat RSD). If pockets persist ≥6 mm after repeated optimal non-surgical treatment, surgical referral is appropriate. In this scenario — 3 sites with 6–7 mm PD with BOP, the appropriate first step is repeat targeted RSD of those specific sites, rather than immediate surgical referral. The overall periodontal stability of the rest of the mouth is reassuring."},
    {"id":"perio_41","type":"sba","stem":"A 70-year-old woman has Stage III Grade B periodontitis and requires extraction of two hopeless teeth and full-mouth rehabilitation with implants. What is the correct sequence of treatment?","options":["Extract hopeless teeth, place implants immediately, then provide periodontal treatment","Periodontal treatment first (achieve stable periodontium), then implant placement and prosthetic rehabilitation","Place implants first to maintain space, then provide periodontal treatment","Provide prosthetic rehabilitation, extract failing teeth last","No fixed sequence is required"],"correct":1,"explanation":"The correct sequence is: treat the periodontal disease first (Steps 1–3 of BSP pathway), achieve a stable healthy periodontium with BOP <10% and PD <5 mm, then extract hopeless teeth if not done during periodontal therapy, and only then place implants. Placing implants into an actively infected, inflamed periodontium dramatically increases the risk of peri-implantitis. A minimum of 3–6 months of stable periodontium is generally recommended before implant placement."},
    {"id":"perio_42","type":"sba","stem":"A 38-year-old woman has received comprehensive non-surgical periodontal therapy 3 months ago. At re-assessment, the clinical attachment level has improved by 1–2 mm at most sites with significant BOP reduction. Which biological mechanism is responsible for this apparent CAL gain?","options":["True periodontal regeneration with new cementum, PDL, and bone","Gingival recession masking clinical pocket depth","Long junctional epithelium formation (repair, not regeneration)","Osseous fill of infrabony defects","Reduction in connective tissue inflammation reducing probing resistance"],"correct":2,"explanation":"Following non-surgical periodontal treatment, the apparent CAL gain (pocket depth reduction) is primarily due to resolution of tissue oedema, gingival recession, and formation of a long junctional epithelium (LJE) — a repair process rather than true periodontal regeneration. LJE forms when the epithelium migrates down the root surface, providing attachment without new cementum or PDL. True regeneration (new cementum, PDL, bone) requires surgical approaches with regenerative materials."},
    {"id":"perio_43","type":"sba","stem":"The BSP Implementation of the 2017 Classification recommends chlorhexidine (CHX) 0.2% mouthwash as an adjunct in which specific periodontal scenario?","options":["As routine daily rinse for all periodontal patients indefinitely","During the initial hygiene phase (Step 1) for all patients","As a short-term adjunct for 4–6 weeks post-surgery or for acute necrotising conditions, not for long-term use","As a replacement for toothbrushing in patients with dexterity problems","As first-line treatment instead of mechanical debridement"],"correct":2,"explanation":"Chlorhexidine 0.2% (or 0.12%) mouthwash is recommended as a short-term adjunct, particularly post-surgical or for acute conditions (ANUG, pericoronitis). Long-term daily use is NOT recommended because it causes tooth staining, taste disturbance, calculus formation, and does not provide significant additional benefit over mechanical plaque control for chronic periodontitis. The SDCEP and BSP guidelines specifically caution against long-term use."},
    {"id":"perio_44","type":"sba","stem":"A 50-year-old man has a 6 mm infrabony defect at the mesial of the upper left first molar on CBCT. The defect is 3-walled. He is a non-smoker with good plaque control. What is the most appropriate surgical intervention?","options":["Extraction of the tooth","Open flap debridement (OFD) alone","Guided tissue regeneration (GTR) with resorbable membrane and bone graft","Free gingival graft","Tunnel preparation"],"correct":2,"explanation":"Deep 3-wall infrabony defects (≥3 mm depth) have the best response to regenerative periodontal surgery. GTR using a resorbable membrane (e.g. collagen) with a bone graft substitute provides superior clinical attachment gain compared to OFD alone. Enamel matrix derivative (Emdogain) is an alternative for 2- and 3-wall defects. Non-smoking status and good plaque control are important prerequisites that make this patient a good candidate for regeneration."},
    {"id":"perio_45","type":"sba","stem":"According to the 2017 classification, 'gingival recession associated with root surface exposure' is now considered a form of what condition?","options":["A type of periodontitis","A non-plaque-induced gingival condition","Peri-implant mucositis","A periodontal health condition at a periodontitis patient","Non-periodontitis condition — recession without attachment loss"],"correct":3,"explanation":"The 2017 classification introduced the concept of 'periodontal health on a reduced periodontium' for patients who have successfully treated periodontitis but retain reduced but stable attachment levels. Recession in these patients represents attachment that was previously lost to periodontitis. It is important to distinguish this from recession in a patient who never had periodontitis. The clinical implications differ: recession in a periodontitis patient carries different risk and management considerations."},
    {"id":"perio_46","type":"sba","stem":"A 35-year-old woman is referred with Grade C periodontitis. She is a non-smoker, HbA1c is normal. Familial aggregation is noted (her mother lost all teeth by age 45). What adjunctive therapy is most likely to benefit her at Step 2 of the BSP pathway?","options":["Topical doxycycline gel only","Full-mouth RSD alone without adjuncts","Systemic amoxicillin 500 mg TDS + metronidazole 400 mg TDS for 7 days as adjunct to full-mouth debridement","Systemic prednisolone 30 mg OD for 2 weeks","Long-term subantimicrobial doxycycline 20 mg BD"],"correct":2,"explanation":"For Stage III/IV Grade C periodontitis (especially in younger patients with rapid progression, A. actinomycetemcomitans association, or familial aggregation), the BSP 2020 pathway recommends systemic amoxicillin 500 mg TDS + metronidazole 400 mg TDS for 7 days as an adjunct to full-mouth RSD at Step 2. This combination is effective against A. actinomycetemcomitans. Full-mouth debridement should be completed within 24–48 hours and antibiotics started at the start of or just before completion."},
    {"id":"perio_47","type":"sba","stem":"A 62-year-old man has an endodontically treated lower first molar that has developed a 9 mm pocket on the mesial, with no bone loss on the other three surfaces. He has no other periodontitis. The tooth was root-treated 10 years ago. What is the most likely diagnosis?","options":["Primary periodontitis at this tooth","Periapical re-infection from failed RCT","Vertical root fracture","Combined endo-perio lesion","Cemento-osseous dysplasia"],"correct":2,"explanation":"An isolated deep pocket on a single surface of an endodontically treated tooth, in the absence of generalised periodontitis, strongly suggests vertical root fracture (VRF). VRF classically produces a narrow, isolated, 'J-shaped' or sinus-type bone defect on radiograph. The tooth is often tender to biting. CBCT can show cortical bone loss adjacent to the fracture line. Treatment is usually extraction; prognosis with attempted root resection is poor."},
    {"id":"perio_48","type":"sba","stem":"Which statement best describes the role of Interleukin-1β (IL-1β) in the pathogenesis of periodontitis?","options":["IL-1β directly destroys collagen in the PDL without cellular mediation","IL-1β is a key pro-inflammatory cytokine produced by macrophages and fibroblasts that stimulates osteoclastogenesis and matrix metalloproteinase (MMP) production, driving bone resorption and tissue destruction","IL-1β prevents bone loss by stimulating osteoblast activity","IL-1β is produced exclusively by Porphyromonas gingivalis","IL-1β is only relevant in primary herpetic gingivostomatitis"],"correct":1,"explanation":"IL-1β is one of the most important pro-inflammatory mediators in periodontitis pathogenesis. Produced by host macrophages, monocytes, and fibroblasts in response to bacterial LPS, it stimulates osteoclast differentiation (via RANKL upregulation) leading to alveolar bone resorption, and induces fibroblasts to produce matrix metalloproteinases (collagenase) that degrade the collagen of the PDL and gingival connective tissues. Genetic polymorphisms in the IL-1 gene cluster are associated with increased periodontitis susceptibility."},
    {"id":"perio_49","type":"sba","stem":"A 48-year-old woman reports that her lower front teeth have become increasingly spaced over the past 2 years. She has no previous orthodontic treatment. Examination shows generalised recession, pocketing of 6–7 mm, and labial flaring of the lower incisors. What is the most likely cause of the drifting?","options":["Bruxism","Lip incompetence","Loss of posterior support with anterior migration due to periodontal bone loss","Age-related tooth wear","Dentoalveolar trauma"],"correct":2,"explanation":"Pathological migration of anterior teeth is a characteristic feature of severe periodontitis. Loss of periodontal support (bone, PDL) combined with loss of posterior occlusal support leads to anterior displacement under lip and tongue pressure. The labial flaring and spacing of lower incisors ('fanning') is highly characteristic of Stage IV periodontitis with masticatory dysfunction. This is also a cause of significant aesthetic concern and is a key Stage IV complexity factor."},
    {"id":"perio_50","type":"sba","stem":"A patient is diagnosed with periodontal-endodontic lesion. The pocket communicates with a periapical pathosis. The tooth has a vital pulp on EPT. What is the most appropriate management sequence?","options":["Root canal treatment first, then periodontal treatment after 3 months","Extraction immediately","Periodontal treatment first, then reassess the periapical status","Combined simultaneous periodontal and endodontic treatment","Prescribe antibiotics and monitor for 6 months"],"correct":2,"explanation":"When the pulp is vital, the primary cause is periodontal (plaque-induced). The management is periodontal treatment first (thorough RSD and possibly surgery), then reassess the periapical status after 3–6 months. In true combined endo-perio lesions with a necrotic pulp and deep pockets, both periodontal and endodontic treatment are required, typically starting with RCT. The sequence depends on whether the pulp is vital or necrotic and the primary aetiology."},
    {"id":"perio_51","type":"sba","stem":"A 58-year-old man is referred by his cardiologist following a myocardial infarction (MI) and is due to start cardiac rehabilitation. He has Stage III Grade B periodontitis. He is on aspirin 75 mg and clopidogrel 75 mg (dual antiplatelet therapy). What is the most appropriate approach to periodontal treatment?","options":["Postpone all treatment for 12 months post-MI","Proceed with non-surgical periodontal treatment; do not stop dual antiplatelet therapy without cardiology advice","Stop both antiplatelet drugs 5 days before treatment","Refer for all treatment to be done in hospital","Prescribe aspirin mouthwash as an adjunct"],"correct":1,"explanation":"Dual antiplatelet therapy must NOT be stopped for routine dental/periodontal treatment as the risk of stent thrombosis or recurrent MI is very high. Non-surgical periodontal treatment (scaling/RSD) can proceed with dual antiplatelet therapy in place; use local haemostatic measures. The cardiologist should always be consulted before stopping any antiplatelet or anticoagulant medication. Active periodontal disease may increase systemic inflammatory burden and should be treated for overall cardiovascular health."},
    {"id":"perio_52","type":"sba","stem":"A 42-year-old woman who is 16 weeks pregnant presents for periodontal treatment. She has Stage II Grade B periodontitis with pocketing up to 5 mm. What is the appropriate management?","options":["Defer all periodontal treatment until after delivery","Non-surgical periodontal treatment (RSD) is safe and indicated in the second trimester","Prescribe amoxicillin and metronidazole and defer instrumentation","Treat in the third trimester only","Immediate periodontal surgery referral to prevent adverse birth outcomes"],"correct":1,"explanation":"Periodontal treatment is safe and indicated during pregnancy. The second trimester (weeks 14–28) is the safest time for dental treatment: organogenesis is complete, the risk of spontaneous abortion is lower than the first trimester, and the patient is not yet uncomfortable in the dental chair as in the third trimester. Non-surgical RSD should be performed. Some evidence suggests a link between severe periodontitis and adverse birth outcomes (preterm birth, low birth weight), further supporting treatment during pregnancy."},
    {"id":"perio_53","type":"sba","stem":"A systematic review reveals that chlorhexidine 0.2% mouthwash reduces plaque scores by 50–55% and gingivitis by 45% when used as an adjunct to brushing. Why is it still not recommended for long-term daily use in periodontal maintenance?","options":["It causes systemic antibiotic resistance","It damages gingival epithelium irreversibly","Side effects (staining, taste disruption, calculus formation) and limited additional benefit over mechanical plaque control outweigh long-term use in stable patients","It is ineffective against the red complex bacteria","It precipitates chlorhexidine-induced periodontal destruction in Stage III patients"],"correct":2,"explanation":"Chlorhexidine's adverse effects with long-term daily use include extrinsic tooth and tongue staining, dysgeusia (taste disturbance), enhanced supragingival calculus formation, and mucosal desquamation at higher concentrations. Meta-analyses confirm its short-term (4–6 week) effectiveness, particularly post-surgical or during acute conditions. However, for chronic long-term use, the side effects and limited additional benefit over meticulous mechanical plaque control mean it is not routinely recommended by BSP or SDCEP guidelines."},
    {"id":"perio_54","type":"sba","stem":"A patient with Stage IV Grade C periodontitis achieves a stable dentition after comprehensive treatment. The BOP is 12%, all PDs are ≤4 mm, and teeth are no longer mobile. However, 4 teeth have been extracted. What is the classification of the patient's periodontal health status at their next SPT review?","options":["Periodontal health on an intact periodontium","Periodontal health on a reduced but stable periodontium","Active periodontitis","Gingivitis on a reduced periodontium","No classification possible after tooth loss"],"correct":1,"explanation":"The 2017 classification introduced 'periodontal health on a reduced periodontium' to describe patients with successfully treated periodontitis who maintain stable attachment levels, even though those levels are reduced compared to the ideal. A BOP <10%, no PD ≥4 mm with BOP, and no active bone loss over time indicate stable disease. This status requires ongoing SPT — it does not represent resolution, and the risk of recurrence remains if risk factors persist."},
    {"id":"perio_55","type":"sba","stem":"Which radiographic bone pattern is most characteristic of plaque-induced periodontitis?","options":["Horizontal bone loss affecting the alveolar crest uniformly","Vertical (angular) bone loss at isolated sites without horizontal loss","Mixed horizontal and vertical bone loss patterns","Periapical bone loss only","Generalised root resorption with diffuse bone destruction"],"correct":0,"explanation":"Horizontal bone loss (loss of alveolar crest height evenly between adjacent teeth) is the most common pattern in generalised plaque-induced periodontitis, resulting from diffuse inflammation. Vertical (angular) bone loss creates infrabony defects and tends to occur at isolated sites with more severe local disease, frequently associated with heavy calculus deposits or narrow periodontitis lesions. Both patterns can coexist. Radiographic assessment should always be interpreted alongside clinical measurements."},
    {"id":"perio_56","type":"sba","stem":"A patient on periodontal recall has a BOP of 22% at their review, compared to 8% at their previous review 6 months ago. The probing depths have not changed. What does this increase in BOP suggest?","options":["The patient has developed new periodontitis","The probing depths are unreliable and must be remeasured","There is increased gingival inflammation, likely due to deterioration in plaque control, which may precede attachment loss","This is a normal variation and requires no action","The patient may be taking a new medication causing gingival bleeding"],"correct":2,"explanation":"Bleeding on probing (BOP) is the most sensitive early indicator of peri-implant or gingival inflammation. A BOP of >10% at a single review or an increase from a previous low level suggests deteriorating plaque control and increased gingival inflammation. While BOP alone does not diagnose periodontitis (which requires CAL), persistently elevated BOP (>25%) is a predictor of attachment loss. The immediate action is to reassess and intensify oral hygiene instruction."},
    {"id":"perio_57","type":"sba","stem":"A 32-year-old non-smoking man of Afro-Caribbean origin has rapidly progressive bone loss affecting first molars and incisors disproportionate to plaque. Testing confirms A. actinomycetemcomitans. He is started on systemic amoxicillin + metronidazole. Why is this antibiotic combination used rather than just metronidazole alone?","options":["Amoxicillin alone is sufficient; metronidazole adds no benefit","The combination provides synergistic coverage of both Aa (which may be resistant to metronidazole) and anaerobes","Metronidazole is contraindicated in young patients","Amoxicillin alone covers all periodontal pathogens","Metronidazole alone covers Aa effectively; amoxicillin adds only for Gram-positive cocci"],"correct":1,"explanation":"A. actinomycetemcomitans can invade the gingival tissues, making it less susceptible to metronidazole alone (which is primarily active against strict anaerobes and tissue-invasive organisms). Amoxicillin has good activity against Aa (a facultative anaerobe). Metronidazole provides excellent coverage of the strict anaerobic red/orange complex organisms. The combination thus provides comprehensive synergistic coverage of both aerobic and anaerobic periodontal pathogens. This is the most evidence-based antibiotic combination for Grade C periodontitis."},
    {"id":"perio_58","type":"sba","stem":"A 55-year-old woman with a history of successfully treated Stage III Grade B periodontitis is reviewed in SPT. Her blood pressure is found to be 172/98 mmHg on repeated measurements. She is not aware of a hypertension diagnosis. What is the most appropriate action?","options":["Prescribe antihypertensives immediately","No action; elevated BP is not within the dental scope of practice","Record the finding, advise the patient to contact her GP urgently, and proceed with non-urgent dental treatment if the procedure is straightforward","Cancel the appointment and defer all dental treatment indefinitely","Prescribe aspirin 75 mg and review"],"correct":2,"explanation":"Dentists have a professional and ethical obligation to act on significant incidental health findings. Sustained hypertension ≥160/100 should be recorded, the patient advised to see their GP urgently, and a record kept. For non-urgent, low-stress procedures with no significant haemorrhage risk, treatment can generally proceed. Elective oral surgery/invasive periodontal treatment may be deferred until BP is better controlled. This reflects GDC Standards and the role of dentists in overall patient health."},
    {"id":"perio_59","type":"sba","stem":"A 40-year-old man has a BPE score of 4 in the lower left sextant during a routine examination. What is the minimum radiographic assessment required before commencing periodontal treatment?","options":["No radiographs are required for BPE 4","OPG only","Selective periapical radiographs of the affected sextant at minimum; bitewings or periapicals of all affected sites after full charting","Full-mouth periapical series (FMS) for all patients with BPE 4","CBCT of the affected sextant"],"correct":2,"explanation":"For patients with BPE score of 4, a full 6-point periodontal chart should be completed first, followed by targeted periapical radiographs of affected sites to assess bone levels, furcation involvement, and root morphology. The radiographic prescription should be based on clinical findings (selective radiographs according to FGDP guidelines). A full periapical series is only required for Stage IV or complex cases. OPG alone provides insufficient detail for periodontal assessment."},
    {"id":"perio_60","type":"sba","stem":"Which of the following histological changes is most characteristic of the established lesion (Stage III) of gingivitis, as described by Page and Schroeder?","options":["Subclinical changes in blood vessel permeability only","Predominantly lymphocyte and macrophage infiltrate with collagen loss and no junctional epithelium proliferation","Dense plasma cell infiltrate occupying >50% of the infiltrated connective tissue, with extensive collagen loss and lateral proliferation of junctional epithelium","Polymorphonuclear leukocyte infiltrate only at the sulcular epithelium","Fibroblast proliferation and collagen gain"],"correct":2,"explanation":"Page and Schroeder's histological staging: Initial lesion (2–4 days) = PMN emigration, vascular changes. Early lesion (4–7 days) = lymphocyte and macrophage infiltrate, collagen loss. Established lesion (>3 weeks) = dense plasma cell infiltrate, junctional epithelium proliferates laterally to form pocket epithelium, extensive collagen loss. Advanced lesion = bone loss begins, representing transition to periodontitis. The established lesion is the Stage III of gingivitis — clinically apparent bleeding gingivitis."}
  ],
  restorative: [
    {"id":"restorative_1","type":"sba","stem":"According to the ICDAS (International Caries Detection and Assessment System), a lesion scored as ICDAS 2 corresponds to which clinical appearance?","options":["White/brown opacification visible on wet enamel only","White/brown opacification visible on dry enamel (<5 seconds air-drying), confined to enamel","Localised enamel breakdown without visible dentine","Underlying dark shadow from dentine, no cavitation","Distinct cavity with visible dentine"],"correct":1,"explanation":"ICDAS scores: 0=sound, 1=first visual change in enamel visible only after prolonged drying (>5 s), 2=distinct visual change in enamel visible when wet or after drying (non-cavitated white/brown spot), 3=localised enamel breakdown (microcavity) without visible dentine, 4=underlying dark shadow from dentine, 5=distinct cavity with visible dentine, 6=extensive cavity. ICDAS 2 represents a non-cavitated enamel lesion visible without drying."},
    {"id":"restorative_2","type":"sba","stem":"A 7-year-old child has a d1 (enamel-only) lesion on the occlusal surface of a newly erupted lower first molar. The surface is intact. According to the Delivering Better Oral Health (DBOH) toolkit, what is the most appropriate management?","options":["Restore with composite resin immediately","Apply fluoride varnish and monitor; consider sealant if caries risk is high","Extract the tooth","Prescribe fluoride supplements","Provide no treatment as the lesion is minimal"],"correct":1,"explanation":"Delivering Better Oral Health recommends that enamel-only (non-cavitated) carious lesions are managed non-operatively: professional fluoride varnish application (2.26% fluoride, at least twice yearly), dietary advice, and oral hygiene instruction. A fissure sealant should be applied to seal the lesion and prevent progression, particularly in high-caries-risk children. Operative intervention is not indicated for intact enamel lesions — arrest and remineralisation are achievable."},
    {"id":"restorative_3","type":"sba","stem":"A 40-year-old woman has an arrested white spot lesion on the labial surface of her upper incisor that has been present for 3 years and shown no progression. It has a chalky-white appearance and is hard to the probe. What management is indicated?","options":["Composite resin restoration","Topical fluoride varnish and monitoring","Porcelain veneer","Fissure sealant application","Bleaching only"],"correct":1,"explanation":"An arrested (non-progressing, hard) enamel white spot lesion that has been stable for several years requires no operative intervention. The hard, chalky surface indicates remineralisation. Management is continued preventive care: optimal oral hygiene, fluoride toothpaste, monitoring. If aesthetics are a concern, microabrasion or bleaching can address discolouration non-invasively. Only progressing or cavitated lesions require operative treatment."},
    {"id":"restorative_4","type":"sba","stem":"A 35-year-old man has a cavitated dentinal carious lesion (ICDAS 5) on the occlusal of an upper first molar. The patient is at high caries risk (diet high in sugar, no fluoride use, multiple active lesions). The tooth is asymptomatic. What is the preferred operative approach according to current minimally invasive dentistry principles?","options":["Remove all caries to hard dentine and restore with amalgam","Selective removal to soft dentine only in deeper areas, leaving firm carious dentine over the pulp, and restore","Complete excavation of all infected dentine regardless of proximity to pulp","Stepwise excavation over two visits","Seal all cavities with glass ionomer and review in 6 months without excavation"],"correct":1,"explanation":"Current minimally invasive dentistry (ICDAS/ESCEP guidelines) recommends selective caries removal: in deeper lesions, soft carious dentine over the pulp is left (risking pulp exposure if removed), with firm (leathery) dentine retained and a permanent restoration placed. This 'selective removal to soft dentine' approach reduces pulp exposure risk and allows remineralisation under the sealed restoration. Complete excavation of all infected dentine is no longer the standard for deep lesions."},
    {"id":"restorative_5","type":"sba","stem":"A 30-year-old woman has a large active carious lesion close to the pulp in a lower right first molar. You choose to perform a selective caries removal (step-wise excavation at the first visit). You leave soft dentine over the pulp and restore with glass ionomer cement temporarily. At 6–8 months review, what change should you expect?","options":["The residual caries will have liquefied and spread rapidly","The pulp will have become non-vital","The residual carious dentine will have hardened and there will be evidence of tertiary dentine formation","There will be no change in caries activity","Resorption of the root will have occurred"],"correct":2,"explanation":"After sealing residual soft dentine, the remaining cariogenic bacteria are deprived of substrate and die, and the dentine undergoes remineralisation. Over 6–12 months, the residual soft dentine hardens due to mineral deposition from the pulp-dentine complex (tertiary dentine formation). At the second visit, the hardened residual dentine can be left (one-step selective removal) or carefully excavated and a definitive restoration placed. This biological response is the basis of indirect pulp capping."},
    {"id":"restorative_6","type":"sba","stem":"A 12-year-old child has a recently traumatised upper right central incisor with a complicated crown fracture (pulp exposed, 2 mm, exposure within 24 hours). The root is partially formed with an open apex. What is the treatment of choice?","options":["Pulpectomy and gutta-percha obturation","Extraction and space management","Cvek partial pulpotomy with MTA or Biodentine to preserve pulpal vitality","Direct pulp cap with calcium hydroxide only","Conventional root canal treatment to the apex"],"correct":2,"explanation":"Cvek (partial) pulpotomy is the treatment of choice for recent pulp exposures in immature teeth with open apices. Removing 2–3 mm of pulp tissue exposes healthy pulp, which is then capped with MTA or Biodentine. This preserves the vital pulp, allows continued root development (apexogenesis), and has a success rate >90% for small recent exposures. Calcium hydroxide alone is less durable and has been largely superseded by MTA/Biodentine."},
    {"id":"restorative_7","type":"sba","stem":"A 45-year-old man has dentine hypersensitivity affecting the cervical areas of multiple lower premolars and canines. He describes sharp pain on contact with cold and brushing. Which of the following is the most appropriate first-line management?","options":["Prescribe analgesics","Place composite resin restorations immediately","Recommend desensitising toothpaste containing potassium nitrate or stannous fluoride, and high-fluoride toothpaste","Apply in-office potassium oxalate","Refer for occlusal adjustment"],"correct":2,"explanation":"Dentine hypersensitivity (DH) management follows a stepwise approach starting with the least invasive options. First-line: twice-daily use of desensitising toothpaste (potassium nitrate, stannous fluoride, or arginine with calcium carbonate) and high-fluoride prescription toothpaste. Advise to leave paste on teeth without rinsing. Review in 4–8 weeks. If no improvement: in-office topical agents (fluoride varnish, oxalates, adhesive resins). Restorations are indicated when DH is associated with a cavity or significant recession/abrasion."},
    {"id":"restorative_8","type":"sba","stem":"A 52-year-old man has a large MOD (mesio-occluso-distal) cavity in an upper left second premolar following caries removal. The tooth is otherwise sound and endodontically healthy. The cavity has thin isthmus and undermined cusps. Which restoration offers the best long-term outcome?","options":["Direct composite resin","Large amalgam","Indirect posterior ceramic onlay or gold onlay","Glass ionomer cement","RMGIC"],"correct":2,"explanation":"For large MOD cavities with undermined or thin cusps, an indirect restoration (onlay — ceramic or gold) distributes occlusal loads and provides superior strength compared to a direct restoration. Large direct composite or amalgam restorations in posterior teeth with thin cusps have high rates of cusp fracture. An onlay preserves and reinforces remaining tooth structure. Gold alloys have proven longevity; all-ceramic onlays have excellent aesthetics with good strength when bonded correctly."},
    {"id":"restorative_9","type":"sba","stem":"What is the main advantage of resin-modified glass ionomer cement (RMGIC) over conventional glass ionomer cement (GIC) for restorations?","options":["Higher strength and wear resistance than composite","Reduced moisture sensitivity, improved handling, and higher early strength while maintaining fluoride release and adhesion to dentine","Better aesthetics with higher translucency","No setting shrinkage unlike GIC","Can be polished to a high gloss similar to composite"],"correct":1,"explanation":"Resin-modified GIC (RMGIC) combines the acid-base setting reaction of GIC with a light-cured resin component, producing: reduced early moisture sensitivity (shorter 'critical' period), improved handling characteristics, better marginal integrity, and higher early strength than conventional GIC, while retaining fluoride release and chemical adhesion to tooth structure. Its strength is still inferior to composite, limiting posterior use in stress-bearing areas. RMGIC is widely used as a base/liner and in deciduous teeth."},
    {"id":"restorative_10","type":"sba","stem":"A 28-year-old woman requests a direct composite veneer for her upper left central incisor, which has an isolated tetracycline-type stain. Before placing the restoration, what is the most important preventive step?","options":["Etching with phosphoric acid 40%","Toothbrushing with chlorhexidine gel","Bleaching (tooth whitening) to lighten underlying tooth colour before bonding composite","Prophylaxis with pumice paste only","Placing a metal primer"],"correct":2,"explanation":"Tooth whitening (bleaching) should always be completed before any direct composite or ceramic veneer placement because: (a) whitening lightens the underlying tooth shade, reducing the thickness of opaque composite required for masking; (b) residual peroxide temporarily inhibits composite polymerisation (wait 2 weeks post-bleaching before bonding); (c) once a composite is placed, it cannot be whitened further. Planning bleaching before veneers optimises aesthetic outcomes and can reduce the amount of restorative material needed."},
    {"id":"restorative_11","type":"sba","stem":"What is the primary mechanism by which fluoride prevents dental caries?","options":["Fluoride kills mutans streptococci directly, eliminating the cariogenic biofilm","Fluoride hardens enamel during tooth development, making it permanently impervious to acid","Fluoride inhibits demineralisation and enhances remineralisation by substituting into hydroxyapatite to form fluorapatite, which is less soluble in acid","Fluoride neutralises dietary acid, preventing pH drop in the plaque","Fluoride prevents bacterial adhesion to the pellicle"],"correct":2,"explanation":"The primary cariostatic mechanism of fluoride is topical: fluoride at the plaque-enamel interface inhibits the dissolution of hydroxyapatite during acid attacks (anti-demineralisation) and promotes remineralisation by incorporating into forming crystals as fluorapatite, which is more resistant to acid dissolution. At high concentrations fluoride also inhibits bacterial enolase, reducing acid production. Systemic fluoride during tooth development has a minor effect through incorporation into the enamel crystal structure."},
    {"id":"restorative_12","type":"sba","stem":"A 5-year-old child at high caries risk is seen in an NHS dental practice. According to Delivering Better Oral Health (DBOH), what fluoride toothpaste should be recommended?","options":["Adult fluoride toothpaste (1450 ppm) twice daily","Fluoride toothpaste 1000 ppm, a pea-sized amount twice daily","Fluoride toothpaste 1350–1500 ppm, a pea-sized amount twice daily, regardless of fluoride area","No fluoride toothpaste until age 7","Fluoride-free toothpaste for all children under 6"],"correct":2,"explanation":"DBOH (3rd edition): children aged 3–6 years should use 1350–1500 ppm fluoride toothpaste (standard adult toothpaste), a pea-sized amount, twice daily, spitting not rinsing. The previous recommendation of 1000 ppm 'children's' toothpaste was updated to 1350–1500 ppm for children aged 3+ at caries risk. For under 3s: smear of 1000 ppm. High-caries-risk children of all ages should use adult fluoride toothpaste."},
    {"id":"restorative_13","type":"sba","stem":"A 3-year-old child at high caries risk lives in a non-fluoridated water area. According to DBOH, what is the recommended fluoride varnish application frequency?","options":["Once per year","Twice per year","At least 2–4 times per year in high-risk children","No fluoride varnish under age 5","Once per year with professional prophylaxis"],"correct":2,"explanation":"DBOH recommends applying fluoride varnish (2.26% = 22,600 ppm F) at least twice yearly for all children aged 3 and over (or from when the first tooth erupts in high-risk children). High-caries-risk children may benefit from more frequent applications (up to 4 times per year). Fluoride varnish applications should be recorded and combined with diet and oral hygiene advice. It is the most effective professionally applied topical fluoride for caries prevention."},
    {"id":"restorative_14","type":"sba","stem":"A 10-year-old child presents with dental fluorosis affecting several permanent teeth, manifesting as white opaque horizontal lines across the enamel of the upper incisors and premolars. This corresponds to which TF (Thylstrup-Fejerskov) index score?","options":["TF 0 — no fluorosis","TF 1 — thin white lines following perikymata","TF 2 — more pronounced lines","TF 3 — white areas merging","TF 4 — entire surface white with some pitting"],"correct":1,"explanation":"Thylstrup-Fejerskov (TF) index: TF 0=normal; TF 1=thin white lines corresponding to perikymata; TF 2=white lines more pronounced, some merging (smooth surface); TF 3=irregular/cloud-like areas; TF 4=entire enamel surface opaque-white; TF 5=5–50% pitting; TF 6–9=progressively more pitting and loss. Horizontal white lines following the perikymata (enamel growth lines) are pathognomonic of mild fluorosis (TF 1–2). The most common cause in the UK is fluoride toothpaste swallowing in children under 6."},
    {"id":"restorative_15","type":"sba","stem":"A 42-year-old patient presents with moderate localised dental fluorosis on his upper incisors: white opaque patches covering approximately 40% of each surface. Which conservative treatment is most appropriate as first-line?","options":["Crown preparation and all-ceramic crowns","Composite veneers immediately","Microabrasion (enamel abrasion) ± home bleaching","Fissure sealant application","No treatment is possible for fluorosis"],"correct":2,"explanation":"Mild-to-moderate fluorosis is managed most conservatively first. Microabrasion (combination of mild acid and abrasive) removes the superficial stained enamel and can significantly reduce the appearance of white opaque areas. Combined with home bleaching, results can be very satisfactory. This approach preserves maximum tooth structure. Direct composite veneers are the next step if microabrasion is insufficient. Ceramic veneers or crowns are reserved for severe fluorosis after conservative options are exhausted."},
    {"id":"restorative_16","type":"sba","stem":"A 60-year-old woman presents with erosion affecting the palatal surfaces of her upper anterior teeth and the occlusal surfaces of her posterior teeth. She reports frequent vomiting. What is the most likely aetiology?","options":["Abrasion from hard-bristle toothbrushing","Intrinsic erosion from gastroesophageal reflux or vomiting (bulimic erosion pattern)","Extrinsic erosion from acidic drinks (sports drinks pattern)","Abfraction from parafunctional habits","Fluorosis"],"correct":1,"explanation":"Intrinsic erosion (from gastric acid via GORD or bulimia nervosa) characteristically affects the palatal surfaces of upper anterior teeth and occlusal surfaces of posterior teeth. This is pathognomonic because gastric acid flows over the palate when vomiting. Extrinsic erosion (from dietary acids like citric juice, carbonated drinks, sports drinks) typically affects the buccal/labial surfaces. The 'perimolysis' pattern (palatal erosion + posterior occlusal) should prompt sensitive enquiry about eating disorders or GORD."},
    {"id":"restorative_17","type":"sba","stem":"The BEWE (Basic Erosive Wear Examination) is used to assess tooth surface loss. Which BEWE score indicates loss of hard tissue with initial involvement of dentine, affecting less than 50% of the surface area?","options":["BEWE 0 — no erosive tooth wear","BEWE 1 — initial loss of enamel surface texture","BEWE 2 — distinct defect, hard tissue loss <50% of the surface area","BEWE 3 — hard tissue loss ≥50% of surface area","BEWE 4 — complete loss of enamel and exposure of pulp"],"correct":2,"explanation":"BEWE scores (Bartlett 2008): 0=no erosive wear; 1=initial loss of surface texture (no dentine exposed); 2=distinct defect, hard tissue loss involving dentine, <50% of the surface area; 3=hard tissue loss ≥50% of the surface area. BEWE 2 indicates dentine exposure affecting less than half the surface. BEWE cumulative scores guide management: 0–2 = routine care, 3–8 = preventive advice, 9–13 = preventive + restorative, ≥14 = restorative + possibly prosthodontic."},
    {"id":"restorative_18","type":"sba","stem":"A 55-year-old man has generalised moderate-to-severe tooth wear (BEWE 3 on multiple surfaces) with significant loss of occlusal vertical dimension (OVD). After diagnosis and stabilisation, what is the first step in restorative management?","options":["Place definitive ceramic crowns on all teeth immediately","Construct a Dahl appliance (anterior bite platform) or use a provisional increase in OVD to test the new vertical","Extract all worn teeth and provide implants","Restore all teeth with amalgam at the existing vertical dimension","Prescribe splint therapy for 12 months before any restorations"],"correct":1,"explanation":"Before definitive restorations in severe tooth wear with reduced OVD, a provisional (reversible) increase in OVD must be tested using a Dahl appliance or provisional composite at the planned new vertical. This tests patient tolerance, allows evaluation of the new occlusion, encourages dentoalveolar compensation, and creates space for restorations. The provisional phase typically lasts 3–6 months. Definitive restorations are placed only once the patient is comfortable and the new OVD is confirmed."},
    {"id":"restorative_19","type":"sba","stem":"A 35-year-old woman has a fractured upper right central incisor at the gingival margin. The fracture line is horizontal, running just subgingivally on the labial and just above the bone on the palatal. The root is sound and parallel-sided. What technique can be used to expose the fracture margin and allow restoration without crown preparation?","options":["Surgical crown lengthening (osseous surgery)","Orthodontic extrusion (forced eruption)","Root canal treatment and post and core","Immediate extraction and implant","Gingivectomy alone (no osseous surgery)"],"correct":1,"explanation":"Orthodontic extrusion (forced eruption) can extrude a root by 2–5 mm, bringing the fracture margin supragingivally. This preserves tooth structure and bone height (which moves coronally with the root), can maintain a good crown-to-root ratio, and creates a restorable margin. It is particularly useful when the fracture margin is <4 mm below the alveolar crest. Surgical crown lengthening removes bone and may compromise adjacent periodontal support. Both techniques may be combined."},
    {"id":"restorative_20","type":"sba","stem":"A 55-year-old woman has a posterior tooth with a failing amalgam and secondary caries. On removal, a deep buccal cavity is found with the pulp vital and asymptomatic. You decide on a direct composite restoration. What is the most important step before placing composite in a deep cavity close to the pulp?","options":["Acid etch all dentine with 37% phosphoric acid for 30 seconds","Place a calcium hydroxide lining over any remaining carious dentine before application of dentine bonding agent","Apply glass ionomer base over the entire floor","Place a metal matrix band first","Pre-heat the composite to reduce viscosity"],"correct":1,"explanation":"In deep cavities close to the pulp, a calcium hydroxide liner (e.g. Dycal) or bioactive material (MTA, Biodentine) should be placed over any residual soft/affected dentine as an indirect pulp cap before placing the bonding agent and composite. Calcium hydroxide stimulates tertiary dentine formation. Critically, 37% phosphoric acid must NOT be applied to thin dentine over the pulp as it can cause pulp damage. The liner protects the pulp from chemicals in the bonding system."},
    {"id":"restorative_21","type":"sba","stem":"When etching enamel with 37% phosphoric acid gel for composite bonding, what is the recommended etching time?","options":["5 seconds","10–15 seconds","15–30 seconds","60 seconds","120 seconds"],"correct":2,"explanation":"37% phosphoric acid etching of enamel for 15–30 seconds creates a micro-porous enamel surface that allows resin tag formation and mechanical microlocking of the composite. Over-etching (>60 seconds) can weaken enamel and damage the surface morphology. Dentine etching time is generally limited to 10–15 seconds to prevent over-drying and collapse of the collagen matrix, which would impair bonding. Many total-etch adhesive systems recommend 15 seconds on dentine and 30 seconds on enamel."},
    {"id":"restorative_22","type":"sba","stem":"A 40-year-old woman has gingival darkening adjacent to her upper left first premolar, which has a full-coverage crown. The crown was placed 12 years ago. There is a dark grey line at the gingival margin. What is the most likely cause?","options":["Periodontal disease causing gingival pigmentation","Tattoo from amalgam spillage","Black discolouration from metal ion oxidation from a porcelain-fused-to-metal (PFM) crown metal coping (porcelain margin metal showing)","Extrinsic staining from tea or coffee","Melanotic macule"],"correct":2,"explanation":"The grey/black gingival discolouration adjacent to an older PFM crown is caused by corrosion of the metal coping (typically base metals such as nickel-chromium or cobalt-chromium), with metal ions leaching into the gingival tissues (metal tattoo). This also occurs when the crown margin exposes the metal shoulder subgingivally. Full-ceramic (metal-free) crowns avoid this problem. Replacement with an all-ceramic restoration is both functional and aesthetic."},
    {"id":"restorative_23","type":"sba","stem":"A patient has an upper first molar that requires a crown. The tooth has an existing large MOD amalgam. The preparation will extend to within 1.5 mm of the gingival margin on the buccal surface. What crown material is most appropriate for this posterior tooth where aesthetics is less important?","options":["All-ceramic (full-contour zirconia)","Porcelain-fused-to-metal (PFM)","Gold full-coverage cast crown","Acrylic-metal temporary crown","Veneered zirconia"],"correct":2,"explanation":"Gold (high-gold or gold alloy) full-coverage cast crowns remain the gold standard for posterior teeth where aesthetics is less critical. Advantages: lowest marginal discrepancy, minimal tooth preparation required (approximately 1.5 mm occlusal clearance), excellent longevity (>90% at 15 years), and the metal is 'kind' to opposing teeth. PFM crowns require more tooth reduction for the ceramic layer. Full-zirconia crowns are strong but may be overly abrasive to opposing teeth."},
    {"id":"restorative_24","type":"sba","stem":"What minimum occlusal clearance is required when preparing a tooth for a metal-ceramic (porcelain-fused-to-metal) posterior crown to accommodate the metal coping and ceramic layer?","options":["0.5 mm","1.0 mm","1.5–2.0 mm","2.5 mm","3.0 mm"],"correct":2,"explanation":"Metal-ceramic (PFM) crowns require a minimum of 1.5–2.0 mm occlusal clearance: approximately 0.5 mm for the metal coping plus 1.0–1.5 mm for the ceramic layer. Insufficient clearance leads to thin ceramic prone to fracture, or overcontouring of the final crown. Gold full-coverage crowns require only 1.0–1.5 mm. Full-ceramic monolithic zirconia requires 1.0–1.5 mm. All-ceramic (e.g. glass-ceramic) anterior crowns with a lingual metal seat require less anteriorly."},
    {"id":"restorative_25","type":"sba","stem":"A 55-year-old woman has a lower left first molar with a periapical abscess. Root canal treatment is performed successfully and the tooth is symptom-free at 6-month review with evidence of periapical healing. The tooth has mesial and distal walls remaining but the pulp chamber floor is intact. Which restoration provides the best long-term outcome?","options":["Large amalgam restoration only","Composite restoration only","Full-coverage crown","Inlay restoration","No restoration — monitor only"],"correct":2,"explanation":"Root-treated molar teeth are significantly weakened by loss of tooth structure (from caries, access cavity, and canal preparation). They are prone to cuspal fracture under occlusal load. A full-coverage crown reduces the risk of cuspal fracture and improves the survival rate of endodontically treated posterior teeth significantly. Meta-analyses confirm that posterior teeth not protected by a crown following RCT have a 2–3 times higher failure rate. Crown placement is the standard of care for endodontically treated molars."},
    {"id":"restorative_26","type":"sba","stem":"A 50-year-old man has a symptomatic tooth (cracked tooth syndrome). He bites on a Tooth Slooth and reports a sharp pain on release. The crack runs mesiodistally through the central groove but does not extend below the gingival margin. What is the most appropriate initial treatment?","options":["Extract the tooth immediately","Prescribe antibiotics","Composite bonded onlay or cuspal coverage restoration to hold the crack and splint the cusps","Endodontic treatment immediately","Occlusal equilibration alone"],"correct":2,"explanation":"Cracked tooth syndrome presenting with sharp pain on release (rather than cold) indicates an incomplete fracture. If the crack does not extend below the gingival margin or into the root, the prognosis is reasonable. Initial treatment is a cuspal coverage restoration (composite bonded onlay or full-coverage crown) to bind the tooth together and prevent propagation of the crack. Endodontic treatment is indicated only if irreversible pulpitis or necrosis develops. Prompt cuspal coverage significantly improves the prognosis."},
    {"id":"restorative_27","type":"sba","stem":"What is the principal advantage of the adhesively luted, minimally prepared lithium disilicate (e-max) ceramic onlay over a conventional crown for a molar with a large MOD cavity?","options":["It is cheaper to fabricate than a cast gold onlay","It requires no preparation of the tooth","It preserves more tooth structure (minimal preparation), provides excellent aesthetics, and high-strength ceramic resists fracture when fully bonded","It can be placed without bonding","It does not require an impression"],"correct":2,"explanation":"Lithium disilicate (IPS e.max) ceramic onlays offer: (1) minimal tooth preparation compared to full-crown preparations; (2) excellent aesthetics; (3) high flexural strength (~400 MPa for e.max CAD) when properly bonded, allowing unsupported ceramic to withstand occlusal loads; (4) adhesive luting reinforces the remaining tooth structure. Compared to a full crown, an onlay preserves significantly more tooth tissue and reduces the risk of irreversible pulpitis. The technique is sensitive and requires complete moisture control."},
    {"id":"restorative_28","type":"sba","stem":"A 45-year-old man presents with an upper right lateral incisor showing root discolouration following previous trauma. The tooth is non-vital. The root is sound with no resorption on radiograph. He requests aesthetic improvement. What is the most appropriate non-invasive bleaching approach?","options":["Internal/walking bleach with sodium perborate and water","Internal/walking bleach with 30% H2O2 only","External bleaching with 35% hydrogen peroxide in-office only","No treatment is possible for non-vital discolouration","Microabrasion"],"correct":0,"explanation":"Internal (non-vital) tooth bleaching for trauma or pulp-blood haemolysis discolouration involves placement of a bleaching agent in the pulp chamber between appointments (walking bleach technique). Sodium perborate mixed with water (or a small amount of 3% H2O2) is placed and sealed for 1–2 weeks — this is the safest approach with the lowest risk of external cervical resorption. The use of 30% H2O2 alone (McInnes technique) has a significantly higher risk of root resorption and is not recommended."},
    {"id":"restorative_29","type":"sba","stem":"A 28-year-old woman requests tooth whitening using home bleaching trays. She has no restorations on her anterior teeth and good periodontal health. The safest and most evidence-based approach in the UK is which of the following?","options":["In-office bleaching with 35% hydrogen peroxide laser-activated only","Dentist-prescribed and supervised home bleaching with 10% carbamide peroxide (3.6% H2O2) in custom trays worn overnight","Over-the-counter bleaching strips with 6% H2O2 purchased independently","Microabrasion followed by bleaching","Fluoride supplements to brighten teeth"],"correct":1,"explanation":"In the UK, tooth whitening products >0.1% and ≤6% H2O2 (or equivalent CP equivalent) can only be supplied by or under the prescription/supervision of a registered dental professional (EU Cosmetics Directive/UK regulation). Dentist-prescribed 10% carbamide peroxide (equivalent to 3.6% H2O2) in custom-fitted trays worn overnight is the best-evidenced, safest approach with predictable results and the lowest risk of sensitivity. Over-the-counter >6% H2O2 strips are illegal to sell to consumers in the UK."},
    {"id":"restorative_30","type":"sba","stem":"A 30-year-old woman has a class III cavity (proximal surface of an upper left lateral incisor, no incisal involvement). She requests a tooth-coloured restoration. What is the most appropriate bonding strategy for the composite resin?","options":["Self-etch primer only, no etching","Selective enamel etching with 37% phosphoric acid and application of universal adhesive (selective-etch technique)","No etching — use glass ionomer directly","Total etch enamel and dentine with 37% phosphoric acid, bond, then composite","Dry dentine before bonding to improve adhesion"],"correct":3,"explanation":"For composite restorations in anterior teeth, total-etch (etch-and-rinse) technique with 37% phosphoric acid applied to both enamel and dentine, followed by appropriate primer and bond, provides the highest bond strengths and best marginal seal. Selective enamel etch can be used with self-etch universal adhesives but total-etch remains the gold standard for anterior composite where margin quality and colour stability are critical. Dentine should be moist (not wet) after rinsing to prevent collagen collapse."},
    {"id":"restorative_31","type":"sba","stem":"What is the maximum safe fluoride varnish application frequency per year recommended for a high-caries-risk adult?","options":["Once per year","Twice per year (every 6 months)","At least twice yearly; more frequent applications may be appropriate based on clinical judgment","Every 3 months only if no home fluoride is used","No maximum — apply as many times as needed"],"correct":2,"explanation":"SDCEP and DBOH guidelines recommend professional fluoride varnish application (2.26% = 22,600 ppm) at least twice yearly for all patients. For high-caries-risk patients, more frequent applications (up to 4 times per year or at every clinical appointment) are supported by evidence. There is no absolute maximum — frequency should be guided by clinical assessment of risk. Each application is safe; fluoride toxicity from standard varnish application is not a clinical concern."},
    {"id":"restorative_32","type":"sba","stem":"According to SDCEP guidelines on the prescription of dietary fluoride supplements, which group of patients in Scotland/UK should receive fluoride supplement tablets?","options":["All children under 16 regardless of water fluoride content","Children aged 6 months to 3 years in all areas","Children in non-fluoridated areas who cannot use, or are not using, high-fluoride toothpaste","All adults with caries regardless of fluoride water content","No group — supplements are not evidence-based and not recommended"],"correct":2,"explanation":"SDCEP (and DBOH) do not recommend routine fluoride supplement prescribing for children generally, as evidence for systemic supplementation is weak and risk of fluorosis exists. Supplements are only considered for children in non-fluoridated areas who cannot or will not use fluoride toothpaste — a narrow specific group. The primary preventive approach is fluoride toothpaste (1000–1500 ppm) and fluoride varnish applications, not fluoride tablets. Public water fluoridation remains the most equitable population-level measure."},
    {"id":"restorative_33","type":"sba","stem":"A patient presents with a subgingival carious lesion on the distal of an upper first molar. The caries margin is 2 mm below the gingival margin. Crown lengthening surgery is not feasible as the adjacent second molar has a 3 mm pocket. What alternative minimally invasive approach can be used to expose the caries margin?","options":["Extract the tooth","Accept subgingival margins and place a crown immediately","Use matrix band technique to place a composite directly","Orthodontic extrusion (forced eruption) to bring the margin supragingivally","Gingivectomy alone without osseous surgery"],"correct":3,"explanation":"Orthodontic extrusion (forced eruption) extrudes the root by applying a light orthodontic force to the tooth, moving the root and the attached gingival margin coronally. The fracture or caries margin emerges supragingivally, allowing restoration. Unlike crown lengthening (which reduces bone height), extrusion preserves the bone level by lifting the entire dentoalveolar complex. After extrusion, a period of fibrotomy or retention is needed to prevent relapse before the definitive restoration."},
    {"id":"restorative_34","type":"sba","stem":"A 35-year-old man has a BPE score of 3 in the upper left sextant and several carious lesions. He smokes 10 cigarettes/day. According to SDCEP, what is the Brief Advice model element most important at this appointment, alongside dental treatment?","options":["Prescribe nicotine patches","Provide a detailed smoking cessation leaflet and ask him to read it","Offer Very Brief Advice (VBA) on smoking cessation: Ask, Advise, Act (signpost to NHS Stop Smoking services)","Tell the patient he must stop smoking before dental treatment continues","Focus only on dental care — smoking cessation is the GP's responsibility"],"correct":2,"explanation":"SDCEP's Prevention in Practice guidance recommends all dental teams routinely deliver Very Brief Advice (VBA) on smoking: Ask about smoking status; Advise that stopping is the single most important action for health; Act by referring/signposting to NHS Stop Smoking services (which are the most effective method). This '3 As' model takes <30 seconds and significantly increases quit attempts. Dental teams have a key public health role; smoking cessation is within the professional scope of dentistry."},
    {"id":"restorative_35","type":"sba","stem":"A 50-year-old woman has heavily worn anterior teeth with palatal and incisal erosion. She drinks 4 glasses of carbonated mineral water daily. The pH of sparkling water is approximately 5.5–6. Which advice is most important to prevent further erosion?","options":["Avoid all water intake","Switch to non-carbonated water or drink sparkling water only with meals; use a straw and do not swish","Brush teeth immediately after drinking sparkling water","Rinse with chlorhexidine mouthwash after carbonated drinks","Use high-fluoride toothpaste only and continue drinking as normal"],"correct":1,"explanation":"Switching to still water is the most effective prevention. If the patient continues to drink carbonated water, limiting it to mealtimes (saliva buffering), drinking through a straw (reduced tooth contact), not swishing the drink, and NOT brushing teeth for 30–60 minutes after acid exposure (to avoid abrading softened enamel) are key advice points. High-fluoride toothpaste reduces erosion risk but does not overcome the effect of frequent acid exposure."},
    {"id":"restorative_36","type":"sba","stem":"What is the recommended minimum thickness of ceramic material for a bonded all-ceramic (lithium disilicate) posterior crown to ensure adequate strength?","options":["0.5 mm","1.0 mm","1.5 mm","2.0 mm","3.0 mm"],"correct":2,"explanation":"Lithium disilicate (e.max) crowns require a minimum ceramic thickness of 1.5 mm occlusally (ideally 2.0 mm in areas of heavy occlusal contact) to provide adequate strength and prevent fracture. Insufficient thickness leads to increased fracture rates. This is less than the 1.5–2.0 mm required for the ceramic layer in PFM crowns (which also need 0.5 mm metal), meaning total tooth reduction for e.max crowns can be comparable to PFM but with a single material."},
    {"id":"restorative_37","type":"sba","stem":"A 44-year-old woman has had three previous restorations on the same upper molar, which has now fractured leaving a thin buccal wall 1 mm thick and a mesial wall 1.5 mm thick. The tooth is vital with no apical pathology. What is the most appropriate restoration?","options":["Large direct composite resin","Amalgam core and full crown","Full coverage crown without a core if enough tooth remains","Direct composite bonded restoration with cuspal coverage","Glass ionomer base and composite"],"correct":1,"explanation":"When residual tooth walls are thin and undermined (<2 mm), direct restorations are prone to failure through cusp fracture. An amalgam (or composite) core is used to replace missing structure and provide adequate bulk for a full-coverage crown preparation. The full crown then distributes occlusal loads over the remaining tooth and core structure. Alternative: fibre-reinforced composite core + crown. The combination of core build-up and full crown is appropriate when there is insufficient sound tooth structure for a direct restoration alone."},
    {"id":"restorative_38","type":"sba","stem":"A 38-year-old man has a history of bruxism and requires multiple posterior crown restorations. He wears an occlusal splint at night. Which crown material is most problematic due to the risk of fracture under parafunctional loads?","options":["Cast gold alloy","Porcelain-fused-to-metal (PFM)","Full-contour monolithic zirconia","High-strength pressable lithium disilicate (e.max) in full occlusal contact","Amalgam core + PFM crown"],"correct":3,"explanation":"Lithium disilicate (e.max) has good but not the highest fracture toughness among ceramic systems. It is prone to fracture in posterior teeth under high parafunctional occlusal loads in bruxists, particularly in molar positions. For bruxing patients: cast gold alloys and full-contour monolithic zirconia offer the highest fracture resistance. High-strength zirconia (5Y-PSZ) combined with reduced veneering ceramic or full-contour zirconia is the preferred ceramic option for bruxists. PFM is intermediate in risk."},
    {"id":"restorative_39","type":"sba","stem":"What is the Stephan curve, and what is the significance of the critical pH in relation to dental caries?","options":["It shows the relationship between plaque fluoride concentration and demineralisation","It is a plot of plaque pH over time following a sugar rinse; the critical pH is 5.5 below which hydroxyapatite dissolves","It shows the relationship between salivary flow and caries rate","It is the plot of enamel dissolution against phosphate concentration in plaque","It shows remineralisation kinetics following fluoride application"],"correct":1,"explanation":"The Stephan curve describes the rapid fall in plaque pH following a sugar challenge, followed by a slower return to resting pH. The critical pH for hydroxyapatite is approximately 5.5 (for fluorapatite, approximately 4.5). Below the critical pH, enamel demineralisation occurs. Caries risk depends on: frequency of sugar intake (more sugar challenges = more time below critical pH), salivary buffering capacity, and fluoride availability. Reducing frequency of sugar intake is more important than total amount."},
    {"id":"restorative_40","type":"sba","stem":"A 30-year-old man presents with multiple new cervical carious lesions. He has recently been diagnosed with Sjögren's syndrome causing severe xerostomia. His diet is relatively good. Which preventive intervention provides the highest caries-protective benefit in this specific clinical scenario?","options":["Dietary advice alone","High-fluoride prescription toothpaste (5000 ppm) and fluoride varnish applications at every visit","Fissure sealants","Regular prophylaxis with polishing","Prescribe pilocarpine only without fluoride"],"correct":1,"explanation":"In patients with severe salivary gland dysfunction (Sjögren's, post-radiation xerostomia), rampant cervical caries is the most significant risk. High-fluoride prescription toothpaste (2800–5000 ppm, e.g. Duraphat 5000) provides maximum topical fluoride protection. Combined with frequent professional fluoride varnish applications (at every recall), this gives the highest caries protection when salivary buffering is absent. Diet is also important but these patients may need high-energy drinks for dysphagia management."},
    {"id":"restorative_41","type":"sba","stem":"Which of the following is a known risk factor for secondary (recurrent) caries at crown margins?","options":["High gold content of the crown alloy","Subgingival crown margins well-adapted to tooth structure","Marginal discrepancy of >100 µm, allowing microleakage and plaque accumulation","All-ceramic crowns compared to PFM","Short clinical crown with adequate taper"],"correct":2,"explanation":"Secondary caries at crown margins is associated with marginal discrepancy (gap between crown margin and tooth), which creates a space for oral fluids, bacteria, and substrate — leading to microleakage and caries. Clinically acceptable marginal fit is generally defined as ≤100–120 µm gap. Poor adaptation, open margins, and overhanging margins are also significant risk factors. Subgingival margins are inherently harder to assess and maintain. Regular radiographic review is required."},
    {"id":"restorative_42","type":"sba","stem":"A dentist is assessing a patient's occlusion for crown preparation. The patient has canine-guided (mutually protected) occlusion. When preparing the upper right first premolar for a crown, what occlusal scheme consideration is most important?","options":["The restored crown must participate in group function in lateral excursion","The crown should have heavy centric stops but no lateral contacts in excursion (canine will guide)","The crown must provide balancing contacts on the working side","The canine guidance should be eliminated and replaced with posterior group function","Occlusal contacts are not important for ceramic crowns"],"correct":1,"explanation":"In a canine-guided (mutually protected) occlusion, the canines provide guidance in lateral excursion, disoccluding all posterior teeth. The restored premolar crown should: have stable centric occlusal contacts (centric stops) at the correct OVD, and be free of lateral excursive contacts to preserve the existing canine guidance. Introducing lateral contacts on a crown would disrupt the existing functional occlusion and may cause fremitus, mobility, or parafunctional loading. 'If in doubt, leave it out.'"},
    {"id":"restorative_43","type":"sba","stem":"A 45-year-old woman has a lower first molar with a post and core and existing crown that requires replacement. On removal of the crown, the post is found to be loosely fitted. The tooth has two remaining roots (mesial and distal). There are no periapical changes. What should be done about the loose post?","options":["Replace the post with a longer parallel post","Remove the post and assess: if significant root structure remains, consider bonded composite core without a post","Prescribe antibiotics and keep the old post in situ","Extract the tooth immediately","Place a longer cast post and core without removing the old post"],"correct":1,"explanation":"A loose post must be removed to allow assessment of remaining root structure. Evidence shows that posts do not strengthen root-treated teeth; their purpose is to retain a core build-up when insufficient coronal dentine remains. If after post removal there is ≥2 mm of coronal dentine (ferrule) and adequate root length, a bonded composite core (without a post) may be preferable — this is less invasive and avoids root perforation risk. A new post is only indicated if there is insufficient coronal tooth structure to retain a core."},
    {"id":"restorative_44","type":"sba","stem":"What is the minimum ferrule height required around a tooth with a crown and post-retained core to provide adequate resistance to root fracture?","options":["0.5 mm","1.0 mm","1.5–2.0 mm","3.0 mm","No minimum; any ferrule improves prognosis"],"correct":2,"explanation":"The ferrule is the height of sound dentine circumferentially above the crown margin that is encircled by the crown. A minimum ferrule height of 1.5–2.0 mm is required to provide resistance to root fracture and improve the prognosis of the restored tooth. Without an adequate ferrule, torquing forces on the crown/post are transmitted directly to the root, predisposing to root fracture. Where insufficient ferrule exists, crown lengthening or orthodontic extrusion is needed before crown placement."},
    {"id":"restorative_45","type":"sba","stem":"A 55-year-old man needs a 3-unit bridge replacing the upper right first premolar, using the upper right canine and second premolar as abutments. The canine has normal periodontal support and is vital. The second premolar has a root canal filling and good bone support. What is the most important factor limiting the prognosis of this bridge?","options":["The cantilever design increases torquing forces","The use of a root-treated tooth as a distal abutment reduces prognosis","The number of roots supporting the bridge (Ante's law: abutment root surface area should equal or exceed that of the missing tooth/teeth)","The choice of metal-ceramic material","The length of the edentulous span"],"correct":2,"explanation":"Ante's law states that the total root surface area (PDL area) of the abutment teeth should be equal to or greater than the root surface area of the teeth being replaced. For a 3-unit fixed-fixed bridge with sound abutments and a single premolar pontic, Ante's law is generally satisfied, but the biological prognosis depends on the adequacy of the abutments. Root-treated distal abutment is a risk factor (reduced fracture resistance), but the total root surface area is the key initial assessment. Cantilever designs violate Ante's principle."},
    {"id":"restorative_46","type":"sba","stem":"A 35-year-old woman has congenitally missing upper lateral incisors. She has an angle Class I occlusion with spaces of 6 mm either side. She is considering implants, bridges, or orthodontic space closure. What is the most conservative option for replacing the lateral incisors?","options":["Two 3-unit porcelain-fused-to-metal bridges (requiring crown preparation of canines and central incisors)","Resin-retained (Maryland) bridge — adhesive bridge using adjacent teeth with minimal preparation","Conventional crown and bridge requiring full preparation of abutments","Partial dentures","Two implants placed immediately without bone grafting"],"correct":1,"explanation":"A resin-retained adhesive bridge (Maryland bridge) is the most conservative option, requiring minimal preparation of the palatal surface of the adjacent teeth for the metal or ceramic wings (no full crown preparation). Evidence supports good longevity for single wing (cantilever) Maryland bridges for anterior teeth — 10-year survival rates of >80–90%. Two-wing designs have higher debonding rates. If the patient opts for implants, this is also a conservative approach long-term but requires a surgical procedure and good bone volume."},
    {"id":"restorative_47","type":"sba","stem":"A 48-year-old man has erosive tooth wear (BEWE score 12, distributed across all teeth). He has been told he needs extensive restorations. His OVD appears to have decreased by approximately 3–4 mm. What is the correct sequence before undertaking full-arch restorations?","options":["Restore all teeth simultaneously in one visit","Undertake a full diagnostic wax-up and provisional restorations at the planned new OVD; test for 3–6 months before definitive restorations","Place definitive crowns immediately without provisionals","Reduce teeth that are not worn to level the occlusion","Use temporary dentures to establish the new OVD"],"correct":1,"explanation":"Before undertaking extensive full-arch restorations in tooth wear with reduced OVD, a diagnostic wax-up on study models mounted in a semi-adjustable articulator establishes the planned new OVD and occlusal scheme. Provisional (acrylic or bis-acryl) restorations fabricated from this wax-up are worn for 3–6 months to: (1) test patient tolerance of the new OVD; (2) confirm functional and aesthetic outcomes; (3) allow dentoalveolar compensation; (4) identify any adjustments needed before committing to irreversible definitive restorations."},
    {"id":"restorative_48","type":"sba","stem":"A 60-year-old man has a deep bite with the upper incisors completely covering the lower incisors. He requires a crown on the lower right central incisor. Sufficient space for a ceramic crown cannot be achieved without reducing the deep overbite. What should be done?","options":["Place the crown without adequate space, resulting in an overcontoured restoration","Reduce the upper incisors to create space","Orthodontic treatment or Dahl anterior bite platform to intrude the upper incisors and open the overbite","Extract the lower central and provide an implant","Prescribe a crown with zero occlusal clearance using composite"],"correct":2,"explanation":"A deep overbite with insufficient interocclusal space for an anterior ceramic restoration can be managed with a Dahl appliance (anterior composite bite platform on the uppers) or orthodontic treatment to intrude the upper anterior teeth and/or proclinate the lower teeth. The Dahl approach allows relative axial movement (intrusion of incisors, extrusion of posterior teeth) over 3–6 months, creating the necessary space. This is reversible and minimally invasive compared to irreversible reduction of sound upper teeth."},
    {"id":"restorative_49","type":"sba","stem":"What is the dental condition 'molar incisor hypomineralisation' (MIH) and which teeth are affected?","options":["Hypoplastic enamel affecting all primary teeth","Systemic enamel defect affecting one or more of the first permanent molars, often with involvement of the permanent incisors","Localised caries in the pit and fissure of molars only","Post-eruptive enamel fracture from trauma","Amelogenesis imperfecta affecting all permanent teeth"],"correct":1,"explanation":"Molar incisor hypomineralisation (MIH) is a developmental enamel defect caused by a disruption of enamel mineralisation during the systemic phase of molar and incisor development (approximately 0–3 years of age). It affects one or more first permanent molars (FPMs) and can involve the permanent incisors. Clinically: demarcated white, yellow, or brown opacity; post-eruptive enamel breakdown; extreme sensitivity; high caries susceptibility. Affected FPMs often require extensive restorative treatment and may need extraction in severe cases."},
    {"id":"restorative_50","type":"sba","stem":"A 35-year-old woman has extensive tooth surface loss due to extrinsic acid erosion from excessive fruit consumption and sports drinks. She has been advised to cut down. For the existing mild-to-moderate cervical lesions (BEWE 2), which is the most appropriate restorative material?","options":["Conventional glass ionomer cement","Resin-modified glass ionomer (RMGIC) or composite resin with correct matrix isolation","High-copper amalgam","Calcium hydroxide cement","Silicate cement"],"correct":1,"explanation":"For cervical non-carious lesions (NCCL), RMGIC is widely used due to its fluoride release, chemical adhesion to dentine without etching, lower technique sensitivity, and good patient tolerance. Composite resin is also appropriate but requires good moisture control. For deeper lesions with sensitivity, RMGIC provides fluoride protection and moderate aesthetics. Conventional GIC has poorer moisture resistance. The choice depends on cavity size, moisture control achievable, and aesthetic requirements."},
    {"id":"restorative_51","type":"sba","stem":"A 50-year-old woman has a large class II composite restoration in a lower left second premolar. The restoration has been in place for 8 years and shows marginal staining and a small gap at the gingival margin. The tooth is symptom-free. What is the most appropriate management?","options":["Immediate replacement of the entire composite","Repair of the defective margin using composite resin bonded to the existing restoration","Extract the tooth and place an implant","Do nothing; composite restorations never fail","Prescribe antibiotics for possible secondary caries"],"correct":1,"explanation":"Repair of a defective composite restoration is preferred over complete replacement (USPHS/FDI criteria). Repair preserves tooth structure, reduces the risk of pulp damage from further excavation, and has good evidence of success when the existing restoration is otherwise sound. The defective margin can be refined, roughened, silanated (if ceramic components present), etched with phosphoric acid, bonded, and new composite applied. Complete replacement is indicated only if the defect is extensive, there is secondary caries beneath the restoration, or the restoration is functionally or aesthetically failing overall."},
