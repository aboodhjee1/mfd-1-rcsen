    {"id":"oralsurg_60","type":"sba","stem":"A GDP is considering requesting a CBCT scan before placing a dental implant in the mandibular premolar region. The patient has had an OPG and a periapical radiograph. According to FGDP/RCR guidance and IRMER 2017, when is CBCT justified?","options":["CBCT is routine for all implant cases and requires no specific justification","CBCT is justified when the clinical question (e.g. bone volume, nerve proximity) cannot be adequately answered by conventional 2D radiography","CBCT must be requested for every case involving the mandible due to IAN proximity","CBCT provides lower radiation dose than OPG so should always be preferred","CBCT justification is the responsibility of the radiographer, not the referring dentist"],"correct":1,"explanation":"IRMER 2017 and FGDP/RCR guidance state that CBCT should only be used when the clinical question cannot be adequately answered by conventional 2D radiography, applying the ALARP (as low as reasonably practicable) principle. For implant planning, CBCT is justified when OPG/periapicals leave uncertainty about bone height, width, or IAN proximity. CBCT is not routine for all implant cases. The referring practitioner must justify the referral in writing."}
  ],
  oralmed: [
    {"id":"oralmed_1","type":"sba","stem":"A 55-year-old woman presents with bilateral white lacy striae on the buccal mucosa that cannot be wiped off. She reports no pain. Similar lesions are present on the gingiva. There is no history of recent drug changes. What is the most likely diagnosis?","options":["Oral candidiasis","Leukoplakia","Oral lichen planus","Lupus erythematosus","Chemical burn"],"correct":2,"explanation":"Bilateral white lacy (Wickham's striae) lesions on the buccal mucosa in a middle-aged woman are characteristic of reticular oral lichen planus, the most common and usually asymptomatic form. Oral candidiasis can be wiped off. Leukoplakia is typically unilateral and homogeneous. The bilateral and symmetrical distribution strongly favours lichen planus."},
    {"id":"oralmed_2","type":"sba","stem":"A 45-year-old man taking amlodipine, lisinopril, and atorvastatin develops painful erosive lesions on the oral mucosa. The lesions cannot be distinguished clinically from erosive lichen planus. Which medication is most commonly associated with a lichenoid drug reaction?","options":["Atorvastatin","Lisinopril","Amlodipine","Aspirin","Metformin"],"correct":1,"explanation":"ACE inhibitors (lisinopril) are among the most commonly implicated drugs in lichenoid drug reactions, along with NSAIDs, antihypertensives (beta-blockers, calcium channel blockers), gold, hydroxychloroquine, and allopurinol. Lichenoid drug reactions are clinically identical to lichen planus but tend to be unilateral or asymmetric, and resolve on stopping the offending drug. Amlodipine can cause gingival enlargement, not lichenoid reactions."},
    {"id":"oralmed_3","type":"sba","stem":"A 38-year-old woman with erosive oral lichen planus has painful erosions covering most of both buccal mucosae. Topical chlorhexidine and analgesics have not helped. What is the most appropriate next step?","options":["Systemic azathioprine","Topical corticosteroids (betamethasone or clobetasol)","Topical aciclovir","Tetracycline mouthwash","Topical miconazole"],"correct":1,"explanation":"Topical corticosteroids are first-line for erosive oral lichen planus. High-potency preparations such as betamethasone 0.5 mg/5 mL mouthwash or clobetasol 0.05% cream applied to the mucosa are the mainstay of treatment. Systemic immunosuppressants (azathioprine, ciclosporin) are reserved for severe cases unresponsive to topical therapy. Antifungal/antiviral topicals are not appropriate for OLP."},
    {"id":"oralmed_4","type":"sba","stem":"A 60-year-old female smoker presents with a homogeneous white patch on the left buccal mucosa that has been present for 4 months and cannot be rubbed off. Candidal infection and other specific causes have been excluded. Biopsy shows hyperkeratosis with mild epithelial dysplasia. What is the diagnosis?","options":["Oral submucous fibrosis","White sponge naevus","Oral leukoplakia with mild dysplasia","Frictional keratosis","Hairy leukoplakia"],"correct":2,"explanation":"Oral leukoplakia is defined as a white patch or plaque that cannot be characterised clinically or pathologically as any other disease (diagnosis of exclusion). The presence of any dysplasia on histology increases the risk of malignant transformation. Mild dysplasia carries approximately 5–15% transformation risk over 10 years. Smoking is the leading aetiological factor. The term 'leukoplakia' is a clinical diagnosis; histopathology determines prognosis."},
    {"id":"oralmed_5","type":"sba","stem":"Which type of oral leukoplakia carries the highest risk of malignant transformation?","options":["Homogeneous leukoplakia","Verrucous leukoplakia","Erythroleukoplakia (speckled)","Proliferative verrucous leukoplakia","Nodular leukoplakia"],"correct":2,"explanation":"Erythroleukoplakia (speckled leukoplakia), which contains a red component, carries the highest malignant transformation risk among oral leukoplakia subtypes, with rates of up to 60–85% in some series. The red component reflects atrophic epithelium with high-grade dysplasia. Homogeneous leukoplakia has the lowest risk (~1–5%). Proliferative verrucous leukoplakia also has a high transformation risk and is associated with HPV in some cases."},
    {"id":"oralmed_6","type":"sba","stem":"A 35-year-old immunocompetent man presents with a unilateral white corrugated lesion on the lateral border of the tongue that cannot be wiped off. He is not a smoker or drinker. What is the most likely diagnosis?","options":["Oral leukoplakia","Frictional keratosis","Hairy leukoplakia","White sponge naevus","Oral lichen planus"],"correct":2,"explanation":"Hairy leukoplakia is caused by EBV replication in superficial epithelial cells and presents as a corrugated or 'hairy' white lesion on the lateral border of the tongue in immunocompromised individuals, particularly HIV-positive patients. However, it can occur in immunocompetent individuals. It cannot be wiped off. It is benign and does not require treatment in most cases but may indicate underlying immune deficiency warranting investigation."},
    {"id":"oralmed_7","type":"sba","stem":"A 52-year-old woman presents with a red velvety lesion of 1.5 cm on the floor of the mouth. She smokes 20 cigarettes per day and drinks 30 units of alcohol per week. Which statement is most accurate?","options":["Erythroplakia is almost always benign and requires no biopsy","Erythroplakia has a lower malignant transformation risk than leukoplakia","Biopsy should be performed; erythroplakia has a high rate of severe dysplasia or carcinoma in situ","This is most likely denture-related stomatitis requiring antifungals","Reassure and review in 3 months; floor-of-mouth lesions rarely become malignant"],"correct":2,"explanation":"Erythroplakia (red velvety mucosal lesion that cannot be attributed to any other disease) carries the highest risk of current or future malignancy of all oral potentially malignant disorders. Up to 90% of biopsied erythroplakias show severe dysplasia, carcinoma in situ, or invasive carcinoma at the time of biopsy. Urgent biopsy is mandatory. The floor of mouth, ventral tongue, and soft palate are high-risk sites."},
    {"id":"oralmed_8","type":"sba","stem":"A 40-year-old man presents with recurrent painful oral ulcers, up to 5 mm in size, that appear on the labial mucosa and heal in 10–14 days without scarring. He has had similar ulcers since his teenage years. There are no skin or genital lesions. What is the most likely diagnosis?","options":["Behçet's disease","Minor recurrent aphthous stomatitis","Primary herpetic gingivostomatitis","Erythema multiforme","Crohn's disease"],"correct":1,"explanation":"Minor recurrent aphthous stomatitis (RAS) is the most common type of aphthous ulceration (~80%), with ulcers <10 mm that heal without scarring in 10–14 days. They occur on non-keratinised mucosa (labial and buccal mucosa, floor of mouth). Behçet's disease requires ulcers plus genital ulcers and/or ocular involvement. HSV ulcers appear on keratinised mucosa and are usually preceded by vesicles."},
    {"id":"oralmed_9","type":"sba","stem":"A 20-year-old woman presents with an acute onset of multiple painful vesicles and erosions on the gingiva, palate, and labial mucosa, associated with fever, malaise, and cervical lymphadenopathy. She has never had this before. What is the most likely diagnosis?","options":["Erythema multiforme minor","Minor recurrent aphthous stomatitis","Primary herpetic gingivostomatitis","Herpangina","Pemphigus vulgaris"],"correct":2,"explanation":"Primary herpetic gingivostomatitis (HSV-1) presents with an acute onset of widespread vesicles and erosions affecting both keratinised (gingiva, palate) and non-keratinised mucosa, with fever, malaise, and lymphadenopathy. It is most common in children but can occur in young adults at first exposure. Management is supportive (analgesics, fluids); antiviral (aciclovir 200 mg five times daily) is indicated if the patient presents within 3 days of onset."},
    {"id":"oralmed_10","type":"sba","stem":"A 65-year-old male patient presents with target lesions on his lips and skin, bullous lesions on the oral mucosa, and crusting of the lips. He had a cold sore 2 weeks ago. What is the most likely diagnosis?","options":["Primary herpetic gingivostomatitis","Behçet's disease","Erythema multiforme","Pemphigus vulgaris","Mucous membrane pemphigoid"],"correct":2,"explanation":"Erythema multiforme (EM) is an acute immune-mediated condition commonly triggered by HSV infection (HSV-associated EM). It presents with target lesions on the skin, haemorrhagic crusting of lips, and bullous oral mucosal lesions. Oral involvement is very common. Minor EM affects mainly mucosae; Stevens-Johnson syndrome and TEN are severe drug-induced variants. Management includes supportive care and treating the HSV trigger."},
    {"id":"oralmed_11","type":"sba","stem":"A 70-year-old woman presents with multiple intact bullae and desquamative gingivitis. The Nikolsky sign is positive. Biopsy with direct immunofluorescence shows linear deposition of IgG and C3 at the basement membrane zone. What is the most likely diagnosis?","options":["Pemphigus vulgaris","Mucous membrane pemphigoid","Bullous pemphigoid","Dermatitis herpetiformis","Linear IgA disease"],"correct":1,"explanation":"Mucous membrane pemphigoid (MMP, formerly cicatricial pemphigoid) predominantly involves mucous membranes and presents with intact subepithelial bullae and desquamative gingivitis. Direct immunofluorescence shows linear IgG (and/or IgA, C3) at the basement membrane zone. Unlike pemphigus (intraepithelial), MMP blisters are subepithelial. It affects predominantly elderly women and can scar; ocular involvement can lead to blindness and requires systemic immunosuppression."},
    {"id":"oralmed_12","type":"sba","stem":"A 65-year-old woman develops widespread oral and skin blistering. Direct immunofluorescence of perilesional tissue shows intercellular IgG deposition within the epithelium ('chicken wire' pattern). Which is the most likely diagnosis?","options":["Mucous membrane pemphigoid","Bullous pemphigoid","Pemphigus vulgaris","Linear IgA disease","Erythema multiforme"],"correct":2,"explanation":"Pemphigus vulgaris is an autoimmune blistering disorder with IgG autoantibodies against desmoglein 1 and 3 (desmosomal proteins). Direct immunofluorescence shows IgG deposition in the intercellular spaces of the squamous epithelium, producing the characteristic 'chicken wire' or 'fishnet' pattern. The Nikolsky sign is positive. It is serious and potentially fatal without systemic immunosuppression (steroids ± azathioprine)."},
    {"id":"oralmed_13","type":"sba","stem":"A 45-year-old woman on hydroxychloroquine for systemic lupus erythematosus presents with white/erythematous irregular plaques on the palate and buccal mucosa. She also has a butterfly rash on her face. Biopsy shows a lichenoid tissue reaction with subepithelial IgG at the basement membrane zone. What is the oral condition?","options":["Oral lichen planus","Oral leukoplakia","Oral manifestation of systemic lupus erythematosus","Mucous membrane pemphigoid","Erythema multiforme"],"correct":2,"explanation":"Oral lesions occur in 25–45% of patients with systemic lupus erythematosus (SLE) and may precede cutaneous disease. They appear as irregular erythematous lesions with white radiating striae, resembling lichen planus but often associated with palatal ulceration. DIF shows IgG, IgM, and C3 deposition at the basement membrane. Management involves treating the underlying SLE; topical corticosteroids provide symptomatic relief."},
    {"id":"oralmed_14","type":"sba","stem":"A 28-year-old woman of South Asian origin who chews areca nut presents with restricted mouth opening (25 mm) and pale, fibrous, blanched buccal mucosa bilaterally. She cannot protrude her tongue fully. What is the most likely diagnosis?","options":["Localised scleroderma","Masseteric hypertrophy","Oral submucous fibrosis","Mucous membrane pemphigoid","Chronic oral candidiasis"],"correct":2,"explanation":"Oral submucous fibrosis (OSMF) is a potentially malignant disorder associated with areca nut (betel quid) use, most prevalent in South Asian populations. It is characterised by progressive submucosal fibrosis causing blanching, stiffening, and restricted mouth opening (trismus). Malignant transformation rate is 7–13%. Management involves cessation of areca nut use and physiotherapy; severe cases may need surgery."},
    {"id":"oralmed_15","type":"sba","stem":"A 50-year-old man presents with pain, burning, and redness of the tongue (glossitis). Blood tests show haemoglobin 9.2 g/dL (low), MCV 110 fL (high), and serum B12 below the lower limit of normal. What oral finding is most characteristic of B12 deficiency?","options":["Angular cheilitis and candidal plaques","Atrophic glossitis with complete loss of filiform papillae","Hyperplastic gingivitis","Geographic tongue","White sponge naevus"],"correct":1,"explanation":"B12 (and folate) deficiency causes megaloblastic anaemia and atrophic glossitis. The tongue loses its filiform papillae (depapillation) leading to a smooth, erythematous, 'beefy-red' tongue. The fungiform papillae may persist initially. Angular cheilitis can also occur but is more classically associated with iron deficiency and candidiasis. Geographic tongue is a benign condition unrelated to B12."},
    {"id":"oralmed_16","type":"sba","stem":"A 35-year-old woman presents with recurrent mouth ulcers, iron deficiency anaemia, and diarrhoea. She has been losing weight and reports joint pains. What is the most important investigation to request?","options":["FBC only","Serum IgA tissue transglutaminase antibodies and IgA level","Serology for H. pylori","CT abdomen","Barium swallow"],"correct":1,"explanation":"The combination of recurrent oral ulcers, iron deficiency anaemia, diarrhoea, weight loss, and arthralgia raises strong suspicion of coeliac disease. The initial investigation of choice is serum IgA anti-tissue transglutaminase (tTG) antibodies alongside total IgA (to exclude IgA deficiency, which would cause a false negative). Coeliac disease is the most common associated systemic cause of recurrent aphthous stomatitis in this clinical context."},
    {"id":"oralmed_17","type":"sba","stem":"A 42-year-old man presents with recurrent oral ulceration, genital ulceration, and right anterior uveitis. Oral examination shows three major aphthous-type ulcers on the soft palate. What is the most likely diagnosis?","options":["Recurrent aphthous stomatitis","Behçet's disease","Reiter's syndrome (reactive arthritis)","Herpes zoster","Crohn's disease"],"correct":1,"explanation":"Behçet's disease (International Study Group criteria) requires recurrent oral ulceration (≥3 episodes in 12 months) plus at least two of: genital ulceration, eye lesions (uveitis/retinal vasculitis), skin lesions (pseudofolliculitis, erythema nodosum), or positive pathergy test. This patient meets the criteria with oral ulcers, genital ulcers, and uveitis. It is more common in patients from the Middle East and Asia along the ancient 'Silk Road'."},
    {"id":"oralmed_18","type":"sba","stem":"A 60-year-old woman presents with burning and dryness of the mouth for 2 years. Stimulated salivary flow rate is 0.5 mL/min (low). She also complains of dry eyes. Blood tests show positive anti-Ro (SSA) and anti-La (SSB) antibodies. What is the most likely diagnosis?","options":["Primary Sjögren's syndrome","Sarcoidosis","Diabetes mellitus","Head and neck radiation sequelae","Dehydration-related xerostomia"],"correct":0,"explanation":"Primary Sjögren's syndrome presents with the triad of dry mouth (xerostomia), dry eyes (keratoconjunctivitis sicca), and parotid enlargement, in the absence of another connective tissue disease. Positive anti-Ro (SSA) and anti-La (SSB) antibodies are highly specific for primary Sjögren's. ACR/EULAR 2016 criteria include these antibodies, salivary flow testing, and minor salivary gland biopsy (focal lymphocytic sialadenitis)."},
    {"id":"oralmed_19","type":"sba","stem":"A patient with Sjögren's syndrome complains that their dentures are loose and their mouth is very dry. Which medication is most appropriate for stimulating salivary flow?","options":["Carboxymethylcellulose spray (saliva substitute)","Pilocarpine 5 mg three times daily","Hyoscine hydrobromide","Amitriptyline 25 mg nocte","Prednisolone 30 mg daily"],"correct":1,"explanation":"Pilocarpine (a muscarinic agonist) stimulates residual salivary gland function and is effective in patients with some residual glandular capacity, as in many Sjögren's patients. It is licensed for treatment of xerostomia and increases both salivary and lacrimal secretions. Side effects include sweating, flushing, and urinary frequency. Saliva substitutes provide symptomatic relief but do not stimulate gland function."},
    {"id":"oralmed_20","type":"sba","stem":"Which malignancy are patients with primary Sjögren's syndrome at significantly increased risk of developing?","options":["Squamous cell carcinoma of the oral cavity","Non-Hodgkin lymphoma (especially MALT lymphoma of the salivary glands)","Thyroid carcinoma","Squamous cell carcinoma of the oropharynx","Hepatocellular carcinoma"],"correct":1,"explanation":"Patients with primary Sjögren's syndrome have a 5–44-fold increased risk of non-Hodgkin lymphoma, most commonly mucosa-associated lymphoid tissue (MALT) lymphoma of the salivary glands. Risk factors within Sjögren's include parotid gland enlargement, lymphadenopathy, cryoglobulinaemia, and low C4 complement. Any progressive unexplained parotid enlargement in a Sjögren's patient warrants urgent investigation."},
    {"id":"oralmed_21","type":"sba","stem":"A 35-year-old HIV-positive patient on combination antiretroviral therapy (CD4 count 180 cells/μL) presents with creamy white plaques on his hard palate and tongue that can be wiped off leaving a raw base. What is the most appropriate treatment?","options":["Topical corticosteroids","Nystatin suspension 1 mL (100,000 units) four times daily","Systemic aciclovir 200 mg five times daily","Chlorhexidine 0.2% mouthwash twice daily","Systemic fluconazole 50 mg daily for 7–14 days"],"correct":4,"explanation":"Pseudomembranous candidiasis in a significantly immunosuppressed patient (CD4 <200) requires systemic antifungal treatment. Fluconazole 50–100 mg daily for 7–14 days is the first-line systemic agent and is preferred over topical nystatin (which may not adequately control disease at this level of immunosuppression). Improving CD4 count through antiretroviral optimisation is the key long-term measure."},
    {"id":"oralmed_22","type":"sba","stem":"A 70-year-old complete denture wearer presents with diffuse erythema of the denture-bearing area of the hard palate. The dentures are worn overnight. Angular cheilitis is present. What is the most likely diagnosis and management?","options":["Traumatic ulcer from ill-fitting denture — reassure and review","Denture-related stomatitis (Candida) — topical antifungal + denture hygiene improvement","Erythroplakia — urgent biopsy","Geographic stomatitis — no treatment needed","Atrophic lichen planus — topical steroid"],"correct":1,"explanation":"Denture-related stomatitis (Newton's type II–III) is caused by Candida albicans and presents as diffuse erythema under a denture. Risk factors include overnight denture wearing, poor denture hygiene, xerostomia, and immunosuppression. Management: topical antifungal (miconazole oromucosal gel to fitting surface of denture or nystatin), improve denture hygiene, remove dentures at night, and disinfect/replace denture if necessary. Angular cheilitis is often a co-existing candidal infection."},
    {"id":"oralmed_23","type":"sba","stem":"A 48-year-old woman presents with burning of the mouth and tongue, especially in the afternoon and evening. There is no visible mucosal abnormality. Blood tests including FBC, ferritin, B12, folate, glucose, and thyroid function are all normal. She is postmenopausal and anxious. What is the most likely diagnosis?","options":["Oral candidiasis","Burning mouth syndrome","Atrophic glossitis","Oral submucous fibrosis","Sjögren's syndrome"],"correct":1,"explanation":"Burning mouth syndrome (BMS) is a chronic orofacial pain condition characterised by burning sensation in the oral mucosa in the absence of any identifiable mucosal lesion or relevant medical condition. It predominantly affects postmenopausal women and is associated with anxiety and depression. All investigations are normal. Management is multidisciplinary: cognitive behavioural therapy, low-dose clonazepam, alpha-lipoic acid, and reassurance."},
    {"id":"oralmed_24","type":"sba","stem":"A 62-year-old man presents with a firm, painless, irregular ulcer on the right lateral border of the tongue that has been present for 6 weeks. He is a smoker and drinks alcohol daily. What is the single most important next step?","options":["Prescribe miconazole gel and review in 2 weeks","Prescribe topical corticosteroid and review in 1 month","Take an urgent biopsy and refer via the 2-week wait (urgent suspected cancer) pathway","Prescribe aciclovir for possible herpes","Take a culture swab for Candida"],"correct":2,"explanation":"A firm, indurated, non-healing ulcer on the lateral tongue in a smoker/alcohol drinker requires urgent biopsy and 2-week wait referral to exclude oral squamous cell carcinoma. The lateral border of the tongue is the most common site for oral cancer in the UK. Any mucosal ulcer that fails to heal after 3 weeks with no obvious benign cause must be biopsied urgently. Delaying diagnosis significantly worsens prognosis."},
    {"id":"oralmed_25","type":"sba","stem":"Oral squamous cell carcinoma (OSCC) is diagnosed in a 58-year-old man. Which lymph node group is the primary drainage site for most oral cavity tumours?","options":["Supraclavicular nodes","Submandibular and jugulodigastric (level I and II) nodes","Parotid nodes","Posterior cervical nodes","Preauricular nodes"],"correct":1,"explanation":"The primary lymphatic drainage of the oral cavity runs to the submental and submandibular (level I) and jugulodigastric/upper deep cervical (level II) nodes. Regional lymph node involvement dramatically worsens prognosis: a single ipsilateral node involvement (N1) reduces 5-year survival by approximately 50%. Staging requires clinical and radiological assessment; elective neck dissection is often performed even with a clinically N0 neck."},
    {"id":"oralmed_26","type":"sba","stem":"A 30-year-old non-smoking man presents with a tonsillar mass and enlarged ipsilateral lymphadenopathy. He is HPV-16 positive. Compared to HPV-negative OSCC, which statement is most accurate?","options":["HPV-positive oropharyngeal cancer has a worse prognosis","HPV-positive oropharyngeal cancer has a significantly better prognosis and often affects younger non-smokers","HPV status has no effect on treatment or prognosis","HPV-positive patients have higher rates of synchronous oral cavity SCC","HPV-positive tumours are more radio-resistant"],"correct":1,"explanation":"HPV-positive (particularly HPV-16) oropharyngeal squamous cell carcinoma has a significantly better prognosis than HPV-negative OSCC. The 5-year survival for HPV-positive disease is approximately 80–90% vs 40–50% for HPV-negative. It typically affects younger, non-smoking patients. The mechanism involves HPV oncoprotein E6/E7 inactivating p53 and Rb. HPV vaccination (Gardasil-9) is now offered to all genders in UK school programmes."},
    {"id":"oralmed_27","type":"sba","stem":"A 55-year-old woman on long-term nifedipine for hypertension presents with gingival overgrowth. The hyperplastic tissue is firm, pale pink, and shows no bleeding on probing. What is the most appropriate management?","options":["Prescribe antifungals and review","Improve oral hygiene alone; this will resolve completely","Refer for a medication review; substitute an alternative antihypertensive if possible, combined with meticulous oral hygiene","Prescribe systemic antibiotics for 2 weeks","Immediate surgical gingivectomy"],"correct":2,"explanation":"Drug-induced gingival overgrowth (DIGO) occurs with calcium channel blockers (nifedipine, amlodipine), phenytoin, and ciclosporin. Management involves: optimising oral hygiene (plaque is a cofactor), requesting a medication review with the prescribing physician to consider substituting the offending drug (e.g. replace nifedipine with an ACE inhibitor or beta-blocker), and surgical gingivectomy if overgrowth persists despite conservative measures."},
    {"id":"oralmed_28","type":"sba","stem":"A 22-year-old woman presents with gingival bleeding, generalised gingival enlargement, and petechiae on the palate and labial mucosa. She is pale and fatigued. A full blood count shows Hb 8.2 g/dL, platelets 18 × 10⁹/L, and WCC 72 × 10⁹/L with 85% blasts on the differential. What is the most appropriate action?","options":["Scale and polish and review in 1 month","Prescribe antibiotics for acute necrotising ulcerative gingivitis","Urgent medical referral — these findings are consistent with acute leukaemia","Prescribe systemic steroids for immune thrombocytopenic purpura","Refer to periodontist for specialist periodontal treatment"],"correct":2,"explanation":"Acute leukaemia (most likely acute myeloid leukaemia given the blast count) can present with gingival enlargement due to leukaemic infiltrate, along with mucosal bleeding and petechiae from thrombocytopaenia, pallor from anaemia, and recurrent infections. The haematological findings (very high WCC with blasts, low platelets) are a haematological emergency requiring urgent hospital referral. Any dental treatment is contraindicated until the underlying condition is managed."},
    {"id":"oralmed_29","type":"sba","stem":"A 35-year-old woman with Crohn's disease presents with cobblestone appearance of the buccal mucosa, deep linear ulcers in the buccal sulcus, and lip swelling. These lesions preceded the bowel diagnosis by 6 months. What describes these oral manifestations?","options":["Oral manifestations are always secondary to bowel disease activity","These are specific oral manifestations of Crohn's disease occurring in approximately 5–10% of patients","These lesions are unrelated to Crohn's and represent mucous membrane pemphigoid","Cobblestoning is pathognomonic of Behçet's disease","These lesions require no treatment as they resolve with bowel treatment"],"correct":1,"explanation":"Oral Crohn's disease affects approximately 5–10% of patients and can precede bowel symptoms. Specific lesions include cobblestone appearance, deep linear ulcers (tag-like folds in the sulci), polypoid folds, mucosal tags, and lip/facial swelling (orofacial granulomatosis). These can occur independent of bowel disease activity. Histology shows non-caseating granulomas. Orofacial granulomatosis without bowel disease can also occur."},
    {"id":"oralmed_30","type":"sba","stem":"A 55-year-old man with poorly controlled type 1 diabetes presents with acute onset severe pain, necrotising ulceration of the gingiva and alveolar mucosa, a fetid odour, and rapidly spreading necrosis involving the buccal mucosa and lip. What is the most likely diagnosis?","options":["Acute necrotising ulcerative gingivitis (ANUG)","Cancrum oris (noma)","Acute leukaemia","Mucormycosis","Aggressive periodontitis"],"correct":3,"explanation":"Mucormycosis (zygomycosis) is a rapidly progressive, life-threatening fungal infection caused by Mucor and Rhizopus species. It occurs predominantly in immunocompromised individuals (poorly controlled diabetes, haematological malignancy). It presents with necrotic, rapidly spreading black/brown lesions of the palate, maxillary sinus, and orbit. It requires urgent hospital admission, IV liposomal amphotericin B, and aggressive surgical debridement. It became more widely recognised during COVID-19-associated mucormycosis outbreaks."},
    {"id":"oralmed_31","type":"sba","stem":"A 40-year-old man presents with white, curdy lesions on the palate and tongue that wipe off, but recur rapidly. He is not known to be immunocompromised but has recently taken a course of broad-spectrum antibiotics. Candidal cultures are positive. He has not responded to two courses of fluconazole. What is the most important next step?","options":["Switch to nystatin pastilles","Prescribe itraconazole 200 mg daily","Test for fluconazole resistance with sensitivity testing","Arrange HIV testing","Prescribe voriconazole"],"correct":3,"explanation":"Recurrent or refractory oral candidiasis in an otherwise healthy adult who is not immunosuppressed should prompt testing for HIV. This is one of the clinical indicators for HIV testing per BHIVA/NICE guidance. Candidiasis is an AIDS-defining illness at CD4 <200. Once HIV status is established, antiretroviral therapy to restore CD4 count is the most effective long-term management. Antifungal resistance testing is secondary."},
    {"id":"oralmed_32","type":"sba","stem":"A 30-year-old woman presents with a tender swelling of the right parotid gland that has been present for 3 days. She is febrile (38.5°C), WCC 14.2 × 10⁹/L. The gland is enlarged and tender and pus can be expressed from Stenson's duct. What is the most likely diagnosis and immediate management?","options":["Parotid calculus — sialography and lithotripsy","Acute suppurative parotitis — IV antibiotics, IV fluids, oral stimulation","Parotid lymphoma — urgent referral for CT and biopsy","Mumps parotitis — supportive management only","Sarcoidosis — high-dose steroids"],"correct":1,"explanation":"Acute suppurative parotitis is a bacterial infection (commonly Staphylococcus aureus) presenting with rapid-onset painful parotid swelling, fever, and purulent discharge from Stenson's duct. It occurs in dehydrated, debilitated patients with poor oral hygiene. Management: IV antibiotics (flucloxacillin ± metronidazole), aggressive hydration, oral stimulation (lemon swabs, vitamin C), and oral hygiene. Surgical drainage is reserved for abscess formation."},
    {"id":"oralmed_33","type":"sba","stem":"A 45-year-old woman presents with bilateral painless parotid enlargement for 6 months associated with xerostomia and dry eyes. Serum ACE is elevated. Chest X-ray shows bilateral hilar lymphadenopathy. What is the most likely diagnosis causing the parotid enlargement?","options":["Primary Sjögren's syndrome","Parotid lymphoma","Sarcoidosis (Heerfordt's syndrome)","Mumps","HIV-related parotid disease"],"correct":2,"explanation":"Heerfordt's syndrome is a manifestation of sarcoidosis comprising parotid gland enlargement, uveitis, fever, and facial nerve palsy. Elevated serum ACE and bilateral hilar lymphadenopathy on CXR are characteristic of sarcoidosis. Oral granulomas can occur. Management involves systemic corticosteroids. Sarcoidosis affects black and South Asian populations disproportionately in the UK."},
    {"id":"oralmed_34","type":"sba","stem":"A 50-year-old smoker presents with a 2 cm smooth-surfaced submucosal swelling in the hard palate. It has been present for years and is not tender. CT shows a well-demarcated soft tissue mass without bone erosion. What is the most likely diagnosis?","options":["Squamous cell carcinoma of the hard palate","Torus palatinus","Minor salivary gland adenoma (pleomorphic adenoma)","Fibrous dysplasia","Ossifying fibroma"],"correct":2,"explanation":"Minor salivary gland tumours most commonly arise in the hard palate, and the majority are pleomorphic adenomas (the most common benign salivary gland tumour). They present as slow-growing, painless submucosal swellings. The palatal mucosa is thin so the swelling may appear smooth. Adenoid cystic carcinoma is the most common malignant minor salivary gland tumour. Any salivary gland swelling requires biopsy/imaging."},
    {"id":"oralmed_35","type":"sba","stem":"A 65-year-old woman on bisoprolol and ramipril presents with a sudden-onset non-pitting swelling of the lower lip and tongue, without urticaria. She had a similar episode 6 months ago. What is the most likely cause?","options":["Angioedema due to ACE inhibitor","Angioedema due to bisoprolol","Hereditary angioedema","Allergic angioedema to dental materials","Oral Crohn's disease"],"correct":0,"explanation":"ACE inhibitor–induced angioedema is a well-recognised class effect caused by accumulation of bradykinin (due to inhibition of ACE, which normally degrades bradykinin). It presents as recurrent non-pruritic, non-pitting oedema of the lips, tongue, face, and airway. It is not IgE-mediated so adrenaline is less effective. Management: stop ACE inhibitor, switch to an ARB (lower risk), treat acute attack supportively. It can occur months to years after starting the drug."},
    {"id":"oralmed_36","type":"sba","stem":"A 19-year-old student presents with multiple painful aphthous ulcers, folliculitis, and a positive pathergy test (pustule developing at venipuncture site). He recently moved to the UK from Turkey. What is the most likely diagnosis?","options":["Recurrent aphthous stomatitis","Reiter's syndrome","Behçet's disease","Systemic lupus erythematosus","Crohn's disease"],"correct":2,"explanation":"The pathergy test (development of a pustule at a minor skin injury site) is a specific finding in Behçet's disease, particularly in patients from the Middle East and Japan. Combined with oral and genital ulceration and folliculitis, this case meets the International Study Group criteria for Behçet's. The disease is more prevalent along the 'Silk Road' from Japan to the Mediterranean. Colchicine is used for mucosal disease; severe disease requires systemic immunosuppression."},
    {"id":"oralmed_37","type":"sba","stem":"A 55-year-old woman presents with 3-month history of painful, burning, and bleeding gums. Examination shows desquamative gingivitis with peeling of the gingival epithelium bilaterally. Nikolsky sign is positive on the attached gingiva. What is the most important diagnostic investigation?","options":["OPG radiograph","Microbiological swab for Candida","Perilesional biopsy with direct immunofluorescence","Exfoliative cytology","Serum antinuclear antibody","Serum immunoglobulins"],"correct":2,"explanation":"Desquamative gingivitis is not a diagnosis but a clinical presentation that can be caused by mucous membrane pemphigoid, pemphigus vulgaris, erosive lichen planus, or linear IgA disease, among others. The definitive investigation is perilesional biopsy for direct immunofluorescence (DIF), which distinguishes these conditions by the pattern and type of immunoglobulin deposition. DIF is diagnostic; haematoxylin and eosin histology alone is insufficient."},
    {"id":"oralmed_38","type":"sba","stem":"A 40-year-old woman with newly diagnosed pemphigus vulgaris has severe oral erosions. What is the first-line systemic treatment?","options":["Azathioprine 2 mg/kg/day alone","High-dose prednisolone (1 mg/kg/day) ± azathioprine or mycophenolate mofetil as steroid-sparing agent","Dapsone 100 mg/day","Colchicine 1.5 mg/day","Topical tacrolimus alone"],"correct":1,"explanation":"Systemic corticosteroids (prednisolone 1–1.5 mg/kg/day) are first-line for pemphigus vulgaris, with a steroid-sparing agent (azathioprine or mycophenolate mofetil) added to reduce long-term steroid side effects. Rituximab (anti-CD20) is increasingly used in moderate-to-severe pemphigus. Without treatment, pemphigus vulgaris was historically fatal; with immunosuppression, mortality is <5%. Close dermatology and oral medicine collaboration is essential."},
    {"id":"oralmed_39","type":"sba","stem":"A 65-year-old woman with mucous membrane pemphigoid has progressive subconjunctival scarring and symblepharon formation on the right eye. Which management step is most critical?","options":["Continue topical dapsone alone","Urgent ophthalmology referral and systemic immunosuppression to prevent blindness","Prescribe topical corticosteroid drops only","Reassure the patient as ocular involvement is self-limiting","Prescribe doxycycline 100 mg once daily"],"correct":1,"explanation":"Ocular involvement in mucous membrane pemphigoid (MMP) can progress to symblepharon (adhesion between conjunctiva and eyelid), entropion, corneal vascularisation, and blindness. It is the most serious complication of MMP and requires urgent ophthalmology referral. Systemic immunosuppression (dapsone, azathioprine, or cyclophosphamide for severe disease) is indicated to halt progression. Ocular disease may progress even when oral disease appears controlled."},
    {"id":"oralmed_40","type":"sba","stem":"A 55-year-old man with no significant past medical history presents with a white patch on the soft palate that cannot be wiped off and has been present for 3 months. There is no history of smoking or alcohol use. You consider HPV as a possible aetiology. Which HPV type is most strongly associated with oral potentially malignant disorders and oropharyngeal cancer?","options":["HPV type 6","HPV type 11","HPV type 16","HPV type 18","HPV type 31"],"correct":2,"explanation":"HPV-16 is the most common high-risk HPV type associated with oropharyngeal squamous cell carcinoma and is present in approximately 72% of HPV-positive oropharyngeal cancers. HPV-18 is the second most common high-risk type. HPV-6 and -11 are low-risk types causing benign lesions (condylomata, papillomas). The HPV vaccine (Gardasil-9) covers types 6, 11, 16, 18, 31, 33, 45, 52, and 58."},
    {"id":"oralmed_41","type":"sba","stem":"A 28-year-old healthcare worker presents with multiple painful vesicles and ulcers on the tip of a finger, which she attributes to touching a patient's herpetic lesion. What is this condition called?","options":["Herpetic whitlow","Digital fibroma","Paronychia","Granuloma annulare","Hand-foot-mouth disease"],"correct":0,"explanation":"Herpetic whitlow is HSV-1 or HSV-2 infection of the finger acquired by direct inoculation through a breach in the skin barrier. It is an occupational risk for dental professionals who do not wear gloves. It presents with painful vesicles, swelling, and erythema of the finger, and can be recurrent. Management is supportive; antiviral (oral aciclovir) may reduce severity if started early. Glove use prevents occupational transmission."},
    {"id":"oralmed_42","type":"sba","stem":"A 65-year-old man develops a unilateral painful erythematous vesicular rash on the left side of his face extending from the ear to the cheek, with vesicles inside the left ear canal and anterior to the ear. He has facial nerve palsy and vertigo. What is the diagnosis?","options":["Bell's palsy","Ramsay Hunt syndrome (herpes zoster oticus)","Trigeminal neuralgia","Melkersson-Rosenthal syndrome","Idiopathic facial palsy"],"correct":1,"explanation":"Ramsay Hunt syndrome is caused by reactivation of VZV in the geniculate ganglion of the facial nerve (CN VII). The classic triad is: ipsilateral facial nerve palsy, otalgia, and vesicles in the outer ear (auricular herpes zoster) or oral cavity (soft palate, anterior tonsillar pillar). Vertigo and tinnitus occur if CN VIII is affected. Treatment: oral prednisolone + aciclovir/valaciclovir started within 72 hours; prognosis is worse than Bell's palsy."},
    {"id":"oralmed_43","type":"sba","stem":"A 50-year-old woman presents with a painful, unilateral vesicular eruption along the distribution of the right maxillary division of the trigeminal nerve, affecting the skin of the right cheek, ala of the nose, and the hard palate. She had chickenpox in childhood. What is the diagnosis and treatment?","options":["Primary herpes simplex — aciclovir 200 mg 5× daily for 5 days","Herpes zoster (shingles) — valaciclovir 1 g three times daily for 7 days","Erythema multiforme — supportive care","Pemphigus vulgaris — systemic prednisolone","Trigeminal neuralgia — carbamazepine"],"correct":1,"explanation":"Herpes zoster (shingles) results from reactivation of latent VZV in the trigeminal ganglion, causing a unilateral vesicular eruption in one dermatome. V2 involvement affects the cheek, side of nose, and palate. Antiviral treatment with valaciclovir 1 g TDS or aciclovir 800 mg 5× daily for 7 days should be started within 72 hours of rash onset to reduce severity and risk of post-herpetic neuralgia, which is more common in older patients."},
    {"id":"oralmed_44","type":"sba","stem":"A 30-year-old woman presents with recurrent episodes of lip swelling lasting 24–72 hours, fissured tongue on examination, and a past history of facial palsy that resolved. Which syndrome is most likely?","options":["Behçet's disease","Angioedema","Melkersson-Rosenthal syndrome","Crohn's disease","Lipoid proteinosis"],"correct":2,"explanation":"Melkersson-Rosenthal syndrome is a rare neurological condition characterised by the triad of: (1) recurrent orofacial granulomatous swelling (usually lip), (2) relapsing facial palsy, and (3) fissured (plicated) tongue. The full triad is present in only 25% of cases. Histology shows non-caseating granulomas. It is part of the spectrum of orofacial granulomatosis. Treatment is with systemic corticosteroids; intralesional triamcinolone is used for lip swelling."},
    {"id":"oralmed_45","type":"sba","stem":"A 60-year-old woman presents with a 2 cm painless ulcer on the anterior hard palate. Biopsy shows tumour comprising small blue cells with round nuclei in nests and cribriform ('Swiss cheese') pattern. There is perineural invasion. What is the most likely diagnosis?","options":["Squamous cell carcinoma","Pleomorphic adenoma","Adenoid cystic carcinoma","Mucoepidermoid carcinoma","Acinic cell carcinoma"],"correct":2,"explanation":"Adenoid cystic carcinoma (ACC) is the most common malignant minor salivary gland tumour, most frequently affecting the hard palate. The characteristic histological patterns are cribriform ('Swiss cheese'), tubular, and solid. Perineural invasion is a hallmark of ACC and accounts for its propensity for pain, facial nerve involvement, and local recurrence. It has a deceptively indolent course but high rates of late distant metastasis (lungs)."},
    {"id":"oralmed_46","type":"sba","stem":"A 30-year-old woman presents with recurrent oral ulcers that have been investigated and confirmed as minor RAS. No underlying systemic cause is found. Which topical treatment has the best evidence for reducing pain and duration?","options":["Topical antibiotics (tetracycline mouthwash)","Topical corticosteroids (triamcinolone acetonide paste or betamethasone mouthwash)","Topical aciclovir cream","Topical chlorhexidine 0.2% mouthwash alone","Topical lidocaine gel"],"correct":1,"explanation":"Topical corticosteroids are the most effective treatment for painful aphthous ulcers, reducing pain, duration, and frequency of episodes. Preparations include triamcinolone acetonide (Adcortyl in Orabase), betamethasone 0.5 mg/5 mL mouthwash, or hydrocortisone pellets. Tetracycline mouthwash can reduce pain and duration but is second-line; it is also not suitable for children. Lidocaine provides symptomatic pain relief only."},
    {"id":"oralmed_47","type":"sba","stem":"A 70-year-old man with type 2 diabetes, well-controlled on metformin, presents with a patchy map-like erythematous area on the dorsal tongue with white borders that migrates in pattern from week to week. What is this condition?","options":["Oral candidiasis","Hairy leukoplakia","Geographic tongue (benign migratory glossitis)","Atrophic glossitis","Oral lichen planus"],"correct":2,"explanation":"Geographic tongue (benign migratory glossitis) is characterised by erythematous, depapillated patches with white serpentine borders that change in shape and position over days to weeks. It affects the dorsal tongue and is a benign, common condition. Most cases are asymptomatic; some patients report sensitivity to spicy or acidic foods. It is associated with fissured tongue and psoriasis. No treatment is required unless symptomatic."},
    {"id":"oralmed_48","type":"sba","stem":"A 44-year-old man of West African origin presents with a 3 cm painless nodule on the hard palate with central necrosis. HIV test is positive (CD4 count 50). Biopsy shows large atypical cells with coarse chromatin and mitoses. What is the most likely diagnosis?","options":["Squamous cell carcinoma","Denture-induced fibrous hyperplasia","Kaposi's sarcoma","Lymphoma (diffuse large B-cell)","Reactive lymph node"],"correct":2,"explanation":"Kaposi's sarcoma (KS) is caused by HHV-8 and is an AIDS-defining malignancy. The hard palate and gingiva are the most common oral sites. Lesions begin as flat, violaceous macules and progress to nodules that may ulcerate and bleed. It occurs at very low CD4 counts. Initiation of antiretroviral therapy (which raises CD4 count) often leads to regression. Local chemotherapy (intralesional vinblastine) or radiotherapy is used for symptomatic lesions."},
    {"id":"oralmed_49","type":"sba","stem":"A 25-year-old woman with insulin-dependent diabetes presents with recurrent angular cheilitis and oral candidiasis. Her blood glucose control is poor (HbA1c 92 mmol/mol). Which is the most important aetiological factor?","options":["Nutritional deficiency","Ill-fitting dentures","Immunosuppression from poorly controlled diabetes impairing neutrophil function","Antibiotic use","Reduced vertical dimension"],"correct":2,"explanation":"Poorly controlled diabetes impairs innate immune defences, particularly neutrophil function (reduced chemotaxis, phagocytosis, and killing ability) and cell-mediated immunity. The resulting immune deficit predisposes to opportunistic infections including oral and cutaneous candidiasis. The high glucose environment also supports Candida growth. Improving glycaemic control is the most important intervention to reduce recurrence."},
    {"id":"oralmed_50","type":"sba","stem":"A 35-year-old man with lichen planus is concerned about his risk of oral cancer. He has reticular lesions on the buccal mucosa. What is the most accurate statement regarding malignant transformation?","options":["Oral lichen planus never undergoes malignant transformation","All forms of OLP carry the same malignant transformation risk","Reticular OLP has a low transformation risk (~1%); erosive OLP and tongue lesions carry a higher risk","OLP is no longer considered a potentially malignant disorder by the WHO","Annual biopsy of all OLP lesions is mandatory"],"correct":2,"explanation":"Oral lichen planus is recognised by the WHO as a potentially malignant disorder. Malignant transformation is estimated at 0.5–2% overall, with reticular lesions having the lowest risk and erosive/atrophic lesions, particularly on the tongue or floor of mouth, having higher risk. Regular 6–12 monthly surveillance is recommended. Not all lesions require biopsy at every review; biopsy is indicated when lesions change appearance, especially developing erythematous or indurated areas."},
    {"id":"oralmed_51","type":"sba","stem":"A 50-year-old woman presents with bilateral parotid gland enlargement, dry mouth, and a diffuse purpuric skin rash on the legs. Blood tests show mixed cryoglobulinaemia and positive anti-Ro antibodies. What systemic condition is most likely?","options":["Sarcoidosis","Primary Sjögren's syndrome with extraglandular manifestations","Systemic lupus erythematosus","HIV-associated salivary gland disease","IgG4-related disease"],"correct":1,"explanation":"Parotid enlargement, xerostomia, anti-Ro antibodies, and cryoglobulinaemia (causing purpuric vasculitic rash) together indicate primary Sjögren's syndrome with systemic extraglandular involvement. Cryoglobulinaemia in Sjögren's is associated with increased risk of lymphoma. Systemic features can include arthritis, pulmonary involvement, peripheral neuropathy, and renal disease. Monitoring for lymphoma is essential in this group."},
    {"id":"oralmed_52","type":"sba","stem":"A 45-year-old male smoker presents with a white patch on the floor of the mouth. Biopsy shows severe epithelial dysplasia. What is the most appropriate management?","options":["Observation with 6-monthly review","Topical retinoids alone","Surgical excision or laser ablation with close follow-up","Radiotherapy","Intralesional bleomycin injection"],"correct":2,"explanation":"Severe epithelial dysplasia in a high-risk site (floor of mouth) warrants intervention, typically surgical excision or laser ablation, followed by close surveillance. The floor of mouth and ventral tongue are the highest-risk sites for malignant transformation. Smoking cessation is strongly advised. Even after treatment, recurrence is possible, particularly if risk factors persist. Lifelong follow-up in a specialist oral medicine clinic is required."},
    {"id":"oralmed_53","type":"sba","stem":"A 62-year-old man on long-term phenytoin for epilepsy presents with generalised gingival overgrowth. Which statement best describes the mechanism?","options":["Phenytoin directly stimulates fibroblast proliferation independently of plaque","Phenytoin-induced overgrowth is entirely due to poor oral hygiene","Phenytoin increases gingival fibroblast collagen synthesis, with plaque-induced inflammation as a major cofactor","Phenytoin causes gingival overgrowth only at doses above 300 mg/day","Gingival overgrowth from phenytoin is irreversible even with dose reduction"],"correct":2,"explanation":"Phenytoin-induced gingival overgrowth results from increased fibroblast collagen synthesis and reduced collagen degradation. While phenytoin has a direct pharmacological effect on fibroblasts, plaque-induced inflammation is a major cofactor — patients with good oral hygiene show significantly less overgrowth. Meticulous plaque control and drug review (switching to alternative anticonvulsants) are the primary interventions before surgical gingivectomy."},
    {"id":"oralmed_54","type":"sba","stem":"A 24-year-old woman with coeliac disease presents with recurring aphthous ulcers despite a strict gluten-free diet. Blood tests show serum ferritin 6 µg/L, B12 148 pg/mL, and folate 2.1 nmol/L. What is the most appropriate next step?","options":["Prescribe long-term topical corticosteroids only","Correct nutritional deficiencies (iron, B12, folate supplementation) as this is the primary aetiological factor","Refer for immunosuppressive therapy with dapsone","Test for Behçet's disease","Arrange upper GI endoscopy to re-evaluate coeliac disease control"],"correct":1,"explanation":"In patients with coeliac disease and recurrent aphthous stomatitis, haematinic deficiencies (iron, B12, folate) are found in up to 20% of cases and are a treatable aetiological factor. Correcting deficiencies often markedly reduces ulcer frequency. If the gluten-free diet is strict and deficiencies persist, absorption may still be impaired, in which case parenteral supplementation may be needed. Endoscopy to re-evaluate histological remission can also guide management."},
    {"id":"oralmed_55","type":"sba","stem":"A 70-year-old man presents with a painless, hard, irregular mass on the right side of the tongue that has been growing for 2 months. He is a smoker and drinks regularly. On examination, the tongue is fixed to the floor of mouth. TNM staging shows T4aN2bM0. What does T4a mean in the TNM classification for oral SCC?","options":["Tumour ≤2 cm in greatest dimension","Tumour >2 cm and ≤4 cm","Tumour invades adjacent structures (cortical bone, deep tongue muscles, skin)","Distant metastasis present","Tumour invades masticator space, pterygoid plates, or skull base"],"correct":2,"explanation":"In the AJCC/UICC 8th edition TNM classification for oral cavity SCC: T1 ≤2 cm; T2 >2–4 cm; T3 >4 cm; T4a = moderately advanced local disease (invades adjacent structures: cortical bone, floor of mouth skin, deep extrinsic tongue muscles); T4b = very advanced disease (invades masticator space, pterygoid plates, skull base, or encases internal carotid artery). Tongue fixation to floor of mouth indicates deep muscle involvement (T4a minimum)."},
    {"id":"oralmed_56","type":"sba","stem":"A 55-year-old man presents with trismus, dysphagia, right-sided cheek ulceration, and weight loss. He has a background of oral submucous fibrosis from areca nut use. Biopsy of the cheek ulcer confirms squamous cell carcinoma. What is the approximate 5-year survival for stage IV oral squamous cell carcinoma?","options":["80–90%","60–70%","40–50%","20–30%","<10%"],"correct":3,"explanation":"The 5-year survival for oral squamous cell carcinoma varies markedly by stage: stage I ~85%, stage II ~70%, stage III ~55%, stage IV ~30–40%. Despite advances in surgery, reconstruction, and chemoradiotherapy, stage IV oral SCC still carries a poor prognosis. Early detection is crucial; the 5-year survival for early-stage oral SCC is significantly better, highlighting the importance of regular oral cancer screening in high-risk patients."},
    {"id":"oralmed_57","type":"sba","stem":"A 45-year-old woman presents with bilateral tender parotid gland enlargement and weight loss. She has recently been placed on methotrexate for rheumatoid arthritis. FNAC of the parotid shows large atypical lymphoid cells. What is the most likely diagnosis?","options":["Drug-induced sialadenitis from methotrexate","Reactive parotitis","Non-Hodgkin lymphoma of the parotid","Pleomorphic adenoma","Warthin's tumour"],"correct":2,"explanation":"Methotrexate-associated lymphoproliferative disorders are a recognised complication of methotrexate therapy. They can occur in lymph nodes or extranodal sites including salivary glands. FNAC showing large atypical lymphoid cells in a parotid lesion in a patient on methotrexate warrants urgent haematology/oncology referral. In some cases, withdrawal of methotrexate alone leads to regression. EBV reactivation may play a pathogenic role."},
    {"id":"oralmed_58","type":"sba","stem":"A 68-year-old woman with severe xerostomia due to post-radiotherapy salivary gland damage asks about caries prevention. Which is the single most important preventive measure?","options":["Chlorhexidine varnish application every 6 months","Daily use of high-fluoride toothpaste (2800–5000 ppm fluoride) and fluoride rinse","Dietary advice alone","Routine prophylaxis every 3 months without topical fluoride","Fissure sealants on remaining posterior teeth"],"correct":1,"explanation":"Post-radiotherapy xerostomia is associated with rampant radiation caries (affecting cervical and incisal edges, which are usually spared). High-fluoride toothpaste (2800–5000 ppm) used twice daily, combined with a 0.05% fluoride mouthrinse and dietary sugar control, is the cornerstone of prevention per SDCEP/FGDP guidance. Chlorhexidine varnish is adjunctive. These patients require very frequent dental review and proactive preventive management."},
    {"id":"oralmed_59","type":"sba","stem":"A 55-year-old man presents with a 6-week history of a non-healing ulcer on his lower lip at the vermilion border. He works outdoors and has extensive solar damage to his lips. Biopsy shows invasive squamous cell carcinoma. What is the predisposing factor specific to this site?","options":["HPV infection","Tobacco use","Chronic actinic damage (actinic cheilitis)","Ill-fitting denture","Candidal infection"],"correct":2,"explanation":"The lower lip vermilion is the most common site for squamous cell carcinoma of the lip, and the main aetiological factor is chronic ultraviolet radiation exposure (actinic cheilitis). This predisposing lesion presents as dry, scaly, blurred vermilion border and carries a malignant transformation rate of approximately 1–10%. Lip SCC has a better prognosis than intraoral SCC due to earlier detection and lower rate of nodal metastasis."},
    {"id":"oralmed_60","type":"sba","stem":"A 45-year-old woman is referred with oral lichenoid lesions that are adjacent to amalgam restorations bilaterally. She reports sensitivity to amalgam on patch testing. What is the most appropriate management?","options":["Prescribe topical corticosteroids and observe indefinitely","Replace amalgam restorations with composite or ceramic restorations","Perform incisional biopsy and arrange immunofluorescence immediately","Prescribe systemic immunosuppressants","Reassure and discharge; lichenoid reactions do not resolve with amalgam removal"],"correct":1,"explanation":"Amalgam-associated oral lichenoid reactions (OLR) can resolve or improve significantly following replacement of the causative amalgam restorations, particularly when the lesions are in direct contact with the restorations and patch testing confirms mercury sensitivity. This distinguishes them from idiopathic OLP. Resolution rates of up to 90% have been reported after amalgam replacement. Biopsy prior to or alongside replacement may be considered to confirm diagnosis and exclude dysplasia."}
  ],
  pathology: [
    {"id":"pathology_1","type":"sba","stem":"A 40-year-old man has an asymptomatic radiolucency at the apex of a non-vital lower molar. Histology shows a cyst lined by non-keratinised stratified squamous epithelium with a fibrous wall containing cholesterol clefts, foamy macrophages, and haemosiderin deposits. What is the diagnosis?","options":["Odontogenic keratocyst","Dentigerous cyst","Radicular (periapical) cyst","Residual cyst","Lateral periodontal cyst"],"correct":2,"explanation":"Radicular (periapical) cysts are the most common odontogenic cysts, arising from Malassez epithelial rests stimulated by inflammatory mediators from a necrotic pulp. Histologically they are lined by non-keratinised stratified squamous epithelium with a fibrous wall containing chronic inflammatory cells, cholesterol clefts (from lysed erythrocytes), foamy macrophages, and haemosiderin. They are always associated with a non-vital tooth."},
    {"id":"pathology_2","type":"sba","stem":"Histological examination of an odontogenic cyst shows a thin, corrugated, parakeratinised stratified squamous epithelium 6–8 cells thick, with a palisaded basal cell layer and a thin fibrous capsule. Daughter cysts are present in the wall. What is the diagnosis?","options":["Dentigerous cyst","Radicular cyst","Odontogenic keratocyst (OKC)","Lateral periodontal cyst","Glandular odontogenic cyst"],"correct":2,"explanation":"The odontogenic keratocyst (OKC) has a characteristic histology: thin, parakeratinised epithelium of uniform thickness (6–8 cells), palisaded basal layer with nuclear polarisation away from the basement membrane, corrugated surface, thin fibrous capsule, and satellite (daughter) cysts in the wall. These features account for its aggressive behaviour and high recurrence rate. Gorlin-Goltz syndrome (PTCH1 mutation) is associated with multiple OKCs."},
    {"id":"pathology_3","type":"sba","stem":"A patient has multiple odontogenic keratocysts, bifid ribs, calcified falx cerebri, frontal bossing, and a history of basal cell carcinomas. What is the underlying condition?","options":["Cherubism","Gorlin-Goltz syndrome (naevoid basal cell carcinoma syndrome)","Down syndrome","Sturge-Weber syndrome","Multiple endocrine neoplasia type 1"],"correct":1,"explanation":"Gorlin-Goltz syndrome (naevoid basal cell carcinoma syndrome) is an autosomal dominant condition caused by mutations in the PTCH1 tumour suppressor gene (hedgehog signalling pathway). Features include multiple OKCs (jaw cysts), multiple basal cell carcinomas, calcified falx cerebri, bifid ribs, macrocephaly, frontal bossing, and increased risk of medulloblastoma. All patients with multiple OKCs should be evaluated for this syndrome."},
    {"id":"pathology_4","type":"sba","stem":"A 25-year-old man has a painless swelling in the right mandibular body. OPG shows a unilocular well-defined radiolucency between the roots of the lower right canine and first premolar. Both teeth are vital. Histology shows a thin epithelial lining with focal plaques. What is the most likely diagnosis?","options":["Radicular cyst","Dentigerous cyst","Lateral periodontal cyst","Residual cyst","Calcifying odontogenic cyst"],"correct":2,"explanation":"The lateral periodontal cyst (LPC) is a developmental odontogenic cyst arising from rests of the dental lamina, located lateral to the root of a vital tooth. It occurs most commonly between the mandibular canine and first premolar. Histologically it has a thin non-keratinised epithelial lining with focal epithelial plaques (glycogen-rich clear cells), which is the pathognomonic feature. The botryoid odontogenic cyst is the multilocular variant."},
    {"id":"pathology_5","type":"sba","stem":"A residual cyst is found in the posterior mandible 5 years after tooth extraction. What type of cyst is this?","options":["A dentigerous cyst that remained after extraction of the associated tooth","A radicular cyst that persisted after extraction of the associated tooth","A new cyst forming in the empty socket","A traumatic bone cyst","A nasopalatine duct cyst migrating inferiorly"],"correct":1,"explanation":"A residual cyst is a radicular cyst that remains in the jaw after the associated tooth has been extracted. If the radicular cyst is not completely removed at the time of extraction, the epithelial lining continues to proliferate. Residual cysts can grow slowly and are often detected incidentally on radiographs. They require enucleation. Dentigerous cysts are associated with unerupted teeth and cannot persist after their associated tooth is removed in the same manner."},
    {"id":"pathology_6","type":"sba","stem":"A 12-year-old child has a unilocular radiolucency associated with the crown of an unerupted lower right third molar. The radiograph shows the radiolucency attached at the cemento-enamel junction, with the crown of the tooth projecting into the lumen. What is the most likely diagnosis?","options":["Odontogenic keratocyst","Radicular cyst","Dentigerous (follicular) cyst","Calcifying odontogenic cyst","Eruption cyst"],"correct":2,"explanation":"A dentigerous cyst is the most common developmental odontogenic cyst and is associated with the crown of an unerupted tooth, attached at the CEJ with the crown projecting into the lumen. It arises from the reduced enamel epithelium. The mandibular third molar is the most common site, followed by the maxillary canine and mandibular premolar. It can displace the associated tooth, expand the jaw, and rarely undergo neoplastic transformation."},
    {"id":"pathology_7","type":"sba","stem":"A 35-year-old woman has a multilocular radiolucency of the posterior mandible that has been slowly expanding for 3 years. Biopsy shows follicles and strands of odontogenic epithelium with peripheral palisading and central stellate reticulum, with a fibrous stroma. What is the most likely diagnosis?","options":["Odontogenic myxoma","Central giant cell granuloma","Ameloblastoma","Ossifying fibroma","Calcifying epithelial odontogenic tumour"],"correct":2,"explanation":"Ameloblastoma is a benign but locally aggressive odontogenic tumour most commonly arising in the posterior mandible in adults. The classic follicular pattern shows islands of epithelium with peripheral palisaded columnar cells (with reverse nuclear polarity) and central stellate reticulum resembling enamel organ epithelium. The plexiform pattern shows anastomosing cords. Wide resection with clear margins is required due to high recurrence rates with conservative treatment."},
    {"id":"pathology_8","type":"sba","stem":"A 58-year-old male smoker is examined by his GDP and has a 3-week history of a non-healing white-and-red patch on the lateral border of the tongue. He also reports a hoarse voice for the past 4 weeks. According to NICE NG12 (Suspected Cancer: recognition and referral), what is the most appropriate action?","options":["Prescribe a course of nystatin and review in 4 weeks","Take an incisional biopsy in primary care and arrange routine review","Refer urgently under the suspected cancer pathway (2-week wait) for assessment in a head and neck cancer service","Reassure and review in 6 weeks with a smoking cessation referral","Arrange a routine GP review for the hoarseness only"],"correct":2,"explanation":"NICE NG12 mandates urgent suspected cancer referral (2-week wait) for adults with: an unexplained ulceration in the oral cavity lasting >3 weeks; a persistent unexplained lump in the neck; a red or red-and-white patch in the oral cavity consistent with erythroplakia or erythroleukoplakia; or persistent unexplained hoarseness lasting >3 weeks. Both this patient's tongue lesion and hoarseness independently meet 2WW criteria. Primary care biopsy or empirical antifungal treatment is inappropriate."},
    {"id":"pathology_9","type":"sba","stem":"A biopsy of a posterior maxillary lesion shows loose myxoid stroma with few spindle-shaped cells and entrapped odontogenic epithelial remnants. There is no significant calcification. What is the diagnosis?","options":["Desmoplastic fibroma","Odontogenic myxoma","Central giant cell granuloma","Ameloblastic fibroma","Ossifying fibroma"],"correct":1,"explanation":"Odontogenic myxoma arises from the mesenchymal component of the tooth germ (dental papilla or follicle). It presents as a painless jaw expansion with a multilocular radiolucency with fine trabeculae producing a 'honeycomb' or 'tennis racket' pattern on radiograph. Histologically it shows stellate and spindle cells in a loosely arranged mucoid matrix. It is locally aggressive and requires wide excision; curettage leads to high recurrence."},
    {"id":"pathology_10","type":"sba","stem":"A 20-year-old woman has a well-defined lesion in the mandible containing calcified dental tissue. OPG shows a radiopaque mass containing tooth-like structures of varying sizes ('denticles'). What is the most likely diagnosis?","options":["Compound odontome","Complex odontome","Ameloblastoma","Calcifying odontogenic cyst","Odontogenic fibroma"],"correct":0,"explanation":"An odontome is a hamartomatous developmental malformation composed of all dental tissues. A compound odontome contains multiple identifiable tooth-like structures (denticles) arranged in an orderly fashion — most common in the maxillary anterior region. A complex odontome has a disorganised mass of dental hard tissue without recognisable tooth morphology — more common in the posterior mandible. Both are treated by enucleation with minimal recurrence."},
    {"id":"pathology_11","type":"sba","stem":"A 45-year-old woman presents with a well-defined radiolucency of the anterior maxilla adjacent to the roots of vital incisors. She has no clinical symptoms. It does not respond to antibiotic treatment. Histology shows blood-filled spaces without an epithelial lining. What is the diagnosis?","options":["Radicular cyst","Aneurysmal bone cyst","Traumatic bone cyst (simple bone cyst)","Stafne bone cavity","Central giant cell granuloma"],"correct":2,"explanation":"A traumatic (simple/solitary) bone cyst is a pseudocyst with no epithelial lining. It typically presents as an asymptomatic unilocular radiolucency with scalloping between the roots of vital teeth, usually in the mandible of young patients. The cavity contains little or no fluid. Surgical exploration (which also treats the lesion by stimulating haemorrhage and filling) confirms the diagnosis. Spontaneous resolution can occur."},
    {"id":"pathology_12","type":"sba","stem":"A 30-year-old man presents with a rapidly expanding jaw lesion. Radiograph shows a 'soap bubble' radiolucency with cortical expansion and erosion. Biopsy shows blood-filled spaces separated by fibrous septa containing osteoclast-like giant cells and reactive bone. What is the most likely diagnosis?","options":["Central giant cell granuloma","Ameloblastoma","Aneurysmal bone cyst","Brown tumour of hyperparathyroidism","Odontogenic myxoma"],"correct":2,"explanation":"Aneurysmal bone cyst (ABC) is a benign but destructive lesion characterised by blood-filled spaces separated by fibrous septa containing osteoclast-like giant cells and reactive woven bone. It shows rapid expansion and can be locally destructive. It may arise de novo or as a secondary change in another lesion. Treatment is curettage, often with adjuvant therapy (denosumab, sclerotherapy) to reduce recurrence. It must be distinguished from central giant cell granuloma and telangiectatic osteosarcoma."},
    {"id":"pathology_13","type":"sba","stem":"A 28-year-old woman has a well-defined multilocular radiolucency of the anterior mandible that is causing cortical expansion. Biopsy shows a hypercellular fibrous stroma containing numerous multinucleate osteoclast-like giant cells distributed throughout. There is no blood-filled space. She is normocalcaemic. What is the most likely diagnosis?","options":["Aneurysmal bone cyst","Brown tumour of hyperparathyroidism","Central giant cell granuloma","Giant cell tumour of bone","Cherubism"],"correct":2,"explanation":"Central giant cell granuloma (CGCG) is a benign jaw lesion most common in young women, anterior mandible. Histology shows giant cells in a fibrous stroma — distinguished from aneurysmal bone cyst by the absence of blood-filled spaces. CGCG can be aggressive (rapid growth, cortical perforation) or non-aggressive. It is histologically indistinguishable from the brown tumour of hyperparathyroidism, so serum calcium must be measured. Treatment: curettage ± corticosteroids/denosumab/calcitonin for aggressive lesions."},
    {"id":"pathology_14","type":"sba","stem":"A 55-year-old man with known primary hyperparathyroidism is found to have a multilocular jaw lesion. Serum calcium is markedly elevated, PTH is raised. Histology of the jaw lesion shows scattered multinucleate giant cells in a fibrous stroma. What is this jaw lesion called?","options":["Central giant cell granuloma","Aneurysmal bone cyst","Brown tumour","Ossifying fibroma","Paget's disease"],"correct":2,"explanation":"A brown tumour is a focal manifestation of hyperparathyroidism (primary or secondary) and is histologically identical to central giant cell granuloma. The name derives from the brownish colour from haemosiderin deposition. Raised PTH causes osteoclastic bone resorption producing these lesions. They regress after surgical correction of hyperparathyroidism. All patients with giant cell lesions of the jaw should have serum calcium and PTH measured."},
    {"id":"pathology_15","type":"sba","stem":"A 70-year-old man presents with progressive enlargement of the skull, bowing of the tibia, and increasing hat size. Serum alkaline phosphatase is markedly elevated. OPG shows cotton-wool radiopacities in the maxilla with loss of distinction between cortex and medullary bone. What is the diagnosis?","options":["Metastatic osteoblastic carcinoma","Osteopetrosis","Paget's disease of bone","Fibrous dysplasia","Osteosarcoma"],"correct":2,"explanation":"Paget's disease (osteitis deformans) is characterised by disordered osteoclastic and osteoblastic activity. Jaw involvement shows the classic 'cotton wool' radiopacities, hypercementosis of teeth, loss of the lamina dura, and 'ground glass' appearance early on. Markedly elevated alkaline phosphatase reflects high bone turnover. The maxilla is more frequently affected than the mandible. Complications include MRONJ-like lesions and (rarely) osteosarcoma."},
    {"id":"pathology_16","type":"sba","stem":"A 15-year-old patient has a radiograph showing 'ground glass' opacity of the right maxilla causing facial asymmetry. The lesion is asymptomatic and has been stable for 2 years. Biopsy shows cellular fibrous stroma with irregular woven bone trabeculae described as 'Chinese characters'. What is the diagnosis?","options":["Ossifying fibroma","Paget's disease","Fibrous dysplasia","Cherubism","Desmoplastic fibroma"],"correct":2,"explanation":"Fibrous dysplasia is a benign condition where normal bone is replaced by fibrous tissue containing irregular woven bone trabeculae ('Chinese character' or 'alphabet soup' pattern). The 'ground glass' radiographic appearance is characteristic. It is caused by a postzygotic GNAS1 mutation. Monostotic (one bone) is most common. Treatment is surgical contouring when cosmetically necessary after skeletal maturity. McCune-Albright syndrome = polyostotic FD + café-au-lait spots + precocious puberty."},
    {"id":"pathology_17","type":"sba","stem":"What histological feature distinguishes ossifying fibroma from fibrous dysplasia in the jaws?","options":["Ossifying fibroma contains myxoid stroma; fibrous dysplasia does not","Ossifying fibroma is encapsulated and the mineralised material shows lamellar bone with osteoblastic rimming; fibrous dysplasia blends with surrounding bone and shows woven bone without osteoblastic rimming","Ossifying fibroma affects multiple bones; fibrous dysplasia is monostotic","Ossifying fibroma has giant cells; fibrous dysplasia does not","Both conditions are histologically identical"],"correct":1,"explanation":"The key histological distinction: ossifying fibroma is a well-circumscribed, encapsulated lesion with cellular fibrous stroma containing spheroid psammomatoid calcifications or lamellar bone trabeculae with osteoblastic rimming. Fibrous dysplasia blends imperceptibly with surrounding bone (no capsule) and contains woven bone trabeculae without osteoblastic rimming. Clinically, OF is well-demarcated on imaging and can be enucleated; FD merges with host bone."},
    {"id":"pathology_18","type":"sba","stem":"A 45-year-old man develops an aggressive osteolytic lesion of the jaw after a long history of Paget's disease. Histology shows pleomorphic spindle cells producing osteoid with numerous mitoses. What is the most likely diagnosis?","options":["Malignant transformation of Paget's to osteosarcoma","Chondrosarcoma","Central giant cell granuloma undergoing malignant change","Metastatic carcinoma","Ewing's sarcoma"],"correct":0,"explanation":"Osteosarcoma is the most common malignant bone tumour, with jaw involvement accounting for 6–7% of cases. Paget's disease is the most common predisposing condition for secondary jaw osteosarcoma in older patients. Clinically it presents as rapid painful swelling; radiographically there may be 'sunburst' periosteal reaction. Prognosis is poor. Osteosarcoma can also arise as a radiation-induced sarcoma decades after jaw radiotherapy."},
    {"id":"pathology_19","type":"sba","stem":"Histological examination of a gingival biopsy shows epithelial changes including loss of polarity of basal cells, cellular pleomorphism, increased nuclear:cytoplasm ratio, abnormal mitoses, and extension of rete ridges as 'drop-shaped' projections. How would you classify these findings?","options":["No dysplasia","Mild epithelial dysplasia","Moderate epithelial dysplasia","Severe epithelial dysplasia","Carcinoma in situ"],"correct":3,"explanation":"Epithelial dysplasia is graded by the extent and severity of architectural and cytological changes. Severe dysplasia involves changes occupying more than two-thirds of the epithelial thickness, with marked cytological atypia, loss of polarity, abnormal mitoses, and drop-shaped rete ridges. The WHO 2017 binary system grades dysplasia as low-grade (mild/moderate) or high-grade (severe/carcinoma in situ). High-grade dysplasia requires intervention."},
    {"id":"pathology_20","type":"sba","stem":"Histology of a tongue biopsy shows islands of squamous epithelium invading the underlying connective tissue with intercellular bridges, individual cell keratinisation, and keratin pearl formation. The basement membrane is breached. What is the diagnosis?","options":["Severe epithelial dysplasia","Carcinoma in situ","Well-differentiated squamous cell carcinoma","Verrucous carcinoma","Mucoepidermoid carcinoma"],"correct":2,"explanation":"Well-differentiated squamous cell carcinoma shows islands and cords of neoplastic epithelium invading through the basement membrane into the connective tissue. Intercellular bridges (desmosomes), individual cell keratinisation, and keratin pearl formation (concentric laminated keratin) are markers of squamous differentiation. Basement membrane breach is the defining feature of invasion (distinguishing it from carcinoma in situ, where the basement membrane is intact)."},
    {"id":"pathology_21","type":"sba","stem":"A low-grade carcinoma of the floor of mouth shows large sheets of well-differentiated squamous cells growing in a verrucous, exophytic, warty pattern with pushing margins and broad rete ridges. There is minimal cytological atypia. What is this variant?","options":["Spindle cell carcinoma","Verrucous carcinoma","Basaloid squamous cell carcinoma","Papillary squamous cell carcinoma","Adenosquamous carcinoma"],"correct":1,"explanation":"Verrucous carcinoma is a distinct low-grade variant of squamous cell carcinoma presenting as a slow-growing, papillary, 'cauliflower-like' lesion. Histologically it shows broad, pushing (non-infiltrating) margins with minimal cytological atypia — making small biopsy specimens potentially underdiagnosed as benign hyperkeratosis. It has a very low metastatic potential and good prognosis if completely excised. Tobacco and betel nut use are major risk factors."},
    {"id":"pathology_22","type":"sba","stem":"A 50-year-old woman has a submandibular mass. Fine needle aspiration shows mucous-containing cells and epidermoid cells. Histology of the resected specimen shows three cell types: mucous cells, epidermoid (squamous) cells, and intermediate cells. What is the diagnosis?","options":["Adenoid cystic carcinoma","Pleomorphic adenoma","Mucoepidermoid carcinoma","Acinic cell carcinoma","Polymorphous adenocarcinoma"],"correct":2,"explanation":"Mucoepidermoid carcinoma is the most common malignant salivary gland tumour overall (parotid > submandibular > minor salivary glands) and the most common in children. Histologically it contains three cell types: mucous cells (clear cytoplasm, mucin-containing), epidermoid (squamous) cells, and intermediate cells. Grade (low/intermediate/high) depends on proportions: low-grade has predominantly mucous cells and a cystic architecture with good prognosis; high-grade shows predominantly epidermoid cells."},
