    {"id":"prostho_4","type":"sba","stem":"When constructing complete dentures, the upper occlusal rim should be trimmed so that it is parallel to which facial landmark in the frontal plane?","options":["Camper's plane (ala-tragus line)","The interpupillary line","Frankfort horizontal plane","The nasal floor","The vermilion border"],"correct":1,"explanation":"In the frontal plane, the upper occlusal rim is adjusted to be parallel to the interpupillary line, ensuring a level occlusal plane aesthetically. In the sagittal plane, the rim is adjusted to be parallel to Camper's plane (ala of nose to tragus of ear), which approximates the occlusal plane inclination."},
    {"id":"prostho_5","type":"sba","stem":"A patient has a maxillary Kennedy Class I partially edentulous arch (bilateral free-end saddles). The most important component of a cobalt-chromium partial denture in preventing rotation of the prosthesis during function is:","options":["Major connector (palatal plate)","Retentive clasps on the premolars","Indirect retainers anterior to the fulcrum line","Posterior palatal seal","Denture teeth selection"],"correct":2,"explanation":"Free-end saddles tend to rotate around the fulcrum line (through the most posterior abutments) when loaded. Indirect retainers placed anterior to this fulcrum line resist such rotation by leveraging the anterior abutment teeth. They are essential in Kennedy Class I and II designs."},
    {"id":"prostho_6","type":"sba","stem":"A patient requests a chrome-cobalt (Co-Cr) removable partial denture. Which occlusal rest position is preferred on a maxillary molar to transmit forces along the long axis of the tooth?","options":["Central fossa rest","Mesial marginal ridge rest","Distal marginal ridge rest","Cingulum rest","Incisal rest"],"correct":0,"explanation":"Central fossa rests on posterior teeth direct occlusal forces along the long axis of the abutment tooth, which is biomechanically ideal. Marginal ridge rests direct forces at an angle and may promote tipping. Cingulum and incisal rests are used on anterior teeth."},
    {"id":"prostho_7","type":"sba","stem":"Which survey line position on a potential abutment tooth indicates the best clasp design choice for a cobalt-chromium partial denture?","options":["Survey line at the cervical margin — use gingivally-approaching clasp","Survey line at the height of contour in the middle third — use circumferential clasp with tip in undercut below survey line","Survey line at the incisal edge — no clasp possible","Survey line bisecting the buccal face — use ring clasp","Survey line in the occlusal third — use T-bar clasp"],"correct":1,"explanation":"The survey line (height of contour) divides the crown into a suprabulge (above) and undercut (below) zone. For a circumferential (Akers) clasp, the retentive tip must engage the undercut below the survey line, while the reciprocal arm sits in the suprabulge. A mid-third survey line allows both components to be placed ideally."},
    {"id":"prostho_8","type":"sba","stem":"A patient with a Kennedy Class II modification 1 partial dental arch requires a Co-Cr RPD. Which major connector would be most appropriate for the maxillary arch?","options":["Single palatal bar","Horseshoe connector","Palatal plate (full palatal coverage)","Anterior-posterior palatal strap","Lingual bar"],"correct":3,"explanation":"An anterior-posterior palatal strap (double palatal bar) is the connector of choice for Kennedy Class II modification 1 (unilateral free-end saddle with one modification space) because it provides adequate rigidity across a wider arch without full palatal coverage, and positions connectors away from gingival margins."},
    {"id":"prostho_9","type":"sba","stem":"A patient's Co-Cr denture clasp arm fractures repeatedly. The most likely cause is:","options":["Insufficient alloy thickness","The clasp engaging too deep an undercut (>0.25 mm) causing repeated flexure fatigue","The denture being cleaned with a soft-bristle brush","Over-polishing of the clasp","Using an acrylic saddle rather than cast metal"],"correct":1,"explanation":"Clasp fatigue fracture results from repeatedly flexing the arm beyond its elastic limit. Engaging an undercut greater than 0.25 mm for a Co-Cr clasp requires excessive flexure, leading to work-hardening and fatigue fracture at the clasp tip or junction with the body. The solution is to resurvey and use a shallower undercut or a more flexible alloy."},
    {"id":"prostho_10","type":"sba","stem":"A 54-year-old patient is to receive a conventional full gold crown on the upper right first molar. Which occlusal clearance is recommended for a full-cast gold crown?","options":["0.5 mm occlusal clearance","1.0 mm occlusal clearance","1.5–2.0 mm occlusal clearance","2.5–3.0 mm occlusal clearance","No clearance needed — metal can be burnished thin"],"correct":2,"explanation":"Full-cast gold crowns require 1.5–2.0 mm occlusal clearance to allow adequate metal thickness for strength without over-reduction. Porcelain-fused-to-metal requires a slightly greater reduction (2 mm) in the porcelain-bearing areas. Insufficient reduction risks perforation; excessive reduction risks pulp exposure."},
    {"id":"prostho_11","type":"sba","stem":"A porcelain-fused-to-metal (PFM) crown on the upper left central incisor fractures at the porcelain-metal interface after 2 years. The most likely reason for this porcelain fracture is:","options":["Inadequate ceramic firing temperature","Insufficient metal substructure bulk or poorly designed framework","Using a feldspathic rather than lithium disilicate ceramic","Excessive preparation taper (>12 degrees per wall)","Gross occlusal overload in lateral excursion"],"correct":1,"explanation":"Porcelain fracture at the porcelain-metal interface is most commonly caused by an inadequately rigid or poorly designed metal substructure. The metal framework must support porcelain uniformly; unsupported porcelain (thin metal, sharp angles in the coping, or large unsupported spans) concentrates stress and causes cohesive or adhesive fracture."},
    {"id":"prostho_12","type":"sba","stem":"A patient presents requesting replacement of an existing 3-unit PFM bridge from the upper left canine to upper left second premolar (replacing the first premolar). The bridge is 7 years old and the patient reports food trapping under the pontic. What is the most appropriate pontic design for a tooth-supported bridge in the aesthetic zone?","options":["Sanitary (hygienic) pontic","Ridge lap pontic","Modified ridge lap pontic","Conical (bullet-shaped) pontic","Ovate pontic"],"correct":4,"explanation":"An ovate pontic sits within a prepared ovoid socket in the ridge tissue, creating the appearance of a natural tooth emergence. It allows plaque control from beneath and gives excellent aesthetics. Modified ridge lap is acceptable but less aesthetic. Sanitary pontics leave a large gap — suitable for posterior non-aesthetic areas. Ridge lap traps plaque and is obsolete."},
    {"id":"prostho_13","type":"sba","stem":"According to Ante's law, a fixed-fixed bridge is only advisable when:","options":["There is at least one natural tooth adjacent to each pontic","The combined root surface area of the abutment teeth is equal to or greater than that of the teeth being replaced","The abutment teeth have a crown-to-root ratio of ≥1:1","All abutment teeth have been root canal treated","The bridge span is no more than two pontics"],"correct":1,"explanation":"Ante's law states that the combined periodontal ligament (root surface) area of the abutment teeth should equal or exceed that of the teeth they support. It guides bridge span planning. In practice it is used as a rule of thumb; favourable bone support and healthy abutments are also required."},
    {"id":"prostho_14","type":"sba","stem":"A 35-year-old patient has a missing upper right lateral incisor and requests a minimally invasive fixed replacement. The adjacent teeth are unrestored and have healthy periodontium. What is the most appropriate fixed option?","options":["Conventional 3-unit PFM bridge cutting both canine and central incisor","Implant-retained single crown (most appropriate long-term, but requires surgery)","Resin-bonded bridge (Maryland bridge) with a single retainer on the canine","Resin-bonded bridge with two retainers","Adhesive fibre post-reinforced bridge"],"correct":2,"explanation":"A cantilever resin-bonded bridge (RBB) with a single retainer on the canine is the evidence-based first choice for single missing lateral incisor with unrestored neighbours: 5-year survival rate ~90–95%, minimal tooth preparation, easily rebonded if it de-bonds. Two-retainer RBBs have higher de-bond rates (differential movement). Implants are suitable but more invasive."},
    {"id":"prostho_15","type":"sba","stem":"Which of the following impression materials is most appropriate for recording the working impression for a cobalt-chromium partial denture framework?","options":["Alginate (irreversible hydrocolloid)","Zinc oxide-eugenol paste","Addition-cured silicone (polyvinyl siloxane)","Impression compound (thermoplastic)","Plaster of Paris impression material"],"correct":2,"explanation":"Addition-cured silicone (A-silicone / PVS) is dimensionally accurate, stable over time, and compatible with stone dies used for casting Co-Cr frameworks. Alginate is insufficiently accurate for metal framework work and is not stable for the time required for pouring. Condensation silicones are less accurate due to volatile by-product shrinkage."},
    {"id":"prostho_16","type":"sba","stem":"A patient's lower complete denture is causing persistent soreness over the left mylohyoid ridge. What modification to the denture will most likely resolve this?","options":["Adding a tissue conditioner to the fitting surface","Extending the denture flange into the retromolar pad","Relieving (reducing) the fitting surface over the mylohyoid ridge area","Increasing the post-dam","Polishing the periphery of the denture"],"correct":2,"explanation":"The mylohyoid ridge is a sharp bony prominence on the lingual aspect of the mandible. Pressure on it causes soreness. Selective grinding (relieving) the fitting surface over this area, confirmed with pressure-indicating paste, resolves the problem. Adding material would worsen the pressure."},
    {"id":"prostho_17","type":"sba","stem":"A patient is provided with a new set of complete dentures. At the review appointment 24 hours later, she reports 'clicking' sounds when speaking. What is the most likely cause?","options":["The OVD is too low (insufficient freeway space)","The OVD is too high (insufficient freeway space)","The teeth were set in class III occlusion","The dentures are not retained sufficiently","The posterior palatal seal is excessive"],"correct":1,"explanation":"Clicking teeth on speaking indicates excessive OVD — the vertical space given to the dentures leaves insufficient freeway space, causing the teeth to contact during speech. Normally OVD should be 2–4 mm below RVD. Management: reduce the OVD by grinding the occlusal surfaces, or remake with corrected records."},
    {"id":"prostho_18","type":"sba","stem":"During try-in of complete dentures, the patient complains the appearance looks 'old-fashioned' and 'false'. The teeth are in perfect class I occlusion on a flat occlusal plane. What single modification would most improve the aesthetic naturalness?","options":["Replacing acrylic teeth with porcelain teeth","Introducing a slight curve of Spee (curved occlusal plane)","Tipping the upper central incisors labially","Using a darker shade of acrylic teeth","Increasing the OVD by 2 mm"],"correct":1,"explanation":"Natural dentitions have a compensating curve (curve of Spee in the sagittal plane and curve of Wilson in the frontal plane). A completely flat occlusal plane gives an artificial appearance. Incorporating a slight curve of Spee improves aesthetics and also aids balanced occlusion. Porcelain teeth are less commonly used in modern practice (risk of attrition to opposing natural teeth and ridge trauma)."},
    {"id":"prostho_19","type":"sba","stem":"A 72-year-old edentulous patient develops persistent erythema beneath both complete dentures. Microscopy of a swab confirms Candida albicans. Which classification of denture stomatitis applies when the entire denture-bearing mucosa is involved as a diffuse erythematous area?","options":["Newton type I — localised simple inflammation","Newton type II — diffuse simple inflammation","Newton type III — granular (papillary hyperplasia)","Median rhomboid glossitis","Erythroleukoplakia"],"correct":1,"explanation":"Newton's classification: Type I = pin-point hyperaemia localised near palatal glands; Type II = diffuse erythema covering the entire denture-bearing mucosa (this case); Type III = papillary hyperplasia (granular/cobblestone surface). Management of all types: antifungal (miconazole gel or nystatin), denture hygiene, removal at night, disinfection of dentures."},
    {"id":"prostho_20","type":"sba","stem":"A 65-year-old man has a flabby (mobile) anterior maxillary ridge following years of wearing an upper complete denture against standing lower anterior teeth. What impression technique is recommended to record this ridge accurately?","options":["Standard alginate wash impression in a stock tray","Sectional or window technique using mucocompressive and mucostatic impression materials","Zinc oxide eugenol paste in a custom tray with high-pressure injection","Condensation silicone in a stock tray","Impression compound (greenstick) with a custom tray"],"correct":1,"explanation":"A flabby ridge is easily displaced. A mucocompressive technique displaces it; the resulting prosthesis then compresses tissue in function causing instability. The 'window' (Osborne) technique uses a perforated custom tray: the flabby tissue is recorded with a mucostatic material (e.g., light-body silicone through the window) while the rest is recorded with a mucocompressive material."},
    {"id":"prostho_21","type":"sba","stem":"A patient has an osseointegrated implant in the upper left second premolar site. The implant has 1.5 mm of peri-implant bone loss since placement and mild peri-implant mucosal bleeding on probing. There is no suppuration and no pocket depth >4 mm. What is the diagnosis?","options":["Normal peri-implant health","Peri-implant mucositis","Peri-implantitis","Implant failure","Ailing implant with retrograde peri-implantitis"],"correct":1,"explanation":"Peri-implant mucositis is reversible inflammation of the soft tissue around an implant WITHOUT radiographic bone loss beyond that expected at initial remodelling. Peri-implantitis requires progressive bone loss beyond the initial remodelling level. The 1.5 mm bone loss is at the borderline; with no progressive loss documented and no pocket depths >4–5 mm with suppuration, the most likely diagnosis here is mucositis, treated with enhanced plaque control."},
    {"id":"prostho_22","type":"sba","stem":"Which of the following correctly describes the osseointegration failure risk associated with smoking in implant therapy?","options":["Smoking doubles early implant failure rate and is an absolute contraindication","Smoking is associated with a 2–3-fold increase in implant failure rate; it is a relative contraindication","Smoking has no significant effect on implant survival","Smoking only affects late failure, not osseointegration","Nicotine patches eliminate all smoking-related implant risk"],"correct":1,"explanation":"Smoking is a well-established risk factor for implant failure, associated with approximately 2–3 times higher failure rates compared with non-smokers, primarily through impaired healing and immune response. It is a relative (not absolute) contraindication; the patient should be counselled, ideally cease smoking, and understand the increased risk. The risk is higher in the early healing phase."},
    {"id":"prostho_23","type":"sba","stem":"An implant-retained overdenture for the mandible is planned using two implants in the canine region. Which attachment system offers the greatest stability but the most maintenance?","options":["Ball (stud) attachments","Bar-clip (Dolder bar) attachment","Locator attachments","Magnetic attachments","Telescopic crown attachments"],"correct":1,"explanation":"A bar-clip system connects both implants rigidly, providing the greatest stability and retention through splinting. However, it requires more maintenance (clip wear, hygiene challenges, potential bar fracture) and greater bone volume and inter-arch space. Ball/stud and Locator attachments are simpler and more commonly used. Magnetic attachments have low retention and are largely obsolete."},
    {"id":"prostho_24","type":"sba","stem":"A patient's fixed bridge abutment crown fractures at the gingival margin leaving insufficient tooth structure for retention. The bridge retainer cannot be re-cemented. What is the most appropriate next step?","options":["Perform root canal treatment and place a post-retained core, then replace the crown","Extract the tooth immediately and plan an implant","Orthodontic extrusion of the root to provide a ferrule before crown","Re-cement the fractured fragment with composite","Accept the situation and monitor"],"correct":2,"explanation":"Orthodontic extrusion (forced eruption) brings more root structure supragingivally, creating the 1.5–2 mm ferrule of sound tooth structure needed for a crown. This is preferable to immediate extraction if the root is intact and periodontally sound. Root canal treatment and a post may also be needed but without ferrule, the crown will fail. Re-cementing the fragment is not durable."},
    {"id":"prostho_25","type":"sba","stem":"Which of the following impression materials requires mixing by hand spatulation of base and accelerator pastes and is prone to dimensional change from evaporation?","options":["Addition-cured silicone (PVS)","Condensation silicone","Polyether","Alginate","Zinc oxide-eugenol paste (non-eugenol)"],"correct":1,"explanation":"Condensation silicone cross-links via an alcohol by-product that evaporates, causing post-set shrinkage. It should be poured within 30 minutes. It is hand-mixed. Polyether is accurate and stable but absorbs water. PVS (addition silicone) releases no by-product and is dimensionally very stable for up to 2 weeks. Alginate is irreversible and must be poured immediately."},
    {"id":"prostho_26","type":"sba","stem":"A patient's lower complete denture drops when opening wide. The most likely cause is over-extension of which border?","options":["Lingual flange in the premolar region","Buccal flange in the retromolar area","Anterior labial flange","Posterior extent beyond the retromolar pad","Sublingual crescents"],"correct":0,"explanation":"Over-extension of the lingual flange in the premolar region conflicts with the mylohyoid muscle (floor of mouth), which rises on wide opening and lifts/dislodges the denture. This is the most common cause of the lower denture being dislodged on wide opening. Trimming the lingual flange resolves it."},
    {"id":"prostho_27","type":"sba","stem":"During complete denture construction, the clinician takes a facebow record. The facebow transfers which relationship to the articulator?","options":["The patient's centric occlusion relationship","The position of the maxillary cast relative to the hinge axis of the condyles","The mandibular cast's position relative to the maxilla","The intercondylar distance","The protrusive record for setting condylar inclination"],"correct":1,"explanation":"A facebow records the spatial relationship of the maxilla (and maxillary dental arch) to the transverse hinge axis of the temporomandibular joints. This allows the maxillary cast to be mounted on the articulator in the same spatial relationship, so that opening/closing movements on the articulator mimic the arc of closure in the patient."},
    {"id":"prostho_28","type":"sba","stem":"A patient presents with parafunctional bruxism and requests a full arch implant-supported fixed prosthesis in the upper arch. What occlusal scheme is most commonly recommended for implant-supported prostheses in bruxists?","options":["Group function occlusion on the working side","Balanced bilateral occlusion","Canine-guided (mutually protected) occlusion","Unilateral balanced occlusion","Cross-arch balanced occlusion"],"correct":2,"explanation":"Mutually protected occlusion (anterior guidance provided by the canines) is the preferred occlusal scheme for implant-supported restorations, particularly in bruxists. It minimises lateral forces on posterior implants. However, given implants lack a PDL, forces are transmitted directly to bone, so any scheme must minimise lateral loads. Balanced occlusion is reserved for complete dentures."},
    {"id":"prostho_29","type":"sba","stem":"A patient has a shallow upper labial sulcus reducing complete denture retention. Which border-moulding material would be most appropriate to extend and refine the peripheral seal?","options":["Light-body addition silicone","Zinc oxide eugenol impression paste","Greenstick (impression compound)","Alginate","Silicone putty"],"correct":2,"explanation":"Greenstick (impression compound) is a thermoplastic material that can be softened and incrementally added to the borders of a special tray to build up the peripheral seal. Each muscle attachment area is border-moulded in turn (functional movements). It is the traditional, widely used material for border moulding — the clinician can re-soften and readapt specific sections repeatedly."},
    {"id":"prostho_30","type":"sba","stem":"A 59-year-old man has a Kennedy Class IV edentulous arch (anterior saddle crossing the midline). Which design principle is most important for his partial denture?","options":["Using stress-breaking clasps to limit load on abutments","Ensuring rigid major and minor connectors to prevent flexure","Placing indirect retainers bilaterally","Using ring clasps on the canines","Covering the entire palate for maximum retention"],"correct":1,"explanation":"Kennedy Class IV (anterior saddle crossing midline) does NOT require indirect retainers (the saddle is anterior; there is no posterior fulcrum rotation problem). The critical design principle is RIGIDITY: the major connector and all components must be rigid to prevent flexion under the forces of biting on the anterior saddle, which would damage abutment teeth. Stress-breakers are used for Class I and II free-end saddles."},
    {"id":"prostho_31","type":"sba","stem":"A patient's existing complete upper denture has a persistent bilateral posterior open bite at the distal end. What type of occlusal error has occurred and what is the most likely cause?","options":["Over-extended posterior peripheral seal causing displacement","Premature contacts in centric relation causing a pivot effect anteriorly","Inadequate freeway space","Posterior teeth set too far distal to the residual ridge","Excessive posterior tooth contact causing anterior open bite"],"correct":1,"explanation":"Bilateral posterior open bite (posterior teeth not contacting while anterior teeth do) is a classic sign of a pivot: the anterior teeth contact first and act as a fulcrum, tipping the denture posteriorly so the posterior teeth open. This results from premature anterior contacts, often because centric relation was not correctly recorded or because anterior tooth position/OVD was set too great."},
    {"id":"prostho_32","type":"sba","stem":"A patient presents for initial assessment for complete denture construction. The maxillary ridge is described as 'knife-edge' (sharp, thin ridge). What immediate concern does this raise for prosthesis provision?","options":["The thin ridge provides better suction and retention","The sharp ridge will cause pressure-related soreness beneath the fitting surface","A knife-edge ridge is too resorbed for impressions with alginate","The patient needs a soft-tissue graft before impressions","This is normal and requires no modification"],"correct":1,"explanation":"A knife-edge ridge has a narrow, sharp crest with thin overlying mucosa. Under occlusal load, the denture base concentrates force on the ridge crest, causing soreness and ulceration. Management includes careful relief of the fitting surface over the crest and consideration of soft-lining materials. Pre-prosthetic surgery (ridge augmentation or implants) may be appropriate in severe cases."},
    {"id":"prostho_33","type":"sba","stem":"Which of the following is a recognised advantage of a precision attachment over a conventional clasp in a cobalt-chromium partial denture?","options":["Lower cost and simpler laboratory procedure","Better plaque control around abutments due to no metal coverage","Superior aesthetics (no visible metal) and better load distribution","Easier adjustment by the clinician chairside","More appropriate when abutment teeth have short clinical crowns"],"correct":2,"explanation":"Precision attachments provide superior aesthetics (no visible metal clasps) and transmit forces more directly along the long axis of abutment teeth. However, they are expensive, technique-sensitive, require advanced laboratory fabrication, and cannot be adjusted easily. They are most suitable where aesthetics is paramount and the abutment teeth have adequate crown length and root support."},
    {"id":"prostho_34","type":"sba","stem":"A patient has Kennedy Class I (bilateral free-end saddle) in the lower arch. To minimise stress to the abutment teeth, which clasp design is preferred?","options":["Rigid ring clasp engaging a deep undercut","RPI (Rest, Proximal plate, I-bar) clasp system","Circumferential clasp with tip engaging a deep undercut mesially","Back-action clasp","Double Akers clasp"],"correct":1,"explanation":"The RPI system (mesial rest, proximal plate, I-bar retentive component) is specifically designed for free-end saddles. When the saddle is loaded, the I-bar disengages the undercut and the proximal plate slides away from the abutment, reducing the tipping stress transferred to the tooth. The mesial rest is preferred over a distal rest to reduce the lever arm on the abutment."},
    {"id":"prostho_35","type":"sba","stem":"A patient's zirconia crown looks opaque and 'lifeless' despite correct shade selection. What is the most likely reason?","options":["The crown was sintered at too high a temperature","Monolithic zirconia lacks the depth and internal light transmission of layered or multi-layered zirconia ceramics","The technician used the wrong cement colour","The preparation lacked sufficient taper","The tooth was over-bleached before shade taking"],"correct":1,"explanation":"Early (first-generation) monolithic zirconia (3Y-TZP) has high opacity and lacks the internal optical depth of natural enamel. This gives the crown an 'opaque', chalky appearance. Newer multi-layered or gradient zirconia (4Y/5Y-TZP) with higher translucency and layered staining/glazing better mimic natural tooth aesthetics. The opacity of zirconia is an intrinsic material limitation, not a fabrication error."},
    {"id":"prostho_36","type":"sba","stem":"A cement for a conventional PFM crown should ideally exhibit which combination of properties?","options":["High solubility, low film thickness, radiopaque","Low solubility, film thickness ≤25 µm, biocompatibility, and adequate compressive strength","High expansion on setting, low film thickness","Self-adhesion only, no mechanical retention required","High thermal conductivity"],"correct":1,"explanation":"Ideal luting cement properties include: low film thickness (≤25 µm per ISO 9917) to allow complete seating; low solubility in oral fluids (for longevity); biocompatibility; adequate compressive and tensile strength; and ideally some degree of adhesion to tooth structure. Radiopacity aids detection of excess cement radiographically. Self-adhesive resin cements (e.g. RelyX Unicem) fulfil most of these criteria."},
    {"id":"prostho_37","type":"sba","stem":"A patient requests an implant in the upper right lateral incisor site. A CBCT shows only 4 mm of buccal-palatal bone width at the site. What is the minimum implant diameter (standard implant) and the likely additional procedure required?","options":["Standard 3.5 mm implant can be placed immediately without grafting","Narrow-diameter implant (2–3 mm) is sufficient without grafting","Simultaneous guided bone regeneration (GBR) is required to achieve adequate bone volume for a standard implant","Immediate implant placement without a flap is sufficient","Socket preservation only at extraction then implant placement 12 months later"],"correct":2,"explanation":"A standard implant (3.5–4 mm diameter) needs a minimum of ~6 mm bone width (1.5 mm facial + 1.5 mm palatal to the implant). With only 4 mm width, there is insufficient bone. Simultaneous or staged guided bone regeneration (GBR) with a membrane and bone graft is required to augment the width. This is one of the most common bone augmentation scenarios in the anterior maxilla."},
    {"id":"prostho_38","type":"sba","stem":"A patient's lower complete denture is persistently retained with adhesive paste. She is unhappy with the quality of life impact. She has two lower canines still present with sound roots. What is the most evidence-based improvement for her lower denture retention?","options":["A new conventional lower complete denture with better peripheral seal","Two implants in the canine region to support an implant-retained overdenture","Full arch implant-supported bridge (6 implants, 'All on 4')","Relining the existing denture with a soft liner","Surgical ridge augmentation"],"correct":1,"explanation":"The McGill Consensus (2002) and York Consensus (2009) state that a two-implant mandibular overdenture should be the standard of care for edentulous mandibles. It significantly improves retention, stability, and quality of life compared to a conventional complete denture, at relatively low implant cost. Given existing sound canine roots, these could support a tooth/implant overdenture, but implant-retained is the standard recommendation when re-treating."},
    {"id":"prostho_39","type":"sba","stem":"A patient receiving a metal-ceramic crown preparation has a subgingival margin placed on the labial aspect of the upper right central incisor for aesthetic reasons. What is a recognised biological risk of subgingival margins?","options":["Increased crown retention compared to supragingival margins","Inflammation, attachment loss, and recession due to gingival margin encroachment","Reduced risk of secondary caries","Better cementation due to protected margin","Facilitated impression taking"],"correct":1,"explanation":"Subgingival margins invade the biological width (the ~2 mm zone comprising junctional epithelium and connective tissue attachment), causing chronic inflammation, attachment loss, and eventually recession. They also make impressions more difficult, increase risk of residual cement retention, and compromise periodontal health. Supragingival or equi-gingival margins are always preferable biologically, with subgingival placement reserved for specific aesthetic indications."},
    {"id":"prostho_40","type":"sba","stem":"In the construction of complete dentures, what does the term 'balanced occlusion' mean?","options":["Equal number of teeth in each quadrant","Simultaneous bilateral contact of posterior teeth in all excursive jaw movements","Equal occlusal force distribution across all teeth in centric occlusion only","Contact of anterior teeth in protrusion only","Canine guidance with posterior disclusion"],"correct":1,"explanation":"Balanced (bilateral balanced) occlusion for complete dentures means simultaneous contact of teeth on both sides of the arch in all excursive movements (protrusion and lateral). This prevents the denture from tipping/rocking during function. It is the preferred occlusal scheme for complete dentures; canine guidance (which discudes posterior teeth) is appropriate for natural dentitions but causes denture tipping."},
    {"id":"prostho_41","type":"sba","stem":"A patient's new complete denture causes pain over the left tuberosity immediately on insertion. Pressure indicating paste shows widespread contact across the whole fitting surface. What does this suggest?","options":["The denture is too retentive — the posterior palatal seal is over-extended","A localised undercut has been created during processing (overextension or processing error in the tuberosity area)","The freeway space is insufficient","The occlusal vertical dimension is too high","The shade of the teeth is incorrect"],"correct":1,"explanation":"Immediate pain on insertion of a new denture, especially over a bony prominence like the tuberosity, points to a processing error: the lab has either left an undercut on the model unblocked, producing a fitting surface that locks onto a tissue undercut on insertion, or the post-processing dimensions have been altered. Relief of the fitting surface at the precise pain point, confirmed with pressure indicating paste, resolves it."},
    {"id":"prostho_42","type":"sba","stem":"Which of the following is the primary disadvantage of using glass ionomer cement (GIC) as a luting agent for a full gold crown compared to resin-modified GIC (RMGIC) or resin cement?","options":["GIC has no fluoride release","GIC has lower solubility than RMGIC","Conventional GIC has lower early strength and higher initial solubility during the critical setting phase","GIC is opaque and aesthetically unacceptable","GIC is contraindicated with metal alloys"],"correct":2,"explanation":"Conventional GIC undergoes an acid-base setting reaction releasing water during the early set. It is vulnerable to moisture (dissolution) and dehydration (cracking) in the first 24 hours, and has lower early mechanical strength. RMGIC includes a light-cured resin component that provides immediate strength and reduced early sensitivity. For this reason, RMGIC is preferred over conventional GIC for crown cementation."},
    {"id":"prostho_43","type":"sba","stem":"A partial denture is described as 'Kennedy Class III, modification 2'. What does this mean?","options":["A unilateral posterior bounded saddle with one additional edentulous space","A bilateral posterior bounded saddle with two additional edentulous spaces","A unilateral posterior bounded saddle with two additional edentulous spaces","An anterior saddle with two additional edentulous spaces","A bilateral free-end saddle with two modifications"],"correct":2,"explanation":"Kennedy Class III = unilateral posterior bounded saddle (teeth present anterior AND posterior to the edentulous space). 'Modification 2' means there are two additional edentulous spaces elsewhere in the same arch (modifications). Kennedy Class III cannot have free-end saddles. Modifications count additional tooth spaces; the 'modification' number refers to additional spaces beyond the primary classification."},
    {"id":"prostho_44","type":"sba","stem":"A 78-year-old man has worn his complete upper denture for over 20 years without replacement. He has developed a 2 cm area of proliferative, folded mucosal tissue along the upper labial sulcus around the denture flange. What is this condition?","options":["Epulis fissuratum (denture-induced fibrous hyperplasia)","Papillary hyperplasia of the palate","Peripheral giant cell granuloma","Fibrous epulis","Squamous cell carcinoma"],"correct":0,"explanation":"Epulis fissuratum (denture-induced fibrous hyperplasia) is a reactive overgrowth of fibrous tissue induced by the chronic trauma of an over-extended or ill-fitting denture flange. The tissue proliferates in folds or ridges. Management: surgical excision followed by new denture construction (the old denture's flange must be shortened or remade to prevent recurrence)."},
    {"id":"prostho_45","type":"sba","stem":"Which of the following is the correct sequence of laboratory stages in constructing a cobalt-chromium removable partial denture?","options":["Primary impression → study cast → design → secondary impression → working cast → framework casting → trial → delivery","Study cast → design → working cast → surveying → framework casting → try-in → final delivery","Primary impression → study cast → surveying and design → special tray → secondary impression → working cast → metal framework → saddle construction → try-in → final delivery","Design → impression → surveying → metal framework → acrylic saddles → delivery"],"correct":2,"explanation":"The correct Co-Cr RPD sequence is: (1) Primary impression (alginate) → study cast; (2) Survey and design on study cast; (3) Make special (custom) tray; (4) Secondary (master) impression → working cast; (5) Block out, duplicate cast; (6) Cast Co-Cr framework; (7) Framework try-in on patient; (8) Add acrylic saddles with teeth; (9) Try-in of teeth; (10) Final delivery."},
    {"id":"prostho_46","type":"sba","stem":"A patient's upper premolar requires crown lengthening before crown placement to achieve an adequate ferrule. How much sound tooth structure (ferrule) above the restorative margin is generally considered the minimum to ensure long-term crown retention and fracture resistance?","options":["0.5 mm","1 mm","1.5–2 mm","3–4 mm","5 mm"],"correct":2,"explanation":"A ferrule of ≥1.5–2 mm of sound, parallel tooth structure above the restorative margin (crown margin) is considered the clinical minimum for adequate crown retention and resistance to fracture under occlusal load. Without ferrule, crown retention relies solely on the post/core system, which is biomechanically inferior. This is a fundamental prosthodontic and restorative principle."},
    {"id":"prostho_47","type":"sba","stem":"Which of the following describes the 'All-on-4' implant concept for an edentulous mandible?","options":["Four implants placed vertically in the interforaminal region to support an overdenture","Two axial anterior implants and two posteriorly tilted implants supporting a fixed full-arch bridge","Four implants placed posteriorly to support a free-end saddle bridge","Four mini-implants placed in the symphysis to support a clip-retained overdenture","Four implants and immediate loading with a complete denture"],"correct":1,"explanation":"The 'All-on-4' (Nobel Biocare, Malo protocol) uses four implants: two placed axially in the anterior mandible and two angled posteriorly (up to 45°) to avoid the inferior alveolar nerve and engage maximal bone. This allows immediate loading with a fixed full-arch provisional prosthesis. The posterior tilting increases the AP spread without requiring posterior bone grafting."},
    {"id":"prostho_48","type":"sba","stem":"A patient returns with a broken cobalt-chromium major connector one week after receiving a new RPD. The most likely cause is:","options":["Inadequate thickness of the casting in the connector region","Patient dropping the denture","Occlusal overload from posterior teeth","Incorrect alloy composition","Immediate loading of the prosthesis"],"correct":0,"explanation":"The most likely cause of early major connector fracture is inadequate thickness of the Co-Cr casting — typically <1.5 mm for a palatal connector bar (recommended minimum 2 mm for bars). This results in insufficient rigidity and fatigue fracture. The technical failure is a laboratory error in wax-up or casting. Poor design (e.g. narrow connector in a high-stress region) or inadequate metal may also contribute."},
    {"id":"prostho_49","type":"sba","stem":"In implant dentistry, what does 'osseointegration' mean according to Branemark's original definition?","options":["The implant is surrounded by fibrous tissue for shock absorption","Direct structural and functional connection between living bone and the surface of a load-carrying implant without intervening soft tissue","The implant is covered by a layer of hydroxyapatite coating","Bone growth only on the implant surface without internal invasion","Complete resorption and replacement of the implant material by bone"],"correct":1,"explanation":"Branemark (1985) defined osseointegration as 'a direct structural and functional connection between ordered, living bone and the surface of a load-carrying implant.' This means there is NO fibrous tissue layer between implant and bone — a key distinction from fibro-osseous integration seen with some earlier implant types. Osseointegration allows load transfer directly to bone."},
    {"id":"prostho_50","type":"sba","stem":"A patient has an existing 3-unit bridge from the upper left canine to upper left second premolar (replacing the first premolar). The bridge feels slightly high on the canine on the day of fit. What is the most appropriate action?","options":["Cement permanently and review in 2 weeks","Adjust the occlusal surface of the canine retainer with a fine diamond bur under water coolant, repolish, then cement","Replace the bridge with a new one","Adjust the opposing teeth","Accept the high contact — ceramics settle with function"],"correct":1,"explanation":"A high occlusal contact on a cemented or newly fitted bridge must be identified with articulating paper and reduced accurately with a fine diamond bur under water cooling to prevent heat damage to the ceramic or underlying tooth. The adjusted area should be repolished (ceramic polishing kit or glaze) to restore surface smoothness. Leaving a high bridge risks abutment tooth trauma, periodontal damage, and bridge fracture."},
    {"id":"prostho_51","type":"sba","stem":"When providing a two-unit cantilever resin-bonded bridge (RBB) to replace the upper left lateral incisor with the canine as the sole abutment, which preparation feature on the canine provides the most important resistance to de-bonding?","options":["Chamfer margin preparation","Proximal groove preparations (wrapping the retainer around the mesial and distal proximal surfaces)","Reducing the cingulum by 0.5 mm","Full coverage preparation of the canine","Deep shoulder margin"],"correct":1,"explanation":"In a RBB retainer, the primary resistance form comes from proximal grooves (or 'wraps') that extend onto the mesial and distal proximal surfaces of the abutment tooth. These create mechanical lock against de-bonding. Cingulum reduction provides some retention but without proximal grooves the retainer is prone to peeling forces. Full coverage would convert it to a conventional crown."},
    {"id":"prostho_52","type":"sba","stem":"A patient has a deep, non-reducible vertical overlap (overbite) of 7 mm. A full crown is planned for the upper right central incisor. What complication may arise during tooth preparation?","options":["Inability to achieve adequate taper","Occlusal space for the crown will be compromised — insufficient room for the incisal edge of the restoration in centric occlusion","Impression taking will be impossible","The gingival margin cannot be subgingival","The crown cannot be cemented"],"correct":1,"explanation":"In a deep overbite, the lower incisal edges contact well onto the palatal surface of the upper incisors. After crown preparation and with a 1.5–2 mm incisal reduction, the occlusal clearance in centric occlusion may be inadequate for the crown material. Options include crown lengthening, accepting a metal palatal surface only, opening the OVD, or orthodontic treatment to reduce the overbite prior to crowning."},
    {"id":"prostho_53","type":"sba","stem":"An 82-year-old patient's complete denture requires a chairside reline due to progressive bone resorption causing poor retention. Which material is most appropriate for a direct (chairside) reline?","options":["Hard autopolymerising PMMA reline material applied directly","Laboratory-processed heat-cured PMMA reline (indirect method)","Silicone soft liner (permanent soft liner)","Zinc oxide eugenol paste","Impression plaster"],"correct":0,"explanation":"For a direct (chairside) reline, autopolymerising (self-curing) PMMA reline material is applied to the fitting surface of the existing denture and the patient closes to CR/OVD while it sets, reestablishing intimate contact with the resorbed ridge. However, it releases residual monomer and generates heat; patients should be warned. The denture should be trimmed and polished before return. An indirect (laboratory) reline is more accurate and appropriate where time allows."},
    {"id":"prostho_54","type":"sba","stem":"When surveying a cast for RPD design, the path of insertion is selected to achieve which of the following objectives simultaneously?","options":["Maximum number of clasps and maximum retention","Elimination of all undercuts, including proximal surfaces adjacent to saddles","Appropriate undercuts for retention, avoiding hard and soft tissue interference, and allowing guiding planes on proximal surfaces of abutment teeth","The path that provides the most retentive clasps possible","The path that requires the most tooth preparation"],"correct":2,"explanation":"The surveyor determines the path of insertion to satisfy four objectives: (1) utilise appropriate undercuts for clasps; (2) avoid interference with hard tissue (bony undercuts) and soft tissue; (3) achieve guiding planes (parallel proximal surfaces) for control of seating/unseating; (4) aesthetic considerations (visible metal). These objectives may conflict and compromise is frequently needed."},
    {"id":"prostho_55","type":"sba","stem":"A patient's complete upper denture repeatedly fractures in the midline. What is the most likely underlying cause?","options":["The OVD is too low","Insufficient acrylic resin thickness in the midline or a high palatal vault creating flexure stress concentration at the midline","The patient has bruxism","The posterior palatal seal is excessive","The teeth are set too far buccally"],"correct":1,"explanation":"Midline fracture of an upper complete denture is most commonly caused by (1) insufficient acrylic thickness in the midline due to a high or narrow palatal vault thinning the denture base, and/or (2) a central palatine torus requiring excessive relief, creating a stress concentration. Repeated flexure during function causes fatigue fracture at the midline. Management: use a cast metal reinforcement (Co-Cr palatal plate) within the denture or reline/remake with adequate thickness."},
    {"id":"prostho_56","type":"sba","stem":"A patient presents for crown preparation on the upper left first premolar. The tooth has had a large MOD amalgam for many years. The crown preparation results in very little tooth structure remaining (short, tapered stumps). What additional step is most important to improve crown retention?","options":["Using a high-viscosity resin cement","Placing retention grooves or a core build-up to increase crown retention and resistance form","Extending the preparation deeper subgingivally","Polishing the preparation with a rubber cup","Providing a provisional crown immediately"],"correct":1,"explanation":"When minimal tooth structure remains after preparation, retention and resistance form are inadequate for crown retention. A core build-up (using composite, amalgam, or RMGIC depending on the situation) restores height and bulk, and auxiliary retention features (grooves, boxes, pins) can be added. Without adequate retention form, even strong cements will fail. A post-retained core may also be appropriate if the tooth has been root-treated."},
    {"id":"prostho_57","type":"sba","stem":"A patient presents 6 months after receiving new complete dentures still complaining of soreness under the upper denture. Clinical examination reveals no obvious overextensions, OVD is appropriate, and occlusion is balanced. Pressure-indicating paste shows uniform contact over the entire fitting surface. What is the most appropriate next step?","options":["Provide a soft-lined reline","Re-record the jaw relations and remake the dentures","Referral to a specialist in oral medicine to exclude oral mucosal pathology","Prescribe antifungal treatment empirically","Polish the fitting surface of the denture"],"correct":2,"explanation":"When denture construction appears technically correct (appropriate OVD, balanced occlusion, no overextension, no localised pressure) but soreness persists, an underlying mucosal pathology (e.g. pemphigoid, mucous membrane pemphigoid, lichenoid reaction, or malignancy) must be excluded before further prosthetic modification. Referral to oral medicine is appropriate. Empirical treatment without diagnosis risks masking a serious underlying condition."},
    {"id":"prostho_58","type":"sba","stem":"For a 3-unit fixed-fixed conventional bridge, what preparation taper (convergence angle per wall) is recommended to balance retention and removal?","options":["0–2° total convergence","6–8° total convergence per wall (12–16° total), ideally 5–6° per wall","20–25° total convergence","No specific taper — parallel walls are required","30° or more to ensure easy removal"],"correct":1,"explanation":"A 5–6° taper per wall (10–12° total occlusal convergence) provides optimal balance between retention (parallel walls increase retention) and the practical need to seat and remove the preparation die and crown. Less than 3° per wall makes die removal impossible; more than 10° per wall significantly reduces retention. For bridges, both abutment preparations must be parallel to each other for the bridge to seat."},
    {"id":"prostho_59","type":"sba","stem":"A patient's upper complete denture develops a crack in the palate running from the right side to the left after being dropped. The patient requests repair. What material is used for chairside or laboratory repair of acrylic complete dentures?","options":["Self-curing (cold-cure) acrylic resin","Heat-cured acrylic resin only — cannot be repaired chairside","Composite resin","Zinc phosphate cement","Epoxy adhesive"],"correct":0,"explanation":"Self-curing (cold-cure, autopolymerising) PMMA acrylic resin is used for chairside and laboratory denture repairs. The fracture surfaces are roughened, cleaned, apposed accurately (using sticky wax or tape), and fresh cold-cure acrylic is flowed into the joint and allowed to polymerise. Heat-cured acrylic is used for new denture bases; composite is inappropriate for this application."},
    {"id":"prostho_60","type":"sba","stem":"A patient presents with an existing implant in the lower right first molar position. Radiographically, there is a cup-shaped bone defect around the coronal third of the implant with 3 mm vertical bone loss bilaterally. There is bleeding and suppuration on probing with pocket depths of 7 mm. The implant is stable clinically. What is the diagnosis and most appropriate management?","options":["Peri-implant mucositis — non-surgical debridement only","Peri-implantitis — debridement, decontamination of implant surface, and consideration of surgical management","Normal peri-implant remodelling — no treatment needed","Failed implant — remove immediately","Retrograde peri-implantitis — access for root canal treatment"],"correct":1,"explanation":"Peri-implantitis is characterised by inflammation of the peri-implant tissues WITH progressive crestal bone loss beyond the expected initial remodelling. Features here include deep pockets (7 mm), suppuration, and 3 mm vertical bone loss. Non-surgical debridement is the initial step for mild cases, but with 3 mm bone loss, suppuration, and 7 mm pockets, surgical access for debridement and implant surface decontamination (e.g. Er:YAG laser, titanium brushes, antiseptics) is indicated. Removal is reserved for failing implants with mobility."}
  ],
  paeds: [
    {"id":"paeds_1","type":"sba","stem":"A 7-year-old child attends with a traumatic intrusion of the upper right permanent central incisor following a fall. The tooth is intruded 3 mm. The root is incompletely formed. What is the recommended management?","options":["Immediate surgical repositioning and rigid splint for 2 months","Extract the tooth to prevent damage to the developing permanent successors","Allow spontaneous re-eruption and monitor clinically and radiographically","Endodontic treatment immediately and rigid splinting","Orthodontic extrusion using brackets immediately"],"correct":2,"explanation":"For an incompletely formed root, the recommended approach for an intruded permanent tooth is to allow spontaneous re-eruption and monitor carefully. The evidence supports this conservative approach as the incomplete apex is associated with improved pulp survival and better re-eruption potential. Surgical or orthodontic repositioning is indicated for completely formed roots or severe intrusion (>7 mm)."},
    {"id":"paeds_2","type":"sba","stem":"A 9-year-old boy presents following a fall. His upper left permanent central incisor has been avulsed. The tooth has been stored in milk for 40 minutes. The root apex is closed. What is the most appropriate immediate management?","options":["Replant immediately without any root treatment, splint for 2–4 weeks","Replant immediately; root canal treatment should be started within 7–10 days of replantation","Discard — dry storage over 60 minutes makes the tooth non-viable","Implant a titanium screw immediately as a space maintainer","Replant and prescribe 3 months of flexible splinting"],"correct":1,"explanation":"Milk is an acceptable short-term storage medium (maintains PDL cell viability for up to 1 hour). For a closed apex tooth avulsed for >60 minutes dry time (or >60 min total in poor media), the PDL is non-viable; however milk storage for 40 min is acceptable. The tooth should be replanted and splinted flexibly (physiological splint) for 2–4 weeks. Root canal treatment is initiated within 7–10 days (before splint removal) as pulp necrosis is expected in a mature tooth. IADT guidelines 2020."},
    {"id":"paeds_3","type":"sba","stem":"A 5-year-old presents for extraction of a grossly carious lower left second primary molar (LLE). If this tooth is extracted prematurely, what space management should be considered?","options":["No space management needed at this age","A band-and-loop space maintainer on the first permanent molar to prevent mesial drift","Immediate placement of a primary molar partial denture","Extraction of the upper left second primary molar to maintain symmetry","Allow natural drift and reassess at age 12"],"correct":1,"explanation":"Early loss of a second primary molar prior to eruption of the first permanent molar risks mesial drift of the first permanent molar into the space, reducing arch length and potentially impacting the second premolar. A band-and-loop space maintainer (banded to the first permanent molar once erupted, or to the first primary molar) is recommended. If the first permanent molar has not yet erupted, a distal shoe space maintainer may be needed."},
    {"id":"paeds_4","type":"sba","stem":"A 10-year-old girl presents with a symmetrical pattern of creamy white opacities and hypoplastic defects on the first permanent molars (all four) and the permanent incisors. What is the most likely diagnosis?","options":["Amelogenesis imperfecta (hypomaturation type)","Dental fluorosis (moderate)","Molar incisor hypomineralisation (MIH)","Tetracycline staining","Enamel hypoplasia from nutritional deficiency"],"correct":2,"explanation":"Molar Incisor Hypomineralisation (MIH) characteristically affects the first permanent molars (often all four) and the permanent incisors. The opacities are asymmetric in distribution but the pattern of teeth involved is typical. The enamel is poorly mineralised, leading to post-eruptive breakdown (PEB) on the molars. MIH is distinct from fluorosis (diffuse white streaking) and AI (affects all teeth systemically)."},
    {"id":"paeds_5","type":"sba","stem":"A 4-year-old child has been referred with rampant caries affecting multiple primary teeth, including the upper and lower molars. The child is uncooperative and cannot be managed in the dental chair. Which of the following is appropriate management under conscious sedation (inhalation sedation with nitrous oxide)?","options":["Comprehensive treatment of all teeth under nitrous oxide/oxygen in multiple appointments","Inhalation sedation is contraindicated in children under 6","Inhalation sedation can be used but cannot be expected to facilitate complex restorative work in a 4-year-old with rampant caries — general anaesthesia referral should be considered","Prescribe antibiotics until the child is old enough for dental treatment","Extract all the carious teeth under local anaesthesia alone"],"correct":2,"explanation":"Nitrous oxide inhalation sedation (IANOB) can be used in children as young as 3–4 years for simple or moderately anxious patients, but is unlikely to facilitate comprehensive restorative treatment in a young, highly uncooperative child with rampant caries. General anaesthesia (GA) referral is appropriate when sedation is inadequate to allow safe and effective treatment. The decision should follow NICE guideline NG184 (Dental antimicrobials) and GDC/FGDP guidance on GA referral."},
    {"id":"paeds_6","type":"sba","stem":"During extraction of an upper left primary canine in a 6-year-old, the clinician is concerned that the root may be resorbed. What radiograph gives the most information about the relationship of the primary root to the permanent successor?","options":["Panoramic radiograph (OPG)","Upper standard occlusal","Periapical radiograph of the canine region using the paralleling technique","CBCT of the anterior maxilla","Bitewing radiograph"],"correct":2,"explanation":"A periapical radiograph of the canine region using the paralleling technique (or bisecting angle technique in children) gives the best view of root resorption, the remaining root length, and the relationship to the developing permanent canine. The OPG is useful for an overview but has geometric distortion and may not show the fine detail needed. CBCT is only indicated for complex cases per IRMER/FGDP guidelines."},
    {"id":"paeds_7","type":"sba","stem":"A 3-year-old child has 'nursing caries' — extensive caries affecting all four upper primary incisors, extending to the gingival margin. The most appropriate restorative approach for the severely affected upper incisors is:","options":["Glass ionomer restorations on each incisor","Stainless steel crowns on all four incisors","Strip crowns (composite/celluloid crown forms) on the upper incisors","Extract all four upper incisors immediately to prevent further infection","Fluoride varnish alone and dietary advice"],"correct":2,"explanation":"Strip crowns (celluloid crown forms filled with composite resin) are the treatment of choice for extensively carious primary incisors when sufficient tooth structure remains. They provide excellent aesthetics, durability, and adequate coronal seal. Stainless steel crowns are used mainly on primary molars. Extraction is a last resort; preserving upper incisors is important for speech, aesthetics, and space maintenance."},
    {"id":"paeds_8","type":"sba","stem":"A 7-year-old child has a permanent first molar with MIH (Grade 3 — sensitivity, breakdown, atypical caries). What is the current evidence-based long-term management strategy for a severely affected lower right first permanent molar?","options":["Restore with composite and monitor","Restore with a stainless steel crown (Hall technique or conventional SSC) for immediate medium-term management, with planned extraction if indicated","Extract immediately — always the best option","Apply fluoride varnish every 3 months only","Place a conventional amalgam restoration"],"correct":1,"explanation":"For a severely affected MIH first permanent molar, a stainless steel crown (SSC) provides the best protection and extends the tooth's functional lifespan while the patient grows. The Hall technique (cemented over minimal or no preparation) is evidence-based and well-tolerated by children. If the long-term prognosis is hopeless, the FGDP/BSPD 'Optimal Extraction Time' guidance considers extracting at the ideal time (when the bifurcation of the lower second molar is calcifying, approximately 8–10 years) to optimise spontaneous space closure."},
    {"id":"paeds_9","type":"sba","stem":"According to current UK guidance, at what age should a first dental examination be offered to a child?","options":["At 2 years of age","When the first tooth erupts or by 1 year of age","At 3 years of age","At school entry (5 years)","Only when a dental problem is identified by a parent"],"correct":1,"explanation":"UK guidance (BSPD, FGDP, DBOH) recommends that children should attend for a dental examination as soon as the first primary tooth erupts or by 1 year of age at the latest. Early examination allows caries risk assessment, dietary and fluoride advice, and establishes a 'dental home.' Many European and US guidelines align with this first-birthday recommendation."},
    {"id":"paeds_10","type":"sba","stem":"A 6-year-old child with no previous dental experience attends. To gain cooperative behaviour, which approach should be attempted first?","options":["Premedicate with oral midazolam","Tell-show-do (TSD) with positive reinforcement","Proceed immediately with treatment under local anaesthesia","Refer for treatment under general anaesthesia","Use restraint (protective stabilisation) on the first visit"],"correct":1,"explanation":"Tell-show-do (TSD) is the cornerstone non-pharmacological behaviour management technique in paediatric dentistry. The clinician explains what will happen (Tell), demonstrates on a model or the child's hand (Show), then performs the procedure (Do). It is used as the first-line approach for all children. Pharmacological methods (sedation, GA) are reserved for when non-pharmacological techniques have failed or are inappropriate."},
    {"id":"paeds_11","type":"sba","stem":"A 9-year-old boy presents with a subluxated upper right permanent central incisor (increased mobility, tooth in socket, no displacement). What is the appropriate management?","options":["No treatment; subluxation always resolves spontaneously","Flexible (physiological) splint for 2 weeks and soft diet advice","Rigid splint for 3–4 months","Immediate root canal treatment","Extract the tooth"],"correct":1,"explanation":"Subluxation involves PDL injury with increased mobility but the tooth is not displaced. Management: a flexible splint (e.g. bonded wire-composite or orthodontic wire, nylon fishing line) for 2 weeks to reduce mobility and patient discomfort, combined with soft diet. Rigid splinting risks ankylosis and resorption. Pulp testing at follow-up is essential; root canal treatment only if pulp necrosis develops."},
    {"id":"paeds_12","type":"sba","stem":"A 2-year-old child presents with bilateral multiple dental caries. The mother reports the child takes a bottle of fruit juice to bed each night. What dietary advice is most important?","options":["Switch to a sugar-free dummy (pacifier) at night","Dilute the fruit juice in the bottle","Stop the bottle feeding at night entirely and offer water only after the last tooth-brushing","Replace fruit juice with formula milk","Restrict all solid foods containing sugar"],"correct":2,"explanation":"Nursing bottle caries (early childhood caries) is primarily caused by prolonged exposure to fermentable carbohydrates (fruit juice, sweetened drinks, formula) in a bottle overnight, when saliva flow is minimal. The single most effective advice is to stop the night-time bottle and use water only after the last brushing. Diluting juice still provides substrate for Streptococcus mutans."},
    {"id":"paeds_13","type":"sba","stem":"According to DELIVERING BETTER ORAL HEALTH (DBOH, 4th edition), at what age and concentration of fluoride toothpaste should fluoride varnish application begin for high-caries-risk children?","options":["From 2 years of age, 1450 ppm toothpaste, varnish twice yearly","From tooth eruption, 1000 ppm toothpaste, varnish twice yearly","From 3 years of age, 1450 ppm toothpaste, varnish four times yearly","From 6 months before tooth eruption, anticipatory fluoride supplements"],"correct":1,"explanation":"DBOH (4th edition, 2021) recommends: from tooth eruption, use 1000 ppm fluoride toothpaste (smear) until age 3, then 1450 ppm (pea-sized) from age 3. Fluoride varnish (22,600 ppm, 2.2% NaF Duraphat) should be applied at least twice yearly from tooth eruption in high-risk children. The correct combination here is from tooth eruption + 1000 ppm + twice-yearly varnish."},
    {"id":"paeds_14","type":"sba","stem":"A 5-year-old presents in pain from a grossly carious upper right primary second molar (UDE). The tooth has evidence of furcation involvement on the periapical radiograph. What is the most appropriate management?","options":["Pulp capping with calcium hydroxide and restore with GIC","Non-vital pulpotomy (Buckley's formocresol) and stainless steel crown","Extraction of the tooth","Prescribe antibiotics and review in 1 week","Pulpotomy with MTA and restore with composite"],"correct":2,"explanation":"Furcation involvement in a primary molar indicates irreversible pulp pathology and periapical/inter-radicular infection. Pulp treatment (pulpotomy or pulpectomy) is contraindicated when there is radiographic evidence of furcation involvement, excessive root resorption, or a developing successor at risk. Extraction is the appropriate management, with consideration for space maintenance (band and loop if indicated, depending on the developing dentition stage)."},
    {"id":"paeds_15","type":"sba","stem":"A 4-year-old child presents with a lower left primary first molar with a carious cavity that does not extend into the pulp. The tooth is vital and the child is cooperative. Which restorative technique has the best evidence for longevity in primary molars?","options":["Glass ionomer cement (GIC) restoration with conventional caries removal","Amalgam restoration","Composite resin with selective caries removal","Hall technique (stainless steel crown cemented over caries without preparation)","Atraumatic restorative treatment (ART) with GIC"],"correct":3,"explanation":"The Hall technique involves cementing a pre-formed stainless steel crown over a primary molar WITHOUT any caries removal or tooth preparation. The evidence shows superior survival rates compared to conventional restorations (50% less failure in the CCNS trial, Innes 2011). It seals in carious dentine, the caries arrests, and the crown protects the tooth. It is the most evidence-based primary molar restorative approach."},
    {"id":"paeds_16","type":"sba","stem":"A 12-year-old has a permanent tooth with a complicated crown fracture (exposing pulp tissue). The fracture occurred 2 hours ago. The tooth is vital, the root is fully formed, and there is minimal contamination. What is the preferred management?","options":["Full pulpectomy and root canal filling immediately","Direct pulp capping with calcium hydroxide only","Partial pulpotomy (Cvek pulpotomy) using MTA or calcium silicate cement","Extract the tooth — complicated fractures cannot be managed conservatively","Prescribe antibiotics and review next week"],"correct":2,"explanation":"A Cvek (partial) pulpotomy is the treatment of choice for a complicated crown fracture in a young, recently injured tooth, whether the root is open or closed. 1–2 mm of the exposed pulp is removed, haemostasis achieved, and MTA or Biodentine placed. Success rates >90% are reported. Complete pulpectomy unnecessarily sacrifices vital pulp tissue. Direct pulp capping alone has lower success for complicated fractures."},
    {"id":"paeds_17","type":"sba","stem":"The eruption sequence in the permanent dentition most commonly begins with which teeth?","options":["Upper central incisors at 6–7 years","Lower central incisors and lower first molars at 6–7 years","Lower canines at 9–10 years","Upper first premolars at 10–11 years","Lower second molars at 11–13 years"],"correct":1,"explanation":"The permanent dentition normally begins eruption with the lower central incisors and the first molars (upper and lower) at approximately 6 years of age ('the 6-year-old molars'). The lower central incisors often erupt slightly before or simultaneously with the first molars. These landmarks are important reference points for monitoring dental development."},
    {"id":"paeds_18","type":"sba","stem":"A child is brought to the emergency department and a history of multiple visits for various injuries at different times is obtained. The child's oral injuries include a torn labial fraenum, bruising of the oral mucosa, and two recently fractured incisors. What is the most important consideration?","options":["Start orthodontic assessment immediately","Consider non-accidental injury (safeguarding concern) and follow your local child protection protocol","Restore the fractured teeth as a priority","Refer to oral and maxillofacial surgery for the fraenum","Prescribe antibiotics for the oral injuries"],"correct":1,"explanation":"Multiple injuries at different stages of healing, a torn fraenum (classically associated with NAI in children), oral bruising, and multiple dental injuries should immediately raise suspicion of non-accidental injury (child abuse). The clinician must follow the local safeguarding protocol: document accurately, do not confront the parent, inform the safeguarding lead, and refer to children's services/social care. This takes priority over any dental treatment."},
    {"id":"paeds_19","type":"sba","stem":"A 6-year-old child has all four first permanent molars extracted as part of a planned 'enforcement of the eight' (first permanent molar extractions to improve long-term prognosis). Which radiograph is essential before proceeding?","options":["Bitewing radiographs to check for interproximal caries on all teeth","An OPG to confirm the presence, number, and position of all developing permanent teeth","Upper standard occlusal view","Lateral cephalogram","CBCT of all four quadrants"],"correct":1,"explanation":"Before balancing or compensating extractions of first permanent molars in a child, an OPG (or full mouth periapical series) is essential to confirm the presence and developmental stage of all successor and adjacent teeth (especially second premolars and second molars). Missing teeth or developmental anomalies change the extraction plan significantly. Extracting at the wrong developmental stage can lead to impaction of second molars or premolars."},
    {"id":"paeds_20","type":"sba","stem":"A 5-year-old child requires extraction of a carious upper right primary second molar. Which local anaesthetic technique is appropriate?","options":["Inferior alveolar nerve block","Maxillary nerve block (Gow-Gates technique)","Infiltration anaesthesia buccally and palatally using lidocaine 2% with 1:80,000 adrenaline","No local anaesthetic — use inhalation sedation alone","Mental nerve block"],"correct":2,"explanation":"For extraction of upper primary molars in children, infiltration anaesthesia (buccal infiltration and palatal infiltration) is the standard technique — the bone of the upper jaw is relatively porous, allowing infiltration to work effectively. Inferior alveolar nerve block is used for lower teeth. The maxillary division block (Gow-Gates) is not routine in paediatric primary care dentistry. Adequate LA is essential before any extraction."},
    {"id":"paeds_21","type":"sba","stem":"A 9-year-old girl has her upper right lateral incisor absent from the arch. An OPG confirms that the UL3 is congenitally absent (hypodontia). Which professional manages the definitive long-term treatment planning?","options":["GDP alone, with composite build-up of the upper left lateral incisor","Orthodontist in liaison with restorative/prosthodontic specialist (multidisciplinary team)","Oral and maxillofacial surgeon for immediate implant placement","Paediatric dentist for space maintenance only","No referral needed — the space will close naturally"],"correct":1,"explanation":"Hypodontia management requires a multidisciplinary approach. An orthodontist and restorative specialist plan together whether to (a) close the space orthodontically (moving the canine to replace the lateral), (b) maintain/open the space for a future implant, or (c) provide a bridgework solution. Implants cannot be placed until skeletal growth is complete (mid-to-late teenage years). Early referral for joint planning is essential."},
    {"id":"paeds_22","type":"sba","stem":"A 14-year-old patient is referred because of a discoloured, non-tender upper left central incisor following trauma 2 years ago. Radiographically there is inflammatory root resorption. Electrical pulp testing gives no response. What is the diagnosis and management?","options":["Pulp canal obliteration (calcification) — no treatment needed","Pulp necrosis with inflammatory resorption — root canal treatment is urgently indicated","External cervical resorption — monitor only","Surface resorption — physiological and self-limiting","Replacement resorption — extract immediately"],"correct":1,"explanation":"Discolouration and non-response to EPT, combined with radiographic inflammatory resorption, indicates pulp necrosis. Infected root canal contents stimulate external inflammatory root resorption (EIRR). Urgent root canal treatment to remove the infected pulp, followed by inter-appointment calcium hydroxide to arrest the resorption, is essential. Delayed treatment leads to progressive tooth loss. Inflammatory resorption can destroy a root rapidly."},
    {"id":"paeds_23","type":"sba","stem":"A 7-year-old with a lower right primary second molar caries. The nerve is exposed and there is no radiographic furcation involvement. Which pulp treatment is the most appropriate?","options":["Indirect pulp cap with calcium hydroxide and GIC","Formocresol pulpotomy: remove coronal pulp, apply Buckley's solution (or FC diluted 1:5), base and restore with stainless steel crown","MTA pulpotomy with composite restoration","Pulpectomy with zinc oxide eugenol paste fill","Extract the tooth"],"correct":1,"explanation":"The formocresol pulpotomy (or increasingly ferric sulphate / MTA pulpotomy) is the standard treatment for a vital exposed primary molar pulp without radiographic furcation involvement or pathological resorption. The coronal pulp is amputated, a medicament (FC, ferric sulphate, or MTA) applied to the radicular stumps, and the tooth restored with a stainless steel crown. SSC is strongly recommended to prevent restoration failure."},
    {"id":"paeds_24","type":"sba","stem":"An 11-year-old child attends with the upper right first permanent molar impacted beneath the second primary molar. The OPG shows the first permanent molar angled mesially with its crown abutting the distal root of the primary molar. What management is indicated?","options":["Extract the first permanent molar — it cannot erupt","No intervention — all impacted first molars erupt spontaneously","Extract the primary second molar to allow the permanent molar to erupt spontaneously or with orthodontic assistance","Apply orthodontic uprighting mechanics to the permanent molar","Monitor radiographically for 2 years without treatment"],"correct":2,"explanation":"Impaction of a first permanent molar (ectopic eruption) occurs when the crown is mesially angulated into the distal root of the second primary molar, causing its resorption. If moderate, spontaneous disimpaction may occur. If the molar remains impacted with progressive root resorption, extraction of the primary second molar is indicated to allow the permanent molar to erupt. A separator spring, brass wire or orthodontic distalisation may also be used in mild cases."},
    {"id":"paeds_25","type":"sba","stem":"A 4-year-old child's upper right primary central incisor (URA) is avulsed in a fall at home. The parents bring the tooth to the surgery. What is the management?","options":["Replant immediately and splint for 2 weeks","Replant and commence root canal treatment in 1 week","Do NOT replant primary incisors — risk of damage to permanent successor; reassure parents and manage aesthetically with a denture if needed","Replant and prescribe antibiotics","Store in milk and refer to hospital immediately"],"correct":2,"explanation":"Avulsed primary teeth should NOT be replanted. The main risks of replanting primary teeth are: (1) damage to the developing permanent successor during replantation; (2) the child's lack of cooperation; (3) risk of aspiration. IADT (2020) and BSPD guidance both advise against primary tooth replantation. The parents should be reassured, the socket managed (haemostasis), and an aesthetic replacement (partial denture) considered if there is a significant cosmetic concern."},
    {"id":"paeds_26","type":"sba","stem":"A 10-year-old child has no upper lateral incisors (confirmed hypodontia on OPG). The canines are in a good position. The treating orthodontist plans to close the lateral incisor spaces and bring the canines forward. What restorative procedure may be needed at the end of orthodontic treatment?","options":["Implants to replace the lateral incisors","Resin-bonded bridges to replace the lateral incisors","Composite addition to the canines to reshape them to resemble lateral incisors (tooth morphing)","No restorative work — canines naturally look like lateral incisors","Veneers on all the upper anterior teeth"],"correct":2,"explanation":"When the canines are moved forward to replace the lateral incisors (space closure), they can be made to look more like lateral incisors by adding composite to the mesial aspect (to narrow the tooth visually) and reshaping the cusp tip. This 'tooth morphing' (canine substitution) is a well-recognised technique. It is minimally invasive and reversible. The canine root provides good support in the lateral position."},
    {"id":"paeds_27","type":"sba","stem":"Which primary teeth have the largest crowns relative to arch size and are most commonly involved in space loss when prematurely extracted?","options":["Primary central incisors","Primary lateral incisors","Primary canines","Primary first molars","Primary second molars"],"correct":4,"explanation":"Primary second molars are the largest primary teeth and occupy the most space in the arch. Their premature extraction (especially in the upper arch) results in the greatest space loss due to mesial drift of the first permanent molar. Space maintenance is particularly important after early loss of primary second molars to preserve space for the developing second premolar."},
