    {"id":"pharm_2","type":"sba","stem":"A patient is prescribed metronidazole for acute necrotising ulcerative gingivitis. She mentions she drinks alcohol socially. What interaction should you warn her about?","options":["Metronidazole causes increased sensitivity to sunlight with alcohol","Metronidazole inhibits aldehyde dehydrogenase, causing a disulfiram-like reaction (flushing, nausea, vomiting, palpitations) when alcohol is consumed — alcohol must be avoided during and for 48 hours after the course","Alcohol reduces the effectiveness of metronidazole","There is no clinically significant interaction between metronidazole and alcohol","Alcohol increases the risk of peripheral neuropathy with metronidazole"],"correct":1,"explanation":"Metronidazole (and tinidazole) inhibits aldehyde dehydrogenase (acetaldehyde dehydrogenase), the enzyme responsible for metabolising acetaldehyde (a toxic alcohol metabolite). Concurrent alcohol intake causes accumulation of acetaldehyde, producing a disulfiram-like reaction: intense flushing, nausea, vomiting, headache, palpitations. Patients must avoid alcohol during treatment and for 48 hours after the last dose. This is a mandatory counselling point."},
    {"id":"pharm_3","type":"sba","stem":"A patient on long-term warfarin requires a dental extraction. His INR is 2.3. According to SDCEP guidance, what is the most appropriate management?","options":["Withhold warfarin for 3 days before extraction and restart immediately after","Check INR within 72 hours of the procedure; if INR ≤4.0, proceed with extraction using local haemostatic measures (oxidised cellulose, tranexamic acid mouthwash, suturing) without stopping warfarin","Always refer to hospital for all extractions in anticoagulated patients","Reverse with vitamin K before extraction","The procedure should be postponed until INR is <2.0"],"correct":1,"explanation":"SDCEP 'Management of Dental Patients Taking Anticoagulants or Antiplatelet Drugs' (2015) guidance: for patients on warfarin, check INR within 72 hours of procedure. If INR ≤4.0, proceed with routine dental extractions without stopping warfarin, using local haemostatic measures (absorbable haemostat, sutures, tranexamic acid mouthwash 5%, bite pack). Stopping warfarin increases thromboembolic risk. Refer to hospital only if INR >4.0 or complex surgery."},
    {"id":"pharm_4","type":"sba","stem":"Articaine 4% with 1:100,000 adrenaline is increasingly used in dentistry. What is the key pharmacokinetic property that makes articaine effective for palatal infiltration from a buccal injection?","options":["Articaine has a slower onset than lidocaine","Articaine is more protein-bound, giving it a longer duration of action","Articaine is unique among amide local anaesthetics in containing a thiophene ring that allows rapid metabolism by plasma esterases and enhanced diffusion through bone and soft tissue","Articaine has a larger molecular weight, making it more potent","Articaine has a higher vasoconstrictor concentration that reduces diffusion"],"correct":2,"explanation":"Articaine contains a thiophene ring (unique among dental LA agents) and an ester-containing side chain that allows partial plasma esterase metabolism (in addition to hepatic metabolism), giving it a shorter systemic half-life and improved safety profile. Its enhanced lipid solubility and diffusion properties allow anaesthesia of the palatal mucosa from a buccal infiltration in some cases. It is available as 4% (40 mg/mL) solution. Maximum dose: 7 mg/kg."},
    {"id":"pharm_5","type":"sba","stem":"A patient reports a previous 'allergic' reaction to penicillin (hives and rash after taking amoxicillin). She requires antibiotic prophylaxis for a procedure. Which antibiotic is most appropriate as a penicillin-free alternative for dental prophylaxis?","options":["Co-amoxiclav","Ampicillin","Clindamycin 600 mg one hour before procedure","Cephalexin 1 g one hour before procedure","Metronidazole 400 mg"],"correct":2,"explanation":"In a patient with a documented penicillin allergy (non-severe — hives/rash), clindamycin 600 mg is the standard alternative for dental infection prophylaxis (e.g. infective endocarditis prophylaxis in eligible patients, or perisurgical prophylaxis). Co-amoxiclav and ampicillin contain penicillin. Cephalosporins (cephalexin) carry a cross-reactivity risk (~1–10%); avoided if the penicillin allergy was severe. Note: routine IE prophylaxis is no longer recommended by NICE for dental procedures (NG178)."},
    {"id":"pharm_6","type":"sba","stem":"A patient is taking an SSRI (selective serotonin reuptake inhibitor) such as sertraline. You prescribe metronidazole for a dentoalveolar infection. What drug interaction should you be aware of?","options":["Metronidazole reduces the absorption of SSRIs","Metronidazole can inhibit CYP2C19 and potentially increase sertraline levels, but more importantly, metronidazole combined with SSRIs (especially tramadol or pethidine — opioids) can increase serotonin syndrome risk; the more clinically relevant interaction is the warfarin-potentiation effect","SSRIs reduce the efficacy of metronidazole","SSRIs cause the disulfiram-like reaction with metronidazole","There is no interaction between metronidazole and SSRIs"],"correct":1,"explanation":"Metronidazole inhibits CYP2C19 and can increase plasma levels of some SSRIs. More clinically important: combining metronidazole with other serotonergic drugs (or when the patient uses herbal preparations like St John's Wort) increases serotonin syndrome risk. Also, metronidazole significantly potentiates the anticoagulant effect of warfarin by inhibiting its metabolism — a critical interaction. Always check the patient's full drug list before prescribing."},
    {"id":"pharm_7","type":"sba","stem":"A 65-year-old man on apixaban for atrial fibrillation requires an upper molar extraction. After tooth removal, gentle pressure for 5 minutes does not achieve haemostasis. The dental emergency drug kit and clinical cupboard contain tranexamic acid 5% mouthwash and tranexamic acid 500 mg tablets. By what mechanism does tranexamic acid help establish haemostasis in this socket?","options":["It activates platelet aggregation directly","It is an antifibrinolytic — it reversibly binds to lysine sites on plasminogen, preventing its activation to plasmin and therefore preventing fibrinolysis (clot breakdown), allowing the clot to mature","It causes vasoconstriction at the bleeding site","It replaces vitamin K in the coagulation cascade","It directly inhibits factor Xa"],"correct":1,"explanation":"Tranexamic acid is a synthetic lysine analogue that competitively blocks the lysine binding sites on plasminogen, preventing its conversion to plasmin and subsequent fibrinolysis. This stabilises the formed clot. In dental practice, 4.8% (sometimes labelled 5%) tranexamic acid mouthwash 10 mL four times daily for 2 days post-extraction is widely used by SDCEP for patients on anticoagulants. It is absorbed minimally from oral mucosa, so the systemic effect is small. Oxidised cellulose packing and suturing are also recommended. Caution in patients with active thromboembolic disease."},
    {"id":"pharm_8","type":"sba","stem":"What is the mechanism of action of adrenaline (epinephrine) as a vasoconstrictor in local anaesthetic solutions?","options":["Adrenaline acts on β2-adrenergic receptors to cause local vasoconstriction","Adrenaline acts on α1-adrenergic receptors to cause vasoconstriction, reducing blood flow, slowing systemic absorption of the LA, deepening anaesthesia, and reducing bleeding","Adrenaline inhibits sodium channels, potentiating the LA effect","Adrenaline acts on μ-opioid receptors to reduce pain","Adrenaline accelerates systemic absorption of the LA to increase peak plasma concentration"],"correct":1,"explanation":"Adrenaline (epinephrine) acts on α1-adrenergic receptors in blood vessel walls, causing vasoconstriction. This reduces blood flow at the injection site, slowing absorption of the local anaesthetic into the systemic circulation, thereby: (1) prolonging the duration of anaesthesia; (2) deepening anaesthesia (higher local concentration); (3) reducing systemic toxicity risk; (4) reducing haemorrhage in the surgical field. β2-adrenergic effects cause vasodilation in skeletal muscle vessels — relevant at higher systemic doses."},
    {"id":"pharm_9","type":"sba","stem":"A patient requires post-operative pain relief following a dental extraction. She is allergic to aspirin. Which analgesic is most appropriate as first-line for mild-to-moderate dental pain?","options":["Ibuprofen 400 mg three times daily","Paracetamol 500–1000 mg up to four times daily (with or without ibuprofen if not contraindicated)","Codeine phosphate 30 mg four times daily","Tramadol 50 mg three times daily","Morphine sulfate tablets"],"correct":1,"explanation":"Paracetamol is the first-line analgesic for mild-to-moderate pain when NSAIDs are contraindicated (aspirin allergy includes cross-sensitivity to other NSAIDs such as ibuprofen). Paracetamol 1000 mg four times daily (maximum 4 g/24h) is safe and effective. For moderate pain, paracetamol + codeine (co-codamol) may be added. In patients with aspirin allergy (especially if also allergic to other NSAIDs), avoid ibuprofen due to cross-reactivity risk."},
    {"id":"pharm_10","type":"sba","stem":"A patient on bisphosphonate therapy (alendronate 70 mg weekly for osteoporosis) requires multiple dental extractions. What is the main risk and the appropriate management discussion?","options":["Bisphosphonates cause post-extraction haemorrhage — check clotting before extractions","Bisphosphonates carry a risk of medication-related osteonecrosis of the jaw (MRONJ); assess the risk using the SDCEP algorithm, inform the patient of the risk, attempt to complete all dentistry before starting bisphosphonates if possible, and ensure optimal oral health","Bisphosphonates cause gingival hyperplasia — perform gingivectomy before extractions","Bisphosphonates reduce bone density and fractures during extraction — refer to OMFS for all extractions","There is no dental risk from oral bisphosphonates — IV bisphosphonates only cause MRONJ"],"correct":1,"explanation":"Both oral and IV bisphosphonates carry a risk of MRONJ (medication-related osteonecrosis of the jaw), though IV bisphosphonates (e.g. zoledronate for cancer) carry a much higher risk. For oral bisphosphonates, the risk from extractions is low but real. Management: assess risk using SDCEP/AAOMS flowchart, optimise oral health to avoid extractions where possible, inform the patient of MRONJ risk, consider referral to secondary care for complex cases. Drug holiday is not routinely recommended (limited evidence)."},
    {"id":"pharm_11","type":"sba","stem":"Which class of local anaesthetics is lidocaine, and what is the main mechanism by which it produces anaesthesia?","options":["Ester local anaesthetic; inhibits potassium channels","Amide local anaesthetic; blocks voltage-gated sodium channels, preventing depolarisation and nerve impulse conduction","Amide local anaesthetic; blocks calcium channels","Ester local anaesthetic; blocks voltage-gated sodium channels","Amide local anaesthetic; binds to GABA receptors"],"correct":1,"explanation":"Lidocaine is an amide-type local anaesthetic (other amides: articaine, bupivacaine, mepivacaine, prilocaine). It works by diffusing through the nerve membrane and blocking voltage-gated sodium channels from within the channel, preventing the influx of Na+ ions required for depolarisation. This abolishes action potential generation and conduction. Ester-type LAs (e.g. procaine, benzocaine, cocaine) are metabolised by plasma cholinesterases; amides are metabolised in the liver."},
    {"id":"pharm_12","type":"sba","stem":"A patient has a periapical abscess and you decide to prescribe an antibiotic. According to SDCEP antimicrobial prescribing guidance, which antibiotic is the first-line choice for a dentoalveolar infection in a non-penicillin-allergic patient?","options":["Metronidazole 400 mg three times daily for 5 days","Amoxicillin 500 mg three times daily for 5 days","Co-amoxiclav 625 mg three times daily for 5 days","Cefalexin 500 mg four times daily for 5 days","Clarithromycin 500 mg twice daily for 5 days"],"correct":1,"explanation":"SDCEP Drug Prescribing for Dentistry (3rd edition) and NICE NG184: first-line antibiotic for dentoalveolar infections (when antibiotics are appropriate — i.e. spreading infection, systemic involvement, immunocompromise) in non-penicillin-allergic patients is amoxicillin 500 mg three times daily for 5 days. Metronidazole 400 mg TDS is an alternative if penicillin-allergic. Antibiotics should ONLY be prescribed when there are systemic signs; source control (drainage/extraction) remains the definitive treatment."},
    {"id":"pharm_13","type":"sba","stem":"A patient requires sedation for a dental procedure. Midazolam is administered intravenously for conscious sedation. What antagonist can be used to reverse midazolam's effects if over-sedation occurs?","options":["Naloxone (Narcan)","Flumazenil (Anexate)","Atropine","Neostigmine","N-acetylcysteine"],"correct":1,"explanation":"Flumazenil (0.2 mg IV, repeated at 1-minute intervals to a maximum of 1 mg) is the specific competitive antagonist at the benzodiazepine binding site on the GABA-A receptor. It rapidly reverses benzodiazepine (including midazolam) over-sedation. Its half-life is shorter than midazolam (~1 hour vs ~2–4 hours), so resedation can occur — patient monitoring must continue. Naloxone reverses opioid effects (not benzodiazepines)."},
    {"id":"pharm_14","type":"sba","stem":"What is the UK maximum recommended dose of bupivacaine (Marcain) with adrenaline for an adult patient?","options":["1 mg/kg (max 70 mg)","2 mg/kg (max 150 mg)","2 mg/kg (max 150 mg) with vasoconstrictor / 1.5 mg/kg (max 60 mg) without","7 mg/kg","4.4 mg/kg (max 300 mg)"],"correct":2,"explanation":"Bupivacaine (0.5% solution, 5 mg/mL) is a long-acting amide LA used in dentistry for prolonged post-operative analgesia (e.g. third molar surgery). Maximum dose: with adrenaline — 2 mg/kg up to 150 mg; plain bupivacaine — 1.5 mg/kg up to 60 mg. Bupivacaine is highly cardiotoxic in overdose (causes ventricular fibrillation); this limits its use and requires careful dosing. It is not suitable for routine dental infiltration but is used by oral surgeons for third molar extractions."},
    {"id":"pharm_15","type":"sba","stem":"A 14-year-old patient has acute dental pain. The parent requests dihydrocodeine for pain relief. What is the main prescribing concern in this age group in the UK?","options":["Dihydrocodeine is not available on NHS for children under 16","Codeine and dihydrocodeine are contraindicated in children under 12 years (absolute) due to risk of respiratory depression from ultra-rapid codeine metabolism; caution also applies to children 12–18 who have breathing problems","Dihydrocodeine causes liver toxicity in all children","Children under 16 require a hospital prescription for all controlled drugs","Dihydrocodeine is unlicensed in children under 18 in the UK"],"correct":1,"explanation":"The MHRA issued guidance in 2013: codeine is contraindicated in children under 12 for any indication, and in all ages for post-tonsillectomy/adenoidectomy pain. For children aged 12–18, codeine should be used with caution and only when paracetamol/ibuprofen are insufficient; avoid in children with breathing problems. The risk is fatal respiratory depression in ultra-rapid metabolisers (CYP2D6 polymorphism). The same caution applies to dihydrocodeine. Paracetamol ± ibuprofen are preferred for dental pain in children."},
    {"id":"pharm_16","type":"sba","stem":"A patient is taking warfarin and you need to prescribe a short course of antibiotics for a dental infection. Which antibiotic has the most clinically significant interaction with warfarin that requires close monitoring or dose reduction?","options":["Amoxicillin — minimal interaction","Metronidazole — significantly inhibits warfarin metabolism (CYP2C9 inhibition), substantially increasing the INR and bleeding risk","Cefalexin — moderate interaction only","Erythromycin — greatest interaction, stronger than metronidazole","Clindamycin — inhibits warfarin absorption"],"correct":1,"explanation":"Metronidazole is a potent inhibitor of CYP2C9 (and CYP3A4), the enzyme primarily responsible for warfarin (S-warfarin) metabolism. Co-prescription can increase the INR by 2–3 times, dramatically increasing haemorrhage risk. This is one of the most clinically significant drug interactions in dentistry. If metronidazole must be prescribed in a warfarin patient, the GP must be informed, the INR monitored, and warfarin dose adjusted. Amoxicillin causes a minimal interaction through gut flora disruption (minor INR changes)."},
    {"id":"pharm_17","type":"sba","stem":"A patient presents with prilocaine toxicity after dental LA. What specific toxic effect is unique to prilocaine among dental local anaesthetics?","options":["Hepatotoxicity","Nephrotoxicity","Methaemoglobinaemia — prilocaine's metabolite (o-toluidine) oxidises haemoglobin to methaemoglobin, causing cyanosis and reduced oxygen-carrying capacity","Peripheral neuropathy","QT interval prolongation"],"correct":2,"explanation":"Prilocaine (Citanest 3% or 4%, often with or without felypressin) can cause methaemoglobinaemia at high doses. Its metabolite o-toluidine oxidises ferrous (Fe²⁺) haemoglobin to ferric (Fe³⁺) methaemoglobin, which cannot carry oxygen, causing cyanosis. It is contraindicated in patients with anaemia, conditions affecting methaemoglobin reduction (G6PD deficiency, hereditary methaemoglobinaemia), and pregnancy (risk to fetus). This unique toxicity limits prilocaine doses to ~400 mg in adults."},
    {"id":"pharm_18","type":"sba","stem":"A patient is prescribed oral fluconazole for oral candidiasis. She also takes warfarin. What monitoring is required?","options":["Monitor blood glucose — fluconazole causes hypoglycaemia with warfarin","Monitor renal function — fluconazole is nephrotoxic with warfarin","Fluconazole significantly inhibits CYP2C9 and CYP3A4, increasing warfarin levels and the INR — the INR should be checked after starting fluconazole and warfarin dose adjusted as needed","No monitoring required — fluconazole has minimal interaction with warfarin","Monitor for peripheral neuropathy"],"correct":2,"explanation":"Fluconazole is a potent inhibitor of CYP2C9 (primary warfarin metabolising enzyme) and CYP3A4. When co-prescribed, it significantly increases warfarin plasma levels, substantially raising the INR and bleeding risk. This interaction can occur with a single dose of fluconazole. For oral candidiasis in a warfarin patient, consider whether topical nystatin (no systemic absorption) is an appropriate alternative, thereby avoiding the interaction altogether."},
    {"id":"pharm_19","type":"sba","stem":"A 30-year-old woman who is 32 weeks pregnant presents with severe pulpitis of a lower molar requiring analgesia until extraction can be arranged the following day. She has no allergies. According to the BNF and SDCEP guidance, which of the following analgesics is the safest first-line choice?","options":["Paracetamol 1 g four times daily — the safest analgesic in pregnancy at therapeutic doses","Ibuprofen 400 mg three times daily — first-line in all trimesters","Aspirin 600 mg four times daily — preferred over paracetamol","Codeine 30 mg four times daily — safe in pregnancy","Diclofenac 50 mg three times daily — safe in third trimester"],"correct":0,"explanation":"BNF and SDCEP prescribing for pregnant patients: paracetamol at standard therapeutic doses is the safest analgesic across all trimesters. NSAIDs (including ibuprofen, diclofenac, aspirin) are CONTRAINDICATED in the third trimester due to risk of premature closure of the fetal ductus arteriosus, oligohydramnios, and impaired neonatal renal function. NSAIDs are also generally avoided in the first trimester (small association with miscarriage). Codeine is best avoided in late pregnancy due to risk of neonatal withdrawal and respiratory depression at delivery. Always check the BNF appendix on prescribing in pregnancy."},
    {"id":"pharm_20","type":"sba","stem":"A dentist prescribes diazepam 5 mg orally as pre-medication for a highly anxious patient before dental treatment. The patient is 65 years old. What is the main prescribing concern for this age group?","options":["Diazepam causes renal failure in elderly patients","Diazepam is absolutely contraindicated in all patients over 60","The elderly have reduced hepatic metabolism and increased sensitivity to benzodiazepines — diazepam has a very long half-life (20–100 hours) and active metabolites; falls, over-sedation, and prolonged effects are significant risks","Diazepam causes acute hepatitis in elderly patients","Diazepam is unsafe only above 70 years old"],"correct":2,"explanation":"In elderly patients, benzodiazepines such as diazepam carry significant risks: reduced hepatic function means slower metabolism; increased sensitivity to CNS effects; active long-lived metabolites (desmethyldiazepam, half-life up to 200 hours) prolong sedation. Falls, respiratory depression, and cognitive impairment are serious risks. Shorter-acting benzodiazepines (e.g. lorazepam, temazepam) or non-pharmacological anxiolysis are preferred. If diazepam is used, doses should be substantially reduced."},
    {"id":"pharm_21","type":"sba","stem":"A patient is taking direct oral anticoagulants (DOACs — specifically rivaroxaban for atrial fibrillation). What is the appropriate management for a routine simple dental extraction, according to SDCEP guidance?","options":["Stop rivaroxaban 7 days before extraction","Continue rivaroxaban, time the extraction at the trough of the dose (12 hours after last dose for twice-daily dosing or 24 hours for once-daily), use local haemostatic measures, and do not routinely stop the drug","Refer all DOAC patients to hospital for dental extractions","Prescribe vitamin K to reverse rivaroxaban before extraction","Switch to warfarin temporarily for perioperative management"],"correct":1,"explanation":"SDCEP (2015, updated guidance) for DOACs: routine dental extractions (simple, 1–3 teeth) in patients on DOACs should proceed WITHOUT stopping the drug. Timing extraction at the trough (morning extraction if once-daily evening dose, or 12 hours after a twice-daily dose) reduces the drug's peak effect. Local haemostatic measures (absorbable haemostats, tranexamic acid, sutures) should be used. There is no widely-available reversal agent for all DOACs in non-emergency settings, and stopping DOACs increases thromboembolic risk."},
    {"id":"pharm_22","type":"sba","stem":"A patient with well-controlled type 2 diabetes takes metformin. She requires a significant oral surgical procedure under LA. What perioperative consideration applies to metformin?","options":["Metformin must be stopped 48 hours before any dental procedure","Metformin is contraindicated with local anaesthetics containing adrenaline","For minor oral surgery under LA, metformin does not require perioperative modification; however, for GA or major surgery with risk of acute kidney injury, metformin should be withheld temporarily due to lactic acidosis risk","Metformin causes hypoglycaemia under stress — give glucose beforehand","Metformin must be replaced with insulin for any surgical procedure"],"correct":2,"explanation":"For routine LA dental procedures, metformin does not require any modification. However, if a general anaesthetic is planned (with potential haemodynamic instability, reduced renal perfusion, and IV contrast), metformin is withheld 48 hours before and restarted after adequate renal function is confirmed (to prevent metformin-associated lactic acidosis). In primary care under LA, no modification to metformin is needed for most procedures. Ensure the patient does not skip meals (hypoglycaemia risk if using insulin/sulfonylureas)."},
    {"id":"pharm_23","type":"sba","stem":"A patient is taking corticosteroids long term (prednisolone 7.5 mg daily) for rheumatoid arthritis. She requires an extraction. What is the main concern regarding her steroid therapy?","options":["Prolonged postoperative haemorrhage from steroid-induced platelet dysfunction","Risk of adrenal crisis (Addisonian crisis) due to hypothalamic-pituitary-adrenal (HPA) axis suppression; the patient may not be able to mount a normal stress response to the surgical procedure","Corticosteroids cause marked anaesthetic resistance — double the LA dose","Corticosteroids cause severe post-extraction infection","No significant concern for minor dental surgery"],"correct":1,"explanation":"Long-term corticosteroid use suppresses the HPA axis — the adrenal glands atrophy and cannot produce sufficient cortisol in response to physiological stress (surgery). Addisonian crisis (acute adrenal insufficiency): profound hypotension, tachycardia, and collapse. For minor dentistry under LA, most guidelines suggest supplementation is rarely needed in a patient on <10 mg prednisolone daily; however, for major/anxious procedures, steroid supplementation ('steroid cover') may be considered. Ensure the patient takes their regular morning dose and has not withheld it."},
    {"id":"pharm_24","type":"sba","stem":"Which of the following correctly describes the mechanism of action of ibuprofen as an analgesic for dental pain?","options":["Ibuprofen binds to opioid receptors in the CNS to reduce pain perception","Ibuprofen irreversibly inhibits cyclooxygenase (COX)-1 and COX-2","Ibuprofen non-selectively and reversibly inhibits COX-1 and COX-2, reducing prostaglandin synthesis, thereby reducing inflammation, pain, and fever","Ibuprofen inhibits phospholipase A2, preventing arachidonic acid release from membrane phospholipids","Ibuprofen selectively inhibits COX-2 only (selective COX-2 inhibitor)"],"correct":2,"explanation":"Ibuprofen is a non-selective, reversible inhibitor of both COX-1 and COX-2 (cyclooxygenase enzymes). Inhibiting COX reduces the conversion of arachidonic acid to prostaglandins (particularly PGE2 and PGI2), thereby reducing inflammation, pain sensitisation, and fever. Aspirin irreversibly inhibits COX (acetylation). Selective COX-2 inhibitors (e.g. celecoxib) spare COX-1 (protecting gastric mucosa) but increase cardiovascular risk."},
    {"id":"pharm_25","type":"sba","stem":"A 50-year-old patient with Addison's disease (primary adrenal insufficiency) collapses with an adrenal crisis during a long, stressful oral surgical procedure. The dental emergency drug kit contains hydrocortisone 100 mg powder for reconstitution. What dose should be given to this adult, and what is the equivalent paediatric dose for a child aged 5 years?","options":["Adult 50 mg IM; child <1 year 25 mg IM","Adult 100 mg IM; child 1–5 years 50 mg IM, 6–11 years 100 mg IM","Adult 200 mg IM; same dose for child of any age","Adult 25 mg IM; child <12 years 12.5 mg IM","Adult 500 mg IM; child <12 years 250 mg IM"],"correct":1,"explanation":"Resus Council UK / BNF for Children doses for IM hydrocortisone in adrenal crisis or steroid cover: adult 100 mg IM (or IV if available); child <1 year 25 mg IM; 1–5 years 50 mg IM; 6–11 years 100 mg IM. Hydrocortisone replaces missing endogenous cortisol response to stress. Call 999, lay flat, give oxygen and IV fluids. Patients on long-term steroids (≥7.5 mg prednisolone equivalent) for >3 weeks may have HPA axis suppression and require steroid cover for major procedures or in acute illness; the patient's regular morning dose should never be missed."},
    {"id":"pharm_26","type":"sba","stem":"A patient with a documented severe penicillin allergy (anaphylaxis after amoxicillin) requires treatment for a spreading facial cellulitis originating from a lower molar. She cannot tolerate any oral food. What is the most appropriate antibiotic choice?","options":["IV amoxicillin-clavulanate (IV co-amoxiclav)","IV cefuroxime (a cephalosporin)","IV metronidazole 500 mg every 8 hours or IV clindamycin 600–900 mg every 6–8 hours plus urgent surgical drainage/extraction","Oral metronidazole 400 mg three times daily","Oral erythromycin 500 mg four times daily"],"correct":2,"explanation":"In a severe penicillin-allergic patient with spreading cellulitis requiring IV antibiotics: metronidazole IV ± clindamycin IV (or vancomycin for gram-positive cover in severe cases) are the penicillin-free options. IV cefuroxime carries a cross-reactivity risk (2–10%) in severe penicillin allergy. Co-amoxiclav is penicillin-based and absolutely contraindicated. Oral antibiotics are inappropriate for a patient who cannot take food (and for a spreading, severe infection requiring hospital management anyway)."},
    {"id":"pharm_27","type":"sba","stem":"Which of the following correctly distinguishes felypressin (used in prilocaine) from adrenaline (used in lidocaine) as a vasoconstrictor in dental local anaesthetics?","options":["Felypressin is an alpha-adrenergic agonist like adrenaline","Felypressin is a synthetic vasopressin (ADH) analogue that acts on V1 receptors in smooth muscle; it is NOT adrenergic, so it is safer in patients where adrenaline is contraindicated (e.g. severe cardiovascular disease, phaeochromocytoma), but it is relatively contraindicated in pregnancy (oxytocic effects)","Felypressin is more potent than adrenaline and causes more vasoconstriction","Felypressin acts on beta-adrenergic receptors","Felypressin has no effect on cardiovascular function"],"correct":1,"explanation":"Felypressin (0.03 IU/mL in Citanest 3%) is a synthetic vasopressin (ADH) analogue acting on vascular V1 receptors to cause smooth muscle contraction/vasoconstriction. Unlike adrenaline, it has no α or β adrenergic activity, making it preferable in patients where catecholamines are risky (severe cardiac disease, uncontrolled hypertension, phaeochromocytoma). However, felypressin has oxytocic (uterotonic) properties and is relatively contraindicated in pregnancy. It also causes less haemostasis than adrenaline."},
    {"id":"pharm_28","type":"sba","stem":"A 70-year-old patient on simvastatin 40 mg nightly for hypercholesterolaemia is prescribed clarithromycin 500 mg BD for a dental infection because of penicillin allergy. Why is this combination concerning, and what is the safest alternative?","options":["No issue — clarithromycin and statins do not interact","Clarithromycin is a potent CYP3A4 inhibitor and dramatically increases simvastatin plasma levels, predisposing to severe myopathy and rhabdomyolysis. The MHRA and BNF advise STOPPING simvastatin during the clarithromycin course, OR using a non-CYP3A4-dependent alternative such as metronidazole/clindamycin if antibiotic is essential","Clarithromycin reduces statin levels — increase the statin dose","Erythromycin is safer than clarithromycin in this context","Atorvastatin is safer with clarithromycin than simvastatin"],"correct":1,"explanation":"Clarithromycin and erythromycin are potent CYP3A4 inhibitors. Co-prescription with CYP3A4-metabolised statins (simvastatin, atorvastatin) raises statin levels several-fold, increasing the risk of myopathy and life-threatening rhabdomyolysis. The MHRA's UK Drug Safety Update specifically warns against combining clarithromycin with simvastatin. Pragmatic options: choose a non-interacting antibiotic (metronidazole or clindamycin); or, if clarithromycin is essential, withhold simvastatin during the course and for a few days afterwards (always in consultation with the prescriber). Pravastatin and rosuvastatin are not metabolised by CYP3A4 and have safer profiles."},
    {"id":"pharm_29","type":"sba","stem":"A 5-year-old child with extensive dental caries needs an antibiotic for spreading cellulitis. The mother asks why the dentist will not prescribe tetracycline, which she had as a child. What is the principal reason for avoiding tetracycline in this patient?","options":["Tetracycline causes congenital heart defects in children","Tetracyclines bind to calcium in developing teeth and bones, causing permanent intrinsic yellow-brown discolouration of the dentition and enamel hypoplasia; they are contraindicated in children under 12 years and in pregnancy/lactation for this reason","Tetracycline causes severe diarrhoea in all children","Tetracyclines are ineffective against oral pathogens","Tetracyclines cause MRONJ in children"],"correct":1,"explanation":"Tetracyclines (tetracycline, doxycycline, minocycline) chelate calcium ions and are deposited in mineralising tissues (teeth and bones). When given during odontogenesis (in utero from the second trimester through to about age 8), they produce permanent intrinsic discolouration (yellow → grey-brown), enamel hypoplasia, and depressed bone growth. They are contraindicated in: children under 12 years, pregnancy (any trimester after the 1st), and breastfeeding. They are also avoided in liver disease and may interact with antacids/calcium/iron (chelation reduces absorption). Use age-appropriate alternatives (amoxicillin or, if penicillin allergic, clarithromycin or clindamycin under specialist advice)."},
    {"id":"pharm_30","type":"sba","stem":"A 75-year-old man with denture stomatitis is to be prescribed miconazole oral gel (Daktarin). He also takes warfarin (target INR 2.0–3.0), simvastatin 40 mg nightly, and gliclazide for type 2 diabetes. Which interaction is the MOST clinically important and what should you do?","options":["Miconazole has no clinically important systemic interactions when applied topically","Despite topical application, miconazole is sufficiently absorbed to inhibit CYP2C9 and CYP3A4. The most dangerous interaction is with WARFARIN — INR can rise dramatically, causing serious bleeding. Use nystatin oral suspension (no systemic absorption) instead, or liaise with the GP regarding INR monitoring","Miconazole reduces warfarin levels, requiring dose increase","Miconazole interacts only with antibiotics, not warfarin","Miconazole accelerates statin metabolism, risking lipid rebound"],"correct":1,"explanation":"Miconazole (including topical oral gel) has caused life-threatening haemorrhage in patients taking warfarin via potent inhibition of CYP2C9 — the principal warfarin-metabolising enzyme. The MHRA has issued safety alerts on this combination. It can also raise simvastatin levels (CYP3A4 inhibition → rhabdomyolysis risk) and potentiate sulfonylureas like gliclazide (causing hypoglycaemia). Practical solution: use NYSTATIN oral suspension (poorly absorbed, no systemic interaction) for oral candidiasis when the patient is on warfarin, statins or sulfonylureas. If miconazole must be used, the GP must be alerted and INR closely monitored."},
    {"id":"pharm_31","type":"sba","stem":"A patient taking phenytoin for epilepsy attends for a review. Which oral adverse effect is a known complication of long-term phenytoin therapy that the dentist should monitor?","options":["Xerostomia and increased caries risk","Gingival hyperplasia (drug-induced gingival overgrowth)","Oral candidiasis","Black hairy tongue","Erythema multiforme"],"correct":1,"explanation":"Drug-induced gingival overgrowth (DIGO) is a well-known adverse effect of phenytoin (anti-epileptic), affecting up to 50% of patients on long-term therapy. The mechanism involves fibroblast proliferation stimulated by phenytoin metabolites. It is also seen with ciclosporin (immunosuppressant) and calcium channel blockers (nifedipine, amlodipine). Management: excellent oral hygiene (plaque control reduces severity), consideration of gingivectomy for severe cases, and liaison with the prescriber about drug substitution."},
    {"id":"pharm_32","type":"sba","stem":"A patient on amitriptyline (tricyclic antidepressant) requires dental local anaesthesia. Which concern is most relevant to the administration of adrenaline-containing LA?","options":["Amitriptyline causes resistance to LA requiring higher doses","Tricyclic antidepressants inhibit noradrenaline reuptake; adrenaline in LA can cause marked cardiovascular responses (hypertension, arrhythmia) — use minimum effective quantity of adrenaline and aspirate carefully to avoid intravascular injection","Amitriptyline causes total contraindication to all LA agents","Amitriptyline causes hypersalivation that prevents LA from working","There is no significant interaction between amitriptyline and adrenaline at dental LA doses"],"correct":1,"explanation":"Tricyclic antidepressants (amitriptyline, imipramine, nortriptyline) inhibit catecholamine (noradrenaline/adrenaline) reuptake, sensitising adrenergic receptors. Exogenous adrenaline can cause exaggerated cardiovascular responses: hypertension, tachycardia, arrhythmia. In clinical practice, the small amount of adrenaline in dental LA cartridges (typically 1:80,000 or 1:100,000) is generally considered safe with careful technique, aspiration, and slow injection, but the dose should be kept to the minimum effective amount."},
    {"id":"pharm_33","type":"sba","stem":"Nitrous oxide inhalation sedation is used for a dental procedure. Which vitamin is affected by prolonged or repeated nitrous oxide exposure, and why is this clinically significant?","options":["Vitamin C — nitrous oxide oxidises ascorbic acid","Vitamin D — nitrous oxide reduces calcium absorption","Vitamin B12 (cobalamin) — nitrous oxide irreversibly oxidises (inactivates) the cobalt atom in B12, inhibiting methionine synthase, which can cause megaloblastic anaemia and subacute combined degeneration of the cord in susceptible individuals","Vitamin K — nitrous oxide reduces clotting factor synthesis","Vitamin A — nitrous oxide causes liver toxicity reducing retinol"],"correct":2,"explanation":"Nitrous oxide irreversibly oxidises vitamin B12 (cobalamin), inactivating methionine synthase and thymidylate synthase. This impairs DNA synthesis, potentially causing megaloblastic anaemia and, with prolonged exposure (occupational/recreational abuse), subacute combined degeneration of the spinal cord. For single dental sedation sessions, this is of minimal clinical significance for healthy patients. However, it is a serious concern in patients with pre-existing B12 deficiency and for operating staff with occupational exposure."},
    {"id":"pharm_34","type":"sba","stem":"A patient has a symptomatic acute periapical abscess. Following drainage and extraction, which of the following situations would most clearly justify antibiotic prescription?","options":["Every patient who has a dental extraction for infection should receive antibiotics","Patients with persistent pain after adequate source control","Spreading infection (cellulitis), systemic signs (pyrexia >38°C, malaise, trismus, lymphadenopathy), or an immunocompromised patient despite adequate local source control","Any patient who asks for antibiotics","Any patient with a red swelling intraorally"],"correct":2,"explanation":"SDCEP and NICE NG184 (antimicrobial prescribing for dental disease): antibiotics are indicated as an ADJUNCT (not replacement) to definitive treatment when there is: spreading infection (cellulitis, fascial space involvement), systemic features (temperature >38°C, malaise, systemic illness, trismus), or immunocompromised patients. Simple localised dental abscesses managed by drainage and extraction do NOT require antibiotics if the patient is systemically well and immunocompetent."},
    {"id":"pharm_35","type":"sba","stem":"Which antibiotic class carries the greatest risk of Clostridium difficile-associated diarrhoea (CDAD) in the dental setting?","options":["Penicillins (amoxicillin)","Metronidazole","Clindamycin and broad-spectrum penicillins/cephalosporins — clindamycin has historically been most strongly associated with CDAD due to disruption of normal bowel flora","Tetracyclines","Macrolides (erythromycin, clarithromycin)"],"correct":2,"explanation":"Clindamycin was historically the antibiotic most strongly associated with Clostridium difficile-associated diarrhoea (pseudomembranous colitis) because it disrupts normal bowel flora allowing C. diff overgrowth. Broad-spectrum penicillins (co-amoxiclav), cephalosporins, and fluoroquinolones also carry significant risk. Metronidazole is actually a primary TREATMENT for CDAD. The risk of clindamycin-associated CDAD should be considered when prescribing for dental infections, particularly in elderly patients or those recently discharged from hospital."},
    {"id":"pharm_36","type":"sba","stem":"A patient develops signs of acute adrenal crisis (collapse, hypotension, profound weakness) during a dental appointment. What is the immediate management?","options":["Lay flat, IV glucose 50 mL, and call 999","Call 999, lay flat with legs raised, give hydrocortisone 100 mg IM (from the emergency drug kit) immediately","Give adrenaline IM 500 µg","Give oral prednisolone immediately","Give glucagon IM 1 mg"],"correct":1,"explanation":"Acute adrenal crisis (Addisonian crisis) is an emergency: profound hypotension, collapse, and altered consciousness in a patient with adrenal insufficiency (e.g. on long-term steroids). Management: call 999; lay flat with legs raised; administer hydrocortisone 100 mg IM (included in dental emergency drug kits) immediately. IV fluid resuscitation and hospital transfer are required. The Resus Council UK Medical Emergencies in the Dental Practice guidelines recommend hydrocortisone as part of the essential emergency drug kit."},
    {"id":"pharm_37","type":"sba","stem":"A patient is on long-term proton pump inhibitor (PPI) therapy (omeprazole 20 mg daily) for GORD. Antifungal treatment with fluconazole is prescribed for oral candidiasis. What interaction should be considered?","options":["PPIs reduce absorption of fluconazole — give fluconazole 2 hours apart from the PPI","Fluconazole inhibits CYP2C19, the main enzyme metabolising omeprazole, significantly increasing omeprazole plasma levels — monitor for PPI-related adverse effects (headache, diarrhoea, electrolyte disturbances)","No clinically significant interaction exists between these drugs","PPIs enhance the antifungal effect of fluconazole","Omeprazole causes resistance to fluconazole"],"correct":1,"explanation":"Fluconazole is a potent inhibitor of CYP2C19, the main enzyme responsible for metabolising omeprazole. This increases omeprazole plasma levels significantly. While this is rarely a major clinical problem for a short course of fluconazole, it is worth awareness. More important is the fluconazole-warfarin interaction described earlier. Always check for drug interactions when prescribing fluconazole, which inhibits multiple CYP enzymes."},
    {"id":"pharm_38","type":"sba","stem":"Chlorhexidine gluconate 0.2% mouthwash is prescribed as an adjunct in periodontal treatment. Which of the following is a recognised side effect of prolonged chlorhexidine use?","options":["Gingival hyperplasia","Increased sensitivity to cold","Brown discolouration (staining) of the teeth, tongue, and some restorations, and altered taste sensation — these are dose-dependent and reversible","Oral ulceration in all patients","Irreversible damage to the oral mucosa"],"correct":2,"explanation":"The main side effects of chlorhexidine 0.2% mouthwash include: (1) brown/yellow tooth staining (and staining of the tongue, restorations, particularly composites and GICs) — caused by tanning reactions between CHX and dietary chromogens and polyphenols; (2) altered taste sensation (dysgeusia); (3) occasional mucosal desquamation/burning in some patients. These effects are reversible upon discontinuation and are dose-dependent. Staining is managed by professional polishing. CHX should not be used concurrently with NaOCl (forms PCA precipitate) or at the same time as fluoride toothpaste (inactivated by SLS)."},
    {"id":"pharm_39","type":"sba","stem":"Which of the following correctly describes the choking adult algorithm (Resus Council UK 2021) for a severe airway obstruction?","options":["Give 5 abdominal thrusts immediately","Encourage coughing first (mild obstruction); for severe obstruction (cannot cough, cannot speak, cyanotic) give 5 back blows between the shoulder blades, then 5 abdominal (Heimlich) thrusts, alternating until the object is expelled or the patient loses consciousness","Perform a blind finger sweep of the mouth first","Position the patient supine and perform chest compressions","Give 5 chest thrusts for severe obstruction in all patients"],"correct":1,"explanation":"Resus Council UK 2021 choking algorithm: If mild obstruction (can cough, speak) — encourage coughing. If severe obstruction (cannot cough, cannot speak, cyanosed): (1) 5 back blows (sharp blows between shoulder blades with heel of hand); (2) if unsuccessful — 5 abdominal thrusts (Heimlich manoeuvre, upward thrusts below xiphisternum); alternate 5 back blows / 5 abdominal thrusts. If the patient loses consciousness: start CPR. Chest thrusts (not abdominal) are used for pregnant patients and obese patients."},
    {"id":"pharm_40","type":"sba","stem":"A patient presents with symptoms of LA toxicity (peri-oral tingling, tinnitus, and confusion) after an inferior alveolar nerve block. What is the most likely cause and management?","options":["Anaphylaxis to the LA agent — give IM adrenaline","Intravascular injection of LA leading to systemic toxicity; management: stop further injection, lay flat, support airway and breathing, call 999, monitor and treat CNS and cardiovascular effects (Intralipid emulsion may be indicated for severe toxicity)","Psychogenic reaction — reassure and continue procedure","Prilocaine methaemoglobinaemia — give methylene blue IV","Hypoglycaemia — give oral glucose"],"correct":1,"explanation":"LA systemic toxicity typically results from intravascular injection or overdose. Initial features: perioral tingling, metallic taste, tinnitus, dizziness, confusion (CNS excitation). Progression: convulsions, then CNS depression, and cardiovascular collapse. Management: stop the injection, maintain airway/breathing (give O2), call 999, consider benzodiazepines for convulsions. For severe cardiovascular toxicity (especially bupivacaine): Intralipid 20% IV emulsion therapy (AAGBI guidelines). Always aspirate before injecting LA to prevent intravascular injection."},
    {"id":"pharm_41","type":"sba","stem":"What is the recommended first-line drug for an acute severe asthmatic attack in a dental practice when the patient's own inhaler is unavailable?","options":["Oral prednisolone 50 mg","Salbutamol 100 µg MDI (blue inhaler) via a spacer from the dental emergency kit","Adrenaline IM 500 µg","Ipratropium bromide inhaler","IV aminophylline"],"correct":1,"explanation":"The dental emergency kit (Resus Council UK 2021, GDC standards) must include salbutamol MDI (blue reliever inhaler) for use with a volumatic spacer. Salbutamol is a short-acting β2-adrenergic agonist causing bronchodilation. For acute asthma, administer via spacer (4–10 puffs), sit the patient upright, give oxygen, and call 999 if there is no improvement. Adrenaline is for anaphylaxis (which can coexist with bronchospasm but is a different diagnosis requiring different management)."},
    {"id":"pharm_42","type":"sba","stem":"A patient requires a short course of doxycycline for a specific periodontal condition. Which antibiotic drug interaction is most important to warn the patient about regarding dairy products?","options":["Doxycycline absorption is significantly reduced by dairy products (calcium in milk chelates the tetracycline, reducing absorption) — take on an empty stomach or 2 hours after dairy","Dairy products increase the absorption of doxycycline","Doxycycline must be taken with milk to reduce gastric irritation","Doxycycline does not interact with food or dairy products","Only cheese interactions are relevant — milk has no effect"],"correct":0,"explanation":"Tetracyclines (including doxycycline) form insoluble chelates with divalent and trivalent cations (Ca2+, Mg2+, Al3+, Fe2+) present in dairy products, antacids, and iron supplements, significantly reducing oral absorption. Doxycycline is less affected by dairy than older tetracyclines but it is still recommended to take doxycycline on an empty stomach (with a full glass of water), or at least 1–2 hours before dairy products. Doxycycline should also be taken in an upright position to prevent oesophageal ulceration."},
    {"id":"pharm_43","type":"sba","stem":"A patient with chronic hepatic failure requires dental treatment. Which of the following LA agents should be used with greatest caution?","options":["Articaine — it is partially plasma-esterase metabolised, so liver failure has minimal impact","Lidocaine and other amide LA agents — amide LAs are extensively metabolised by the liver; doses may need to be reduced and the patient must be monitored carefully as hepatic impairment reduces clearance","Benzocaine (topical ester) — it is liver-metabolised in severe disease","There is no modification needed for any LA agent in hepatic failure","Prilocaine — it is renally excreted and unaffected by liver disease"],"correct":1,"explanation":"All amide local anaesthetics (lidocaine, prilocaine, mepivacaine, bupivacaine) are metabolised primarily by the liver (hepatic microsomal enzymes). In severe hepatic failure, metabolism is impaired, leading to drug accumulation and increased toxicity risk. Doses should be reduced and the minimum effective quantity used. Articaine has partial plasma esterase metabolism (50–90% plasma, remainder hepatic) giving it a slight advantage. Ester LAs (benzocaine, procaine) are metabolised by plasma pseudocholinesterases and are relatively unaffected by liver disease."},
    {"id":"pharm_44","type":"sba","stem":"A patient requires post-operative analgesia after lower wisdom tooth extraction. Evidence suggests which combination provides the most effective dental pain relief?","options":["Codeine alone 30 mg every 4–6 hours","Tramadol 50 mg every 4–6 hours","Ibuprofen 400 mg + paracetamol 1000 mg alternated (or taken together every 6–8 hours) is superior to either alone and comparable to opioid combinations","Aspirin 900 mg every 4 hours","Diclofenac sodium 75 mg twice daily"],"correct":2,"explanation":"Evidence from systematic reviews (Cochrane) confirms that the combination of an NSAID (e.g. ibuprofen 400 mg) and paracetamol 1000 mg provides superior analgesia to either drug alone, and is at least as effective as opioid-containing combinations for moderate-to-severe dental pain. This combination exploits different mechanisms: NSAIDs (peripheral anti-inflammatory) + paracetamol (central mechanisms). It is the recommended first-line regimen in SDCEP pain management guidance."},
    {"id":"pharm_45","type":"sba","stem":"The BNF (British National Formulary) categorises drugs in pregnancy by risk. Which local anaesthetic agent is relatively contraindicated in pregnancy due to specific drug effects?","options":["Lidocaine 2% with adrenaline — absolutely contraindicated in all trimesters","Prilocaine with felypressin — felypressin has oxytocic (uterotonic) effects and is relatively contraindicated in pregnancy; lidocaine with adrenaline is the preferred LA in pregnancy","Articaine with adrenaline — highest teratogenic risk","All LA agents are equally contraindicated in pregnancy","Mepivacaine plain — causes cleft palate in first trimester"],"correct":1,"explanation":"Felypressin, the vasoconstrictor in Citanest (prilocaine 3%), is a synthetic vasopressin analogue with oxytocic properties (causes uterine contractions). It is relatively contraindicated in pregnancy. The recommended LA in pregnant patients is lidocaine 2% with adrenaline (1:80,000 or 1:100,000), which is considered safe at dental doses. The amount of adrenaline in standard dental cartridges is extremely unlikely to reach uterine receptors at therapeutic concentrations."},
    {"id":"pharm_46","type":"sba","stem":"A patient presents in status epilepticus (ongoing seizure >5 minutes) in the dental practice. Emergency drug treatment is required. What is the recommended drug and route?","options":["Oral diazepam 10 mg tablet","Intravenous diazepam 10 mg via IV access established by the dentist","Buccal midazolam 10 mg (using a pre-prepared buccal syringe) — the recommended route for first-line emergency seizure treatment in the community","Intramuscular diazepam 10 mg","Intrarectal diazepam 10 mg"],"correct":2,"explanation":"Resus Council UK Medical Emergencies guidance recommends buccal midazolam (10 mg for adults and children >10 years; 5 mg for children under 10) as the first-line agent for status epilepticus in community settings (dental practice). It is pre-prepared in the emergency kit as a buccal solution. The buccal route provides rapid absorption through the oral mucosa. IV diazepam requires venous access, which is not routinely established in dental practice. Intranasal midazolam is an alternative."},
    {"id":"pharm_47","type":"sba","stem":"A dental nurse asks about the required contents of the dental emergency drug kit. Which of the following is an essential medication required in the dental practice emergency kit according to Resus Council UK / GDC guidance?","options":["Dexamethasone injection","Adrenaline (epinephrine) 1:1000 injection (1 mg/mL), salbutamol inhaler, aspirin 300 mg dispersible, glyceryl trinitrate (GTN) spray, glucagon 1 mg kit, midazolam buccal solution, and oxygen","Morphine sulphate injection for pain management","Metoclopramide injection for nausea","Furosemide injection for pulmonary oedema"],"correct":1,"explanation":"The Resus Council UK (2021) and GDC recommend the following essential emergency drugs and equipment: adrenaline 1:1000 (anaphylaxis); aspirin 300 mg dispersible (myocardial infarction); glyceryl trinitrate (GTN) spray (angina/MI); glucagon 1 mg kit (hypoglycaemia if unconscious); buccal midazolam 10 mg (status epilepticus); salbutamol MDI (asthma); hydrocortisone 100 mg (Addisonian crisis); oxygen and AED. Some practices also carry IV dextrose and IV flumazenil for IV sedation services."},
    {"id":"pharm_48","type":"sba","stem":"A patient presents with acute angina during a dental appointment. She has her GTN spray with her. What is the correct management?","options":["Lay the patient flat immediately and give aspirin 300 mg","Sit the patient upright (semi-reclined), give GTN spray 400 µg sublingually, repeat after 5 minutes if no improvement; if chest pain persists after 2 doses of GTN or lasts >15 minutes — call 999 (suspected MI), give aspirin 300 mg, and monitor","Administer adrenaline IM 500 µg","Escort the patient to A&E by private transport","Continue the dental treatment while monitoring"],"correct":1,"explanation":"Angina attack in the dental chair: sit upright (to reduce cardiac preload and breathlessness), give GTN spray 400 µg sublingually (causes vasodilation, reduces cardiac workload). If pain resolves within 5 minutes — the episode was angina, and the appointment can be rescheduled. If pain persists after 2 GTN doses or lasts >15–20 minutes, suspect myocardial infarction: call 999, give aspirin 300 mg (chewed or dispersed in water if no allergy), oxygen if O2 <95%, and keep the patient still until ambulance arrives."},
    {"id":"pharm_49","type":"sba","stem":"A patient is taking an MAOI (monoamine oxidase inhibitor) such as phenelzine for depression. Which commonly used dental drug interaction is potentially life-threatening?","options":["MAOIs significantly potentiate the effects of adrenaline in dental LA — but the interaction is modest and rarely life-threatening at dental doses","MAOIs combined with opioids (particularly pethidine/meperidine) can cause a severe serotonin syndrome (hyperthermia, agitation, neuromuscular abnormalities, cardiovascular instability) — pethidine is absolutely contraindicated with MAOIs; other opioids are used with extreme caution","MAOIs neutralise the effect of lidocaine","MAOIs cause resistance to all forms of anaesthesia","MAOIs have no significant dental drug interactions"],"correct":1,"explanation":"The most dangerous drug interaction involving MAOIs in dentistry is with opioid analgesics, especially pethidine (meperidine). The combination can trigger a severe serotonin syndrome or an opioid-potentiating reaction with fatal hyperthermia, cardiovascular collapse, and coma. Pethidine is ABSOLUTELY contraindicated with MAOIs. Morphine and other opioids should be used with extreme caution and under specialist guidance. This information must be checked before prescribing any analgesic to a patient on MAOIs."},
    {"id":"pharm_50","type":"sba","stem":"A patient undergoing IV conscious sedation with midazolam develops respiratory depression (rate <8 breaths/min, SpO2 dropping). What is the immediate management?","options":["Give adrenaline IM immediately","Administer IV flumazenil 200 µg slowly (over 15 seconds), with further doses of 100 µg every 60 seconds as needed to a maximum 1 mg; support ventilation with oxygen/BVM; have 999 called; monitor for resedation","Give IV naloxone 400 µg","Give IV atropine 500 µg","Simply increase the oxygen flow rate and continue monitoring"],"correct":1,"explanation":"For midazolam (benzodiazepine) over-sedation with respiratory depression: IV flumazenil 0.2 mg (200 µg) over 15 seconds is the specific reversal agent (competitive GABA-A antagonist). Repeat 100 µg doses every 60 seconds if needed, up to 1 mg total. Support ventilation with 100% oxygen via bag-valve-mask if needed. Call 999. Monitor closely for resedation because flumazenil's half-life (~1 hr) is shorter than midazolam's (~2–4 hrs). Naloxone reverses opioids, not benzodiazepines."},
    {"id":"pharm_51","type":"sba","stem":"A patient reports she is taking lithium for bipolar disorder. She develops a mild dental infection. Which NSAID should be avoided?","options":["Ibuprofen — NSAIDs reduce renal prostaglandin synthesis, decreasing renal clearance of lithium and increasing plasma levels to potentially toxic concentrations; avoid all NSAIDs in lithium-treated patients","Aspirin — causes lithium deficiency","Celecoxib — selective COX-2 inhibitor has no interaction with lithium","Ibuprofen is safe but aspirin is contraindicated with lithium","NSAIDs have no interaction with lithium at therapeutic doses"],"correct":0,"explanation":"NSAIDs (including ibuprofen, naproxen, diclofenac) reduce renal prostaglandin synthesis, leading to reduced renal blood flow and decreased renal clearance of lithium. This can raise plasma lithium levels into the toxic range (therapeutic index is very narrow). Lithium toxicity presents with tremor, confusion, polyuria, vomiting, and seizures. Paracetamol is the safe analgesic choice for patients on lithium. Selective COX-2 inhibitors carry the same interaction risk."},
    {"id":"pharm_52","type":"sba","stem":"A patient in your dental surgery has a cardiac arrest. You are alone initially. What is the first step according to BLS (Basic Life Support) guidelines (Resus Council UK 2021)?","options":["Start chest compressions immediately","Confirm the collapse (shout/shake), check for breathing, call 999 (or send someone), retrieve the AED, start CPR: 30 compressions at 100–120/min to a depth of 5–6 cm, then 2 breaths","Open the airway using head tilt-chin lift before checking for breathing","Give 2 rescue breaths before starting compressions","Administer adrenaline IM while waiting for the AED"],"correct":1,"explanation":"BLS algorithm (Resus Council UK 2021): (1) Shout for help; (2) Check for response and normal breathing simultaneously (10 seconds max); (3) If no response and not breathing normally — call 999 (or send someone to call and get AED); (4) Start chest compressions 30:2 at 100–120/min, depth 5–6 cm, full recoil; (5) As soon as AED arrives, attach and follow voice prompts. In a dental practice with >2 people, one performs CPR while another calls 999 and gets the AED."},
    {"id":"pharm_53","type":"sba","stem":"Which of the following correctly states the standard adult BLS chest compression to ventilation ratio?","options":["15:2 (hospital trained rescuers with two persons only)","30:2","30:1","10:2","5:1 (appropriate for the dental setting)"],"correct":1,"explanation":"Resus Council UK 2021 adult BLS ratio is 30 compressions : 2 rescue breaths (30:2), regardless of whether one or two rescuers are present. Compressions at 100–120 per minute, depth 5–6 cm, allowing full chest recoil between compressions. If unable or unwilling to give breaths (e.g. no face shield), compression-only CPR is better than no CPR. For infant (under 1 year), two-thumb encircling technique; for child (1 year to puberty), one or two hands at 15:2 in professional settings."},
    {"id":"pharm_54","type":"sba","stem":"Oxygen is administered to an adult patient during a medical emergency using a non-rebreather (reservoir) mask at 15 L/min. Approximately what FiO2 (fraction of inspired oxygen) can be achieved with this technique?","options":["21% (room air)","35–40% (standard venturi mask)","60–70% (simple face mask at 5–10 L/min)","85–90% (non-rebreather reservoir mask at 10–15 L/min)","100% (non-rebreather with tight seal and one-way valves)"],"correct":3,"explanation":"A non-rebreather reservoir mask at 10–15 L/min delivers approximately 85–90% FiO2 in spontaneously breathing patients (the reservoir bag fills with pure O2; inhalation draws O2 from the bag through one-way valves; expiration is vented). It is the highest-flow O2 delivery device available without intubation. A standard simple face mask at 5–6 L/min delivers ~35–50% FiO2. Room air is 21% O2. 100% FiO2 requires intubation with a sealed cuffed ET tube and a closed circuit."},
    {"id":"pharm_55","type":"sba","stem":"What is the correct dose and route of glucagon for treating an unconscious hypoglycaemic patient in the dental practice?","options":["1 mg intravenously","1 mg intramuscularly (IM) or subcutaneously (SC) — the standard dose in the dental emergency kit","500 µg IM","0.5 mg IV only","Buccal glucose gel only — glucagon injection is not used in dental practice"],"correct":1,"explanation":"Glucagon 1 mg is given intramuscularly (or subcutaneously) for unconscious hypoglycaemia when IV access is not available. It stimulates hepatic glycogenolysis, raising blood glucose within 10–15 minutes. The glucagon emergency kit (GlucaGen HypoKit or Baqsimi) is a required item in the dental emergency drug kit (Resus Council UK). IV 10% or 20% glucose is used in hospital settings. Buccal glucose gel/GlucoGel is only used in a CONSCIOUS patient who can swallow."},
    {"id":"pharm_56","type":"sba","stem":"Which antihypertensive drug class is associated with drug-induced angioedema that may present as orofacial swelling and can mimic a dental abscess or allergic reaction?","options":["Beta-blockers (e.g. atenolol)","Calcium channel blockers (e.g. amlodipine)","ACE inhibitors (e.g. ramipril, lisinopril)","Angiotensin receptor blockers (ARBs, e.g. losartan)","Diuretics (e.g. bendroflumethiazide)"],"correct":2,"explanation":"ACE inhibitors (angiotensin-converting enzyme inhibitors, e.g. ramipril, lisinopril, enalapril) are associated with bradykinin-mediated angioedema (estimated 0.1–0.7% of patients). Bradykinin accumulates because ACE normally degrades it; inhibition of ACE allows bradykinin levels to rise, increasing vascular permeability. The swelling can involve the lips, tongue, floor of the mouth, and larynx, occurring suddenly. It is NOT mediated by histamine (so antihistamines are less effective). Dental clinicians must be aware and refer urgently if the airway is involved. Note: ARBs can also rarely cause angioedema via the same mechanism."},
    {"id":"pharm_57","type":"sba","stem":"Which of the following correctly defines the term 'drug bioavailability' as used in pharmacology?","options":["The speed at which a drug is absorbed from the GI tract","The proportion (fraction) of an administered drug dose that reaches the systemic circulation in an active form, relative to intravenous administration (100% bioavailability)","The maximum concentration of the drug achievable in the bloodstream","The volume of distribution of a drug after absorption","The time taken for the drug to reach its peak plasma concentration"],"correct":1,"explanation":"Bioavailability is the fraction of an administered drug dose that reaches the systemic circulation unchanged. IV administration gives 100% bioavailability (the reference). Oral drugs are subject to first-pass hepatic metabolism and GI absorption losses, reducing bioavailability. For example, oral metronidazole has ~100% bioavailability; lidocaine has ~35% oral bioavailability (hence given parenterally). Understanding bioavailability guides route of administration decisions and dose calculations."},
    {"id":"pharm_58","type":"sba","stem":"A patient requires a prescription for analgesics following oral surgery. The patient is breastfeeding. Which analgesic is safest for use while breastfeeding?","options":["Codeine — safe in all breastfeeding women","Ibuprofen at standard doses — excreted minimally in breast milk, considered safe in short-term use for breastfeeding mothers","Aspirin — preferred analgesic in breastfeeding","Tramadol — highly protein-bound and not excreted in breast milk","Diclofenac — preferred over other NSAIDs in breastfeeding"],"correct":1,"explanation":"Ibuprofen is considered one of the safest NSAIDs in breastfeeding — it is highly protein-bound with low transfer into breast milk and a short half-life. Paracetamol is also safe. Codeine is CONTRAINDICATED in breastfeeding due to risk of neonatal opioid toxicity from CYP2D6 ultra-rapid metabolisers converting codeine to high levels of morphine excreted in milk (MHRA 2015 warning). Aspirin carries Reye's syndrome risk in infants. Tramadol and strong opioids: avoid in breastfeeding."},
    {"id":"pharm_59","type":"sba","stem":"When taking a drug history, a patient says they take 'St John's Wort' (hypericum perforatum). Why is this of clinical significance to the dental prescriber?","options":["St John's Wort has no significant drug interactions relevant to dentistry","St John's Wort is a potent inducer of CYP3A4 and P-glycoprotein, reducing the plasma levels of many drugs (including ciclosporin, digoxin, antiretrovirals, some antidepressants, and oral contraceptives) — it can also contribute to serotonin syndrome when combined with serotonergic drugs","St John's Wort increases the efficacy of all dental local anaesthetics","St John's Wort causes gingival hyperplasia","St John's Wort is only relevant in elderly patients"],"correct":1,"explanation":"St John's Wort (Hypericum perforatum) is a potent inducer of CYP3A4, CYP2C9, and P-glycoprotein. It can significantly reduce plasma levels of many prescription drugs (ciclosporin, warfarin, antiretrovirals, some antidepressants, oral contraceptives). It also has serotonergic activity, increasing the risk of serotonin syndrome when combined with SSRIs or other serotonergic agents. Patients may not mention herbal supplements unless specifically asked. Always include herbal/OTC preparations in the drug history."},
    {"id":"pharm_60","type":"sba","stem":"A patient taking clopidogrel (antiplatelet) after a coronary stent requires a dental extraction. According to SDCEP guidance, what is the correct approach?","options":["Stop clopidogrel 7 days before extraction to normalise platelet function","Continue clopidogrel without modification; perform the extraction using local haemostatic measures (resorbable haemostats, sutures, biting on a pack, tranexamic acid mouthwash)","Refer all patients on clopidogrel to hospital","Replace clopidogrel with aspirin for 1 week before extraction","Check platelet function test before proceeding"],"correct":1,"explanation":"SDCEP (2015) guidance for antiplatelet therapy: do NOT stop clopidogrel (or aspirin) before dental extractions. Stopping clopidogrel in a patient with a coronary stent risks acute stent thrombosis — a potentially fatal complication. The benefits of continuing the drug outweigh the risk of dental haemorrhage. Perform extractions with careful technique, local haemostatic measures, and advice on post-operative bleeding management. If concerned about haemostasis, refer to an appropriate setting but do NOT unilaterally stop the drug."}
  ],
  profpractice: [
    {"id":"profpractice_1","type":"sba","stem":"During a routine crown preparation, a 58-year-old man suddenly complains of severe central crushing chest pain radiating to the left arm, with sweating and pallor. He remains conscious. What is the immediate management?","options":["Lay flat, give oxygen, call 999, give GTN spray","Sit upright (semi-reclined), stop dental treatment, call 999, give aspirin 300 mg chewed (if no allergy), give GTN 400 µg sublingual spray, give oxygen if SpO2 <94%, monitor and stay with the patient","Lay flat, administer adrenaline IM 500 µg","Give GTN and observe for 15 minutes before calling 999","Give diazepam for anxiety and re-assess in 5 minutes"],"correct":1,"explanation":"Suspected acute myocardial infarction (MI): (1) call 999 immediately; (2) position semi-reclined (upright/semi-sitting — reduces cardiac preload and respiratory distress); (3) give aspirin 300 mg (chewed/dispersed) if not allergic — inhibits platelet aggregation, reduces infarct size; (4) GTN 400 µg sublingually; (5) oxygen only if SpO2 <94% (hyperoxia can be harmful); (6) do NOT leave the patient alone. Resus Council UK 2021 / dental emergency guidance."},
    {"id":"profpractice_2","type":"sba","stem":"A patient receiving IV conscious sedation with midazolam for a dental procedure becomes unresponsive with a respiratory rate of 4 breaths/min and oxygen saturation of 82%. What is the immediate sequence of actions?","options":["Stop the procedure, call 999, give flumazenil IV 200 µg, open airway with head-tilt chin-lift, give supplemental oxygen, and prepare for BVM ventilation if needed","Give another dose of midazolam to calm the patient","Lay flat and wait for the sedation to wear off","Give adrenaline IM 500 µg immediately","Start chest compressions immediately without airway assessment"],"correct":0,"explanation":"Respiratory depression from midazolam: (1) call 999; (2) attempt to arouse — open airway (head-tilt chin-lift), give 100% O2 via mask; (3) give flumazenil 200 µg IV over 15 seconds (specific reversal agent for benzodiazepines); (4) if no response, give further 100 µg doses every minute up to 1 mg; (5) if apnoeic, support ventilation with BVM. Monitor for resedation (flumazenil half-life shorter than midazolam). Do NOT give further midazolam."},
    {"id":"profpractice_3","type":"sba","stem":"A 7-year-old child inhales a dental instrument (matrix band) during a restorative procedure. She is coughing vigorously and SpO2 is 99%. What is the immediate management?","options":["Perform 5 back blows and 5 chest thrusts immediately","Encourage coughing — if the child is maintaining good O2 saturation and coughing effectively, call 999, keep the child calm and upright, and arrange urgent hospital transfer for bronchoscopy","Perform the Heimlich manoeuvre","Give salbutamol inhaler immediately","Take a chest X-ray in the practice first"],"correct":1,"explanation":"Mild airway obstruction (patient can cough, SpO2 maintained): do NOT intervene with back blows/abdominal thrusts as these can dislodge the object into a worse position. Encourage coughing. Call 999 urgently — the child needs rigid bronchoscopy to retrieve the foreign body. Keep calm and upright. Monitor continuously. If the child deteriorates (cannot cough, cyanosed, SpO2 drops) → proceed with 5 back blows / 5 chest thrusts (Resus Council UK 2021 paediatric choking algorithm)."},
    {"id":"profpractice_4","type":"sba","stem":"A patient with a known latex allergy attends the dental practice. She develops widespread urticaria, angioedema, and bronchospasm 5 minutes after a latex glove is used. What is the priority treatment?","options":["IV antihistamine (chlorphenamine) immediately","IV hydrocortisone immediately","IM adrenaline (epinephrine) 500 µg in the anterolateral thigh — this is the first-line treatment for anaphylaxis","Salbutamol inhaler for the bronchospasm","Remove the latex and give oral antihistamine"],"correct":2,"explanation":"Anaphylaxis from latex: the FIRST treatment is IM adrenaline 500 µg (0.5 mL of 1:1000) in the anterolateral mid-thigh (Resus Council UK anaphylaxis guideline 2021). Simultaneously: call 999, lay flat with legs raised (or sit if respiratory distress), give 100% O2. Secondary treatments: IV chlorphenamine 10 mg, IV hydrocortisone 200 mg. Salbutamol can be given for persistent bronchospasm after adrenaline. The dental practice should be latex-free for all known latex-allergic patients."},
    {"id":"profpractice_5","type":"sba","stem":"A patient suddenly loses consciousness in the dental chair. You confirm no breathing and no pulse. CPR is commenced 30:2. The AED is attached and advises 'shock indicated'. What is the correct energy setting for the first shock with a biphasic defibrillator?","options":["100 J","150–360 J as per manufacturer's recommendation (typically 150–200 J for a biphasic defibrillator)","50 J only","Always 360 J for all defibrillators","Energy selection is not required — AED selects automatically"],"correct":4,"explanation":"For an automated external defibrillator (AED): the device selects the energy and shock automatically following voice prompts — no manual energy selection is required by the operator. The AED analyses the rhythm, determines if a shock is advised, charges to the appropriate energy, and instructs the rescuer to deliver the shock (by pressing the button). Modern AEDs typically deliver 150–200 J biphasic. Fully automated AEDs deliver the shock without any button press. The dentist's role is to follow the AED's voice prompts."},
    {"id":"profpractice_6","type":"sba","stem":"A patient's face turns bright red, they become flushed, pulse is bounding, and they are confused with a blood glucose reading of 2.2 mmol/L. They are semi-conscious and cannot swallow. What is the management?","options":["Give glucagon 1 mg IM/SC from the emergency kit","Apply glucose gel (GlucoGel) to the buccal mucosa — only if a fully conscious/safe swallowing reflex can be confirmed","Call 999, give 10% or 20% IV dextrose (hospital setting), apply glucose gel only if safe swallowing is confirmed","Give IM adrenaline for diabetic coma","Lay flat and apply ice packs to reduce flushing"],"correct":0,"explanation":"For an unconscious or semi-conscious hypoglycaemic patient in the dental practice where IV access is not available: give glucagon 1 mg IM or SC. Glucagon stimulates hepatic glycogenolysis, raising blood glucose within 5–15 minutes. Call 999 regardless. GlucoGel (buccal glucose) must ONLY be used in a fully conscious patient who can protect their airway. IV glucose is the hospital management. After recovery, give a complex carbohydrate snack and ensure GP follow-up."},
    {"id":"profpractice_7","type":"sba","stem":"A known asthmatic patient stops responding to their salbutamol inhaler during an acute attack. They appear exhausted, are barely able to speak, and SpO2 has fallen to 88%. What is this termed and what is the management?","options":["Mild asthma — give more salbutamol puffs","Life-threatening asthma attack — call 999 immediately; give 100% O2 via non-rebreather mask at 15 L/min; give salbutamol via spacer (10 puffs); give IV/nebulised salbutamol if available; give IV hydrocortisone 200 mg or oral prednisolone if available; do not leave patient","Anaphylaxis mimicking asthma — give IM adrenaline","Status asthmaticus — give IM midazolam to reduce anxiety","Hyperventilation syndrome — ask patient to breathe into a paper bag"],"correct":1,"explanation":"Signs of life-threatening asthma: SpO2 <92%, silent chest, cyanosis, poor respiratory effort, bradycardia, exhaustion. Management: call 999 immediately; high-flow O2 (10–15 L/min); salbutamol via spacer (up to 10 puffs); IV/IM hydrocortisone 200 mg or oral prednisolone 50 mg if available; nebulised salbutamol 5 mg if nebuliser available; ipratropium bromide 0.5 mg nebulised. Do not leave the patient. Prepare for assisted ventilation if the patient deteriorates."},
    {"id":"profpractice_8","type":"sba","stem":"A 6-year-old known epileptic in your practice has a generalised tonic-clonic seizure that is still ongoing 5 minutes after onset. The dental emergency drug kit contains buccal midazolam 10 mg/mL. What is the correct dose to administer for this child?","options":["2.5 mg buccal","5 mg buccal","7.5 mg buccal","10 mg buccal","20 mg buccal"],"correct":2,"explanation":"Resus Council UK / BNF for Children buccal midazolam dose for status epilepticus or seizure >5 minutes: 1–4 years = 5 mg; 5–9 years = 7.5 mg; ≥10 years and adults = 10 mg. Half the volume is placed in each buccal sulcus and the lips closed. Call 999 if the seizure continues or recurs. Monitor airway and protect from injury — do NOT restrain or insert anything between the teeth. The unconscious-but-breathing patient afterwards is placed in the recovery position."},
    {"id":"profpractice_9","type":"sba","stem":"What drug should be used for the immediate management of a severe allergic reaction (anaphylaxis) in a child weighing 20 kg?","options":["Adrenaline 150 µg IM (junior EpiPen or pre-loaded adrenaline)","Adrenaline 500 µg IM (same as adult)","Chlorphenamine 5 mg IV first","Hydrocortisone 100 mg IV first","Salbutamol inhaler first"],"correct":0,"explanation":"Resus Council UK paediatric anaphylaxis 2021: adrenaline dose is weight-based. Children <6 years or <25 kg: 150 µg IM (Junior EpiPen or 0.15 mL of 1:1000 adrenaline). Children 6–12 years (25–50 kg): 300 µg IM (0.3 mL). Over 12 years or >50 kg: 500 µg IM (0.5 mL adult dose). A 20 kg child falls in the 6-year-old range: 150 µg IM is appropriate. Always give in the anterolateral mid-thigh and call 999."},
    {"id":"profpractice_10","type":"sba","stem":"A 65-year-old patient develops a sudden-onset severe headache described as 'the worst headache of my life', accompanied by neck stiffness and photophobia, during a routine dental appointment. What is the most likely diagnosis and management?","options":["Tension headache — give paracetamol and discharge","Migraine — give aspirin 900 mg and lie down in a dark room","Subarachnoid haemorrhage (SAH) — call 999 immediately; this is a life-threatening neurological emergency","Trigeminal neuralgia — give carbamazepine","Dental pain referred to the head — proceed with dental treatment"],"correct":2,"explanation":"A sudden-onset severe 'thunderclap' headache (worst of life), especially with neck stiffness (meningism) and photophobia, is a subarachnoid haemorrhage until proven otherwise. This is a life-threatening emergency with mortality of ~30–40%. Call 999 immediately and do NOT proceed with dental treatment. The patient requires urgent CT head and neurosurgical assessment. A sentinel headache (small warning bleed) may precede a major SAH."},
