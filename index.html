    {"id":"paeds_28","type":"sba","stem":"A 13-year-old presents with a deep carious lesion on the lower right first permanent molar. Radiographically, the lesion is within 1 mm of the pulp chamber. The tooth is vital, has no spontaneous pain, and responds normally to cold. What approach minimises the risk of pulp exposure during caries removal?","options":["Complete caries excavation in one visit to confirm pulp vitality","Stepwise caries excavation (indirect pulp capping) — remove peripheral caries, leave demineralised dentine over the pulp, seal, return in 6–12 months to re-enter and remove softened dentine","Selective caries removal (remove only peripheral infected caries) and restore without re-entry","Use rotary burs at high speed to remove caries quickly","Remove all caries and place MTA as a full pulp cap if exposed"],"correct":2,"explanation":"Selective (soft dentine) caries removal — removing infected, soft dentine at the periphery but leaving firm, affected dentine over the pulp — is the current evidence-based approach (ECPD/ACFF guidelines). It avoids pulp exposure while allowing remineralisation of the remaining dentine. This is now preferred over stepwise excavation as a one-stage procedure with no re-entry. An indirect pulp cap with calcium hydroxide or MTA is placed over the remaining dentine."},
    {"id":"paeds_29","type":"sba","stem":"A 12-year-old child has a dilacerated upper right central incisor that is failing to erupt. The tooth is lying horizontally in the palate with a 90-degree bend in the root. What is the most appropriate management?","options":["Orthodontic traction — erupt the tooth into the arch regardless of angulation","Extract the dilacerated tooth — it is almost invariably impossible to align successfully","Wait until 18 years and place an implant","Apply a removable appliance to create space and re-assess","Coronectomy of the crown fragment"],"correct":1,"explanation":"Severely dilacerated permanent incisors (particularly with a 90° or greater crown-to-root dilaceration) have a very poor prognosis for eruption and alignment. Forced orthodontic traction typically fails or results in root resorption or gingival problems. The evidence and clinical experience strongly favour extraction followed by space management and eventual implant or bridge placement after growth completion. Each case must be assessed individually, but severe dilaceration generally warrants extraction."},
    {"id":"paeds_30","type":"sba","stem":"A child aged 8 presents with asymmetric exfoliation — the lower left primary central incisor is retained while the lower right has been shed and the permanent tooth has erupted. What is the appropriate management?","options":["Refer to orthodontist urgently","Extract the retained primary incisor to allow the permanent successor to erupt into position","Apply fluoride varnish and monitor for 6 more months","Prescribe a vitamin D supplement","Obtain a CBCT scan"],"correct":1,"explanation":"Retained primary incisors that have failed to exfoliate naturally while the permanent successor has already erupted on the other side should be extracted. The permanent tooth erupts lingually and will migrate into position once the primary tooth is removed. Prolonged retention leads to double row of teeth and may cause the permanent tooth to remain out of alignment. Monitoring beyond 6 months is inappropriate when the contralateral permanent tooth is already erupted."},
    {"id":"paeds_31","type":"sba","stem":"A 7-year-old child fractures the upper right central incisor at the crown, exposing the pulp. The root is incompletely formed (open apex). Which treatment maintains the greatest chance of continued root development?","options":["Complete root canal treatment immediately with gutta percha obturation","Pulpectomy followed by MTA apexification","Cvek partial pulpotomy with MTA or Biodentine to maintain pulp vitality and allow continued apexogenesis","Antibiotics and observation","Extract the tooth"],"correct":2,"explanation":"Apexogenesis (continued root development) depends on maintaining a vital pulp. The Cvek partial pulpotomy — removing only the superficial 2 mm of the exposed pulp, placing MTA or Biodentine — preserves the remaining vital pulp and allows continued root development in an immature tooth. Once the root is complete, conventional RCT can be performed if needed. Pulpectomy removes all pulp tissue and forfeits apexogenesis."},
    {"id":"paeds_32","type":"sba","stem":"A 6-year-old child attends with her mother, who is concerned about white marks on the child's teeth. The child drinks fluoridated tap water. Clinical examination shows faint white lines and flecks on the permanent first molars and incisors, and a few primary teeth. What is the most likely diagnosis?","options":["MIH (molar incisor hypomineralisation)","Fluorosis — very mild/mild (TFI score 1–2)","Enamel hypoplasia from febrile illness","Amelogenesis imperfecta","Calcium/phosphate deficiency"],"correct":1,"explanation":"Faint white lines, flecks, and cloudy patches on multiple teeth in a child from a fluoridated area are characteristic of mild dental fluorosis (Thylstrup-Fejerskov Index 1–2 or Dean's index very mild/mild). MIH affects only the first permanent molars and incisors in a demarcated pattern (not diffuse). Fluorosis affects multiple teeth in the same developmental group with diffuse, symmetrical changes."},
    {"id":"paeds_33","type":"sba","stem":"A 5-year-old child requires a filling in the lower right primary second molar. The child is moderately anxious. Inhalation sedation with nitrous oxide/oxygen is planned. What is the maximum recommended concentration of nitrous oxide for conscious sedation in the UK?","options":["30% nitrous oxide / 70% oxygen","50% nitrous oxide / 50% oxygen","70% nitrous oxide / 30% oxygen","80% nitrous oxide / 20% oxygen","100% nitrous oxide (hypoxic mixture) for deep sedation"],"correct":1,"explanation":"In the UK, the maximum recommended concentration for nitrous oxide inhalation sedation is 50% N2O / 50% O2 (a 50:50 mix). The minimum oxygen concentration must never fall below 30%. The SDCEP conscious sedation guidance and the Safe Sedation Practice guidelines (RCS/RCA 2020) specify these limits. Higher concentrations increase the risk of over-sedation. For most patients, 30–40% N2O is effective."},
    {"id":"paeds_34","type":"sba","stem":"A child presents with teeth showing diffuse, generalised brown discolouration and pitting that affects both the primary and permanent dentition equally. There is no systemic illness history but the parents mention a family history of similar dental problems. What is the most likely diagnosis?","options":["Dentinogenesis imperfecta","Amelogenesis imperfecta","MIH","Tetracycline staining","Severe dental fluorosis"],"correct":1,"explanation":"Generalised enamel defects affecting all primary and permanent teeth with a family history suggest amelogenesis imperfecta (AI), a group of hereditary conditions affecting enamel formation. The pitting and discolouration point to a hypoplastic or hypocalcified subtype. In dentinogenesis imperfecta (DI), the dentine is affected (blue-grey opalescent teeth), not just enamel. AI is distinct from MIH (which affects only first molars and incisors) and fluorosis (no family history, diffuse white/brown)."},
    {"id":"paeds_35","type":"sba","stem":"A 10-year-old child has an upper right central incisor with a class III (complicated crown-root fracture — fracture line extending below the gingival margin subgingivally). The pulp is exposed and vital. Root development is complete. What is the most appropriate management?","options":["Direct pulp cap and glass ionomer restoration","Root canal treatment, orthodontic extrusion to bring the fracture margin supragingivally, then crown","Extract and plan implant immediately","Pulpotomy and reattach the fractured fragment","Monitor for 6 months"],"correct":1,"explanation":"A complicated crown-root fracture with a subgingival margin requires RCT (as the pulp is exposed), followed by orthodontic extrusion to expose the fracture line and allow an adequate restorative margin (ferrule) supragingivally. Crown lengthening surgery is an alternative. This preserves the tooth for a long-term adhesive/crown restoration. Implants are contraindicated until skeletal growth is complete in a 10-year-old."},
    {"id":"paeds_36","type":"sba","stem":"Parents of a 4-year-old child report that their child grinds their teeth at night. The primary teeth show mild wear facets but no symptoms. What is the most appropriate management?","options":["Construct a soft occlusal splint to wear at night","Refer for a sleep study immediately","Reassure the parents — primary tooth bruxism is very common and usually resolves without treatment","Prescribe magnesium supplements","Refer to a paediatric neurologist"],"correct":2,"explanation":"Bruxism in young children is extremely common and is a normal developmental finding in the primary dentition. Mild wear facets without symptoms, sensitivity, or loss of vertical dimension require no intervention. Parents should be reassured. Occlusal splints are not recommended in young children (choking hazard, compliance). The condition typically resolves spontaneously. Management is needed only if wear is pathologically severe or symptomatic."},
    {"id":"paeds_37","type":"sba","stem":"A 6-year-old has a traumatic lateral luxation of the upper left primary central incisor (displaced palatally). The tooth is not mobile but is locked into the displaced position with normal occlusion. What is the recommended management according to IADT guidelines?","options":["Reposition under LA and splint for 4 weeks","Extract the tooth if it cannot be repositioned spontaneously","Monitor — primary incisors in lateral luxation with no occlusal interference often spontaneously reposition","Apply orthodontic traction immediately","Leave displaced and restore with composite"],"correct":1,"explanation":"For a laterally luxated primary incisor in a 6-year-old, IADT guidelines recommend: if there is interference with the occlusion, attempt gentle repositioning or extract; if no occlusal interference, allow spontaneous repositioning and monitor. However, a tooth 'locked into position palatally' with inability to reposition typically indicates extraction is necessary (especially if the permanent successor may be at risk). IADT specifically recommends extraction when spontaneous repositioning is unlikely."},
    {"id":"paeds_38","type":"sba","stem":"A 9-year-old presents with a large periapical abscess associated with the upper right first permanent molar. The caries extends deeply and there is marked swelling of the buccal sulcus. The child has not had dental treatment before. What is the immediate priority?","options":["Root canal treatment at this appointment","Extraction of the tooth under LA, with antibiotic prescription if systemic signs are present","Prescribe antibiotics for 5 days and review","Incise and drain the swelling under LA","Refer to hospital immediately regardless of symptoms"],"correct":1,"explanation":"The definitive treatment for a first permanent molar abscess with buccal swelling is extraction or drainage. In a child, extraction under LA (with adequate analgesia and anxiolysis if needed) is the primary management. Antibiotics alone are not definitive treatment for a dental abscess (source control is required). Antibiotics are prescribed as an adjunct if there are systemic signs (fever, trismus, lymphadenopathy) or the child is medically compromised. If extraction cannot be done at this appointment due to the child's condition, this is a legitimate reason for urgent onward referral."},
    {"id":"paeds_39","type":"sba","stem":"A 5-year-old child presents with a history of avulsed upper left primary incisor. What is the most important concern in the long-term follow-up?","options":["Space loss causing anterior crowding","Intrusion or displacement of the developing permanent successor due to the primary tooth trauma or the avulsion itself","Loss of arch length for the successor","Need for orthodontic treatment at age 12","Cosmetic impact on the child"],"correct":1,"explanation":"Trauma to primary incisors, especially intrusion and avulsion, carries a significant risk of damaging the developing permanent successor tooth (disruption to amelogenesis resulting in white/yellow-brown defects, dilaceration, or even loss of the permanent tooth bud). Follow-up radiographs at 6-month intervals until the permanent tooth erupts are essential to detect any disturbance early. This is the most clinically important concern."},
    {"id":"paeds_40","type":"sba","stem":"A 14-year-old patient with a fully developed permanent tooth has an uncomplicated crown fracture (enamel-dentine, pulp not exposed). The dentine is exposed and the tooth is sensitive. What is the preferred immediate management?","options":["No treatment — small dentine fractures remineralise spontaneously","Crown preparation and placement of a temporary crown","Bond the tooth fragment back with composite if available; if not, apply bonded composite resin over the exposed dentine to cover it and reduce sensitivity","Root canal treatment to eliminate sensitivity","Extract the tooth"],"correct":2,"explanation":"For an uncomplicated crown fracture with exposed dentine, immediate management involves sealing the exposed dentine to protect the pulp and reduce sensitivity. If the fragment is available and clean, it can be reattached with adhesive composite (fragment reattachment). If no fragment, place a smooth layer of bonded composite over the exposed dentine. This is a temporary or definitive restoration. Root canal treatment is not indicated unless pulp necrosis develops."},
    {"id":"paeds_41","type":"sba","stem":"Which of the following is the most reliable clinical indicator that a primary tooth has formed an ankylosed tooth (infraocclusion/submergence)?","options":["Pain on percussion","High metallic ('solid') percussion note compared to adjacent teeth","Increased mobility","Presence of a sinus tract","Dark discolouration of the crown"],"correct":1,"explanation":"An ankylosed primary tooth (infraocclusion) sounds different on percussion: it produces a high, solid 'metallic' note (ankylotic sound) compared to the dull sound of a normally suspended tooth with a PDL. This is the most reliable clinical sign. Visually, the tooth appears to have sunk below the occlusal plane as the adjacent teeth continue to erupt. Mobility is reduced or absent."},
    {"id":"paeds_42","type":"sba","stem":"A child of 9 years old presents with a grossly carious lower left first permanent molar deemed unrestorable. An OPG shows that the lower left second molar bifurcation is just calcifying. What does this suggest about the optimal time for extraction?","options":["Immediate extraction is optimal — the sooner the better","Wait until 14 years for the lower left second molar to be fully erupted","This is the optimal (ideal) time for extraction: when the bifurcation of the lower second molar is calcifying, spontaneous mesial drift and upright of the second molar is maximised","Wait until the lower left second premolar has erupted","Immediate extraction, followed by space maintainer"],"correct":2,"explanation":"The BSPD/FGDP 'Optimal Extraction Time' (Livas/Bhatt guidance) states the ideal time to extract a condemned lower first permanent molar is when the bifurcation of the lower second molar is just visible radiographically (typically 8.5–10 years). At this stage, the second molar drifts mesially and uprights most favourably, often closing the space adequately without an orthodontic appliance. Earlier or later extraction leads to suboptimal spontaneous space closure."},
    {"id":"paeds_43","type":"sba","stem":"A 3-year-old child presents with a dental abscess associated with an upper right primary central incisor. There is no facial swelling and the child is systemically well with no fever. What is the most appropriate management?","options":["Prescribe oral antibiotics and review in 1 week","Extract the tooth under local anaesthesia","Pulpotomy and restore with strip crown","Observe — primary incisors do not need treatment","Refer urgently to paediatric dental unit under general anaesthesia"],"correct":1,"explanation":"An abscess on a primary incisor (especially with a draining sinus or localised abscess) is best managed by extraction when systemic signs are absent. Primary incisor pulpotomy/RCT has poor evidence and a high failure rate; re-infection risks damage to the developing permanent successor. Local anaesthesia is feasible in a cooperative 3-year-old with a small amount of topical and careful infiltration. Antibiotics alone are not appropriate for a dental abscess — source removal is required."},
    {"id":"paeds_44","type":"sba","stem":"An 8-year-old presents with a permanent first molar with a carious exposure. A pulpotomy is performed. The radicular pulp stumps are assessed — they are bleeding, vital-appearing, and respond well to haemostasis. Which material is the current first-line option for covering the radicular pulp stumps?","options":["Calcium hydroxide paste (Dycal)","Formocresol (Buckley's solution)","Ferric sulphate 15.5%","Mineral trioxide aggregate (MTA) or Biodentine (calcium silicate cements)","Zinc oxide eugenol"],"correct":3,"explanation":"For vital pulpotomy in permanent teeth, MTA (or Biodentine, iRoot BP Plus — all calcium silicate-based cements) are the current first-line materials due to excellent biocompatibility, sealing ability, and long-term success. Calcium hydroxide has historically been used but has higher failure rates over time. Formocresol is not appropriate for permanent teeth pulpotomy. Ferric sulphate is used for primary teeth. The trend in guidelines (BSPD, ESE) favours calcium silicate cements."},
    {"id":"paeds_45","type":"sba","stem":"A 12-year-old child's upper left canine is ectopically positioned palatally and is palpable in the palate. An OPG shows the canine crossing the midline of the adjacent lateral incisor. What is the most important initial management?","options":["Extract the primary canine and observe for 12 months for spontaneous eruption","Referral to an orthodontist for assessment and planning of surgical-orthodontic exposure and alignment","Apply removable appliance to push the canine labially","Extract the ectopic permanent canine and place a bridge","Reassure — ectopic canines always self-correct"],"correct":1,"explanation":"Palatal canine impaction crossing the midline of the lateral incisor root (sector 3–4 on the IOTN/sectoral classification) is a complex case requiring orthodontic-surgical management. Referral to an orthodontist is the appropriate first step. Treatment involves orthodontic space creation followed by surgical exposure (open or closed eruption technique) and orthodontic traction. Early extraction of the primary canine (at approximately 10–11 years) may allow spontaneous correction in mild cases, but this case is complex."},
    {"id":"paeds_46","type":"sba","stem":"When taking a radiograph for a 7-year-old child with primary teeth and developing permanent teeth, which projection provides the most information while minimising radiation dose?","options":["Full mouth periapical series","Bitewing radiographs (posterior)","Panoramic (OPG) radiograph","Upper anterior occlusal","Lateral cephalogram"],"correct":1,"explanation":"Posterior bitewing radiographs in children provide essential information about interproximal caries in primary molars (which is not detectable clinically or buccally), early first permanent molar caries, and the stage of root resorption of primary teeth. They deliver the lowest radiation dose for the information gained. An OPG is used for dentition overview but has higher dose and less detail. Full mouth series have a much higher cumulative dose. FGDP UK selection criteria support bitewings as the initial projection in the primary/mixed dentition."},
    {"id":"paeds_47","type":"sba","stem":"A 10-year-old presents with a permanent upper left central incisor intruded 5 mm following a fall. The root is completely formed. What is the recommended management according to IADT guidelines?","options":["Allow spontaneous re-eruption","Immediate orthodontic repositioning","Surgical repositioning within 2 weeks","Extract and plan implant","Apply a vacuum-formed night guard and review weekly"],"correct":1,"explanation":"For an intruded permanent tooth with a CLOSED (complete) apex, IADT 2020 guidelines recommend ORTHODONTIC repositioning for intrusions >3 mm. Spontaneous re-eruption is indicated for closed apex intrusions ≤3 mm or open apex at any depth. Surgical repositioning is an alternative for >7 mm intrusion. Orthodontic repositioning is preferred over surgical as it allows more controlled, gradual movement with lower risk of ankylosis."},
    {"id":"paeds_48","type":"sba","stem":"A 2-year-old child's primary maxillary central incisors are described as being 'fused'. There are 9 primary teeth in the upper arch instead of 10. What is the most likely explanation?","options":["Gemination of one tooth","Fusion of two teeth resulting in one fewer tooth in the arch","Taurodontism","Dilaceration","Hypodontia of one lateral incisor with normal central incisors"],"correct":1,"explanation":"Fusion is the joining of two separate tooth buds to form one large, single tooth. It results in a reduction in tooth number — the two fused teeth count as one, hence 9 visible teeth instead of 10. Gemination is an attempt by one bud to divide, resulting in an enlarged tooth but the tooth count remains normal. Fused primary teeth are associated with a higher chance of missing or impacted permanent successors and require radiographic monitoring."},
    {"id":"paeds_49","type":"sba","stem":"According to the GDC standards and UK law, what is the age at which a young person can consent to their own dental treatment without parental consent (assuming they have capacity)?","options":["14 years of age","16 years of age","18 years of age — parental consent is required for all under 18s","12 years if assessed as Gillick competent","There is no fixed age — only Gillick competence matters"],"correct":1,"explanation":"In England, Wales, and Northern Ireland, the Family Law Reform Act 1969 gives individuals aged 16 and over the right to consent to medical and dental treatment without parental consent. Below 16, a child can consent if Gillick competent (Fraser guidelines). In Scotland, the Age of Legal Capacity (Scotland) Act 1991 sets the same threshold at 16. Parents can still consent for children aged 16–17 if the young person lacks capacity, but cannot override a competent young person's consent."},
    {"id":"paeds_50","type":"sba","stem":"A paediatric patient is identified as being at high risk of developing dental caries. Which of the following interventions has the strongest evidence base for caries prevention in primary teeth?","options":["Sugar-free chewing gum after every meal","Fluoride varnish application 2–4 times per year","Fissure sealing of primary molars routinely","Daily fluoride tablets from birth","Xylitol sweets twice daily"],"correct":1,"explanation":"Fluoride varnish (22,600 ppm F, 2.2% NaF Duraphat) applied 2–4 times per year has the strongest evidence for caries prevention in both primary and permanent teeth in high-risk children. SIGN guideline 138 and DBOH both support this. Fissure sealants are evidence-based for permanent molars but not routinely recommended for primary molars. Fluoride tablets are of limited evidence and compliance is poor. Fluoride varnish is the cornerstone of preventive paediatric dentistry in the UK."},
    {"id":"paeds_51","type":"sba","stem":"A 5-year-old child presents with a large lower left primary second molar caries. There is no radiographic furcation involvement. The tooth is vital (responds to EPT). The child is cooperative. The clinician decides to perform a Hall technique. Which of the following is correct about the Hall technique?","options":["Requires complete caries excavation and pulp capping before crown placement","Requires local anaesthesia in all cases","Places a preformed stainless steel crown over the tooth with glass ionomer luting cement WITHOUT caries removal or pulp treatment","Is contraindicated if the child has previous dental experience","Involves removing only soft caries before placement"],"correct":2,"explanation":"The Hall technique involves selecting and fitting a preformed stainless steel crown with glass ionomer cement WITHOUT any caries removal, pulp treatment, or even local anaesthesia in most cases. The crown seals the caries; the oxygen-free environment and change in pH cause the bacteria to become inactive ('arrested caries' principle). The Cochrane review (2015) and the CCNS trial show superiority over conventional restorations. No preparation or LA is necessary in the majority of cases."},
    {"id":"paeds_52","type":"sba","stem":"A 4-year-old presents with a grossly carious upper primary first molar. The mother wants the tooth treated conservatively if possible. A pulpotomy is planned. Which radiographic finding would be an absolute contraindication to pulp treatment?","options":["A widened PDL space","A deep cavity within 1 mm of the pulp","Pathological internal or external root resorption or periapical/furcation changes","Mild coronal bleeding on pulp exposure","A radiolucent area limited to the crown only"],"correct":2,"explanation":"Absolute contraindications to pulpotomy in primary teeth include: radiographic evidence of furcation involvement, pathological internal resorption, pathological external root resorption, or periapical changes (periapical radiolucency). These indicate irreversible pulpal/periradicular disease where the radicular pulp is also infected. In these cases, extraction is indicated. A widened PDL space warrants caution; mild signs are relative contraindications."},
    {"id":"paeds_53","type":"sba","stem":"What is the recommended splinting period for a permanent tooth with a lateral luxation injury in a child, according to IADT guidelines?","options":["No splint required","1 week","2–4 weeks flexible splint","3–4 months rigid splint","6 months regardless of healing"],"correct":2,"explanation":"IADT 2020 guidelines recommend a flexible (functional) splint for 2–4 weeks for lateral luxation injuries in permanent teeth. Flexible splinting allows physiological movement, promoting PDL healing and reducing the risk of ankylosis compared to rigid splinting. Rigid splints and long splinting times are associated with increased rates of ankylosis and replacement resorption."},
    {"id":"paeds_54","type":"sba","stem":"A 7-year-old child presents with clinical and radiographic evidence of premature loss of both lower primary second molars due to caries. The first permanent molars have not yet erupted. What space maintenance device would be most appropriate?","options":["Band-and-loop space maintainer from the first primary molar","Distal shoe space maintainer extending below the gingival margin to guide the first permanent molar eruption","No space maintenance at this age","Lingual arch space maintainer","Removable partial denture"],"correct":1,"explanation":"If the first permanent molar has not yet erupted, a distal shoe space maintainer (intra-alveolar guidance appliance) is used. It has a blade that extends below the gingival margin to contact the mesial surface of the unerupted first permanent molar crown, guiding it into the correct eruption path. Once the first permanent molar erupts, it is converted to a band-and-loop. This is a specialised device typically provided by a specialist."},
    {"id":"paeds_55","type":"sba","stem":"Which of the following primary dentition spaces is the most significant contributor to the 'leeway space' that allows spontaneous alignment of the permanent teeth?","options":["The space between the upper primary central and lateral incisors","The difference between the combined mesiodistal widths of the primary canine, first molar, and second molar versus the permanent canine, first premolar, and second premolar","The incisor liability space in the lower arch","The space created by natural attrition of primary teeth","The interdental spacing between primary incisors"],"correct":1,"explanation":"Leeway space (Nance) is defined as the difference between the combined mesiodistal widths of the primary canine, first molar, and second molar versus those of their permanent successors (canine, first premolar, second premolar). In the lower arch it is approximately 3.1 mm (1.7 mm upper). This 'extra' space allows some mesial drift of the permanent first molar and some spontaneous alignment of the permanent incisors during the transition."},
    {"id":"paeds_56","type":"sba","stem":"A 6-year-old child is seen as an emergency with severe dental pain and a facial swelling affecting the left cheek and lower eyelid. The source is thought to be an infected upper left primary molar. The child has a temperature of 38.5°C and is unwell. What is the most appropriate management?","options":["Prescribe oral amoxicillin and review in 24 hours","Extract the causative tooth in the practice with local anaesthesia only","Refer urgently to hospital — spreading facial cellulitis with systemic involvement requires IV antibiotics and surgical drainage","Apply warm salt-water mouthwashes and prescribe analgesia","Incise and drain the swelling in the dental chair"],"correct":2,"explanation":"Spreading facial cellulitis with periorbital involvement (lower eyelid swelling), fever, and systemic illness in a child is a serious, potentially life-threatening emergency. Periorbital/orbital cellulitis can lead to vision loss, cavernous sinus thrombosis, or meningitis. Urgent referral to hospital (A&E/OMFS/paediatrics) for IV antibiotics, imaging (CT if orbital involvement), and surgical drainage is mandatory. This should NOT be managed in primary care."},
    {"id":"paeds_57","type":"sba","stem":"In primary dentition, which of the following teeth are most susceptible to early caries?","options":["Primary central incisors (lower)","Primary lateral incisors (upper)","Primary first molars","Primary second molars (posterior interproximal surfaces)","Primary canines"],"correct":3,"explanation":"The interproximal surfaces of the primary second molars (and to a lesser extent first molars) are the most susceptible sites for caries in the primary dentition. The tight contact points between primary molars trap plaque, and these surfaces are not cleaned by brushing. Bitewing radiographs are specifically indicated to detect these hidden interproximal carious lesions. Upper primary incisors are susceptible in nursing bottle caries (early childhood caries)."},
    {"id":"paeds_58","type":"sba","stem":"A 12-year-old presents with delayed eruption of the upper right permanent canine. The primary canine is still present. What is the most appropriate initial investigation?","options":["Reassure — canines up to age 14 are within normal limits","Prescribe a removable plate to create space","Take a periapical radiograph and an upper standard occlusal radiograph (or OPG) to determine the canine's position","Immediately refer to an oral surgeon for surgical exposure","Apply orthodontic brackets to pull the canine down without imaging"],"correct":2,"explanation":"A retained primary canine at age 12 with absent permanent canine requires radiographic investigation. Two periapical radiographs using tube shift (parallax / SLOB technique — Same Lingual Opposite Buccal) or a combination of periapical and upper standard occlusal radiograph (or OPG with two periapicals) are used to localise the canine in all three planes. Referral to an orthodontist follows once the position is known. FGDP and BSPD guidance supports early detection at age 10–11."},
    {"id":"paeds_59","type":"sba","stem":"A 9-year-old child has a 4 mm diastema between the upper central incisors. What is the most appropriate management?","options":["Immediate orthodontic closure with fixed appliances","Reassure — midline diastemas often close spontaneously as the permanent lateral incisors and canines erupt, and early treatment should be deferred","Composite bonding of the central incisors immediately","Frenectomy of the upper labial frenum immediately","Refer for orthodontic treatment urgently"],"correct":1,"explanation":"A midline diastema of up to 4 mm in the mixed dentition (9 years) is very common and often resolves spontaneously as the lateral incisors and canines erupt and exert pressure on the centrals from distal. This is the 'ugly duckling' stage of dental development (Broadbent phenomenon). Definitive treatment (orthodontics, frenectomy) is deferred until all permanent teeth are in place. Premature frenectomy does not reliably close the diastema."},
    {"id":"paeds_60","type":"sba","stem":"A child presents with Trisomy 21 (Down syndrome). Which of the following dental features is most characteristic of this condition?","options":["Premature eruption of all permanent teeth","Macrodontia (enlarged teeth)","Hypodontia, microdontia, taurodontism, and increased susceptibility to severe periodontitis","Amelogenesis imperfecta","Increased caries risk due to thick saliva"],"correct":2,"explanation":"Children with Down syndrome have characteristic dental features: hypodontia (missing teeth, especially lower lateral incisors), microdontia, taurodontism, delayed eruption of both primary and permanent teeth, anterior open bite, macroglossia, and a significantly increased susceptibility to severe periodontitis (due to immune dysfunction, particularly neutrophil defects). Caries risk is not necessarily increased; salivary pH may be protective. Periodontal disease is the most important dental health concern in this group."}
  ],
  ortho: [
    {"id":"ortho_1","type":"sba","stem":"A 14-year-old girl is referred for orthodontic assessment. She has a Class II Division 1 malocclusion with an overjet of 9 mm and an average skeletal pattern. Dental health is otherwise good. What is the most appropriate time to commence orthodontic treatment?","options":["Immediately — start functional appliance at age 14","Defer treatment until late teenage years (17+)","Commence treatment when the permanent dentition is established and the patient is motivated, typically 12–14 years","Refer for orthognathic surgery at age 14","No treatment is required — large overjets resolve spontaneously"],"correct":2,"explanation":"Optimal timing for comprehensive orthodontic treatment is generally when the permanent dentition is established (typically 12–14 years) and the patient is motivated and compliant. At 14 the permanent dentition should be nearly complete. Functional appliances are most effective during the pubertal growth spurt; at 14 a female may be past peak growth, though they are still sometimes used. Treatment cannot be deferred until 17+ without losing the benefit of remaining growth."},
    {"id":"ortho_2","type":"sba","stem":"A 12-year-old patient has an Index of Orthodontic Treatment Need (IOTN) Dental Health Component (DHC) score of 4a (overjet >6–9 mm). What does this grade indicate?","options":["Treatment is unnecessary — the patient is at low risk","Treatment is of little benefit","Treatment need is borderline, possibly indicated","Treatment is clearly indicated due to a dental health benefit","Treatment is mandatory — the patient is entitled to free NHS treatment immediately"],"correct":3,"explanation":"IOTN DHC Grade 4 ('great need') means treatment is clearly indicated due to significant dental health benefit. Grade 4 encompass overjets 6–9 mm (4a), among other traits. Grades 4 and 5 qualify for NHS orthodontic treatment in England. Grade 5 is the most severe. Grades 1–2 indicate no/little need, grade 3 is moderate/borderline need."},
    {"id":"ortho_3","type":"sba","stem":"A patient has a skeletal Class III pattern (ANB = -2°, SNA = 79°, SNB = 81°). The mandible is protrusive and the maxilla is retrusive. Which of the following best describes this finding?","options":["The mandible is normal and the maxilla is retrusive","The mandible is protrusive and the maxilla is normal","Both maxilla and mandible are involved in producing the Class III pattern","The skeletal pattern is within normal limits (ANB 2–4°)","SNA of 79° is within normal limits; the problem is the SNB only"],"correct":2,"explanation":"ANB = SNA - SNB. Normal ANB is 2–4° (Class I). ANB of -2° indicates a Class III skeletal pattern. SNA of 79° (normal ~82°) indicates a retrusive maxilla; SNB of 81° (normal ~80°) indicates a protrusive mandible. Both are contributing to the Class III pattern — this is a combined (dual) aetiology. Understanding the individual components guides surgical planning."},
    {"id":"ortho_4","type":"sba","stem":"An 11-year-old presents with a unilateral posterior crossbite on the left side with an associated mandibular displacement on closure. What is the recommended management?","options":["Monitor until the permanent dentition is fully erupted","Upper removable appliance with a posterior expansion screw to expand the upper arch and eliminate the displacement","Extract upper premolars to reduce the arch width","Accept the crossbite — it will self-correct with growth","Fixed orthodontic appliances immediately"],"correct":1,"explanation":"A unilateral posterior crossbite with an associated mandibular displacement (the mandible shifts laterally to achieve intercuspation) should be treated early to prevent adaptive mandibular asymmetric growth and TMJ changes. An upper removable appliance with a midline expansion screw (Coffin spring or screw) corrects the upper arch width discrepancy. Correction before the end of growth gives the best long-term outcome."},
    {"id":"ortho_5","type":"sba","stem":"Which of the following describes Class II Division 2 malocclusion?","options":["Skeletal Class II, average overjet (>4mm), retroinclined upper centrals","Skeletal Class II or I, reduced overjet due to retroclination of upper central incisors, deep overbite","Skeletal Class III, increased overjet","Skeletal Class I, proclined upper incisors, increased overjet","Skeletal Class II, bimaxillary proclination"],"correct":1,"explanation":"Class II Division 2 is characterised by: skeletal Class II (or sometimes Class I), retroclination of the upper central incisors (reduced overjet — typically ≤2 mm), often retroclined upper lateral incisors that flare labially, and characteristically a deep (increased) overbite. The retroclination is thought to be related to lower lip trap position. The deep overbite differentiates it from Class II Div 1."},
    {"id":"ortho_6","type":"sba","stem":"A patient has moderate crowding in both arches with a Class I skeletal and dental base relationship. The decision is taken to extract four first premolars to provide space. Which teeth in each quadrant are most commonly extracted to relieve crowding in routine orthodontics?","options":["Second premolars","First premolars","First permanent molars","Second permanent molars","Primary canines"],"correct":1,"explanation":"The upper and lower first premolars are the teeth most commonly extracted to relieve crowding in orthodontic treatment. Their position (adjacent to canines) allows efficient mesial movement of posterior teeth into the extraction site and provides space for canine retraction and incisor alignment. First premolars have a favourable crown-to-root ratio and single root, making space closure straightforward."},
    {"id":"ortho_7","type":"sba","stem":"A 16-year-old patient is wearing twin-block functional appliance for a Class II Division 1 malocclusion. What is the primary mechanism of overjet reduction?","options":["Retraction of the upper incisors by the labial bow only","Skeletal and dentoalveolar changes: mandibular growth modification, upper incisor retroclination, lower incisor proclination, and vertical molar eruption changes","Skeletal change only — the twin block grows the mandible forward by 4 mm per year","The twin block exerts a force on the maxilla to retract it","The twin block primarily tilts the upper anterior teeth lingually only"],"correct":1,"explanation":"Overjet reduction with a functional appliance (twin block) results from a combination of dentoalveolar changes (upper incisor retroclination, lower incisor proclination, downward molar eruption) and a modest amount of skeletal change (forward mandibular growth modification and some maxillary restraint). Meta-analyses suggest ~1.5–2 mm of additional mandibular length with early treatment compared to untreated controls. The majority of overjet correction is dentoalveolar."},
    {"id":"ortho_8","type":"sba","stem":"A fixed orthodontic appliance is being used to close an extraction space. The clinician places a coil spring (open coil) between two brackets. What force does this deliver?","options":["Compressive (closing) force to bring two teeth together","Expansive (opening) force to push teeth apart and open space","Torquing force to angulate root tips","No force — open coil springs are only for anchorage","Tipping force only in a distal direction"],"correct":1,"explanation":"An open coil spring (NiTi or stainless steel) is placed in a compressed state between two brackets and exerts a continuous expansive (opening) force, pushing the two adjacent teeth apart. This is used to create space for tooth alignment, to re-open spaces, or to maintain space. A closed coil spring exerts a compressive (retraction/closing) force and is used to bring teeth together."},
    {"id":"ortho_9","type":"sba","stem":"What does the term 'torque' mean in fixed appliance orthodontics?","options":["Mesiodistal tipping of a tooth crown","Labiolingual root movement (changing the labiolingual angulation of the tooth root relative to its crown)","Vertical extrusion of a tooth","Rotation of a tooth around its long axis","Transverse expansion of the dental arch"],"correct":1,"explanation":"Torque in orthodontics refers to the third-order movement: the labiolingual angulation of the root relative to the crown (or buccolingual root torque). It is controlled by the rectangular archwire interacting with the rectangular bracket slot. 'Root torque' moves the root lingually/palatally; 'crown torque' moves the crown labially. Torque is distinct from tipping (first order), rotation (second order), and translation (bodily movement)."},
    {"id":"ortho_10","type":"sba","stem":"A 13-year-old patient is having fixed orthodontic treatment. Decalcification (white spot lesions) is noticed around the brackets. What is the primary cause of this iatrogenic complication?","options":["Excessive bracket bonding force during placement","Plaque accumulation around the brackets causing demineralisation of enamel","Fluoride in the bonding composite causing opacity","The archwire exerting pressure on the enamel","Rapid tooth movement causing surface enamel cracks"],"correct":1,"explanation":"White spot lesions (WSLs) around fixed appliance brackets are caused by demineralisation from bacterial acid production in plaque that accumulates around the brackets. They represent the earliest clinical sign of caries. Prevention: meticulous oral hygiene, fluoride toothpaste (1450 ppm), fluoride varnish applications, and dietary sugar control. If OH is poor, treatment should be paused or abandoned. This is the most common iatrogenic complication of fixed appliances."},
    {"id":"ortho_11","type":"sba","stem":"In cephalometric analysis, which of the following is the correct landmark definition for 'Nasion (N)'?","options":["The deepest point on the concavity of the anterior face of the frontal bone","The junction of the nasal and frontal bones on the mid-sagittal plane (nasofrontal suture)","The anterior-most point on the maxilla","The tip of the chin","The most anterior point of the sella turcica"],"correct":1,"explanation":"Nasion (N) is defined as the most anterior point of the frontonasal suture (nasofrontal suture) in the mid-sagittal plane, seen on a lateral cephalogram. It is an important reference point forming the basis of the SNA and SNB angles used to assess sagittal skeletal discrepancy. Sella (S) is the centre of the sella turcica; A-point is the deepest point on the maxillary alveolar curvature."},
    {"id":"ortho_12","type":"sba","stem":"A 10-year-old child has an upper permanent canine that is palpable buccally in the alveolus. An OPG shows the canine is just mesially angulated but still above the premolar roots. What is the most appropriate first-line treatment?","options":["Immediate surgical exposure and orthodontic traction","Referral to oral surgery for extraction","Extract the retained primary canine and monitor for 12 months — in many cases the permanent canine will self-correct","Apply an upper removable appliance with a labial bow to guide the canine","No treatment — all buccal canines erupt spontaneously"],"correct":2,"explanation":"For a buccally displaced canine identified early (age 10–11), extraction of the retained primary canine may be sufficient to allow the permanent canine to self-correct. Evidence (Ericson and Kurol 1988) shows that 78% of buccally displaced palatally-palpable canines will correct within 12 months of primary canine extraction if started before age 11. If no improvement after 12 months of monitoring, referral for surgical-orthodontic management is indicated."},
    {"id":"ortho_13","type":"sba","stem":"A 14-year-old boy has a skeletal Class III malocclusion with a reverse overjet of -2 mm and an anterior crossbite of two upper incisors. Facial profile shows a concave profile. Cephalometric analysis: ANB = -1°, MMPA 28°. Dental arches are uncrowded. What is the most appropriate management?","options":["Immediate orthognathic surgery — skeletal Class III always requires surgery","Monitor growth and reassess at 18; if skeletal discrepancy worsens, plan combined orthodontic-surgical correction","Upper removable appliance with Z-spring to procline upper incisors and correct the crossbite, and accept the skeletal pattern","Extract lower premolars and close space to reduce the reverse overjet","Facemask (reverse pull headgear) therapy to advance the maxilla"],"correct":1,"explanation":"In a growing patient with a mild Class III (ANB -1°, small reverse overjet), the most important step is to monitor growth. If the skeletal discrepancy is mild and stable, orthodontics alone (camouflage) may be sufficient at completion of growth. If growth worsens the discrepancy, combined orthodontic-surgical treatment is planned after growth completion (typically 18+ for males). Facemask therapy may have limited value at 14 (past the optimal treatment window of 8–10 years)."},
    {"id":"ortho_14","type":"sba","stem":"A patient has an IOTN Aesthetic Component (AC) score of 8. What does this mean?","options":["A very minor deviation from normal, no treatment need","A minor need, approximately mid-range on the scale","A moderately severe deviation, treatment possibly indicated","A severe deviation from the ideal — most people would consider this unattractive, treatment clearly indicated","The aesthetic component scale goes only to 5"],"correct":3,"explanation":"The IOTN Aesthetic Component is a 10-point scale using standardised photographs (Daniels and Richmond). Scores of 1–4 indicate no/slight need; 5–7 moderate need; 8–10 definite need. AC score 8 falls in the 'definite treatment need' range (severe aesthetic impairment). The AC assesses the patient's subjective appearance against standard dental photographs and contributes to NHS treatment eligibility alongside the DHC."},
    {"id":"ortho_15","type":"sba","stem":"A patient has a bimaxillary proclination — the upper and lower incisors are both proclined, giving a convex profile and lip incompetence. The skeletal pattern is Class I. The most appropriate orthodontic approach is:","options":["Upper arch expansion to resolve crowding","Upper and lower premolar extractions (typically four first premolars) with retraction of incisors to improve profile and achieve lip competence","Upper premolar extractions only","Accept — bimaxillary proclination is a normal variation","Orthognathic surgery to set back both jaws"],"correct":1,"explanation":"Bimaxillary proclination in a Class I skeletal base with lip incompetence and a convex profile is treated by extracting four first premolars (upper and lower) to create space for significant retraction of both upper and lower incisors. This reduces the overjet, improves lip competence, and creates a more balanced profile. Fixed appliances are used for retraction. Expansion would worsen the proclination and flaring."},
    {"id":"ortho_16","type":"sba","stem":"Resorption of the roots of upper central incisors is a recognised complication of orthodontic tooth movement. Which of the following increases the risk of external apical root resorption (EARR) during fixed appliance treatment?","options":["Short treatment duration","Low force levels","Round tooth root morphology, pipette-shaped or blunt roots, and extensive intrusion or torque movements","Using nickel-titanium archwires","Maintaining good oral hygiene throughout treatment"],"correct":2,"explanation":"Risk factors for EARR include: pre-treatment root morphology (pipette/blunt/dropper-shaped roots), greater magnitude of tooth movement (especially intrusion and labial root torque), longer treatment duration, genetic susceptibility, and history of previous trauma. Round archwires and light forces are less associated with EARR than rectangular wires and heavy forces. Radiographic monitoring (periapical views mid-treatment) is recommended in high-risk cases."},
    {"id":"ortho_17","type":"sba","stem":"In the Angle classification system, Class II molar relationship means:","options":["The mesiobuccal cusp of the upper first molar occludes in the buccal groove of the lower first molar","The mesiobuccal cusp of the upper first molar occludes anterior to the buccal groove of the lower first molar (lower molar is distal to the upper)","The mesiobuccal cusp of the upper first molar occludes posterior to the buccal groove","The lower molar is mesial to the upper molar","The upper and lower molars have no defined relationship"],"correct":1,"explanation":"In Angle's classification: Class I — the mesiobuccal cusp of the upper first molar occludes in the mesiobuccal groove of the lower first molar; Class II — the mesiobuccal cusp of the upper first molar is ANTERIOR to the mesiobuccal groove (i.e. the lower molar is distally positioned — 'distoclusion'); Class III — the mesiobuccal cusp of the upper first molar is POSTERIOR to the mesiobuccal groove (lower molar is mesially positioned — 'mesioclusion')."},
    {"id":"ortho_18","type":"sba","stem":"A patient has a deep traumatic overbite where the lower incisors are biting into the palatal mucosa of the upper incisors. What fixed appliance mechanic is used to increase the overbite correction (open the bite anteriorly)?","options":["Class II elastics from upper canine to lower molar","Posterior bite planes or reverse curve of Spee in the lower archwire to intrude incisors and allow posterior eruption","Removing the lower archwire to allow free eruption","Adding a high pull headgear to intrude upper posteriors","Using class III elastics"],"correct":1,"explanation":"A deep overbite is reduced by intrusion of incisors and/or eruption of posterior teeth. A reverse curve of Spee in the lower archwire creates intrusive forces on the lower incisors and extrusive forces on the posterior teeth, opening the bite. Posterior bite planes (bonded composites on upper posterior teeth) also encourage posterior eruption and incisor intrusion. Class II elastics tend to increase overjet, not specifically overbite."},
    {"id":"ortho_19","type":"sba","stem":"A patient's orthodontic treatment is completed. The treating orthodontist prescribes fixed retainers bonded to the lingual surfaces of the lower anterior teeth. What is the main indication for fixed (bonded) retention over removable retention?","options":["Fixed retainers are always superior to removable in all cases","Fixed retention is indicated for teeth with high relapse risk (e.g. corrected lower incisor crowding, rotations, spacing between upper central incisors) where removable compliance cannot be guaranteed","Fixed retainers are only used in Class II cases","Removable retainers are never used in the lower arch","Fixed retainers require replacement every 6 months"],"correct":1,"explanation":"Fixed (bonded) retainers are indicated where there is a high risk of relapse (corrected lower incisor crowding — significant lifelong relapse tendency; corrected upper midline diastema; corrected rotations) and/or where patient compliance with removable retainers cannot be guaranteed. They provide continuous passive retention. The risk of bond failure, plaque accumulation and gingival inflammation around the retainer wire must be managed. A combination of fixed and removable retention is frequently prescribed."},
    {"id":"ortho_20","type":"sba","stem":"What is the primary reason that orthodontic treatment should not be started in patients with active, untreated periodontal disease?","options":["Orthodontic forces may cause enamel fracture in periodontally compromised teeth","Tooth movement in the presence of active periodontal disease and bone loss accelerates alveolar bone loss and worsens the periodontal condition","Fixed brackets prevent oral hygiene and therefore must await periodontal stability","Periodontal disease does not affect orthodontic outcome — treatment can proceed","Active periodontal disease causes bracket debonding"],"correct":1,"explanation":"Orthodontic tooth movement in the presence of uncontrolled periodontal disease accelerates bone loss and attachment loss, and can move teeth into infrabony pockets. Active infection must be controlled (full periodontal therapy, oral hygiene optimised, and a period of stability confirmed) before starting orthodontics. In treated and stable periodontitis patients, orthodontics can be performed with careful monitoring and strict oral hygiene."},
    {"id":"ortho_21","type":"sba","stem":"A 14-year-old patient has upper arch crowding of 8 mm and a Class I skeletal and dental base. Upper left and right first premolars are to be extracted for orthodontic space creation. Which of the following best describes the concept of 'anchorage' in this context?","options":["Anchorage describes the initial force applied to extract the premolars","Anchorage is the resistance to unwanted tooth movement — the posterior teeth must not drift forward (mesially) into the premolar space during anterior retraction","Anchorage refers to the retention of the completed treatment outcome","Anchorage is only relevant when using headgear","Anchorage means all teeth move equally towards the extraction space"],"correct":1,"explanation":"Anchorage in orthodontics is the resistance to unwanted (reactive) tooth movement. When retracting the anterior teeth, Newton's Third Law means an equal and opposite force pushes the posterior teeth mesially. If anchorage is insufficient, the posterior teeth move forward, reducing the space for anterior retraction. Anchorage control strategies include: headgear, TADs (temporary anchorage devices), transpalatal arches, Nance palatal arch, and careful force mechanics."},
    {"id":"ortho_22","type":"sba","stem":"A patient is to undergo combined orthodontic-orthognathic surgical correction of a severe Class III malocclusion. What is the role of pre-surgical orthodontics?","options":["Completely correct the malocclusion prior to surgery so surgery only needs minor adjustments","Decompensate the dental arches — remove dental compensations so the underlying skeletal discrepancy is fully revealed, and align arches so they will fit together at surgery","Expand the arches to maximum width before surgery","Extract all premolars to create space for surgical movement","Apply functional appliances to maximise growth before surgery"],"correct":1,"explanation":"Pre-surgical orthodontics decompensates the dental arches: in Class III, the upper incisors are often retroclined and the lower incisors proclined as dental compensations for the skeletal discrepancy. Pre-surgical orthodontics reverses these compensations (proclines upper incisors, retrolines lower incisors), worsening the clinical appearance before surgery but aligning the arches so they will fit together correctly after the surgical movements."},
    {"id":"ortho_23","type":"sba","stem":"A 10-year-old boy has a Class II skeletal base with a convex profile. His MMPA (mandibular plane angle) is 39°. He has a large overjet (8 mm) and an incompetent lip. What does the MMPA of 39° indicate and how does it affect treatment planning?","options":["MMPA of 39° is average — no special considerations","MMPA of 39° indicates a high-angle (hyperdivergent) skeletal pattern; extrusion of posterior teeth must be avoided as it would worsen the anterior open bite tendency","MMPA of 39° indicates a low-angle pattern; vertical height must be increased","MMPA determines the overjet only, not vertical considerations","MMPA of 39° is irrelevant to orthodontic planning in young patients"],"correct":1,"explanation":"Normal MMPA is approximately 27° (range ~22–32°). MMPA of 39° is high (hyperdivergent) — the mandible is steeply inclined, producing an anterior open bite tendency and vertically long lower face. In these patients, extrusion of posterior teeth is harmful (opens the anterior bite further). Treatment must avoid mechanics that cause posterior molar eruption. Headgear (high-pull), temporary anchorage devices, or orthognathic surgery may be needed in severe cases."},
    {"id":"ortho_24","type":"sba","stem":"What does the PAR (Peer Assessment Rating) Index measure?","options":["Severity of malocclusion at a single time point","The percentage improvement in malocclusion outcome from pre-treatment to post-treatment — used as an audit and quality measure of orthodontic treatment outcome","The patient's satisfaction with treatment","The aesthetic appearance of the dentition","Crowding severity only"],"correct":1,"explanation":"The PAR index (Richmond et al. 1992) is a validated orthodontic outcome measure. It scores multiple occlusal components (alignment, spacing, crossbite, overjet, overbite, centreline) at pre- and post-treatment. The reduction in PAR score expresses the percentage improvement: ≥30% reduction = improved; ≥70% reduction = greatly improved. It is used as an audit standard in NHS orthodontic contracts and clinical research."},
    {"id":"ortho_25","type":"sba","stem":"Which of the following best describes the mode of action of a palatal expansion appliance (rapid maxillary expansion — RME) in a growing patient?","options":["The appliance tips the molar teeth buccally to widen the arch width","The appliance opens the mid-palatal suture by applying heavy forces, widening the bony maxilla (skeletal expansion)","The appliance extrudes the upper molars to create crossbite correction","The appliance applies forces directly to the alveolar bone only","Dental expansion only — no skeletal effect"],"correct":1,"explanation":"Rapid maxillary expansion (RME) applies heavy forces (typically 1–2 lbs) across the mid-palatal suture via molar bands and a jackscrew. In growing patients (before sutural fusion, typically before 14–15 years), this opens the mid-palatal suture, allowing true skeletal (basal bone) widening with new bone deposition in the suture. Slow expansion appliances (Quad helix, removable screws) work mainly by dental tipping. After sutural fusion, surgically-assisted RME (SARME) is required."},
    {"id":"ortho_26","type":"sba","stem":"A patient is referred with a palatally impacted upper right permanent canine. The OPG and sectional periapical films using parallax technique show the canine is palatal, with the crown over the root of the lateral incisor. The canine root is not yet developed fully. What is the most appropriate management?","options":["Extract the canine — palatal canines cannot be aligned","Surgical exposure (open eruption technique with a surgical pack to maintain the window) and orthodontic traction with bonded bracket","Extract the primary canine only and monitor for 12 months","Coronectomy — remove the canine crown","Closed (envelope) surgical technique with a bonded gold chain and active traction"],"correct":4,"explanation":"For a palatally impacted canine with the crown lying over the lateral incisor root, the closed surgical technique (envelope flap with bonded gold chain) allows traction into the arch without exposure of the tooth to the oral cavity, reducing risk of gingival recession and producing better periodontal outcomes. The open technique is used when the canine is more superficially located. Active orthodontic traction is applied immediately or within 2 weeks of surgery."},
    {"id":"ortho_27","type":"sba","stem":"A patient in retention 1 year after completing fixed appliance treatment has mild lower incisor crowding that has relapsed. What is the most evidence-based explanation for this relapse?","options":["The fixed appliance was not worn for long enough","Lower incisor crowding has a strong genetic/physiological tendency to relapse throughout life, driven by forward migration of the occlusion and lip pressure, regardless of treatment","The retainer was the wrong type","The orthodontist should have extracted more teeth","Relapse is caused by fluoride in the water supply"],"correct":1,"explanation":"Lower incisor crowding has a very strong tendency to relapse throughout life — this is a well-established finding in orthodontic literature (Littlewood 2006, etc.). The mechanisms include: lifelong forward migration of teeth in the arch (mesial drift), changes in soft tissue pressures (lip), late mandibular growth, and continued eruption forces. This is why indefinite retention (bonded fixed retainer) is now routinely offered. No treatment eliminates this inherent tendency."},
    {"id":"ortho_28","type":"sba","stem":"What is the main advantage of nickel-titanium (NiTi) archwires over stainless steel (SS) archwires in the initial alignment stages of fixed orthodontic treatment?","options":["NiTi is more rigid, providing greater force for tooth movement","NiTi has superelastic properties, delivering light, continuous forces over a large range of deflection, making it ideal for engaging severely malpositioned teeth","NiTi can be bent and adjusted chairside easily","NiTi wires are less expensive than stainless steel","NiTi has a rectangular cross-section from the outset"],"correct":1,"explanation":"Nickel-titanium archwires are superelastic (at body temperature): they can undergo large deflections with low force and return to their original shape, delivering light, continuous forces suitable for engaging severely displaced or rotated teeth. They cannot be permanently bent chairside (unlike SS). Stainless steel is used in later stages for detailing and finishing because of its stiffness and ability to be bent. NiTi is always round in early stages."},
    {"id":"ortho_29","type":"sba","stem":"Which of the following is a recognised contraindication to orthodontic treatment with fixed appliances?","options":["History of oral cancer treated >5 years ago with no recurrence","Uncontrolled active periodontal disease or severe caries","Mild dental anxiety managed with nitrous oxide sedation","Class II Division 1 malocclusion in an adult","Mild crowding with spacing"],"correct":1,"explanation":"Uncontrolled active periodontal disease or extensive active caries are contraindications to initiating fixed orthodontic treatment. Fixed appliances increase plaque retention and may accelerate bone loss in periodontally susceptible patients. The disease must be controlled and stable before commencing orthodontics. Medical contraindications include bisphosphonate therapy (risk of MRONJ with extractions), bleeding disorders, and immune compromise (relative contraindications)."},
    {"id":"ortho_30","type":"sba","stem":"A 12-year-old patient has lower left first permanent molar with MIH, judged unrestorable, requiring extraction. To compensate for balance, and to prevent over-eruption, which tooth is usually extracted in the same visit?","options":["The upper left first permanent molar (compensating extraction)","The lower right first permanent molar (balancing extraction)","Both the upper left and lower right first permanent molars","The lower left first premolar","No compensating or balancing extraction is required in all cases"],"correct":0,"explanation":"When a lower first permanent molar is extracted, the corresponding upper first molar (the compensating tooth) may over-erupt into the space. A compensating extraction (upper left first molar) is performed at the same time to prevent over-eruption and reduce the need for future treatment. A balancing extraction (contralateral lower molar) prevents arch asymmetry. Whether to balance, compensate, or both depends on the clinical situation and is decided in consultation with an orthodontist."},
    {"id":"ortho_31","type":"sba","stem":"A 15-year-old patient has been wearing a Hawley retainer in the upper arch for 12 months post-treatment. The retainer is being worn every night. What is the current UK clinical guidance regarding long-term retention?","options":["Retain for 1 year and then stop","Retain until growth is complete (18 years) then stop","Long-term (indefinite) retention should be offered to all patients completing orthodontic treatment, as relapse is a lifelong risk","Retention is only required for extraction cases","Retention is not evidence-based and can be discontinued at any time"],"correct":2,"explanation":"Current UK guidance (BOS guidelines, Faculty of Dental Surgery standards) recommends that all patients completing orthodontic treatment should be offered lifelong retention. Short-term retention (1–2 years) is insufficient as some degree of relapse occurs in virtually all patients over time, and lower incisor crowding in particular is a lifelong tendency. The patient should be informed of this before treatment commences."},
    {"id":"ortho_32","type":"sba","stem":"When assessing a lateral cephalogram, what does a large Wits appraisal value (AO-BO distance) indicate?","options":["A Class I skeletal relationship","A Class II skeletal pattern with a forward maxilla or retruded mandible (or both)","A Class III skeletal pattern with a protruded mandible or retrusive maxilla (or both)","Vertical skeletal discrepancy only","The Wits appraisal is not used in UK practice"],"correct":1,"explanation":"The Wits appraisal measures the anteroposterior relationship of the jaws by projecting perpendiculars from A-point and B-point onto the functional occlusal plane. Normal values: females 0 mm, males -1 mm. A positive Wits (AO anterior to BO) indicates a Class II pattern. A negative Wits (BO anterior to AO) indicates a Class III pattern. It is used alongside ANB to assess sagittal skeletal discrepancy, especially in cases with non-standard Sella-Nasion orientation."},
    {"id":"ortho_33","type":"sba","stem":"A patient presents with a large upper midline diastema of 4 mm. The upper labial frenum attaches at the interdental papilla and shows blanching on stretching. What is the evidence-based management sequence?","options":["Frenectomy first, then orthodontic closure","Orthodontic closure first, then frenectomy if a fibre remnant is visible between the roots preventing closure","No treatment — midline diastemas always close spontaneously in adults","Composite bonding of the central incisors without orthodontic treatment","Extract the central incisors and place implants"],"correct":1,"explanation":"Evidence-based management of upper midline diastema with a prominent frenum: perform orthodontic closure first to bring the teeth together. If the space closes and there is residual fraenal tissue between the roots (visible on periapical radiograph as a 'notching' between the roots), a frenectomy is then performed (after orthodontic closure) to prevent relapse. Frenectomy before closure leaves scar tissue that impedes closure and provides no advantage."},
    {"id":"ortho_34","type":"sba","stem":"Which of the following appliances is designed to correct a posterior unilateral crossbite with a Class II molar relationship on the same side, using removable appliance mechanics?","options":["Twin block","Removable expansion plate with buccal springs","Quad helix with asymmetric activation","Modified reverse Twin block","Transpalatal arch"],"correct":2,"explanation":"A Quad helix (fixed palatal appliance) can be asymmetrically activated to expand only one side of the upper arch, correcting a unilateral posterior crossbite. It can also deliver some Class II correction. A removable expansion plate can also expand one side. A transpalatal arch maintains arch width but provides little expansion force. The Twin block corrects Class II overjet, not primarily crossbite."},
    {"id":"ortho_35","type":"sba","stem":"Which of the following is the most accurate method of determining bone age in orthodontic assessment to identify pubertal growth status?","options":["Dental age (stage of dental development)","Chronological age alone","Hand-wrist radiograph (cervical vertebral maturation stage) or cervical vertebral maturation on lateral cephalogram","Standing height measurement","Assessment of secondary sexual characteristics only"],"correct":2,"explanation":"Growth maturation (bone age) is most accurately assessed by skeletal indicators. The cervical vertebral maturation (CVM) method, assessed on the lateral cephalogram, is widely used in orthodontics (Baccetti et al.) as it requires no additional radiograph. Hand-wrist radiographs offer direct skeletal staging. Both identify the pubertal peak better than chronological age or dental age alone, informing the timing of functional appliance therapy."},
    {"id":"ortho_36","type":"sba","stem":"A temporary anchorage device (TAD) is planned to intrude an upper molar. Where is a TAD typically inserted in the maxilla to intrude a molar?","options":["In the palate, midline, between the first and second molar roots","In the buccal alveolus between the first and second molar roots (or between first molar and second premolar roots)","In the anterior alveolus between the central incisors","In the tuberosity region","In the maxillary sinus"],"correct":1,"explanation":"For molar intrusion or anchorage augmentation, TADs (mini-screws) are typically placed in the buccal alveolus between the roots of adjacent teeth (e.g. between the upper first and second molar roots, or between the second premolar and first molar roots). For total arch intrusion or distalization, the palatal midline (TADS or miniplates) is used. The TAD must avoid root contact; a PA radiograph confirms safe positioning."},
    {"id":"ortho_37","type":"sba","stem":"A patient's fixed appliance treatment is complicated by an upper right central incisor that is not moving as expected. The bracket seems to have debonded partially. What is the most important check the clinician should make?","options":["Increase the archwire force to overcome bracket resistance","Check the bracket is securely bonded to the tooth surface — a partially debonded bracket transmits no force and may rotate the tooth unfavourably","Change to a larger diameter archwire","Add a composite block to the bracket","Continue and review in 6 weeks"],"correct":1,"explanation":"A partially or fully debonded bracket no longer transmits controlled forces from the archwire to the tooth. The tooth may not move or may move in an unpredictable direction. The clinician must inspect all brackets at each visit to ensure full bonding. A debonded bracket should be rebonded promptly. Failure to detect this leads to prolonged treatment, unplanned tooth movements, and potential complications."},
    {"id":"ortho_38","type":"sba","stem":"An upper removable appliance (URA) is prescribed to procline a palatally displaced upper right central incisor. Which component provides the active force?","options":["Adams clasps","Posterior bite plane","Z-spring or double cantilever spring","Buccal acrylic retention","Labial bow"],"correct":2,"explanation":"A Z-spring (bihelical Z-spring) or double cantilever spring is placed palatally to the incisor on a URA and delivers a labial (proclinatory) force when activated. Adams clasps provide retention. A posterior bite plane opens the bite to allow the incisor to procline without occlusal interference (critical for incisor proclination). The labial bow provides anterior retention, not active force in this case."},
    {"id":"ortho_39","type":"sba","stem":"What is 'overbite' in dental terminology?","options":["The horizontal distance between the upper and lower incisal edges (measured parallel to the occlusal plane)","The vertical overlap of the upper incisors over the lower incisors (measured perpendicular to the occlusal plane)","The lateral overlap of buccal teeth in centric occlusion","The distance from the incisal edge of the upper central to the gingival margin","The vertical distance between the occlusal planes of upper and lower arches in lateral excursion"],"correct":1,"explanation":"Overbite is the vertical overlap of the upper incisors over the lower incisors, measured perpendicular to the occlusal plane. Average overbite is approximately 2–4 mm (or one-third to one-half crown coverage of the lower incisors). Overjet is the horizontal distance. A 'traumatic overbite' contacts palatal mucosa. An 'anterior open bite' has a negative overbite (the incisors do not overlap vertically)."},
    {"id":"ortho_40","type":"sba","stem":"A patient has completed orthodontic treatment and has a retained upper right primary lateral incisor with an absence of the permanent lateral incisor. What is the most appropriate long-term plan?","options":["Retain the primary lateral incisor as long as possible; when it is eventually lost, plan a replacement (implant or bridge)","Extract the primary lateral incisor immediately and provide a Maryland bridge","Leave the space empty","Use the primary incisor as a permanent bridge abutment","Extract and provide an immediate flipper denture only"],"correct":0,"explanation":"A retained primary lateral incisor in the absence of a permanent successor can serve as a natural space maintainer and functional tooth for many years. The evidence shows that well-maintained primary teeth can last into the 40s–50s. When it eventually fails, replacement with an implant (after growth completion) or adhesive/conventional bridge is planned. Extracting a healthy, functional primary tooth prematurely is unnecessary."},
    {"id":"ortho_41","type":"sba","stem":"Which of the following is NOT a recognised feature associated with Class III skeletal pattern?","options":["Retrusive maxilla (SNA below average)","Protrusive mandible (SNB above average)","Negative ANB angle","Negative Wits appraisal","Increased overjet (>4 mm)"],"correct":4,"explanation":"Class III malocclusion is associated with: retrusive maxilla, protrusive mandible, negative ANB angle, negative Wits appraisal, and a reverse overjet (negative overjet, where the lower incisors are anterior to the uppers). An INCREASED overjet (>4 mm, e.g. 9 mm) is a feature of Class II Division 1 malocclusion, not Class III."},
    {"id":"ortho_42","type":"sba","stem":"A 9-year-old presents with a developing Class II Division 1 malocclusion. Her lower incisors are biting into the palatal mucosa of the upper incisors (traumatic overbite). What is the priority treatment at this age?","options":["Full fixed appliance treatment to correct the Class II","Monitor and plan treatment at 12–13 years only","Place an upper removable appliance with anterior bite plane to immediately eliminate the traumatic overbite and reduce the risk of tissue damage, pending comprehensive treatment","Prescribe a mouthguard to wear during contact sports only","Extract upper first premolars to reduce overjet now"],"correct":2,"explanation":"A traumatic overbite causing palatal tissue damage requires immediate attention. An upper removable appliance with an anterior bite plane opens the overbite, immediately eliminating the trauma, and also allows the overjet to reduce (lower lip engages the palatal surface of the upper incisors). This is an interceptive measure. Comprehensive fixed appliance treatment is deferred until the permanent dentition. The bite plane may also facilitate spontaneous Class II improvement."},
    {"id":"ortho_43","type":"sba","stem":"A consent form for orthodontic treatment in an NHS orthodontic practice must include information about which of the following?","options":["The cost of private treatment only","Likely duration of treatment, risks (root resorption, decalcification, relapse), retention requirements, and the need for good oral hygiene throughout","A guarantee of a specific aesthetic outcome","Information about implant replacement if treatment fails","No specific information — verbal consent is sufficient"],"correct":1,"explanation":"Informed consent for orthodontic treatment (following Montgomery v Lanarkshire 2015 and GDC Standards) requires discussion of: material risks of treatment (root resorption, decalcification/WSLs, relapse, soft tissue effects), expected duration, alternative options (including no treatment), retention requirements and their long-term nature, and the patient's oral hygiene obligations. Written consent is best practice. No guarantee of specific outcomes should be given."},
    {"id":"ortho_44","type":"sba","stem":"A patient with a narrow maxillary arch and a crossbite that has been corrected with RME has a diastema open in the upper midline during the expansion phase. Why does this occur and what happens to it?","options":["It indicates the expansion is failing — stop treatment","The mid-palatal suture is opening (skeletal expansion); the diastema closes spontaneously within 3–6 months as the supra-crestal fibres pull the central incisors back together","The diastema is permanent — composite bonding is required immediately","The diastema indicates that the incisors were already spaced","The midline diastema is caused by the appliance pushing the incisors apart dentally"],"correct":1,"explanation":"During rapid maxillary expansion, the mid-palatal suture opens and a diastema appears between the upper central incisors. This is a positive sign that skeletal expansion is occurring. The diastema closes spontaneously within 3–6 months after the active expansion phase ends, as the supra-crestal periodontal fibres recoil. Patients and parents should be warned about this expected and temporary finding."},
