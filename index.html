    {"id":"restorative_52","type":"sba","stem":"A 40-year-old man has a lower molar with a large carious lesion involving the pulp. On investigation, the pulp is diagnosed as irreversibly inflamed. What is the definitive management?","options":["Direct pulp cap with calcium hydroxide","Indirect pulp cap","Root canal treatment (pulpectomy) or extraction","Prescribe antibiotics and review","Vital pulpotomy with MTA"],"correct":2,"explanation":"Irreversible pulpitis (persistent spontaneous or severe cold-triggered pain lasting >30 seconds after stimulus removed) indicates that the pulp cannot recover. The only definitive treatment options are root canal treatment (pulpectomy) or extraction of the tooth. Pulp capping cannot reverse irreversible pulpitis — the inflamed pulp will progress to necrosis regardless. Antibiotics do not treat irreversible pulpitis (no bacterial infection to address in the pulp at this stage)."},
    {"id":"restorative_53","type":"sba","stem":"A 30-year-old man has proximal caries affecting the contact between the upper right first and second premolars. The lesion on the first premolar is at the outer dentine on the radiograph (D1). Both teeth are vital with no symptoms. What is the first-line management for the D1 dentinal lesion according to minimally invasive principles?","options":["Restore with composite resin immediately","Extract both teeth","Non-operative treatment: separate the teeth with flossing and applying fluoride varnish or a sealant interproximally","Place an amalgam restoration","Review in 6 months without any intervention"],"correct":2,"explanation":"A D1 dentinal lesion on an interproximal surface is early dentinal involvement and may be amenable to non-operative management. Techniques include: improving contact point to allow fluoride access (orthopaedic/interproximal wedges or orthodontic separators), applying fluoride varnish interproximally, and optimising oral hygiene. Some studies support placement of interproximal resin sealants or ICON resin infiltration. Non-surgical intervention can arrest D1 lesions in adults. Operative treatment is indicated for D2 (middle dentine) or cavitated lesions."},
    {"id":"restorative_54","type":"sba","stem":"A patient presents with a class V cavity on the buccal of a lower canine, which has a scalloped cavosurface margin, is not associated with caries, and shows a smooth 'scooped' appearance. The patient is a heavy tooth-brusher. What is the correct aetiology classification?","options":["Erosion","Abrasion","Attrition","Abfraction","Combined erosion-abfraction"],"correct":1,"explanation":"Abrasion is mechanical wear from an extrinsic agent — in this case, traumatic toothbrushing with a hard-bristled brush. Classic features: smooth, polished, scooped-out cervical lesion on the buccal surfaces of teeth exposed to brushing. The canine and premolar are most commonly affected due to the prominence of these teeth. Attrition affects occlusal/incisal surfaces (tooth-to-tooth contact). Erosion produces a more glossy, cupped appearance from acid. Abfraction (from occlusal loading) is controversial and the lesion would not have a smooth polished appearance."},
    {"id":"restorative_55","type":"sba","stem":"A 55-year-old man has a fractured upper left first molar with the fracture line running below the gingival margin mesiodistally, and the tooth is endodontically treated. On probing, the fracture communicates with the gingival sulcus. What is the most likely prognosis?","options":["Good prognosis with crown lengthening and crown","Hopeless prognosis — extraction is indicated","Reasonable prognosis with post and core and crown","Fair prognosis with bonded composite and crown","Prognosis is the same as a vertical root fracture"],"correct":1,"explanation":"A fracture line that communicates with the gingival sulcus (subgingival fracture) on an endodontically treated tooth has a hopeless prognosis. The fracture below the bone crest cannot be restored with an adequate ferrule, and an attached fractured segment creates a nidus for infection, irreversible periodontal destruction, and bone loss. Crown lengthening to expose the margin would further compromise the crown-to-root ratio. The tooth should be extracted and the space managed with an implant or bridge."},
    {"id":"restorative_56","type":"sba","stem":"A 22-year-old student presents requesting composite bonding on her upper anterior teeth to improve their appearance. She reports no specific complaints but on examination, her upper teeth show mild generalised erosion. What is the priority before placing composite?","options":["Commence composite bonding immediately as the patient is young","Identify and manage the cause of erosion (dietary, GORD, bulimia) before placing restorations","Extract teeth and provide veneers","Prescribe fluoride supplements first","Wait until the teeth have erupted completely"],"correct":1,"explanation":"Placing composite veneers on eroded teeth without identifying and managing the aetiology is inappropriate, as the restorations will fail rapidly if the erosive challenge continues. The first step is to identify the cause (dietary acid, GORD, eating disorder) through detailed history-taking, and implement preventive measures (diet modification, acid reflux management, fluoride). Once the condition is stable, restorative treatment can be planned. This aligns with the 'prevention before restoration' principle and the minimally invasive approach."},
    {"id":"restorative_57","type":"sba","stem":"A 65-year-old man presents with generalised moderate tooth surface loss. Occlusal examination shows faceting on the incisal edges of anterior teeth and flattening of posterior cusps, with a glossy appearance on the occlusal surface of lower molars. The upper palatal surfaces are intact. What is the most likely primary aetiology?","options":["Extrinsic erosion from acidic diet","Bruxism-associated attrition","Intrinsic erosion from GORD","Abrasion from hard-bristle toothbrushing","Abfraction from parafunctional clenching"],"correct":1,"explanation":"Attrition is mechanical wear from tooth-to-tooth contact. Features: faceting on incisal edges and flattening of cusps, with matching wear facets on opposing teeth. The glossy appearance of worn dentine is characteristic. Upper palatal surfaces being intact helps exclude intrinsic erosion. Bruxism (nocturnal or diurnal grinding) is the most common cause of generalised attrition. Management: occlusal splint to protect remaining tooth structure from further wear, followed by restorative treatment if clinically indicated."},
    {"id":"restorative_58","type":"sba","stem":"A 40-year-old man requires crown preparation of an upper right central incisor. Shoulder preparation is planned. What is the recommended total convergence angle (taper) for a crown preparation?","options":["0° (no taper — parallel walls)","2° total convergence","6° total convergence per wall (12° total)","20° total convergence","5–6° per side (10–12° total)"],"correct":3,"explanation":"The ideal crown preparation taper is 5–6° per wall (total 10–12° convergence angle). This provides retention (sufficient parallelism) while allowing the crown to be seated without binding and allowing adequate thickness of material. Zero taper is technically impossible and would prevent crown seating. Too much taper (>30° total) reduces retention significantly. Taper of 10–12° total is achievable clinically and balances retention with material thickness and seating. Each wall should taper 5–6° from the line of draw."},
    {"id":"restorative_59","type":"sba","stem":"A 50-year-old woman has a class I amalgam on an upper right first premolar that has been in place for 20 years. The amalgam appears intact with no marginal failure on examination. The patient asks if it should be replaced. What is the most appropriate advice?","options":["Replace it immediately as amalgam is toxic","Monitor it; intact amalgam with no secondary caries or structural failure does not require replacement","Replace with a composite restoration as a routine upgrade","Replace as all amalgam restorations over 10 years must be changed","Remove it as part of a standard 'amalgam-free' practice policy"],"correct":1,"explanation":"An intact amalgam with no secondary caries, no fractures, and no structural failure should be monitored rather than replaced. Unnecessary replacement increases the risk of pulp damage, caries under the restoration, loss of tooth structure, and does not improve patient outcomes. GDC Standards and evidence-based guidelines advise against prophylactic replacement of functional restorations. Amalgam can be safely retained until it fails clinically. Replacement should be based on clinical need, not the restoration material or age alone."},
    {"id":"restorative_60","type":"sba","stem":"A 35-year-old woman presents with a class IV fracture of her upper left central incisor following trauma. The fracture involves the mesial incisal angle. The tooth is vital and the pulp is not exposed. She requests the most aesthetic and conservative restoration. What is the ideal restoration?","options":["Extract the tooth and place an implant","Full ceramic crown immediately","Acid-etch retained composite resin restoration","Resin-retained bridge","Porcelain laminate veneer"],"correct":2,"explanation":"Acid-etch retained direct composite resin is the most conservative and appropriate first-line restoration for a non-exposed class IV incisal fracture. Modern composites (micro-hybrid or nanofilled) can achieve excellent aesthetics when shade and translucency are carefully matched. The technique is reversible, preserves tooth structure, and is immediately available. A porcelain veneer or crown should be deferred until the patient is older and the pulp has receded, and is only indicated if composite fails or the patient requests definitive ceramic restoration."}
  ],
  endo: [
    {"id":"endo_1","type":"sba","stem":"A 38-year-old woman presents with a tooth that responds to cold with a sharp pain lasting 2–3 seconds and then disappears completely. There is no spontaneous pain. What is the most likely pulpal diagnosis?","options":["Normal pulp","Reversible pulpitis","Irreversible pulpitis","Pulp necrosis","Previously treated"],"correct":1,"explanation":"Reversible pulpitis produces a sharp, exaggerated pain response to thermal stimuli that resolves within seconds of stimulus removal. The pulp retains the capacity to heal if the cause (caries, exposed dentine) is removed. Irreversible pulpitis produces pain that lingers for >30 seconds after the cold stimulus is removed. Normal pulp gives a brief, mild response. Management: remove the cause (caries, replace faulty restoration) and monitor."},
    {"id":"endo_2","type":"sba","stem":"A 45-year-old man reports spontaneous, severe, lingering pain from the lower right quadrant that wakes him at night and is exacerbated by lying down. Cold makes the pain worse and it persists for over a minute. He cannot localise the pain precisely. What is the pulpal diagnosis?","options":["Normal pulp","Reversible pulpitis","Symptomatic irreversible pulpitis","Pulp necrosis","Previously treated (symptomatic apical periodontitis)"],"correct":2,"explanation":"Symptomatic irreversible pulpitis features spontaneous pain (often worse at night and when supine due to increased pulp pressure), lingering cold pain (>30 seconds), and difficulty localising the tooth. The pulp is inflamed beyond the point of recovery. Management is root canal treatment or extraction. The severity and spontaneous nature distinguish it from reversible pulpitis."},
    {"id":"endo_3","type":"sba","stem":"A 50-year-old woman has a tooth that gives no response to cold or EPT. Periapical radiograph shows slight widening of the apical PDL space with no visible periapical radiolucency. She has no spontaneous pain or tenderness to percussion. What is the most likely diagnosis?","options":["Normal pulp","Reversible pulpitis","Symptomatic irreversible pulpitis","Pulp necrosis — asymptomatic apical periodontitis","Condensing osteitis"],"correct":3,"explanation":"No response to vitality testing (cold and EPT) combined with widening of the apical PDL indicates pulp necrosis with early asymptomatic apical periodontitis. The widened PDL represents an early inflammatory response at the apex before a frank periapical radiolucency develops. Management is root canal treatment. It is important to use both cold testing and EPT — false negatives occur with EPT in recently traumatised or fully calcified teeth."},
    {"id":"endo_4","type":"sba","stem":"A patient presents with acute pain and swelling from a lower left molar. Periapical radiograph shows a well-defined periapical radiolucency with a corticated margin. The tooth does not respond to cold or EPT and is extremely tender to percussion. What is the most likely diagnosis?","options":["Symptomatic irreversible pulpitis","Symptomatic apical periodontitis with acute apical abscess","Dentigerous cyst","Periapical cemento-osseous dysplasia","Condensing osteitis"],"correct":1,"explanation":"A non-vital tooth (no response to EPT/cold) with extreme tenderness to percussion and an established periapical radiolucency indicates symptomatic apical periodontitis, likely with an acute apical abscess (given the swelling). The corticated margin of the radiolucency suggests a chronic lesion that has acutely flared. Management: drainage (via access cavity or incision), root canal treatment, or extraction."},
    {"id":"endo_5","type":"sba","stem":"A 30-year-old non-smoker has a periapical radiolucency associated with a lower molar. The tooth is non-vital and has no symptoms. Which factors most reliably indicate a successful outcome following root canal treatment, based on the evidence?","options":["Young patient age and female sex","Absence of pre-operative periapical lesion and complete obturation to within 0–2 mm of the radiographic apex","Presence of a pre-existing periapical lesion always predicts failure","Using calcium hydroxide inter-appointment medicament for exactly 4 weeks","Use of a single-visit protocol"],"correct":1,"explanation":"The two factors most consistently associated with root canal treatment success are: (1) absence of a pre-operative periapical lesion (teeth without apical periodontitis have success rates of ~90–95% vs ~80–85% for those with lesions) and (2) adequate obturation quality — fills within 0–2 mm of the radiographic apex with dense, void-free fill. Technical factors (taper, file choice, single vs multi-visit) have less impact on outcome than these two core factors."},
    {"id":"endo_6","type":"sba","stem":"A 35-year-old man requires root canal treatment on a lower right first molar. How many canals should be anticipated in this tooth?","options":["One canal","Two canals","Three canals","Three to four canals","Five canals"],"correct":3,"explanation":"The lower first molar typically has 3–4 canals: the mesial root contains 2 canals (mesio-buccal and mesio-lingual) and the distal root usually has 1–2 canals (a second distal canal, DB, is present in approximately 40% of cases). A second mesiobuccal canal in the mesial root is found in over 90% of cases. Clinicians should always search for an additional distal canal using magnification (dental loupes/microscope) and CBCT if doubt exists. Missing a canal is a common cause of RCT failure."},
    {"id":"endo_7","type":"sba","stem":"A 28-year-old woman has an upper right first molar requiring root canal treatment. The palatal root canal is long, straight, and wide. Which file size represents the appropriate taper for shaping the palatal canal to ISO standards using a conventional technique?","options":["ISO 15 with 2% taper","ISO 20 with 4% taper","ISO 25 with 4% taper — or NiTi rotary with equivalent taper","Apical preparation to ISO 45 with 4% taper","ISO 08 hand file only"],"correct":2,"explanation":"The apical preparation size should be selected based on initial apical file (IAF) size and canal anatomy. For a wide palatal canal with an initial binding file typically at ISO 25–30, appropriate taper preparation with NiTi rotary files (e.g. ProTaper Next X3, F3 at ISO 30.09 taper) is appropriate. Regardless of system, the goal is a continuously tapered shape with a confirmed apical stop, clean apical third, and adequate space for irrigation. Modern reciprocating or rotary systems typically achieve ISO 25 apical at 0.08 or 0.06 taper."},
    {"id":"endo_8","type":"sba","stem":"A dentist is irrigating root canals during RCT. Which irrigant has the best evidence for dissolving organic debris (necrotic pulp tissue) and eliminating endodontic bacteria including biofilm?","options":["Sterile saline","2% chlorhexidine gluconate","0.9% EDTA","Sodium hypochlorite (NaOCl) 1–5.25%","Hydrogen peroxide 3%"],"correct":3,"explanation":"Sodium hypochlorite (NaOCl) at 1–5.25% is the irrigant of choice and the most evidence-based for: (1) dissolving organic tissue (the only irrigant that does so), (2) broad-spectrum antimicrobial activity including Enterococcus faecalis, and (3) biofilm disruption. EDTA is used as a final rinse to chelate calcium and remove the smear layer. Chlorhexidine provides good antimicrobial properties but does NOT dissolve tissue and can form carcinogenic precipitate (PHMB) when mixed with NaOCl. Final rinse protocol: NaOCl then EDTA."},
    {"id":"endo_9","type":"sba","stem":"During root canal treatment of an upper central incisor, sodium hypochlorite is inadvertently injected beyond the apex. The patient immediately experiences severe pain, swelling, and ecchymosis spreading into the face. What is this complication called and what is the immediate management?","options":["Irreversible pulpitis flare — prescribe antibiotics","NaOCl accident — immediate referral to A&E, IV corticosteroids, ice packs, and document in notes","Normal post-operative swelling — reassure","Dental abscess — incise and drain","Allergic reaction — administer adrenaline IM"],"correct":1,"explanation":"A sodium hypochlorite accident (hypochlorite extrusion beyond the apex) is a serious complication causing immediate severe pain, oedema, haemorrhage/ecchymosis, tissue necrosis, and potential airway compromise. Immediate management: stop irrigation, remove rubber dam, reassure patient, assess airway, apply ice packs to cheek, prescribe analgesics and corticosteroids (oral/IV), and urgent hospital referral if significant swelling. Document carefully in notes. Secondary infection with antibiotics and surgical debridement may follow. This is a serious incident requiring RIDDOR reporting if airway compromised."},
    {"id":"endo_10","type":"sba","stem":"The 'working length' in root canal treatment refers to what measurement?","options":["The full radiographic length of the root","The distance from a reference point on the crown to the apical constriction (CDJ) where the canal preparation and obturation should terminate","The length of the largest file that binds in the canal","The distance from the apex to the occlusal surface","The length of the gutta-percha master cone"],"correct":1,"explanation":"Working length (WL) is the distance from a coronal reference point to the apical terminus of canal preparation — the cemento-dentinal junction (CDJ), typically located approximately 0.5–1.0 mm short of the radiographic apex. Establishment of accurate WL is critical: over-preparation causes periapical tissue damage; under-preparation leaves infected tissue. WL is determined using electronic apex locators (EAL) and confirmed with a periapical radiograph. EALs are accurate to within 0.5 mm in the majority of cases."},
    {"id":"endo_11","type":"sba","stem":"A root-filled lower molar is reviewed at 12 months. The preoperative periapical radiolucency has not changed in size on the periapical radiograph. What should be the management?","options":["Declare the case a failure and extract immediately","Continue to monitor for a further 12 months — complete resolution can take up to 4 years","Retreat immediately as 12-month non-resolution means failure","Prescribe 6 weeks of amoxicillin","Place a crown immediately to prevent fracture"],"correct":1,"explanation":"Periapical healing following root canal treatment is a slow process. The ESE guidelines state that a case should not be declared a failure until 4 years of follow-up, as complete periapical healing can take this long. At 12 months, an unchanged lesion is not a failure — it should be monitored. Retreatment or surgery is only considered if: symptoms recur, the lesion increases in size, or there is no improvement after 4 years of optimal treatment. Annual radiographic review is recommended."},
    {"id":"endo_12","type":"sba","stem":"A lower left second premolar requires root canal treatment. On access preparation, only one canal orifice is identified. The cross-section of the root at mid-level on CBCT shows an oval-shaped canal. What instrument type is most suitable for cleaning an oval or C-shaped canal?","options":["Standard stainless steel hand files only","Reciprocating single-file systems with supplementary ultrasonic irrigation","Large round burs","Passive ultrasonic irrigation (PUI) with adjunctive XP-Endo finisher or canal brush","Single-visit NaOCl irrigation with no mechanical instrumentation"],"correct":3,"explanation":"Oval and C-shaped canals have fins, isthmuses, and recesses that cannot be adequately cleaned by rotary files alone, as files only contact approximately 40% of the canal wall. Supplementary techniques including passive ultrasonic irrigation (PUI), sonic irrigation (EndoActivator), and adjunctive instruments such as the XP-Endo Finisher (which expands beyond its master taper) are essential for debris removal from fins and lateral recesses. Thorough NaOCl irrigation combined with these techniques significantly improves cleaning efficacy."},
    {"id":"endo_13","type":"sba","stem":"What is the purpose of EDTA irrigation in root canal treatment?","options":["Primary antimicrobial agent — more effective than NaOCl for killing bacteria","Tissue dissolution — equivalent to NaOCl","Smear layer removal (decalcification of inorganic component) and dentinal tubule opening to allow deeper penetration of disinfectants","Lubrication of hand files only","Bleaching of root-stained dentine"],"correct":2,"explanation":"EDTA (ethylenediaminetetraacetic acid) is a chelating agent used as a final rinse after NaOCl irrigation to remove the smear layer — a 1–2 µm layer of cut dentine, organic debris, and bacteria that occludes the dentinal tubules. Removing the smear layer opens dentinal tubules and exposes intracanal bacteria deeper in the dentine, improving the antimicrobial efficacy of the final NaOCl rinse and improving adhesion of the root canal sealer. EDTA and NaOCl should not be mixed directly as they inactivate each other."},
    {"id":"endo_14","type":"sba","stem":"A patient returns for obturation following root canal preparation. The master apical file was a size 30 at 2% taper. Which gutta-percha cone size is selected as the 'master cone' using the standard taper technique?","options":["Non-standardised size 20 GP cone","Standardised ISO 30 GP cone that snugs at the working length","Non-standardised large GP cone selected by trial","Any cone that fits without tugback","Pre-fitted cone thermoplasticised to the canal"],"correct":1,"explanation":"The master cone is selected to match the master apical file (MAF). For a size 30 MAF, a standardised ISO 30 GP cone is tried in the canal to confirm 'tugback' — resistance to withdrawal — at the working length. This confirms the cone seats to the correct depth. If there is no tugback, the cone is too small. The master cone is then fitted with sealer and condensed (cold lateral condensation) or thermoplasticised. Matching cone size to MAF ensures a well-adapted apical seal."},
    {"id":"endo_15","type":"sba","stem":"A 35-year-old man has a tooth with an immature open apex (blunderbuss canal) requiring root canal treatment due to pulp necrosis. Which technique is used to create an apical barrier to allow subsequent obturation?","options":["Over-instrumenting to create an apical seat","Placing calcium hydroxide dressing long-term for apexification (months to years)","Apexification using MTA (mineral trioxide aggregate) or Biodentine to create an immediate apical barrier","Thermoplasticised gutta-percha injected beyond the apex","Surgical apicoectomy first"],"correct":2,"explanation":"For necrotic teeth with immature open apices, MTA apexification creates an immediate apical barrier in a single or two-visit technique. MTA (or Biodentine) is packed to the apex under direct vision, creating a biocompatible apical plug that allows immediate obturation. This has largely replaced the traditional long-term calcium hydroxide apexification (which took 6–18 months to form an apical barrier and weakened the root through dehydration). Revascularisation/regenerative endodontics is the preferred treatment in younger patients to allow continued root development."},
    {"id":"endo_16","type":"sba","stem":"Regenerative endodontic procedures (REPs) are indicated in which clinical scenario?","options":["Mature apex with established periapical lesion","Necrotic immature permanent teeth in young patients (typically under 18) where continued root development is desired","Post-RCT retreatment of failed cases","Symptomatic irreversible pulpitis with closed apex","Teeth with perforation in the coronal third"],"correct":1,"explanation":"Regenerative endodontic procedures (REPs, formerly 'revascularisation') are indicated for immature permanent teeth with pulp necrosis (often from trauma or extensive caries) in young patients, where the goal is to continue root development (apexogenesis) by stimulating ingrowth of vital tissue from the periapical area into the disinfected canal space. The protocol involves disinfection with antibiotics (double antibiotic paste: ciprofloxacin + metronidazole, or calcium hydroxide) followed by blood clot stimulation, MTA coronal seal, and crown restoration."},
    {"id":"endo_17","type":"sba","stem":"During root canal treatment, a nickel-titanium (NiTi) rotary file separates within the root canal at the apical third. The fragment cannot be bypassed or removed. The tooth has a small periapical radiolucency. What is the most important prognostic factor?","options":["The brand of NiTi file used","The length of the separated fragment","Whether the canal was adequately disinfected before separation (bacterial load at time of separation)","The patient's age","The crown-to-root ratio of the tooth"],"correct":2,"explanation":"The prognosis after instrument separation depends primarily on the state of infection at the time of separation: if the canal was adequately disinfected before the instrument broke (in a clean canal), the prognosis is similar to a normally treated case. If the instrument separates in an infected canal with residual biofilm beyond it, the prognosis is significantly worse. File position (apical vs coronal) and pre-existing periapical pathology are also important. Many separated instruments can be left in situ if the canal was clean and the tooth is asymptomatic."},
    {"id":"endo_18","type":"sba","stem":"A 45-year-old woman has a previously root-treated upper right central incisor with a persistent draining sinus and periapical radiolucency. Re-examination shows the obturation is short of the apex by 4 mm with a void in the apical third. Non-surgical retreatment is planned. What is the priority when attempting to remove the existing gutta-percha?","options":["Use Gates Glidden burs immediately","Use chloroform or Endosolv to dissolve the GP, combined with H-files to remove the softened material","Drill through the GP with a rotary file without solvents","Surgically remove without retreatment","Leave the GP and seal over the coronal third only"],"correct":1,"explanation":"Non-surgical retreatment begins with removal of the existing GP using a combination of heat (Gates Glidden or warm plugger to soften the coronal portion), chemical solvents (chloroform, xylene, or commercial solvents like Endosolv) to dissolve the GP in the mid and apical third, and hand files to mechanically remove the softened material. This allows access to the full working length for retreatment. Chemical solvents should be used sparingly to avoid solvent extrusion. After GP removal, the canal is reshaped, disinfected, and re-obturated."},
    {"id":"endo_19","type":"sba","stem":"What is the main purpose of using calcium hydroxide as an inter-appointment intracanal medicament?","options":["To permanently obturate the canal","To increase the pH of the root canal and surrounding periapical tissues, providing antimicrobial action and potential stimulation of hard tissue formation","To replace irrigation and remove the smear layer","To dissolve necrotic tissue equivalent to NaOCl","To anaesthetise the residual pulp tissue"],"correct":1,"explanation":"Calcium hydroxide (Ca(OH)2) is the most widely used inter-appointment medicament. Its mechanism: high pH (~12.5) inhibits bacterial enzymes, kills most endodontic bacteria, and neutralises the lipopolysaccharide of gram-negative bacteria. It may also stimulate periapical hard tissue repair. It is most effective when placed in contact with the apical tissues. Limitations: it is less effective against E. faecalis (which can survive high pH), so irrigation with NaOCl/CHX is still essential. Typical inter-appointment period: 1–4 weeks."},
    {"id":"endo_20","type":"sba","stem":"A 60-year-old man has a root-treated upper left lateral incisor that continues to cause discomfort 18 months after apparently technically adequate RCT. Periapical radiograph shows a persisting radiolucency. Non-surgical retreatment has already been performed once. What is the next step?","options":["Extract immediately","Prescribe long-term antibiotics","Periapical surgery (apicectomy with retrograde root-end filling using MTA)","Place a post and crown without further investigation","Monitor for another 4 years"],"correct":2,"explanation":"Periapical surgery (apicectomy) is indicated when non-surgical treatment has been performed to a high standard and the periapical lesion persists, or when non-surgical retreatment is not possible (post or calcified canal). The procedure involves: raising a mucoperiosteal flap, resecting the root apex (3 mm), examining the resected surface under magnification, preparing a root-end cavity (3 mm depth) with ultrasonic retrograde tips, and placing MTA or Biodentine as a retrograde seal. Success rates are 85–90% at 1 year for primary apicectomy."},
    {"id":"endo_21","type":"sba","stem":"During access cavity preparation for an upper first molar, the dentist must identify the orifices of all four canals. How many canals does the upper first molar typically have?","options":["Two canals (mesiobuccal and palatal)","Three canals (mesiobuccal, distobuccal, palatal)","Three to four canals (MB1, MB2, DB, palatal)","Five canals","One oval canal only"],"correct":2,"explanation":"The upper first molar most commonly has 3 roots and 3–4 canals: mesiobuccal root (MB1 always present, MB2 present in approximately 55–95% of cases depending on the study), distobuccal (DB), and palatal. The MB2 canal is the most commonly missed canal in endodontics — its orifice is located approximately 1–2 mm palatal and mesial to MB1. Magnification (loupes or microscope) and CBCT are helpful for locating MB2. Failure to identify MB2 is a frequent cause of RCT failure in upper molars."},
    {"id":"endo_22","type":"sba","stem":"A 40-year-old man presents with a swelling on the buccal gingiva adjacent to the upper right canine. The swelling is soft and discharges on probing. The canine is non-vital. The periapical radiograph shows a periapical radiolucency and a separate radiopaque shadow over the root. What is the radiopaque shadow most likely to be?","options":["A calcified pulp stone","A fragment of separated instrument","A condensing osteitis","A periapical cemental dysplasia","A superimposed bony structure (e.g. zygomatic buttress)"],"correct":4,"explanation":"The zygomatic buttress (or arch) frequently overlies the apices of the upper premolar and molar teeth on periapical radiographs, creating a confusing radiopaque shadow that can be mistaken for a pathological entity or foreign body. Careful geometric analysis, cone shift techniques, or CBCT can distinguish anatomical overlays. Pulp stones appear within the pulp chamber; condensing osteitis appears around the apex as diffuse sclerosis. For upper canine, the nasal floor and anterior wall of the maxillary sinus may also overlap."},
    {"id":"endo_23","type":"sba","stem":"A lower left molar has acute periapical abscess with buccal swelling and sinus tract. The patient is systemically well (apyrexial, no trismus). What is the definitive treatment?","options":["Antibiotics alone for 5 days","Surgical drainage through the skin","Drainage via root canal access with irrigation (debridement), or extraction — with antibiotics only if systemic signs exist","Incision and drainage of the swelling only","Systemic corticosteroids"],"correct":2,"explanation":"The definitive management of a dental abscess is source control: drainage via the root canal (access preparation and instrumentation) to decompress and drain the abscess, combined with root canal treatment or extraction. Antibiotics alone are not effective without drainage and are not routinely indicated for a localised abscess in a systemically well patient (SDCEP guidance). Antibiotics should only be prescribed if systemic signs are present (fever >38°C, cervical lymphadenopathy, facial swelling outside the alveolar area)."},
    {"id":"endo_24","type":"sba","stem":"A periapical radiograph shows a lower first premolar with a root canal filling that extends 3 mm beyond the radiographic apex. The patient reports severe pain since the treatment was completed last week. What is the most likely complication?","options":["Condensing osteitis","Post-obturation flare-up from over-instrumentation only","Extrusion of gutta-percha and sealer beyond the apex causing a foreign body reaction and periapical periodontitis","Normal post-operative sensitivity","Hypersensitivity to the sealer material"],"correct":2,"explanation":"Overfilling (obturation material beyond the apex) causes persistent periapical pain due to: mechanical irritation of the periapical tissues by extruded GP, foreign body reaction, and chemical irritation from extruded sealer (especially zinc oxide eugenol sealers). Some sealers (e.g. Sealapex, AH Plus) are better tolerated than ZOE when extruded. In most cases, the pain resolves over weeks to months as the material is resorbed or encapsulated. Persistent symptoms or a persisting large extruded mass may require surgical removal."},
    {"id":"endo_25","type":"sba","stem":"What is the function of rubber dam isolation during root canal treatment?","options":["Primarily to improve visibility only","To prevent aspiration/ingestion of instruments and irrigants, maintain a sterile field, retract soft tissues, and improve access and visibility","To prevent patient from moving their tongue","To prevent the NaOCl from working","To prevent post-operative infection"],"correct":1,"explanation":"Rubber dam is mandatory for root canal treatment (GDC, ESE, and RCS(Eng) guidelines) because it: (1) prevents aspiration or ingestion of endodontic instruments (a serious safety incident), (2) prevents swallowing of sodium hypochlorite or other irrigants, (3) maintains a sterile field preventing salivary contamination of the canal, (4) provides tissue retraction improving access, and (5) protects the patient's oral tissues from NaOCl. It is not optional. Failure to use rubber dam for RCT is a departure from the standard of care."},
    {"id":"endo_26","type":"sba","stem":"A 38-year-old woman requires root canal treatment on an upper premolar with two canals. After preparation and obturation, a crown is placed. What type of post, if required, provides the best mechanical and biological outcome for this tooth?","options":["Large-diameter metal cast post maximising retention","Parallel-sided metal post as large as the canal allows","Fibre-reinforced composite (FRC) post with composite core, where the elastic modulus matches dentine","Threaded stainless steel post for maximum retention","No post is ever needed in premolars"],"correct":2,"explanation":"Fibre-reinforced composite (FRC) posts have an elastic modulus (approximately 40 GPa) similar to dentine (approximately 18 GPa), stress-distributing along the root rather than concentrating stresses at the apex (as rigid metal posts do). This reduces the risk of catastrophic root fracture — the most common cause of tooth loss with metal posts. When root fracture does occur with FRC posts, it is more likely to be a reparable coronal fracture. FRC posts are cemented adhesively, distributing load through the post, resin cement, and dentine as a single unit."},
    {"id":"endo_27","type":"sba","stem":"A 22-year-old man suffered a blow to his upper right central incisor 3 years ago. The tooth is now non-vital with a widely open apex. On the periapical radiograph, the apical foramen is >1 mm wide (blunderbuss canal). Which material is placed as an apical barrier before obturation?","options":["Calcium hydroxide only","Gutta-percha thermoplasticised","Mineral trioxide aggregate (MTA) or Biodentine to 3–4 mm thickness as an apical plug","Zinc oxide eugenol cement","Glass ionomer cement"],"correct":2,"explanation":"For open apex management (apexification), MTA or Biodentine is placed as a 3–4 mm apical plug under magnification. MTA has excellent biocompatibility, high pH (12.5), sealing ability, and stimulates cementum formation. It sets in the presence of moisture. Once set (minimum 4 hours for MTA — place a moist cotton pellet, re-enter next visit), the canal is backfilled with thermoplasticised GP. Biodentine can be used as a single-visit technique. Both materials have superior outcomes to long-term calcium hydroxide apexification."},
    {"id":"endo_28","type":"sba","stem":"During root canal treatment of a lower first molar, an instrument is used in the mesial root that suddenly separates at the midroot level. The separated fragment is 5 mm long and is in the coronal third of the canal. What is the most appropriate next step?","options":["Abandon treatment and extract immediately","Attempt to bypass the fragment with a small hand file (size 6–8) using copious NaOCl, then attempt removal with ultrasonic tips under magnification","Continue rotary instrumentation through the fragment","Prescribe antibiotics and close the cavity","Attempt removal with a Masserann kit immediately without magnification"],"correct":1,"explanation":"When an instrument separates in the coronal third, the prognosis for removal is better than for deeper fragments. The first attempt should be to bypass the fragment using small hand files (size 6–8) with copious irrigation. If bypassed, the fragment may be loosened and then removed using ultrasonic tips (under magnification/microscope) which vibrate the fragment without removing dentine from the canal wall. The Masserann technique (micro-tube and extractor) is a second-line approach. Decisions are guided by root anatomy (curved canals are higher risk for perforation during fragment removal)."},
    {"id":"endo_29","type":"sba","stem":"A 48-year-old man has external inflammatory root resorption at the mid-third of the root of an upper left central incisor following trauma 10 years ago. The tooth is currently asymptomatic. What is the first-line treatment?","options":["Extract immediately — all EIRR lesions are untreatable","Root canal treatment with calcium hydroxide long-term dressing to arrest resorption, followed by obturation","Surgical removal of resorptive tissue from the outside","Prescribe systemic bisphosphonates","No treatment required — external resorption is always self-limiting"],"correct":1,"explanation":"External inflammatory root resorption (EIRR) occurs when infected necrotic pulp tissue drives inflammation through dentinal tubules to stimulate osteoclastic resorption of the root surface. First-line treatment is root canal treatment to remove the source of inflammation (infected pulp), followed by long-term calcium hydroxide dressing (which diffuses through dentine to raise periradicular pH and inhibit osteoclasts). After arrest is confirmed radiographically, the canal is obturated. Without treatment, EIRR progresses rapidly and can cause tooth loss."},
    {"id":"endo_30","type":"sba","stem":"A 30-year-old woman has replacement (ankylotic) root resorption of an upper central incisor following avulsion and replantation at age 25. The tooth appears infraoccluded. What does replacement resorption indicate?","options":["The pulp is still vital","The tooth is infected and needs RCT","The root is being progressively replaced by bone (ankylosis); eventual loss is inevitable but the tooth may be retained for several years","The resorption can be reversed with MTA","The tooth should be extracted immediately before more bone is lost"],"correct":2,"explanation":"Replacement resorption (ankylosis/dentoalveolar ankylosis) occurs when the PDL is damaged (e.g. after avulsion with prolonged extra-oral dry time) and alveolar bone fuses directly to the root surface. The tooth becomes progressively infraoccluded as surrounding bone grows normally while the ankylosed tooth does not. The root is gradually replaced by bone. This is irreversible — there is no treatment. However, the tooth can be retained for several years to preserve bone volume and allow facial development to continue, particularly in children/young adults, delaying implant placement."},
    {"id":"endo_31","type":"sba","stem":"Which of the following is most characteristic of internal resorption on a periapical radiograph?","options":["Radiolucency at the apex of the tooth","Asymmetric widening of the periodontal ligament space","Uniform ovoid expansion of the root canal space from within, with smooth margins, moving with the canal on angled radiographs","Diffuse periapical radiolucency with loss of lamina dura","Horizontal bone loss adjacent to the root"],"correct":2,"explanation":"Internal resorption (idiopathic internal resorption, rare) presents as a smooth, ovoid radiolucent expansion of the root canal, visible within the root — the lesion moves with the tooth on parallax radiographs (unlike external resorption which does not). It results from metaplasia of pulp tissue to granulation tissue with osteoclastic activity. Diagnosis: CBCT. Treatment: RCT (removes the granulation tissue that drives resorption). If the canal wall is perforated, MTA is used to seal the perforation."},
    {"id":"endo_32","type":"sba","stem":"A 55-year-old woman presents with a 'cracked tooth' in the lower right molar. She reports pain on chewing specific foods and occasional sharp pain on biting. The crack runs mesio-distally through the floor of the pulp chamber. On probing, a 7 mm pocket is detected along the crack. What is the prognosis?","options":["Excellent with cusp coverage restoration","Good with root canal treatment and crown","Poor to hopeless — crack extending to the furcation or into the root results in tooth loss","Uncertain — monitor for 6 months before deciding","Very good with onlay restoration"],"correct":2,"explanation":"A crack that extends to the floor of the pulp chamber and into the furcation area has a very poor to hopeless prognosis. The 7 mm pocket along the crack line confirms that the crack is communicating with the periodontium, causing irreversible periodontal destruction along the crack. No restoration can predictably seal a crack extending into the furcation. Root canal treatment followed by extraction and implant, or extraction alone, is the typical management. Detection of cracks before they extend this far (cuspal coverage at the first sign of crack) dramatically improves prognosis."},
    {"id":"endo_33","type":"sba","stem":"A patient presents 48 hours after the start of root canal treatment reporting severe throbbing pain, swelling, and inability to close the mouth. Temperature is 38.2°C and there is moderate trismus. The access cavity is sealed. What is this called and how should it be managed?","options":["Dry socket — place sedative dressing","Inter-appointment flare-up — open the tooth for drainage, debride canals with NaOCl, prescribe amoxicillin if systemic signs, and analgesics","Normal post-operative response — prescribe ibuprofen only","Refer to A&E for IV treatment immediately in all cases","Re-cement and prescribe chlorhexidine mouthwash"],"correct":1,"explanation":"An inter-appointment endodontic flare-up is an acute onset of pain and/or swelling within 24–72 hours of root canal treatment. Systemic signs (fever >38°C, trismus) indicate significant infection. Management: (1) re-open the tooth and provide drainage through the canal, (2) thorough canal debridement and irrigation with NaOCl, (3) leave open for 24–48 hours if drainage is established, or place calcium hydroxide if the canal is clean, (4) prescribe amoxicillin 500 mg TDS for 5 days (or metronidazole if allergic to penicillin). Refer to secondary care if airway compromise is a concern."},
    {"id":"endo_34","type":"sba","stem":"When using electric apex locators (EAL) for working length determination, in which situation is their accuracy most likely to be reduced?","options":["When the canal is dry","When using a size 8 file","When the canal is excessively wet or flooded with irrigant, or when there is a communication with the oral environment (cracked tooth, furcation perforation)","In teeth with calcified canals","In teeth with multiple canals"],"correct":2,"explanation":"EALs work on the principle of measuring electrical impedance difference between the PDL and the oral mucosa. Their accuracy is reduced when: (1) the canal is excessively wet/flooded (NaOCl changes conductivity), creating a short circuit, (2) there is communication between the canal and the oral cavity (furcation perforation, cracked tooth — multiple ground connections), (3) metallic restorations short the file to the gingiva, or (4) the file is too small relative to the canal. Despite these limitations, modern EALs are accurate within ±0.5 mm in >90% of cases when used correctly."},
    {"id":"endo_35","type":"sba","stem":"A 42-year-old woman has chronic apical periodontitis of an upper left first premolar. The tooth has a post-retained crown. Non-surgical retreatment is planned. What is the risk of attempting to remove a cemented metal post?","options":["There is no risk; metal posts can always be removed safely","Post removal carries a risk of root perforation, root fracture, or stripping of dentine, all of which can render the tooth unrestorable","Post removal is only possible with Masserann kit surgery","Metal posts are soluble in chloroform, so no mechanical removal is needed","Post removal is not possible and surgery must always be performed instead"],"correct":1,"explanation":"Removal of a well-cemented post is a high-risk procedure. The main risks are: root fracture (especially with cast metal or threaded posts), root perforation during removal, excessive dentine removal weakening the root, and ledge formation. Techniques for post removal include ultrasonic vibration (loosening cement without force), the Eggler post remover, and dedicated post removal kits. If the risk of root fracture is too high, periapical surgery with retrograde root-end filling may be preferable to attempted post removal and non-surgical retreatment."},
    {"id":"endo_36","type":"sba","stem":"What is 'condensing osteitis' and how does it appear on a periapical radiograph?","options":["An aggressive resorptive process causing widespread bone loss","A reactive sclerotic bone formation in response to chronic low-grade inflammation, appearing as a well-defined or diffuse periapical radiopacity around the root apex","A type of osteoradionecrosis","A malignant bone lesion mimicking periapical pathology","A normal anatomical variant of the mandibular cortex"],"correct":1,"explanation":"Condensing osteitis is a focal reactive sclerosing osteitis occurring at the apex of a tooth with chronic pulpitis or necrosis, where low-grade inflammation stimulates bone formation rather than resorption. It appears as a diffuse or focal radiopacity around the apex (the apex is within the sclerotic bone). It is most common at lower molar and premolar apices. Unlike PCOD, it is associated with a non-vital or chronically inflamed tooth. After RCT, the sclerosis may persist, reduce, or rarely resolve completely."},
    {"id":"endo_37","type":"sba","stem":"A 30-year-old man has an upper central incisor with a periapical cyst confirmed on biopsy. The root canal treatment has been completed to a high standard. The cyst is 8 mm in diameter and shows no sign of reduction at 12-month follow-up. What is the next step?","options":["Monitor for a further 4 years before any intervention","Periapical surgery with cyst enucleation and retrograde root-end filling with MTA","Extract and provide an implant","Prescribe long-term antibiotics","Re-do the root canal treatment"],"correct":1,"explanation":"True radicular cysts (with a complete epithelial lining) may not resolve following RCT because the epithelial lining becomes self-sustaining (autonomous from the periapical inflammation). When a periapical lesion shows no reduction at 12 months after high-quality RCT, surgical intervention (periapical surgery) is indicated — the cyst is enucleated and the root apex resected and sealed with retrograde MTA. Periapical granulomas (which have no epithelial lining) typically resolve after RCT alone, whereas cysts may require surgery."},
    {"id":"endo_38","type":"sba","stem":"A 55-year-old man has a lower right first molar that requires root canal treatment. During access preparation, the pulp chamber floor shows the presence of calcifications. What instrument is most useful for locating calcified canal orifices?","options":["Large round bur in a high-speed handpiece","Endodontic explorer (DG16 probe) to feel along the chamber floor for canal orifices, combined with ultrasonic tips to carefully remove calcification","Standard tweezer to probe","Syringe with NaOCl only","Gates Glidden drill size 4 immediately"],"correct":1,"explanation":"Locating calcified canals: the DG16 endodontic explorer has a sharp, fine tip for tactile exploration of the pulp chamber floor to locate orifices. Ultrasonic tips (U-file or troughing tip) can carefully trough along the developmental groove lines where calcified canals are located, removing calcification without the aggressive removal associated with burs. Magnification (microscope) is essential. NaOCl irrigation helps clear debris. Aggressive use of burs risks perforation of the pulp floor. CBCT pre-operatively helps plan access in heavily calcified teeth."},
    {"id":"endo_39","type":"sba","stem":"A patient undergoing RCT has a suspected root perforation during instrumentation. The patient reports sudden pain and the apex locator gives an erratic reading. What is the ideal material for perforation repair?","options":["Gutta-percha alone","Zinc oxide eugenol temporary cement","Mineral trioxide aggregate (MTA) or Biodentine","Composite resin","Calcium hydroxide as a permanent seal"],"correct":2,"explanation":"MTA (mineral trioxide aggregate) and Biodentine are the materials of choice for perforation repair. MTA properties: biocompatible, seals against microleakage, can set in the presence of moisture, has high pH (antimicrobial), and stimulates cementum/bone formation. Perforations can be sealed internally using MTA under magnification. Prognosis depends on: size of perforation, location (furcation worst prognosis), time before repair (immediate is better), and level of contamination. Large or furcation perforations have a poor prognosis regardless of repair material."},
    {"id":"endo_40","type":"sba","stem":"Following a successful periapical surgery on an upper incisor, radiographic review at 1 year shows complete periapical healing. The retrograde filling is in place and the tooth is asymptomatic. What is the expected success rate (healing) for periapical surgery with MTA retrograde filling?","options":["30–40%","50–60%","70–75%","85–95%","100%"],"correct":3,"explanation":"Periapical surgery (apicectomy) with a retrograde MTA filling has reported success rates of 85–95% at 1 year in systematic reviews, particularly when performed under magnification (dental microscope), with ultrasonic root-end preparation, and MTA as the retrofilling material. These rates are significantly higher than older studies using amalgam retrograde fills (approximately 60%). Long-term (4–7 year) success rates are slightly lower (~85%). Factors improving prognosis: no pre-existing periodontitis, small periapical lesion, adequate root length remaining after apex resection."},
    {"id":"endo_41","type":"sba","stem":"A patient presents with a draining buccal sinus tract adjacent to an upper premolar. The tooth does not respond to cold or EPT. What investigation best confirms the source of the sinus tract?","options":["Blood count","CBCT scan of the quadrant","GP cone placed down the sinus tract tract, followed by a periapical radiograph showing the path of the cone","Exfoliative cytology of the sinus opening","Culture swab of the exudate"],"correct":2,"explanation":"The standard method to trace a sinus tract to its source is to insert a gutta-percha cone gently into the sinus tract until resistance is felt, then take a periapical radiograph. The GP cone points to the source of infection (usually the apex or lateral perforation of the offending tooth). This is simple, cheap, and reliable. A sinus tract may not always originate from the apex of the nearest tooth — it can track some distance and appear at a distant gingival site. CBCT is used when initial investigation is inconclusive."},
    {"id":"endo_42","type":"sba","stem":"A 35-year-old woman requires RCT of a lower left second molar. The tooth has a C-shaped root canal system visible on the periapical radiograph (single wide root with a groove on the lingual surface). What is the most important consideration?","options":["C-shaped canals require more irrigant and passive ultrasonic irrigation to clean fins and isthmus","C-shaped canals are always treated with extraction","Only one canal is present so the procedure is simpler","C-shaped canals always have an open apex","C-shaped canals require post placement"],"correct":0,"explanation":"C-shaped canals are most common in lower second molars (particularly in Asian populations) and have complex anatomy with fins, anastomoses, and isthmuses connecting canal spaces. Standard rotary files cannot reach all surfaces. Management requires: copious NaOCl irrigation, passive ultrasonic irrigation (PUI) to clean the fins, and adjunctive instruments (e.g. XP-Endo Finisher). Thermoplasticised obturation (e.g. System B warm vertical) is preferred over cold lateral condensation to ensure the complex anatomy is obturated. CBCT aids in understanding the anatomy."},
    {"id":"endo_43","type":"sba","stem":"A patient has a lower molar with irreversible pulpitis. The tooth is acutely painful and symptomatic. You administer an inferior alveolar nerve block but the patient reports persistent severe pain on commencing access preparation. Why can IANBs fail in acute irreversible pulpitis?","options":["The patient is faking pain","Irreversible pulpitis always requires general anaesthesia","Inflamed pulp tissue has a lower resting membrane potential (peripheral sensitisation) and tissue acidosis reduces the pH available for local anaesthetic to cross the nerve membrane in active (uncharged) form","The wrong local anaesthetic was used","Inferior alveolar nerve blocks never fail in the mandible"],"correct":2,"explanation":"IANB failure in hot pulpitis (Hot Tooth Syndrome) is due to: (1) peripheral sensitisation — inflammatory mediators lower the activation threshold of tetrodotoxin-resistant sodium channels in inflamed pulp nerves, requiring higher anaesthetic concentrations; (2) tissue acidosis (abscess/inflamed tissue pH 5–6) reduces the proportion of LA in the lipid-soluble, membrane-penetrating uncharged form (pKa of lidocaine 7.9, so less uncharged form at low pH). Management: supplemental IDB, intrapulpal injection, articaine infiltration, increased dose."},
    {"id":"endo_44","type":"sba","stem":"A 40-year-old woman has a symptomatic root-treated upper molar with clinical and radiographic evidence of apical periodontitis. The existing obturation is considered technically adequate (fill within 2 mm of apex, dense, no voids). What is the most appropriate management?","options":["Monitor for another 12 months","Non-surgical retreatment to replace the filling","Periapical surgery as first choice","Prescribe long-term metronidazole","Extract and place an implant"],"correct":2,"explanation":"When a symptomatic root-treated tooth has a technically adequate obturation with persistent apical pathology, the cause is likely: (1) a missed canal, (2) an isthmus/lateral canal, (3) E. faecalis biofilm beyond the apex, or (4) an extraradicular biofilm or cyst. Non-surgical retreatment is unlikely to be more effective than the original treatment if technically adequate. Periapical surgery is the appropriate next step, allowing direct visualisation and retrograde sealing of the apex and removal of any extraradicular pathology."},
    {"id":"endo_45","type":"sba","stem":"A 35-year-old man has an upper left lateral incisor that has been root-treated with a cast metal post and crown for 5 years. He attends with a sinus tract adjacent to the tooth. A periapical radiograph shows a well-defined periapical radiolucency and the post appears well-adapted. The crown is satisfactory. How should this case be managed?","options":["Prescribe antibiotics and review","Remove the crown and post, retreat the canal, and place a new post and crown — only if non-surgical retreatment is technically achievable","Extract immediately","Periapical surgery as first-line without attempting post removal","Leave the post in situ and place a new crown over it"],"correct":1,"explanation":"Management depends on clinical assessment of whether non-surgical retreatment is achievable (considering post length, root anatomy, risk of root fracture on post removal). If the post can be safely removed (ultrasonic loosening technique), retreating the canal addresses the source of infection more thoroughly than surgery alone. If post removal is too high-risk, periapical surgery with retrograde filling is the alternative. The crown condition and cost should be discussed with the patient to allow informed decision-making."},
    {"id":"endo_46","type":"sba","stem":"A 25-year-old woman has a lower second premolar with hyperalgesia to cold (pain score 9/10, lasting 45 seconds), spontaneous dull aching overnight, and no tenderness to percussion. There is no periapical radiolucency. What is the diagnosis?","options":["Normal pulp","Reversible pulpitis","Symptomatic irreversible pulpitis","Pulp necrosis — asymptomatic apical periodontitis","Symptomatic apical periodontitis"],"correct":2,"explanation":"Symptomatic irreversible pulpitis: the prolonged lingering pain to cold (>30 seconds, often described as lasting many minutes), spontaneous pain, and normal periapical radiograph are the hallmarks. The pulp is irreversibly inflamed and cannot recover; root canal treatment or extraction is indicated. There is no periapical pathology yet (normal PDL and bone), distinguishing it from apical periodontitis. Percussion tenderness develops when inflammation extends beyond the apex (apical periodontitis)."},
    {"id":"endo_47","type":"sba","stem":"A patient on long-term bisphosphonate therapy requires root canal treatment for a molar with acute apical abscess. The patient asks if root canal treatment is safe for them. What is the most important consideration?","options":["Root canal treatment is absolutely contraindicated in bisphosphonate patients","Root canal treatment is preferable to extraction as it avoids creating an extraction socket and reduces the MRONJ risk — discuss with prescribing physician","Antibiotics alone are sufficient to treat the infection in bisphosphonate patients","The MRONJ risk from RCT is identical to extraction","Refer to secondary care for RCT under general anaesthesia"],"correct":1,"explanation":"Root canal treatment is strongly preferred over extraction in patients on antiresorptive therapy, as it avoids creating an alveolar socket — the principal risk factor for MRONJ. A tooth treated endodontically avoids the alveolar bone exposure that follows extraction. If the tooth is unrestorable and extraction is unavoidable, SDCEP/AAOMS guidance on risk management applies (atraumatic extraction, primary closure, antibiotics). Discussion with the prescribing physician and clear documentation of the risk:benefit analysis is essential."},
    {"id":"endo_48","type":"sba","stem":"What is the role of Enterococcus faecalis in endodontic failure?","options":["E. faecalis is the primary cause of primary (initial) root canal infection","E. faecalis is a gram-negative anaerobe that dominates root canal biofilm","E. faecalis is a gram-positive facultative anaerobe that can survive in the root canal after treatment due to resistance to calcium hydroxide and starvation; it is strongly associated with persistent apical periodontitis","E. faecalis is eliminated by calcium hydroxide — hence inter-appointment dressing is curative","E. faecalis is only found in primary infections and disappears after obturation"],"correct":2,"explanation":"Enterococcus faecalis is the most studied microorganism in endodontic failure. It is a gram-positive facultative anaerobe that: (1) survives in nutritionally deprived environments (dentinal tubules), (2) is resistant to the high pH of calcium hydroxide (has proton pumps to maintain intracellular pH), (3) can be reactivated after prolonged dormancy, and (4) is found in ~70% of retreatment cases. It is not a major component of primary infections but emerges after treatment kills more sensitive anaerobes. Chlorhexidine and NaOCl are more effective against E. faecalis than calcium hydroxide."},
    {"id":"endo_49","type":"sba","stem":"A 45-year-old man has root canal treatment started on a lower first molar. At the second visit, he is pain-free. You place calcium hydroxide inter-appointment dressing and seal with IRM (intermediate restorative material). How long should calcium hydroxide be left in situ for maximum antimicrobial effect?","options":["24 hours only","1 week maximum","1–4 weeks is sufficient; prolonged use (>3 months) weakens the root structurally","Exactly 6 weeks","6–12 months minimum for all cases"],"correct":2,"explanation":"Calcium hydroxide inter-appointment dressing for 1–4 weeks is effective for: (1) antimicrobial action, (2) dissolution of residual organic tissue, (3) periapical pH modulation. Prolonged use beyond 3 months reduces the flexural strength and fracture resistance of dentine by hydrolysing the dentinal collagen matrix. The evidence for extended periods (6–12 months) in immature teeth is different (apexification protocol) where long-term Ca(OH)2 was the standard before MTA became available. For standard RCT, 1–4 weeks is optimal."},
    {"id":"endo_50","type":"sba","stem":"What is the minimum coronal restoration that should be placed to ensure long-term success of a root-treated lower premolar with intact mesial and distal marginal ridges?","options":["Temporary dressing for 12 months while monitoring","Amalgam or composite restoration of the access cavity only (without cusp coverage)","Full-coverage crown only","Cuspal coverage with bonded composite or onlay, with the access cavity incorporated","Glass ionomer cement core alone"],"correct":3,"explanation":"Following RCT, the coronal seal is critical for long-term success — coronal microleakage is a major cause of RCT failure. For a premolar with intact marginal ridges, cuspal coverage via a bonded composite onlay (incorporating the access cavity) is the appropriate minimum. Full crown coverage is not always necessary if adequate tooth structure remains. The access cavity must be incorporated into the restoration to ensure a complete coronal seal. Temporary dressings leak within weeks; leaving an access cavity unfilled invites bacterial recontamination of the canal system."},
    {"id":"endo_51","type":"sba","stem":"A 30-year-old man has a periapical radiograph showing a tooth with an incomplete root-end filling (void at the apex). The tooth is asymptomatic and the periapical area shows no evidence of pathology. What management is appropriate?","options":["Immediate retreatment to improve the fill","Monitor clinically and radiographically; if the tooth remains asymptomatic and periapical healing occurs, no retreatment is needed","Extract immediately","Prescribe prophylactic antibiotics indefinitely","Undertake periapical surgery"],"correct":1,"explanation":"Not all technically imperfect root canal fillings lead to failure. An asymptomatic tooth without periapical pathology, even with a void in the obturation, may remain stable — provided the coronal seal is intact. The outcome of RCT is most influenced by the presence or absence of periapical pathology pre-operatively and the quality of the coronal restoration. Retreatment of an asymptomatic tooth with no periapical pathology based on technical imperfection alone exposes the patient to unnecessary risk and is not evidence-based."},
    {"id":"endo_52","type":"sba","stem":"A 55-year-old woman has root canal treatment of an upper left canine with a single straight canal. Which file type would be least appropriate for shaping this canal?","options":["NiTi rotary files with continuous rotation","NiTi reciprocating files (Reciproc, WaveOne)","Large stainless steel K-files used in a reaming motion in a straight canal","Hand files used with a balanced-force technique","Self-adjusting file (SAF)"],"correct":2,"explanation":"Large stainless steel K-files used in a reaming motion in a narrow or curved canal are associated with iatrogenic errors (ledge formation, transportaion, zipping) due to their rigidity and their tendency to straighten curved canals. In a straight single canal like an upper canine, large SS files used with a reaming motion carry less risk than in curved canals, but they still do not produce a continuous taper and tend to create stepwise preparations. NiTi rotary and reciprocating files produce a smoother, tapered preparation with lower instrumentation stress due to superelasticity."},
    {"id":"endo_53","type":"sba","stem":"A patient requires root canal treatment of a lower left first molar. After access, the mesial canals are located and instrumented to size 25.06 taper. After placing rubber dam and taking a WL radiograph, you note the file tip appears to be at the radiographic apex. The apex locator reading shows the file is 0.5 mm short of the electronic apex. What is the correct working length?","options":["Use the radiographic WL — file at the radiographic apex is correct","Use the EAL reading — 0.5 mm short of the apex","Set WL 1 mm beyond the radiographic apex to ensure the apex is cleaned","Subtract 1 mm from the radiographic length","Use only the EAL without a radiograph"],"correct":1,"explanation":"Electronic apex locators (EALs) detect the CDJ (cemento-dentinal junction) which is typically 0.5–1.0 mm short of the radiographic apex. When there is a discrepancy between the radiograph (file appears to be at apex) and the EAL (reading 0.5 mm short), the EAL is considered more accurate for locating the actual apical constriction. The working length should be set at the CDJ per the EAL reading. The radiographic apex and anatomical apex do not always coincide with the CDJ."},
    {"id":"endo_54","type":"sba","stem":"A patient presents with a draining sinus on the buccal gingiva of the upper right lateral incisor. The tooth has an existing crown and responds negatively to cold. CBCT shows a periapical lesion with a labial cortical breach and root tip 2 mm from the nasal floor. Which treatment option avoids risk to the nasal floor?","options":["Conventional apicectomy from the buccal approach","Non-surgical retreatment — remove the crown and post, reinstrument, and re-obturate","Extraction and immediate implant","Leave untreated and prescribe antibiotics","Prescribe long-term bisphosphonates"],"correct":1,"explanation":"When the root apex is close to the nasal floor (or maxillary sinus), apicectomy carries the risk of creating an oro-nasal or oro-antral communication. Non-surgical retreatment — although complex (requires crown and post removal) — avoids this surgical risk and allows treatment from inside the tooth. If the root canal can be adequately cleaned and re-obturated, healing can occur without surgery. CBCT provides the anatomical information needed to make this decision safely."},
    {"id":"endo_55","type":"sba","stem":"A patient has an upper right second premolar with a calcified pulp chamber visible on a bitewing radiograph. The tooth requires RCT for chronic apical periodontitis. What is the most appropriate aid to help locate the calcified canal?","options":["Standard periapical radiograph only","CBCT to determine canal anatomy and depth of calcification before access","Ultrasonic scaler to vibrate the tooth","Bleach the tooth first","Adjust the speed of the dental drill"],"correct":1,"explanation":"CBCT is the most valuable pre-operative tool for planning RCT in calcified canals. It provides three-dimensional information: the depth of calcification, the remaining canal space, the relationship to adjacent structures, and the access angle needed. This reduces perforation risk during access. During access preparation, operating under magnification (microscope), using ultrasonic tips for fine decalcification, copious NaOCl irrigation (which lubricates and dissolves debris), and the DG16 probe for tactile exploration are the key techniques."},
    {"id":"endo_56","type":"sba","stem":"A 50-year-old man requires extraction of a heavily broken-down upper first molar that has failed root canal treatment. A dental implant is planned. The tooth has a periapical cyst. What is the most important consideration when placing an immediate implant?","options":["Immediate implants in infected sockets always fail","The periapical cyst must be completely enucleated before implant placement; implants can still be placed immediately if the socket is thoroughly debrided and there is adequate bone","The implant must be delayed for 12 months minimum after cyst enucleation","Only a conventional bridge should be placed after this extraction","Periapical cysts never resolve after implant placement"],"correct":1,"explanation":"Immediate implant placement into an infected (post-extraction) socket is possible with appropriate case selection and meticulous debridement. The critical steps are: thorough curettage and debridement of all granulation tissue/cyst lining, copious irrigation, confirmation that there is adequate bone for primary stability (≥3–4 mm beyond the socket apex), and antibiotic coverage. Research shows comparable survival rates for immediate implants in infected vs non-infected sockets when these protocols are followed, though delayed placement reduces risk."},
    {"id":"endo_57","type":"sba","stem":"Which statement about the use of chlorhexidine (CHX) 2% as an endodontic irrigant is most accurate?","options":["CHX 2% is more effective than NaOCl for dissolving organic tissue","CHX 2% and NaOCl can be mixed sequentially without any adverse reaction","CHX 2% is more effective than NaOCl against E. faecalis but cannot dissolve tissue; it should not be mixed sequentially with NaOCl as it forms a precipitate (parachloroaniline)","CHX 2% is the irrigant of choice for all root canal treatments","CHX is the only irrigant safe to use in the UK"],"correct":2,"explanation":"CHX 2% has excellent broad-spectrum antimicrobial activity including substantivity (prolonged action after contact) and is effective against E. faecalis. However: (1) it cannot dissolve organic tissue (unlike NaOCl), (2) it must NOT be mixed or used sequentially without thorough saline flushing between each irrigant, as CHX + NaOCl forms a brown-orange precipitate containing para-chloroaniline (PCA), a potential carcinogen that may also block dentinal tubules. Protocol: NaOCl irrigation throughout, then EDTA to remove smear layer, then final saline rinse, ± CHX if desired as a final rinse."},
    {"id":"endo_58","type":"sba","stem":"A 65-year-old woman has a symptomatic lower right first molar requiring RCT. She is on warfarin (INR 2.9). How should pulpal and periapical pain relief be managed at the emergency visit?","options":["No treatment possible until INR < 2.0","Pulpotomy or emergency debridement under local anaesthesia can proceed — access preparation and drainage do not require modification for anticoagulation","Refer to hospital for all endodontic treatment","Prescribe antibiotics only and defer all instrumentation","Place a temporary dressing without opening the pulp chamber"],"correct":1,"explanation":"Endodontic access preparation and pulpal debridement (pulpotomy or emergency RCT) are procedures that carry minimal bleeding risk comparable to restorative treatment. SDCEP guidance states that patients with a stable INR ≤4.0 can receive routine dental treatment without modifying anticoagulation. Emergency endodontic treatment to relieve acute pain should not be withheld in a warfarinised patient with a therapeutic INR. Local anaesthesia (with care to avoid intravascular injection) and standard haemostatic measures are all that is required."},
    {"id":"endo_59","type":"sba","stem":"A 28-year-old man has a horizontal root fracture of the upper right central incisor in the coronal third of the root. The tooth is luxated. What management is most appropriate according to IADT guidelines?","options":["Extract the coronal fragment and leave the apical fragment","Reposition and splint both fragments for 4 months with a semi-rigid splint","Extract the entire tooth","Root canal treat both fragments simultaneously","Leave untreated as root fractures are always self-healing"],"correct":1,"explanation":"IADT guidelines for horizontal root fractures: repositioning the luxated coronal fragment as close to anatomically as possible (confirmed radiographically) and placing a semi-rigid (flexible) splint for 4 weeks (mid-third fractures) up to 4 months (cervical third fractures — closer to the PDJ, longer healing time needed). Healing of root fractures occurs by calcified tissue, fibrous connective tissue, or granulation tissue. Prognosis is better for fractures in the apical third. RCT is only required for the coronal fragment if it becomes non-vital."},
    {"id":"endo_60","type":"sba","stem":"A 40-year-old man has an upper left second premolar with a 6 mm isolated probing depth on the mesial surface. The tooth is vital with no periapical pathology. The pocket communicates with the coronal pulp chamber when a probe is used. What is the most likely diagnosis and management?","options":["Localized Stage III periodontitis — periodontal treatment","Vertical root fracture — extraction","Developmental groove — RCT then periodontal treatment","Furcation involvement — tunnel preparation","Dens invaginatus with secondary infection — treat the invagination"],"correct":4,"explanation":"Dens invaginatus (dens in dente) is a developmental invagination of the enamel organ into the dentinal papilla during tooth formation, creating a channel from the oral environment to the pulp (or periapical area). It is most common in upper lateral incisors and upper second premolars. Bacteria colonise the invagination causing early pulp necrosis, often before the root apex is fully formed. The invagination communicates with the periodontal sulcus or apex causing localised bone loss. Management: RCT or surgical treatment of the invagination, with periodontal debridement."}
  ],
  prostho: [
    {"id":"prostho_1","type":"sba","stem":"A 68-year-old patient needs a complete upper denture opposing a mandibular complete denture. When recording jaw relations, the clinician notes the occlusal vertical dimension (OVD). Which of the following best describes the relationship between OVD and the rest vertical dimension (RVD)?","options":["OVD equals RVD","OVD is greater than RVD by 2–4 mm (freeway space)","OVD is less than RVD by 2–4 mm (freeway space)","OVD is greater than RVD by 8–10 mm","RVD and OVD are unrelated measurements"],"correct":2,"explanation":"Freeway space (interocclusal rest space) is the difference between RVD and OVD; typically 2–4 mm. OVD is therefore LESS than RVD. Excessive OVD causes muscle fatigue, clicking teeth, and soreness. Insufficient OVD leads to overclosure, angular cheilitis, and poor appearance."},
    {"id":"prostho_2","type":"sba","stem":"A complete lower denture is persistently unstable during mastication despite good occlusion and adequate peripheral seal. The most important anatomical factor contributing to mandibular complete denture instability compared with maxillary is:","options":["Reduced sulcus depth in the mandible","The smaller surface area of the mandibular denture bearing area","The presence of the tongue and floor-of-mouth musculature","Mandibular tori","The mental foramen location"],"correct":1,"explanation":"The mandibular denture bearing area is approximately half that of the maxillary, fundamentally limiting retention and stability. Additionally, muscular activity (tongue, cheeks, floor of mouth) dislodges the lower denture. The smaller surface area is the primary anatomical disadvantage; the tongue and musculature compound this."},
    {"id":"prostho_3","type":"sba","stem":"A patient presents with complete dentures that were made 15 years ago. She complains of angular cheilitis and a 'sunken' facial appearance. Intra-orally, the residual ridges are markedly resorbed. What is the most likely cause of her angular cheilitis?","options":["Candidal infection secondary to denture stomatitis","Overclosure due to excessive bone resorption and loss of OVD","Vitamin B12 deficiency","Ill-fitting denture causing trauma","Sjögren syndrome"],"correct":1,"explanation":"Progressive alveolar bone resorption over years reduces OVD, causing overclosure. The resulting deep labial commissure folds retain moisture, predisposing to angular cheilitis (often Candida-related secondarily, but the primary cause is overclosure). Replacement dentures with restored OVD is the definitive management."},
