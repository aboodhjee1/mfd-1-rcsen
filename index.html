    const qId = quizState.questions[quizState.currentIdx].id;
    if (!quizState.skipped.includes(qId)) quizState.skipped.push(qId);
    if (quizState.currentIdx < quizState.questions.length - 1) {
      quizState.currentIdx++;
    } else {
      const firstUnanswered = quizState.questions.findIndex(
        (qq, i) => !quizState.answers.find(a => a.qId === qq.id) && i !== quizState.currentIdx
      );
      if (firstUnanswered !== -1) quizState.currentIdx = firstUnanswered;
    }
    renderQuiz();
  });

  // Navigator dots
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      quizState.currentIdx = parseInt(el.dataset.nav);
      renderQuiz();
    });
  });

  // Remove question
  const removeBtn = document.querySelector('[data-remove]');
  if (removeBtn) removeBtn.addEventListener('click', () => {
    const qId = removeBtn.dataset.remove;
    if (!state.removedQuestions.includes(qId)) {
      state.removedQuestions.push(qId);
      saveState();
    }
    // Remove from current quiz session
    quizState.questions.splice(quizState.currentIdx, 1);
    // Also drop any recorded answer for this question
    quizState.answers = quizState.answers.filter(a => a.qId !== qId);
    if (quizState.questions.length === 0) { finishQuiz(); return; }
    if (quizState.currentIdx >= quizState.questions.length) {
      quizState.currentIdx = quizState.questions.length - 1;
    }
    renderQuiz();
  });

  // Bookmark
  const bmBtn = document.querySelector('[data-bookmark]');
  if (bmBtn) bmBtn.addEventListener('click', () => {
    const qId = bmBtn.dataset.bookmark;
    if (state.bookmarks.includes(qId)) {
      state.bookmarks = state.bookmarks.filter(x => x !== qId);
    } else {
      state.bookmarks.push(qId);
    }
    saveState();
    renderQuiz();
  });

  // Quit
  const quitBtn = document.querySelector('[data-quit-quiz]');
  if (quitBtn) quitBtn.addEventListener('click', () => {
    if (quizState.answers.length > 0 && !confirm('Exit and lose progress in this session?')) return;
    currentView = 'practice';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-view="practice"]').classList.add('active');
    render();
  });
}

function submitAnswer() {
  const q = quizState.questions[quizState.currentIdx];
  let userAnswer, correct;

  if (q.type === 'sba') {
    const selected = document.querySelector('[data-opt][data-temp-selected="1"]');
    if (!selected) { alert('Please select an answer.'); return; }
    userAnswer = parseInt(selected.dataset.opt);
    correct = userAnswer === q.correct;
  } else if (q.type === 'tf') {
    userAnswer = q.branches.map((_, i) => {
      const sel = document.querySelector(`[data-branch="${i}"][data-temp-selected]`);
      return sel ? sel.dataset.tempSelected === 'true' : null;
    });
    if (userAnswer.some(a => a === null)) { alert('Please answer all branches.'); return; }
    // For TF: correct only if ALL branches right (RCSI scoring is per-branch but we simplify here as overall)
    const branchesCorrect = userAnswer.filter((a, i) => a === q.branches[i].answer).length;
    correct = branchesCorrect === q.branches.length;
    // Save partial scoring
    quizState.answers.push({
      qId: q.id, userAnswer, correct,
      branchesCorrect, totalBranches: q.branches.length
    });
    updateQuestionStats(q.id, q.id.split(/\d/)[0], correct, branchesCorrect, q.branches.length);
    renderQuiz();
    return;
  }

  quizState.answers.push({ qId: q.id, userAnswer, correct });
  updateQuestionStats(q.id, getTopicForQuestion(q.id), correct);
  renderQuiz();
}

function getTopicForQuestion(qId) {
  for (const topicId in QUESTIONS) {
    if (QUESTIONS[topicId].some(q => q.id === qId)) return topicId;
  }
  return null;
}

function updateQuestionStats(qId, topicId, correct, branchesCorrect=null, totalBranches=null) {
  if (!state.questionStats[qId]) {
    state.questionStats[qId] = { attempts: 0, correct: 0, lastSeen: null };
  }
  state.questionStats[qId].attempts++;
  if (correct) state.questionStats[qId].correct++;
  state.questionStats[qId].lastSeen = Date.now();
  if (branchesCorrect !== null) {
    state.questionStats[qId].branchesCorrect = (state.questionStats[qId].branchesCorrect || 0) + branchesCorrect;
    state.questionStats[qId].totalBranches = (state.questionStats[qId].totalBranches || 0) + totalBranches;
  }
  saveState();
}

function finishQuiz() {
  const answered = quizState.answers.length;
  const totalQs = quizState.questions.length;
  const unanswered = totalQs - answered;
  let scoreNum = 0, scoreDenom = 0;
  quizState.answers.forEach(a => {
    if (a.totalBranches) {
      scoreNum += a.branchesCorrect;
      scoreDenom += a.totalBranches;
    } else {
      scoreNum += (a.correct ? 1 : 0);
      scoreDenom += 1;
    }
  });
  const pct = scoreDenom ? Math.round((scoreNum/scoreDenom)*100) : 0;
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="quiz-result">
      <div class="quiz-result-score">${pct}%</div>
      <div class="quiz-result-label">${scoreNum} of ${scoreDenom} ${quizState.answers.some(a=>a.totalBranches)?'branches':'questions'} correct · ${answered} of ${totalQs} answered${unanswered > 0 ? ` · ${unanswered} skipped` : ''}</div>
      <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-secondary" id="reviewQuiz">Review answers</button>
        <button class="btn" id="newSession">New session</button>
      </div>
    </div>
  `;
  document.getElementById('newSession').addEventListener('click', () => {
    currentView = 'practice';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-view="practice"]').classList.add('active');
    render();
  });
  document.getElementById('reviewQuiz').addEventListener('click', () => {
    quizState.currentIdx = 0;
    renderQuiz();
  });
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============ EVENT HANDLERS ============
function attachHandlers() {
  // Topic card click on dashboard → start quiz for that topic
  document.querySelectorAll('[data-topic]').forEach(el => {
    el.addEventListener('click', () => {
      const tid = el.dataset.topic;
      const removed = state.removedQuestions || [];
      startQuiz((QUESTIONS[tid] || []).filter(q => !removed.includes(q.id)), 'topic', tid);
    });
  });

  document.querySelectorAll('[data-quiz-topic]').forEach(el => {
    el.addEventListener('click', () => {
      const tid = el.dataset.quizTopic;
      const removed = state.removedQuestions || [];
      startQuiz((QUESTIONS[tid] || []).filter(q => !removed.includes(q.id)), 'topic', tid);
    });
  });

  document.querySelectorAll('[data-mode]').forEach(el => {
    el.addEventListener('click', () => {
      const mode = el.dataset.mode;
      const removed = state.removedQuestions || [];
      if (mode === 'mixed') {
        const all = Object.values(QUESTIONS).flat().filter(q => !removed.includes(q.id));
        startQuiz(all, 'mixed', 'Mixed practice');
      } else if (mode === 'weak') {
        const all = Object.values(QUESTIONS).flat().filter(q => !removed.includes(q.id));
        const weak = all.filter(q => {
          const s = state.questionStats[q.id];
          return s && s.attempts > 0 && s.correct === 0;
        });
        if (weak.length === 0) { alert('No wrong answers yet — keep practicing!'); return; }
        startQuiz(weak, 'weak', 'Weak spots');
      } else if (mode === 'bookmarks') {
        const all = Object.values(QUESTIONS).flat().filter(q => !removed.includes(q.id));
        const bm = all.filter(q => state.bookmarks.includes(q.id));
        if (bm.length === 0) { alert('No bookmarked questions yet. Bookmark questions during practice to review later.'); return; }
        startQuiz(bm, 'bookmarks', 'Bookmarked');
      } else if (mode === 'topic') {
        document.querySelector('.section-title:nth-of-type(2)').scrollIntoView({behavior:'smooth'});
      }
    });
  });

  // Restore individual removed question
  document.querySelectorAll('[data-restore]').forEach(el => {
    el.addEventListener('click', () => {
      const qId = el.dataset.restore;
      state.removedQuestions = state.removedQuestions.filter(id => id !== qId);
      saveState();
      render();
    });
  });

  // Restore all removed questions
  const restoreAllBtn = document.querySelector('[data-restore-all]');
  if (restoreAllBtn) restoreAllBtn.addEventListener('click', () => {
    if (confirm(`Restore all ${state.removedQuestions.length} removed questions?`)) {
      state.removedQuestions = [];
      saveState();
      render();
    }
  });

  // Exam date input
  const dateInput = document.getElementById('examDateInput');
  if (dateInput) {
    dateInput.addEventListener('change', (e) => {
      state.examDate = e.target.value;
      saveState();
      render();
    });
  }
}

// ============ INIT ============
render();
</script>
